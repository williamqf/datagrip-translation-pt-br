<span>
Substitua <code>import module_name</code> por <code>from module_name import</code> e remova os qualificadores das referências a nomes em <code>module_name</code>.
</span>
<br/>
<span>
  O uso de <code>from module_name import</code> permite um melhor controle sobre quais itens de <code>module_name</code> podem ser acessados.
</span>
