Cria uma declaração <code>attr_accessor</code> para uma variável de instância. O <code>attr_accessor</code> é um açúcar sintático para definir métodos de leitura (reader) e escrita (writer), sendo equivalente ao seguinte código:
<pre><code>
class Foo
  def foo
    @foo
  end

  def foo=(foo)
    @foo = foo
  end
end
</code></pre>
