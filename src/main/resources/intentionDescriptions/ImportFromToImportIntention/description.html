<span>
Converte <code>from module_name import</code> em <code>import module_name</code> e qualifica quaisquer nomes importados desse módulo com o nome do módulo.
</span>
<br/>
<span>
Com a instrução <code>import module_name</code>, não é necessário atualizar nenhuma instrução <code>from module_name import</code> para começar a usar outro item do mesmo módulo.</span>
</body>
