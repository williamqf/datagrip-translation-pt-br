Cria uma declaração <code>attr_writer</code> para variáveis de instância. <code>attr_writer</code> é um açúcar sintático para definir métodos de escrita (writer), sendo equivalente ao seguinte código:
<pre><code>
class Foo
  def foo=(foo)
    @foo = foo
  end
end
</code></pre>
