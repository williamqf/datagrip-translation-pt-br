<span>
Aplica as <a href="https://en.wikipedia.org/wiki/De_Morgan%27s_laws">Leis de De Morgan</a> realizando as seguintes substituições em expressões booleanas:</span>
<pre>
<b>a or b</b> por <b>not(not a and not b)</b> ou
<b>a and b</b> por <b>not(not a or not b)</b>
</pre>
