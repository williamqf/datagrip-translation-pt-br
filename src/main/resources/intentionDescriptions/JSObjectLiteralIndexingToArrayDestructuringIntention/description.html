Se o mesmo item for indexado nos valores das propriedades de um objeto (por exemplo, <code>var x = {a: r[0], b: r[1]}</code>), essas propriedades podem ser pré-atribuídas usando desestruturação e, em seguida, utilizadas em formato abreviado, a menos que um conflito de nomes seja detectado.
