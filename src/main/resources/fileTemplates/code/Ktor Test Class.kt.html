<html>
<body>
<table width="100%" border="0" cellpadding="5" cellspacing="0" style="border-collapse: collapse" bordercolor="#111111">
  <tr>
    <td colspan="3"><font face="verdana" size="-1">
      Este é um template usado para criar classes de teste JUnit 4 para aplicações Ktor.</font>

  </tr>
</table>

    <td valign="top"><nobr><font face="verdana" size="-2"><b>${NAME}</b></font></nobr></td>
    <td width="10"></td>
    <td width="100%" valign="top"><font face="verdana" size="-1">O nome da classe a ser criada</font></td>
  </tr>
  <tr>
    <td valign="top"><nobr><font face="verdana" size="-2"><b>${CLASS_NAME}</b></font></nobr></td>
    <td width="10"></td>
    <td width="100%" valign="top"><font face="verdana" size="-1">O nome da classe a ser testada</font></td>
  </tr>
  <tr>
    <td valign="top"><nobr><font face="verdana" size="-2"><b>${BODY}</b></font></nobr></td>
    <td width="10"></td>
    <td width="100%" valign="top"><font face="verdana" size="-1">O corpo da classe gerada</font></td>
  </tr>
