dataspell.read.only.message=Este é um módulo de aprendizado de demonstração. Não realize seu trabalho aqui. Ele pode ser sobrescrito pela IDE.\n<a href="ift.allow">Clique</a> para habilitar modificações no módulo de aprendizado.
jupyter.onboarding.apply.split=Clique em "{0}".
jupyter.onboarding.balloon.about.debug.panel=A janela de ferramentas "{0}" fornece uma barra de ferramentas com diversas ações de depuração.
jupyter.onboarding.balloon.add.notebook=Agora, vamos adicionar um novo notebook. Clique com o botão direito em {0} e selecione {1}.
jupyter.onboarding.balloon.attach.button=Clique neste ícone para anexar um diretório e selecionar o diretório {0}.
jupyter.onboarding.balloon.workspace.view=Clique na faixa para abrir a janela de ferramentas {0}.
jupyter.onboarding.change.ui.settings=Nesta lição, o <ide/> alterará algumas configurações da UI para o estado padrão. Suas preferências serão restauradas após concluir ou sair da lição.
jupyter.onboarding.cleanup.notification.action=Desanexar {0}
jupyter.onboarding.cleanup.notification.description=Deseja desvincular do workspace o diretório que contém os arquivos de aprendizagem?
jupyter.onboarding.cleanup.notification.title=Limpar o espaço de trabalho dos dados de aprendizado
jupyter.onboarding.cleaunup.informer=Para remover o diretório {0} do seu espaço de trabalho, clique com o botão direito em {0} e selecione <strong>Desanexar diretório…</strong> no menu de contexto. Ou você também pode clicar no link na notificação de limpeza.
jupyter.onboarding.confirm.package.installation=Basta pressionar {0} para iniciar a instalação.
jupyter.onboarding.congratulations=Parabéns! Você concluiu a lição.
jupyter.onboarding.debug.introduction=Parece que ocorreu um erro de execução. Por padrão, o traceback na área de saída está recolhido. Expanda o traceback para visualizar os detalhes. Vamos depurar o erro.
jupyter.onboarding.debugging.workflow.description=<strong>Atenção</strong>: a definição da função e sua chamada estão em células diferentes. Para realizar a depuração nesta situação, primeiro você deve executar todas as células (já concluído). Em seguida, você precisa iniciar a depuração da célula que contém a definição. Vamos começar agora.
jupyter.onboarding.finish.completion=Certifique-se de que {0} esteja selecionado e pressione {1}.
jupyter.onboarding.fix.problem=Você precisa corrigir o nome da coluna para corrigir o erro detectado. Substitua {0} (com hífen no meio) por {1} (sublinhado necessário).
jupyter.onboarding.insert.second.cell=Agora, adicione uma segunda célula. Pressione {0} ou clique em "{1}" e selecione {2}.
jupyter.onboarding.install.matplotlib=Vamos instalar o {0}. Pressione {1} para invocar ações de contexto.
jupyter.onboarding.install.pandas=O <ide/> destaca erros e problemas no editor. Linhas vermelhas indicam que você precisa instalar o pacote {0}. Mova o cursor sobre a palavra {1} em destaque e pressione {2}.
jupyter.onboarding.intro=Com o suporte ao Jupyter Notebook oferecido pelo DataSpell, você pode criar e se conectar a notebooks locais, trabalhar remotamente e executar e depurar células de código.
jupyter.onboarding.invoke.search.everywhere=Você pode executar a célula atual e todas as células abaixo dela. Pressione {0} duas vezes para encontrar as ações necessárias do IDE.
jupyter.onboarding.lesson.name=Vamos conhecer o {0}
jupyter.onboarding.module.description=Visão geral das principais funcionalidades no {0}.
jupyter.onboarding.module.name=Tour de integração
jupyter.onboarding.notebook.name=Digite qualquer nome (por exemplo, {0}) e pressione {1}.
jupyter.onboarding.open.results.in.tab=Você pode visualizar os resultados da execução das células na área de saída. Clique em "{0}" para abrir o DataFrame em uma aba separada do editor.
jupyter.onboarding.press.run.below=Pressione {0} após selecionar o item desejado. Observe que existem várias outras ações contendo {1} e {2}, portanto, certifique-se de selecionar o item correto.
jupyter.onboarding.progress.text.installing.specific.package=Instalando o pacote {0}
jupyter.onboarding.promo.text=Novo no {0}? Aproveite ao máximo seu IDE. Familiarize-se com as ferramentas e fluxos de trabalho básicos.
jupyter.onboarding.rerun.all=Agora você pode executar novamente as células corrigidas. Clique em "{0}" ou pressione {1}.
jupyter.onboarding.return.to.editor=Vamos voltar ao Notebook.
jupyter.onboarding.right.click.for.split=Vamos colocar a função e seu uso em células separadas. Clique com o botão direito e selecione "{0}" no menu de contexto.
jupyter.onboarding.run.and.select.below=Vamos executar esta célula e adicionar outra abaixo. Podemos fazer isso com a ação "{0}": clique em "{1}" ou pressione {2}.
jupyter.onboarding.run.first.sample=Há uma célula de código de exemplo criada para esta lição. Pressione {0} para executá-la.
jupyter.onboarding.second.cell.intro=Vamos criar alguns gráficos matplotlib com base em dataframes do kernel do Python. A segunda célula está sem o nome da primeira coluna necessária para o gráfico de pizza.
jupyter.onboarding.set.up.sdk=O <ide/> detectará automaticamente o interpretador Python e instalará os pacotes necessários. Caso precise alterar o interpretador, você poderá selecionar o desejado <callback id="{0}">manualmente</callback>.
jupyter.onboarding.start.completion=Você pode completar rapidamente os nomes das colunas a serem incluídas no gráfico: comece a digitar {0} e a lista de completamento será exibida. Ou você pode pressionar {1} e continuar digitando para filtrar a lista.
jupyter.onboarding.start.to.debug.call=Agora você pode depurar células que contêm chamadas de função.
jupyter.onboarding.start.typing.run.below=Lembre-se da caixa de diálogo {0}. Ela ajuda a encontrar entidades no código ou ações e configurações do IDE. Basta começar a digitar {1}.
jupyter.onboarding.third.cell.intro=Em seguida, vamos modificar o conjunto de dados inicial e calcular o número médio de kernels para o Python 3.4 e 3.5.
jupyter.onboarding.wait.indexing=Agora o <ide/> precisa coletar dados sobre os pacotes instalados. Isso deve levar algum tempo.
jupyter.onboarding.wait.pandas.installation=Aguarde a conclusão da instalação do pacote.