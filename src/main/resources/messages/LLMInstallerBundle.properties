welcome.feature.ds.data.wrangler.agent.steps=Abra o <i>Chat de IA</i><p>Peça ao {0} para realizar manipulações nos dados<p>Revise a ação sugerida e execute-a.
welcome.feature.ds.data.wrangler.agent.title=Transforme os dados pelo chat
welcome.feature.ds.export.agent.before.steps={0} pode exportar dados e notebooks para diferentes formatos por meio do chat.
welcome.feature.ds.export.agent.steps=Abra o <i>AI Chat</i><p>Peça ao {0} para exportar seu notebook ou dados<p>Revise a ação sugerida e execute-a.
welcome.feature.ds.export.agent.title=Exporte dados e notebooks pelo chat
welcome.feature.ds.jupyter.agent.before.steps={0} pode criar diferentes tipos de células e executar notebooks através do chat.
welcome.feature.ds.jupyter.agent.steps=Abra o <i>AI Chat</i><p>Peça ao {0} para criar um tipo específico de célula (por exemplo, importar um arquivo CSV para um dataframe) em seu notebook<p>Revise a ação sugerida e execute-a.
welcome.feature.ds.jupyter.agent.title=Crie células e execute notebooks através do chat
welcome.feature.ds.python.env.agent.before.steps={0} pode instalar/desinstalar pacotes Python através do chat.
welcome.feature.ds.python.env.agent.steps=Abra o <i>AI Chat</i><p>Peça ao {0} para instalar/desinstalar o pacote<p>Revise a ação sugerida e execute-a.
welcome.feature.ds.python.env.agent.title=Gerencie pacotes Python pelo chat
welcome.feature.ds.workspace.agent.before.steps={0} pode gerenciar arquivos e pastas em seu espaço de trabalho pelo chat.
welcome.feature.ds.workspace.agent.steps=Abra o <i>Chat de IA</i><p>Peça ao {0} para anexar uma pasta ao workspace ou criar/remover um arquivo<p>Revise a ação sugerida e execute-a.
welcome.feature.ds.workspace.agent.title=Gerencie os arquivos do workspace pelo chat
welcome.feature.explain.code.afterSteps=Isso também funciona para expressões regulares, consultas SQL, expressões cron e outros fragmentos injetados.
welcome.feature.explain.code.steps=Selecione um fragmento de código e clique com o botão direito para abrir o menu de contexto.<p>Selecione <b>AI Actions</b> e, em seguida, <b>Explain Code</b>.
welcome.feature.explain.code.title=Explicar código
welcome.feature.explain.commit.steps=Abra a <icon src="com.intellij.icons.AllIcons.General.Vcs"/> <b>janela de ferramentas Git</b>.<p>No painel de commits, selecione um ou mais commits para o {0} explicar.<p>Clique com o botão direito e selecione <b>Explicar commit com {0}</b> no menu de contexto.
welcome.feature.explain.commit.title=Explicar commits
welcome.feature.explain.runtime.error.title=Explicar erros de tempo de execução
welcome.feature.explain.runtime.errors.before.steps=Se ocorrer um erro de tempo de execução:
welcome.feature.explain.runtime.errors.steps=Clique em <icon src="com.intellij.llmInstaller.common.branding.LLMInstallerAIAssistantBrandingIcons.Logo16"/> <b>Explicar com IA</b> no console.<p>Como alternativa, selecione a mensagem de erro, abra o menu de contexto e clique em <b>Explicar mensagem de erro com IA</b>.
welcome.feature.find.potential.problems.steps=Selecione um fragmento de código e clique com o botão direito para abrir o menu de contexto.<p>Selecione <b>Ações de IA</b> e depois <b>Encontrar problemas</b>.
welcome.feature.find.potential.problems.title=Encontrar erros e sugerir correções
welcome.feature.generate.commit.messages.after.steps=<b>Personalização de prompts:</b><br>Abra as configurações de commit no canto inferior direito do campo de mensagem de commit.<p>Como alternativa, vá para <b>Configurações | Ferramentas | {0} | Biblioteca de Prompts | Geração de Mensagem de Commit</b>.
welcome.feature.generate.commit.messages.before.steps=Se houver alterações:
welcome.feature.generate.commit.messages.steps=Abra a <icon src="com.intellij.icons.AllIcons.Actions.Commit"/> <b>janela de ferramentas Commit</b>.<p>Clique em <icon src="com.intellij.llmInstaller.common.branding.LLMInstallerAIAssistantBrandingIcons.Logo16"/> <b>Gerar Mensagem de Commit com {0}</b>.
welcome.feature.generate.commit.messages.title=Gerar mensagens de commit
welcome.feature.inline.code.completion.after.steps=Você também pode invocar o preenchimento de código manualmente pressionando <shortcut actionId="CallInlineCompletionAction"/>.<p><b>Dica:</b> Passe o mouse sobre a sugestão de código para alterar a tecla que aceita as sugestões do {0}.
welcome.feature.inline.code.completion.steps=Comece a digitar no editor para obter sugestões instantâneas.<p>Para aceitar o código sugerido, pressione <shortcut actionId="InsertInlineCompletionAction"/>.<p>Para rejeitar a sugestão, pressione <kbd>Esc</kbd>.
welcome.feature.inline.code.completion.title=Completar código
welcome.feature.name.suggestions.steps=Posicione o cursor sobre o item que deseja renomear.<p>Clique com o botão direito para abrir o menu de contexto, selecione <b>Refatorar</b> e, em seguida, <b>Renomear</b>.
welcome.feature.name.suggestions.title=Sugerir nomes
welcome.feature.refactoring.suggestions.afterSteps=<b>Dica:</b> Você pode usar esta e outras <b>Ações de IA</b> sem selecionar um fragmento de código específico. Posicione o cursor na classe ou no método desejado, escolha a ação de IA e selecione o fragmento de código necessário.
welcome.feature.refactoring.suggestions.steps=Selecione um fragmento de código e clique com o botão direito para abrir o menu de contexto.<p>Selecione <b>Ações de IA</b> e, em seguida, <b>Sugerir Refatoração</b>.<p>No campo com o código refatorado, clique em <b>Mostrar Diff</b> para abrir o visualizador de diff.
welcome.feature.refactoring.suggestions.title=Sugestões de refatoração
welcome.feature.reference.files.before.steps=Realize consultas direcionadas em seu projeto.<br><br><b>Exemplos de prompt:</b><ul><li>Onde em <b>#thisFile</b> há um erro off-by-one?<li>Qual das minhas <b>#localChanges</b> introduziu um erro off-by-one?<li>Onde em <b>#file:Foo.kt</b> há um erro off-by-one?<li>Onde em <b>#symbol:Foo</b> há um erro off-by-one?<li>Qual valor <b>#jupyter_var:foo</b> possui?</ul>
welcome.feature.reference.files.title=Arquivos de referência
welcome.feature.sql.ask.insights.before.steps=Como o chat {0} conhece o seu esquema, você pode fazer perguntas sobre os objetos do seu banco de dados. Exemplos de prompts:<ul><li><i>Quais tabelas contêm colunas com o tipo BLOB?</i><li><i>A quais tabelas <code>film_actor</code> está conectada via chaves estrangeiras?</i><li><i>Quais tabelas estão particionadas?</i><li><i>Quais tabelas não possuem chaves primárias?</i></ul>
welcome.feature.sql.ask.insights.title=Solicite insights sobre seu banco de dados
welcome.feature.sql.attach.schema.before.steps=Você pode melhorar a qualidade das consultas SQL geradas fornecendo o contexto do esquema do banco de dados com o qual você está trabalhando.
welcome.feature.sql.attach.schema.steps=Abra o chat de IA.<p>Anexe o esquema com a ajuda da lista suspensa.<p>O {0} terá acesso à estrutura do esquema anexado, fornecendo informações sobre ele para o LLM.<p>Comece a conversar.
welcome.feature.sql.attach.schema.title=Anexe um esquema para melhorar a interação
welcome.feature.sql.correct.syntax.steps=Coloque o cursor sobre o erro de sintaxe no seu código SQL.<p>Selecione <i>Ações de IA</i> e, em seguida, <i>Corrigir Problema de SQL</i>.<p>O código será corrigido no editor.<p>Use a ação <i>Desfazer</i> se não estiver satisfeito com o resultado.
welcome.feature.sql.correct.syntax.title=Corrija sua sintaxe SQL
welcome.feature.sql.create.prompt.library.after.steps=<b>Dica</b>: Você pode usar a variável <code>$SELECTION$</code> para adicionar a seleção de código atual ao prompt.<br/><br/>Exemplos de prompt:<ul><li><i>Converter este SQL para o dialeto PostgreSQL.</i><li><i>Escrever código Python que duplique a funcionalidade desta consulta.</i><li><i>Refatorar este SQL: substituir subconsulta por CTE.</i><li><i>Adicionar aliases a todas as tabelas nesta consulta.</i></ul>
welcome.feature.sql.create.prompt.library.steps=Clique com o botão direito no editor para abrir o menu de contexto e vá para <i>Ações de IA</i> | <i>Adicionar Seus Prompts</i>.<p>Clique em <i>Salvar Prompt Atual</i> no campo de entrada de chat do {0} para salvar seu prompt.<p>Como alternativa, abra as configurações e selecione <i>Ferramentas</i> | <i>{0}</i> | <i>Biblioteca de Prompts</i>.
welcome.feature.sql.create.prompt.library.title=Criar uma biblioteca de prompts
welcome.feature.sql.explain.queries.after.steps=<b>Dica</b>: isso também funciona para expressões regulares, snippets de Python e outros fragmentos de código.
welcome.feature.sql.explain.queries.steps=Coloque o cursor em uma consulta e clique com o botão direito para abrir o menu de contexto.<p>Selecione <i>Ações de IA</i> e, em seguida, <i>Explicar código</i>.
welcome.feature.sql.explain.queries.title=Explicar consultas
welcome.feature.sql.generate.by.nl.request.steps=Coloque o cursor em qualquer lugar no editor ou selecione um fragmento de código e pressione <shortcut actionId="AIAssistant.Editor.ForceGenerateCodeInEditor"/>.<p>No campo de entrada, escreva seu prompt para a consulta e pressione <kbd>Enter</kbd>.<p>Para ajustar os resultados, escreva um prompt de acompanhamento no campo de entrada e pressione <kbd>Enter</kbd>.<p>Aceite a consulta gerada pressionando {0} ou rejeite-a pressionando <kbd>Esc</kbd>.
welcome.feature.sql.generate.by.nl.request.title=Gerar consultas SQL com base em solicitações em linguagem natural
welcome.feature.sql.optimize.query.before.steps=Você pode enviar uma consulta para o chat de IA junto com o resultado do uso de <i>Explain Plan</i> na consulta, e o {0} oferecerá possíveis otimizações.
welcome.feature.sql.optimize.query.steps=Anexe o esquema ao chat – o contexto ajudará o {0} a otimizar sua consulta.<p>Crie um prompt com uma solicitação de otimização, incluindo a consulta, o resultado do <i>Explain Plan</i> e a solicitação.<p>Cole a refatoração sugerida e teste-a.
welcome.feature.sql.optimize.query.title=Solicitar otimização de consulta
welcome.feature.sql.use.correct.objects.before.steps={0} lida perfeitamente com o uso incorreto de objetos de banco de dados. Conhecendo o esquema do banco de dados, ele pode detectar qual objeto você deveria ter usado.
welcome.feature.sql.use.correct.objects.steps=Coloque o cursor sobre o erro de sintaxe no seu código SQL.<p>Selecione <i>Ações de IA</i> e, em seguida, <i>Corrigir problema de SQL</i>.<p>O código será corrigido no editor.<p>Use a ação <i>Desfazer</i> se não estiver satisfeito com o resultado.
welcome.feature.sql.use.correct.objects.title=Solicitar o uso dos objetos de banco de dados corretos
welcome.feature.unit.tests.generation.afterSteps=<b>Personalização de prompt:</b><br>Vá para <b>Configurações | Ferramentas | {0} | Biblioteca de Prompts | Gerar Testes Unitários</b>.
welcome.feature.unit.tests.generation.steps=Posicione o cursor em qualquer lugar dentro de um método e clique com o botão direito para abrir o menu de contexto.<br>Como alternativa, pressione <shortcut actionId="ShowIntentionActions"/>.<p>Selecione <b>Ações de IA</b> e depois <b>Gerar Testes de Unidade</b>.<p>Para aprimorar o código gerado, clique em <b>Especificar</b> e adicione novos requisitos na aba <b>AI Diff</b>.
welcome.feature.unit.tests.generation.title=Gerar testes
welcome.feature.write.documentation.after.steps=<b>Personalização de prompts:</b><br>Acesse <b>Configurações | Ferramentas | {0} | Biblioteca de Prompts | Escrever Documentação</b>.
welcome.feature.write.documentation.steps=Selecione um fragmento de código e clique com o botão direito para abrir o menu de contexto.<p>Selecione <b>Ações da IA</b> e, em seguida, <b>Escrever Documentação</b>.
welcome.feature.write.documentation.title=Gerar documentação
