welcome.feature.ask.about.code.after.steps=<b>Dica:</b> {0} reconhece a posição do cursor e o código selecionado no editor, o arquivo atual e as abas abertas.<br><br><b>Exemplos de prompts:</b><ul><li>O que o <b>secretMethod</b> faz?<li>Onde posso encontrar <b>authorization</b> no meu projeto?<li>Explique o código na posição do cursor.<li>O que o código selecionado faz?<li>Descreva o código no meu arquivo atual.<li>Quais arquivos estão abertos?</ul>
welcome.feature.ask.about.code.steps=Selecione um fragmento de código específico no editor e clique com o botão direito para abrir o menu de contexto.<p>Selecione <b>Ações da IA</b> e depois <b>Novo chat usando seleção</b>.
welcome.feature.ask.about.code.title=Pergunte sobre o código do projeto
welcome.feature.ask.about.local.changes.and.commits.beforeSteps=Você pode fazer perguntas relacionadas ao VCS para o {0}.<p><b>Exemplos de prompts:</b><ul><li>Qual foi o último commit?<li>Mostre-me o histórico de commits.<li>Mostre-me a diferença entre os dois últimos commits.<li>Mostre-me as alterações não commitadas.<li>Quais são as alterações de saída?</ul>
welcome.feature.ask.about.local.changes.and.commits.title=Perguntar sobre o VCS
welcome.feature.ask.questions.before.steps=Você pode fazer perguntas gerais de programação ao {0}.<br><br><b>Exemplos de prompts:</b><ul><li>O que é o teorema CAP?<li>Como validar um endereço de e-mail usando regex?<li>Como gerar números inteiros aleatórios em um intervalo específico em Java?<li>Explique como escrever um arquivo Docker eficiente para implantar aplicativos Spring Boot.<li>Forneça instruções passo a passo sobre como criar um aplicativo CRUD usando Ktor com API RESTful.</ul>
welcome.feature.ask.questions.title=Faça perguntas de programação
welcome.feature.code.generation.steps=Posicione o cursor em qualquer lugar no editor ou selecione um fragmento de código e pressione {0}.<p>No campo de entrada, escreva seu prompt e pressione <kbd>Enter</kbd>.<p>Para melhorar os resultados, escreva seu prompt de acompanhamento no campo de entrada e pressione <kbd>Enter</kbd>.<p>Aceite o código gerado pressionando <shortcut actionId="ViewSource"/> ou rejeite-o pressionando <kbd>Esc</kbd>.
welcome.feature.code.generation.title=Gerar código a partir de descrições
welcome.feature.convert.to.another.language.steps=Abra um arquivo que deseja converter, posicione o cursor no editor e clique com o botão direito para abrir o menu de contexto.<p>Selecione <b>Ações de IA</b> e depois <b>Converter Arquivo para Outro Idioma</b>.<p>Selecione o idioma para o qual deseja converter o arquivo atual.
welcome.feature.convert.to.another.language.title=Converter para outro idioma
welcome.feature.craft.prompt.library.before.steps=Para criar seus próprios prompts, você pode:<ul><li>Clicar com o botão direito no editor para abrir o menu de contexto e ir para <b>Ações de IA | Adicionar seus prompts</b>.<li>Clicar em <icon src="com.intellij.icons.AllIcons.Actions.MenuSaveall"/> <b>Salvar prompt atual</b> no campo de entrada de chat do {0} para salvar seu prompt.<li>Ou abrir as configurações e selecionar <b>Ferramentas | {0} | Biblioteca de prompts</b>.</ul><br><b>Dica:</b> use a variável <b>$SELECTION</b> para adicionar a seleção de código atual ao prompt.
welcome.feature.craft.prompt.library.title=Criar biblioteca de prompts
welcome.feature.ds.connection.agent.before.steps={0} pode criar conexões de banco de dados pelo chat.
welcome.feature.ds.connection.agent.steps=Abra o <i>AI Chat</i><p>Peça ao {0} para se conectar ao banco de dados e fornecer as informações necessárias<p>Revise a ação sugerida e execute-a.
welcome.feature.ds.connection.agent.title=Crie conexões de banco de dados através do chat
welcome.feature.ds.data.agent.before.steps={0} pode gerenciar tabelas e arquivos de dados em seu espaço de trabalho por meio do chat.
welcome.feature.ds.data.agent.steps=Abra o <i>AI Chat</i><p>Peça ao {0} para anexar/desanexar um arquivo CSV/XLS ou tabela de banco de dados ao espaço de trabalho<p>Revise a ação sugerida e execute-a.
welcome.feature.ds.data.agent.title=Gerencie os dados anexados ao espaço de trabalho por meio do chat
