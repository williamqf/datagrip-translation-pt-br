dialog.diagram.graph.characteristics.title=Características Comuns do Gráfico
diagram.graph.characteristics.group.common=Comum
diagram.graph.characteristics.group.connectivity=Conectividade
diagram.graph.characteristics.group.cycles=Ciclos
diagram.graph.characteristics.node.count=Contagem de nós:
diagram.graph.characteristics.node.count.context.help=Número de nós no grafo
diagram.graph.characteristics.edge.count=Contagem de arestas:
diagram.graph.characteristics.edge.count.context.help=Número de arestas no grafo
diagram.graph.characteristics.average.degree=Grau médio:
diagram.graph.characteristics.average.degree.context.help=O <i>grau médio</i> mede o número de arestas em comparação com o número de nós e é definido como: <code>numberOfEdges / numberOfNodes</code>
diagram.graph.characteristics.density=Densidade:
# suppress inspection "GrazieInspection"
diagram.graph.characteristics.density.context.help=A <i>densidade</i> é a proporção de arestas do grafo em relação ao número máximo possível de arestas e é definida como: <code>numberOfEdges / (numberOfNodes * (numberOfNodes - 1))</code>
diagram.graph.characteristics.contains.self.loops=Contém auto-loops:
diagram.graph.characteristics.contains.self.loops.context.help=Uma aresta é chamada de <i>laço</i> se sua origem e seu destino forem o mesmo nó.
diagram.graph.characteristics.is.simple=É simples:
diagram.graph.characteristics.is.simple.context.help=Um grafo é chamado de <i>simples</i> se não contiver duas arestas distintas <code>e1, e2</code> onde <code>e1.source()</code> é igual a <code>e2.source()</code> e <code>e1.target()</code> é igual a <code>e2.target()</code>
diagram.graph.characteristics.contains.multiple.edges=Contém múltiplas arestas:
diagram.graph.characteristics.contains.multiple.edges.context.help=Duas arestas distintas <code>e1, e2</code> são chamadas de <i>arestas múltiplas</i> se conectarem os mesmos pares de nós em qualquer direção
diagram.graph.characteristics.is.connected=Conectado:
diagram.graph.characteristics.is.connected.context.help=Um grafo é chamado de <i>conexo</i> se houver um caminho não direcionado de arestas entre cada par de nós
diagram.graph.characteristics.is.biconnected=É biconexo:
diagram.graph.characteristics.is.biconnected.context.help=Um grafo é chamado de <i>biconexo</i> se não possui vértice de corte ou ponto de articulação, ou seja, nenhum nó cuja remoção desconecte o grafo
diagram.graph.characteristics.is.strongly.connected=É fortemente conexo:
diagram.graph.characteristics.is.strongly.connected.context.help=Um grafo é chamado de <i>fortemente conectado</i> se existir um caminho direcionado entre cada par de nós.
diagram.graph.characteristics.is.acyclic=É acíclico:
diagram.graph.characteristics.is.acyclic.context.help=Um grafo é chamado de <i>acíclico</i> se não contiver ciclos orientados
diagram.graph.characteristics.is.bipartite=É bipartido:
diagram.graph.characteristics.is.bipartite.context.help=Um grafo é chamado de <i>bipartido</i> se seus nós puderem ser particionados em dois conjuntos de modo que cada aresta conecte dois nós de conjuntos diferentes
diagram.graph.characteristics.is.planar=É planar:
