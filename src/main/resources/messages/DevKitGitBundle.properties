push.commit.intellij.platform.message.lacks.issue.reference.body=<html>Os commits listados abaixo alteram o código dos produtos JetBrains IDE. Siga o formato de mensagem de commit (consulte o arquivo README.md na raiz do repositório mono) e mencione na mensagem do commit uma tarefa do YouTrack que altere a distribuição do produto.<br/><br/> <a href="https://youtrack.jetbrains.com/newIssue">Crie</a> uma tarefa ou use qualquer ID de ticket do YT relacionado ao IDE.<br/><br/> </html>
