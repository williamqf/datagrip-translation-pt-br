scala.project.settings.form.performance.guidelines=<html><body>Para melhorar o desempenho:<br><ul><li><strong>Certifique-se de que há memória suficiente</strong><br>Para visualizar o uso atual da memória, clique com o botão direito na barra de status e ative o <em>Indicador de Memória</em> (ou <em>Localizar Ação</em> &ldquo;Gráficos de CPU e Memória ao Vivo&rdquo;). Se necessário, use <em>Ajuda | Alterar Configurações de Memória</em> para aumentar o tamanho máximo do heap.</li> <li><strong>Torne o código amigável ao realce</strong><br>Da mesma forma que o código tem desempenho em tempo de execução, o código tem desempenho em tempo de compilação. &ldquo;As leis do realce,&rdquo; assim como as leis da física, são reais e devem ser respeitadas para que o realce seja eficiente. Consulte as diretrizes sobre <a href="https://youtrack.jetbrains.com/issue/SCL-24113">como tornar o código amigável ao realce</a>.</li><li><strong>Tente o <em>Realce Incremental</em></strong><br>Ao usar o realce <em>Integrado</em>, você pode ativar <em>Configurações | Linguagens | Scala | Editor | Realce incremental</em> para <a href="https://youtrack.jetbrains.com/issue/SCL-23216">realçar apenas o que está visível</a>. (Pressione <code>Esc</code> duas vezes para realçar o arquivo inteiro.) Isso ajuda a reduzir o uso de CPU, RAM e bateria, especialmente em arquivos grandes e complexos, e também aumenta a responsividade.</li><li><strong>Use o realce do <em>Compilador</em> sem inspeções</strong><br>Usar <em>Configurações | Linguagens | Scala | Editor | Realce de erro: Compilador</em> ajuda com erros falsos em códigos complexos, mas em casos normais costuma ser mais lento e consome mais recursos. No entanto, se você também <em>Desativar inspeções integradas</em>, isso pode ajudar no uso de CPU, RAM e bateria em casos desafiadores para a inferência de tipo integrada.</li><li><strong>Use o realce <em>Integrado</em> se o código não compilar</strong><br>Se o código não compilar corretamente, o realce do <em>Compilador</em> é particularmente ineficiente. Nesse caso, tente o realce <em>Integrado</em>, possivelmente com o <em>Realce Incremental</em>. (Se houver falsos positivos, você pode desativar a opção <em>Sensível ao tipo</em>.)</li><li><strong>Capture snapshots de CPU e memória</strong><br>Às vezes, os problemas de desempenho são inerentes e dependem do código. Outras vezes, a causa é uma ineficiência nos algoritmos. Siga as diretrizes para <a href="https://intellij-support.jetbrains.com/hc/en-us/articles/207241235-Reporting-performance-problems">relatar problemas de desempenho</a> para capturar snapshots de CPU e memória e envie-os para o <a href="https://youtrack.jetbrains.com/issues/SCL#newissue">rastreador de problemas</a>, o que pode nos ajudar a diagnosticar e corrigir o problema.</li><li><strong>Entre em contato</strong><br>Se você tiver alguma dúvida, teremos prazer em respondê-la no <a href="https://discord.gg/aUKpZzeHCK">canal do discord do plugin Scala</a>.</li></ul></body></html>
