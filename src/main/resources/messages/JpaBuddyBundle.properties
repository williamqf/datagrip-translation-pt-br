liquibase.diff.feature.description=A geração de changelogs de Diff do Liquibase é uma funcionalidade extremamente útil que economiza muito tempo em tarefas rotineiras. Ao utilizar esse recurso, você pode gerar automaticamente um changelog do Liquibase contendo todo o código necessário para atualizar o banco de dados e torná-lo compatível com seu modelo JPA. Changelogs de Diff podem ser gerados comparando entidades JPA com um banco de dados, dois bancos de dados ou até mesmo entidades JPA de um branch do VCS com outro, o que é muito útil quando você não tem acesso ao banco de dados de destino.
liquibase.diff.in.existing.file.feature.description=A geração de diff de changelogs do Liquibase é um recurso extremamente útil que economiza muito tempo nas tarefas diárias. Ao usar este recurso, você pode gerar automaticamente changelogs do Liquibase contendo todo o código necessário para atualizar o banco de dados para que ele esteja em conformidade com o seu modelo JPA. Os changelogs de diff podem ser gerados comparando entidades JPA com um banco de dados, dois bancos de dados ou até mesmo entidades JPA em uma branch do VCS com outra branch do VCS, o que é muito útil quando você não tem acesso ao banco de dados de destino.
liquibase.init.feature.description=A ação de Changelog do Liquibase para Inicialização de Esquema ajuda os desenvolvedores a gerar um esquema de banco de dados do zero. Ela pode usar suas entidades JPA ou um banco de dados existente como fonte. Como resultado, você obterá um changelog do Liquibase contendo todos os comandos necessários para a inicialização do esquema. Esse recurso é muito útil se você estiver integrando o Liquibase em uma aplicação existente ou se decidir gerar um único script para a inicialização do banco de dados em vez de executar uma grande quantidade de changelogs antigos. Além disso, ele ajuda a configurar novos ambientes de desenvolvimento ou teste.
