ddl.generate.in.existing.file.feature.description=Com este recurso, você pode gerar instruções DDL para suas entidades JPA com apenas alguns cliques. Ele pode gerar scripts de inicialização para criar o esquema do banco de dados do zero ou gerar DDLs diferenciais para atualizar um banco de dados existente para um estado válido com base nas entidades JPA. Além disso, este recurso é muito útil para substituir a propriedade spring.jpa.hibernate.ddl-auto, que é propensa a erros. Ao usar as ações do JPA Buddy, você terá controle total sobre o DDL antes da execução, definirá mapeamentos de tipos Java -> DB corretos, mapeará campos usando conversores de atributos e tipos Hibernate, gerará instruções drop e muito mais.
