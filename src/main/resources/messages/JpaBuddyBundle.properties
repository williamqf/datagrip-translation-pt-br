re.columns.from.db.feature.description=Se você prefere projetar o banco de dados primeiro e depois escrever as entidades JPA para mapear as tabelas, este recurso será muito útil e economizará muito tempo no seu dia a dia! Com a ação "Colunas do BD", você poderá converter os atributos selecionados em campos em uma entidade JPA. Ele também suporta o mapeamento de associações ManyToOne, OneToOne, OneToMany e ManyToMany. O melhor de tudo é que ele não gera novamente a entidade inteira, mas adiciona novos campos à declaração da entidade existente.
re.entities.from.db.feature.description=Se você prefere projetar o banco de dados primeiro e depois escrever as entidades JPA para mapear as tabelas, ou se está desenvolvendo uma aplicação sobre um banco de dados existente, este recurso será muito útil e economizará muito tempo em sua rotina diária! Com a ação "Gerar Entidades do Banco de Dados", você pode converter tabelas selecionadas e suas características em entidades JPA com apenas alguns cliques, incluindo restrições, índices, propriedades de coluna e muito mais. Ele também suporta o mapeamento de associações ManyToOne, OneToOne, OneToMany e ManyToMany. O melhor de tudo é que ele não gera novamente a entidade inteira, mas sim adiciona novos campos às declarações de entidades existentes.
