projection.class.comment.help.tooltip=<html>variável <b>ENTITY_FQN</b> - o nome totalmente qualificado da entidade a partir da qual a projeção é criada.</html>
projection.comment.description=<html>A expressão regular de link de comentário permite que o JPA Buddy associe projeções às suas entidades JPA. Para especificar um marcador para o FQN da entidade de destino no comentário, use o padrão <b>(?&lt;entity&gt;.*)</b>.<br><br>Portanto, se a expressão regular for definida como <b>A Projection for the {@link (?.*)} entity.</b>, ela será resolvida no seguinte comentário: <i>//A Projection for the {@link io.jpabuddy.demo.entities.Project} entity.</i>.<br><br>Quando o campo estiver vazio, o recurso será desativado.</html>
projection.name.pattern.description=<html>Se você usa convenções de nomenclatura rígidas entre entidades JPA e projeções, você pode declará-las aqui. Isso permite que o JPA Buddy associe as projeções às suas entidades JPA.<br><br>Para especificar um placeholder para o nome de classe simples da entidade JPA de destino, use o padrão <b>(?&lt;entity&gt;.*)</b>. Por exemplo, (?.*)Prj significa que a classe MyEntityPrj será tratada como uma projeção de MyEntity.<br><br>Esse recurso é desativado quando o campo está vazio.</html>
