flyway.diff.feature.description=A geração de migrações versionadas do Flyway é um recurso extremamente útil que pode economizar muito tempo no trabalho rotineiro. Ao usar esta funcionalidade, você pode gerar automaticamente migrações contendo o DDL necessário para atualizar o banco de dados e torná-lo compatível com seu modelo JPA. Essas migrações do Flyway com DDL diferencial podem ser geradas comparando entidades JPA com um banco de dados, dois bancos de dados ou até mesmo entidades JPA de um branch VCS com outro branch VCS, o que é muito útil quando você não tem acesso ao banco de dados de destino.
flyway.init.feature.description=A ação de Migração de Inicialização de Esquema do Flyway ajuda os desenvolvedores a gerar um esquema de banco de dados do zero. Ela pode usar suas entidades JPA ou um banco de dados existente como origem. Como resultado, você obterá migrações versionadas do Flyway contendo a DDL necessária para a inicialização do esquema. Esse recurso é muito útil se você estiver integrando o Flyway a um aplicativo existente ou se decidir gerar um único script para a inicialização do banco de dados em vez de executar um grande número de migrações antigas. Além disso, ajuda a configurar novos ambientes de desenvolvimento ou teste.
follow.this.link.to.watch.feature=<a href="{0}">Assista a este vídeo curto</a> para ver o recurso em funcionamento.
following.licence.options=Você pode ativar este recurso por meio das seguintes opções: <ol><li>Se você ainda não experimentou o IntelliJ IDEA Ultimate, pode <a href="https://www.jetbrains.com/lp/idea-extended-trial/#:~:text=90%2Dday%20Trial%20for%20Your%20Whole%20Team&text=Complete%20a%20short%20form%20and,a%20set%20of%20simple%20criteria">solicitar uma avaliação agora mesmo para você ou para toda a sua equipe</a></li><li>Se você for estudante ou professor, estiver ministrando ou aprendendo em um curso ou desenvolvendo projetos de código aberto, poderá <a href="https://www.jetbrains.com/idea/buy/?section=discounts&billing=yearly">obter o IntelliJ IDEA Ultimate gratuitamente</a></li><li><a href="https://www.jetbrains.com/idea/buy/?section=commercial&billing=yearly">Comprar o IntelliJ IDEA Ultimate</a></li></ol>
from.db=Do banco de dados
from.dto=A partir de DTO
generate.ddl.by.entities=Ao usar a ação "Gerar DDL por Entidades", os desenvolvedores podem converter entidades em instruções DDL com apenas alguns cliques. Ela permite gerar scripts de inicialização para criar o esquema do banco de dados do zero ou DDL diferencial para atualizar um banco de dados existente para um estado válido de acordo com as entidades JPA. Além disso, esse recurso é muito útil para substituir a propriedade spring.jpa.hibernate.ddl-auto, que é propensa a erros. Com as ações do JPA Buddy, você terá controle total sobre o DDL antes da execução, poderá configurar o mapeamento correto de tipos Java -> BD, usar Attribute Converters e tipos Hibernate para mapear campos, gerar instruções drop e muito mais.
generate.ddl.from.run.console.feature.description=Esta exceção ocorre quando suas entidades JPA não podem ser mapeadas corretamente para as tabelas e campos do banco de dados. O JPA Buddy oferece um recurso muito útil que resolve esse problema facilmente. Gere o DDL diretamente do stack trace para preencher a lacuna entre as entidades JPA e o banco de dados! Em seguida, verifique o script gerado, execute-o e reinicie a aplicação. Configurar as propriedades ddl-auto ou hbm2ddl para recriar ou atualizar o banco de dados também pode resolver o problema, mas essa solução tem limitações significativas. Assista ao vídeo abaixo para conhecer essas limitações e a melhor solução proposta pelo JPA Buddy.
