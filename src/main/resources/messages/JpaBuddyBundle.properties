dto.and.mapper.feature.description=Os DTOs são essenciais para aplicações web, mas sua implementação traz código boilerplate. Dezenas de classes que quase duplicam suas entidades, cada uma com um mapper. Com o recurso de <b>Geração de DTO</b>, você economiza tempo em tarefas rotineiras. Você pode criar DTOs e mappers MapStruct baseados em definições de entidades JPA, mas isso não é tudo! Com o tempo, as entidades podem mudar e você precisará alterar os DTOs de acordo. O JPA Buddy também resolve esse problema. Ele permite <b>sincronizar entidades com seus DTOs</b> e vice-versa. Além disso, o JPA Buddy fornece a ação <b>Entidade a partir de POJO</b>, ajudando a gerar entidades JPA a partir de qualquer classe Java/Kotlin. Esse recurso pode ser útil se você desenvolve aplicações seguindo a abordagem API-first: primeiro definindo DTOs para a API e depois implementando o modelo de dados.
dto.class.comment.help.tooltip=<html>Variável <b>ENTITY_FQN</b> - O nome totalmente qualificado da entidade na qual o DTO se baseia.</html>
dto.comment.description=<html>A expressão regular do link de comentário permite que o JPA Buddy associe o DTO à sua entidade JPA. Para especificar um marcador para o FQN da entidade de destino no comentário, use o padrão <b>(?&lt;entity&gt;.*)</b>.<br><br>Portanto, se a expressão regular for definida como <b>A DTO for the {@link (?.*)} entity.</b>, ela será resolvida no seguinte comentário: <i>//A DTO for the {@link io.jpabuddy.demo.entities.Project} entity.</i>.<br><br>Quando o campo estiver vazio, este recurso será desativado.</html>
dto.comment.regexp=Expressão regular de link de comentário
dto.name.pattern.description=<html>Se você usa convenções de nomenclatura rígidas entre entidades JPA e DTOs, pode declará-las aqui. Isso permite que o JPA Buddy associe DTOs às suas entidades JPA.<br><br>Para especificar um marcador para o nome de classe simples da entidade JPA de destino, use o padrão <b>(?&lt;entity&gt;.*)</b>. Por exemplo, (?.*)Dto significa que a classe MyEntityDto será tratada como um DTO de MyEntity.<br><br>Quando o campo estiver vazio, o recurso será desativado.</html>
