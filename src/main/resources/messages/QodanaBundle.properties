third.party.plugins.privacy.note.text=A instalação de plugins é semelhante à instalação e execução de aplicativos.\nOs plugins são instalados no Qodana porque você os listou explicitamente no arquivo qodana.yaml.\nOs plugins recebem as mesmas permissões que o próprio processo da IDE. Prossiga apenas se você confiar nos plugins.\nTambém é recomendável verificar a documentação do fornecedor do plugin para obter detalhes sobre como o fornecedor pode processar seus dados pessoais.\nA JetBrains não é responsável pelo comportamento de quaisquer plugins de terceiros e seus fornecedores, incluindo o processamento de seus dados pessoais.\n
