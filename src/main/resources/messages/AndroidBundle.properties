project.upgrade.studio.notification.body.no.recommendation=Seu projeto está configurado com uma versão do SDK de compilação que não é compatível com esta versão do Android Studio ({0}). Atualmente, não existe nenhuma versão do Android Studio que ofereça suporte a este SDK de compilação. Você pode enfrentar problemas ao trabalhar neste projeto. Se isso ocorrer, relate um erro selecionando <b>Ajuda > Enviar Relatório de Erro…</b>.
project.upgrade.studio.notification.body.same.channel.recommendation=Seu projeto está configurado com uma versão do SDK de compilação que não é compatível com esta versão do Android Studio ({0}). Você pode atualizar para a versão {1} ou superior para ter um melhor suporte da IDE para este projeto. <br/><br/> Lembre-se de que o fluxo de atualização levará você para a versão mais recente do Android Studio. Se essa versão estiver várias versões à frente, ela poderá não ser mais compatível com certos componentes ou APIs usados pelo seu projeto.
