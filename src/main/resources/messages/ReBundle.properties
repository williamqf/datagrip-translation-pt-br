zero.table.found=<html><p>Não foi possível encontrar tabelas ou views no banco de dados para as quais entidades possam ser geradas. Isso pode ser devido a um dos seguintes motivos:</p><ol><li>A conexão de banco de dados selecionada está incorreta.</li><li>Não existem tabelas ou views no banco de dados.</li><li>As tabelas ou views estão localizadas em um esquema não padrão. </ol> Nesse caso, tente ajustar sua conexão de banco de dados seguindo estas <a href=''{0}''>instruções</a>.</html>