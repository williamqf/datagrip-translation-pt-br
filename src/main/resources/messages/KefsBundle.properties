settings.repositories.comment=Configure os repositórios Maven e os plugins conhecidos.<br/><br/>Apenas plugins conhecidos podem ser carregados na IDE. Se você deseja usar um plugin não listado aqui, você pode adicioná-lo <a href="https://github.com/Mr3zee/kotlin-external-fir-support/blob/main/GUIDE.md#artifacts-settings">manualmente</a>.<br/> Se você é um desenvolvedor e deseja adicionar seu plugin à lista padrão, por favor leia nosso <a href="https://github.com/Mr3zee/kotlin-external-fir-support/blob/main/PLUGIN_AUTHORS.md">guia do desenvolvedor</a>.<br/> As configurações são armazenadas no arquivo de projeto <a href="https://github.com/Mr3zee/kotlin-external-fir-support/blob/main/GUIDE.md#storing-settings">kotlin-plugins.xml</a>, e é recomendado adicionar este arquivo ao seu VCS.
