exceptions.action.default.body=Se você estiver desenvolvendo o plugin, precisará verificar as exceções e substituí-las por diagnósticos.<br/>Se você não for o desenvolvedor, poderá relatar este problema ao autor do plugin usando o botão abaixo.<br/>
exceptions.action.header=<strong>Sugestão de ação</strong><br/><br/>
exceptions.action.kotlinVersionMismatch.body=O arquivo jar foi carregado de forma insegura, usando um fallback sem a garantia de compatibilidade.<br/>Se você estiver desenvolvendo o plugin, tente publicá-lo com a mesma versão do Kotlin que a do IDE.<br/>Se você não for o desenvolvedor, pode relatar este problema ao autor do plugin usando o botão abaixo.<br/>
exceptions.action.local.body=O jar foi carregado de uma fonte local.<br/>Se você estiver desenvolvendo o plugin, tente alterar sua lógica e republicá-lo localmente no mesmo local. Ele será atualizado automaticamente na IDE.<br/>
exceptions.action.local.reloaded.body=O jar foi carregado de uma fonte local e recarregado pelo menos uma vez com o mesmo conteúdo, portanto a exceção persiste (por exemplo, durante uma atualização manual ou em segundo plano).<br/>Se você estiver desenvolvendo o plugin, tente alterar sua lógica e republicá-lo localmente no mesmo local. Ele será atualizado automaticamente na IDE.<br/>
exceptions.action.remote.reloaded.body=O arquivo jar foi carregado de uma fonte remota e recarregado pelo menos uma vez com o mesmo conteúdo, portanto a exceção persiste (por exemplo, durante uma atualização manual ou em segundo plano).<br/>Se você estiver desenvolvendo o plugin, tente alterar sua lógica, republicá-lo no mesmo local e executar a ação 'Update'<br/>
exceptions.analysis.header=<strong>Análise de Exceções</strong><br/><br/>
exceptions.analysis.incompatibility.body=A versão do plugin não é compatível com a versão do IDE.<br/>Isso pode ser a causa das exceções geradas.<br/>A API do compilador não é binariamente compatível entre as versões do Kotlin.<br/><br/>Versão do Kotlin indicada no jar: {0}<br/>Versão do Kotlin no IDE: {1}<br/><br/>
exceptions.analysis.probablyIncompatible.body=As exceções lançadas provavelmente são sinal de uma incompatibilidade binária entre a versão do Kotlin do IDE e a versão do Kotlin do plugin.<br/>O plugin indica que a versão do Kotlin coincide. No entanto, este pode não ser o caso.<br/><br/>Versão do Kotlin no IDE: {0}<br/><br/>
exceptions.runtime.tipHtml=Um plugin de compilador nunca deve lançar uma exceção<br/>Em vez disso, ele deve relatar erros usando diagnósticos
exceptions.runtime.title=Ocorreu(ram) exceção(ões) no tempo de execução
