inlay.parameters.python.hints.blacklist.explanation=<p>Para desativar as dicas de um método ou de uma função, use um dos seguintes padrões:</p><ul><li><code><b>(*info)</b></code> - todas as funções com um único parâmetro cujo nome termina com <em>info</em><br></li><li><code><b>(a, b)</b></code> - todas as funções com os parâmetros <em>a</em> e <em>b</em><br></li><li><code><b>*.put(self, key, value)</b></code> - todos os métodos <em>put</em> com os parâmetros <em>key</em> e <em>value</em><br></li><li><code><b>Foo.bar(self, a, b)</b></code> - método <em>bar</em> da classe <em>Foo</em> com os parâmetros <em>a</em> e <em>b</em><br></li><li><code><b>foo(\\&lt;star\\&gt;\\&lt;star\\&gt;kwargs)</b></code> - função <em>foo</em> com o parâmetro <em>**kwargs</em><br></li></ul><p>Nomes ou espaços reservados devem ser fornecidos para todos os parâmetros, incluindo os opcionais.<br>Nomes de métodos qualificados devem incluir nomes de classes ou espaços reservados para eles.<br>Use a ação "Não mostrar dicas para o método atual" {0} para adicionar padrões a partir do editor.</p>
