js.param.hints.blacklist.pattern.explanation=Para desativar dicas de um método ou função, use um dos seguintes padrões:<p style="margin-left: 5px"><code><b>(*info)</b></code> - todos os métodos de parâmetro único onde o nome do parâmetro termina com <em>info</em><br><code><b>(key, value)</b></code> - todos os métodos com parâmetros <em>key</em> e <em>value</em><br><code><b>*.put(key, value)</b></code> - todos os métodos <em>put</em> com os parâmetros <em>key</em> e <em>value</em><br><code><b>Console.log(*, *)</b></code> - o método <em>log</em> do tipo <em>Console</em> com exatamente dois parâmetros</p><br><p>Nomes ou espaços reservados devem ser fornecidos para todos os parâmetros, incluindo os parâmetros opcionais.<br>Nomes de métodos qualificados devem incluir nomes de classe ou interface, ou um espaço reservado para eles.<br>Use a ação "Não mostrar dicas para o método atual" {0} para adicionar padrões ao editar código.</p>
