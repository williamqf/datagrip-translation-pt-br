vm.option.module.version.description=Especifica a versão dos módulos que estão sendo compilados.
vm.option.ms.description=Define o tamanho inicial do heap Java.
vm.option.mx.description=Define o tamanho máximo do heap do Java.
vm.option.native.header.description=Especifica onde colocar os arquivos de cabeçalho nativos gerados.
vm.option.noclassgc.description=Desativa a coleta de lixo de classes.
