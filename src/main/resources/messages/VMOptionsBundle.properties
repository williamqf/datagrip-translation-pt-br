vm.option.future.description=Ativa as verificações mais rigorosas, antecipando o padrão futuro. Esta opção foi descontinuada e poderá ser removida em uma versão futura.
vm.option.generate.choice.debug.information.description=Gera apenas os tipos de informações de depuração especificados pela lista de palavras-chave separadas por vírgulas.
