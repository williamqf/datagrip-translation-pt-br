vm.option.showSettings.properties.description=Exibe todas as configurações de propriedades e continua.
vm.option.showSettings.system.description=(Somente Linux) Mostra a configuração do sistema host ou do contêiner e continua.
vm.option.showSettings.vm.description=Exibe todas as configurações relacionadas à VM e continua.
vm.option.source.description=Define a \\&lt;version\\&gt; da origem no modo de arquivo de origem.
vm.option.source.output.description=Especifica o diretório usado para armazenar os arquivos de origem gerados.
vm.option.source.path.description=Especifica onde encontrar os arquivos de origem.
