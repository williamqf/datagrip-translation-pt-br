vm.option.ss.description=Define o tamanho da pilha de threads do Java. O tamanho real pode ser arredondado para um múltiplo do tamanho da página do sistema, conforme exigido pelo sistema operacional.
vm.option.stdout.description=Redireciona a saída padrão para um arquivo.
vm.option.system.description=Substitui a localização dos módulos do sistema.
