vm.option.release.description=Compila o código-fonte de acordo com as regras da linguagem de programação Java para uma versão específica do Java SE e gera arquivos de classe destinados a essa versão.
vm.option.rs.description=Reduz o uso de sinais do sistema operacional pela Java/VM (consulte a documentação).
vm.option.share.auto.description=Usa dados de classe compartilhados se possível (padrão).
