vm.option.pkginfo.description=Especifica quando e como o javac gera arquivos package-info.class.
vm.option.plugin.description=Especifica o nome e os argumentos opcionais de um plug-in a ser executado.
vm.option.prefer.description=Especifica qual arquivo ler quando tanto um arquivo fonte quanto um arquivo de classe são encontrados para uma classe compilada implicitamente.
vm.option.print.description=Imprime uma representação textual dos tipos especificados para fins de depuração.
vm.option.print.processor.info.description=Imprime informações sobre quais anotações um processador foi solicitado a processar.
vm.option.print.rounds.description=Exibe informações sobre as rodadas de processamento de anotação.
vm.option.proc.description=Controla o processamento de anotações e a compilação: none (compilação sem processamento de anotações), only (apenas processamento de anotações) ou full (processamento de anotações e compilação).
vm.option.processor.description=Nomes dos processadores de anotação a serem executados.
vm.option.processor.module.path.description=Especifica o caminho do módulo usado para localizar processadores de anotação.
vm.option.processor.path.description=Especifica onde encontrar os processadores de anotação.
vm.option.prof.description=Gera dados de profiling da CPU.
