vm.option.add.exports.description=Atualiza \\&lt;module\\&gt; para exportar \\&lt;package\\&gt; para \\&lt;target-module\\&gt;, independentemente da declaração do módulo. \\&lt;target-module\\&gt; pode ser ALL-UNNAMED para exportar para todos os módulos não nomeados.
vm.option.add.modules.description=Especifica os módulos raiz a serem resolvidos além dos módulos iniciais.
vm.option.add.opens.description=Atualiza \\&lt;module\\&gt; para abrir \\&lt;package\\&gt; para \\&lt;target-module\\&gt;, independentemente da declaração do módulo.
vm.option.add.reads.description=Atualiza \\&lt;module\\&gt; para ler \\&lt;target-module\\&gt;, independentemente da declaração do módulo. \\&lt;target-module\\&gt; pode ser ALL-UNNAMED para ler todos os módulos sem nome.
vm.option.advanced.option.description=Especifica uma opção não padrão específica da JVM.
vm.option.agentlib.description=Carrega a biblioteca de agente nativo por \\&lt;libname\\&gt;.
vm.option.agentpath.description=Carrega a biblioteca de agente nativo por \\&lt;pathname\\&gt;.
