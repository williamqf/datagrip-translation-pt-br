vm.option.comp.description=Força a compilação de métodos na primeira invocação.
vm.option.debug.description=Não faz nada. Fornecido para compatibilidade retroativa.
vm.option.default.module.for.created.files.description=Especifica o módulo de destino de fallback para arquivos criados por processadores de anotação, caso nenhum seja especificado ou inferido.
vm.option.deprecation.description=Habilita ou desabilita o processamento de avisos de depreciação.
vm.option.diag.description=Mostra mensagens de diagnóstico adicionais.
