js.editor.basics.module.description=Domine os fundamentos do editor – comece a escrever códigos melhores e economize tempo em tarefas comuns desde o primeiro dia.
js.editor.basics.module.name=Básicos do Editor
js.editor.code.editing.comment.delete.unselect.move.up.1=Agora que você selecionou o código, poderá (des)comentá-lo ({0}), excluí-lo ({1}) ou reduzir a seleção ({2}).
js.editor.code.editing.comment.delete.unselect.move.up.2=Outra coisa que você pode fazer é mover este código para cima ou para baixo no arquivo. Vamos movê-lo para cima com {0}.
js.editor.code.editing.duplicate.delete.comment=Finalmente, vamos testar rapidamente as ações de linha mais populares, como duplicar linha, excluir linha ou transformá-la em comentário. Use {0} para duplicar a linha selecionada agora. Em seguida, pressione {1} e {2} para testar as outras ações de linha.
js.editor.code.editing.multi.caret.1=A seguir, temos a edição com múltiplos cursores. Use-a para economizar tempo ao modificar o código em vários lugares ao mesmo tempo. Posicione o cursor dentro da primeira tag {0} (linha 10). Em seguida, selecione todas as tags {1} dentro do mesmo elemento tr (linhas 10-12): pressione {2} seis vezes até que todas as tags necessárias sejam selecionadas.
js.editor.code.editing.multi.caret.2=Vamos substituir {0} por {1} e pressionar {2} para sair do modo de múltiplos cursores.
js.editor.code.editing.next=Isso é tudo para esta lição. Clique no botão abaixo para iniciar a próxima ou use {0}.
js.editor.code.editing.reformat.start=Vamos conferir algumas dicas e truques que podem ajudar você a editar código muito mais rápido. Para começar, não há necessidade de corrigir manualmente a formatação do código com o <ide/>. Reformate o código com {0}.
js.editor.code.editing.select.word=Agora, vamos ver como selecionar rapidamente trechos de código em um arquivo. Pressione {0} algumas vezes para selecionar completamente o segundo elemento tr (linhas 14-18).
js.editor.code.editing.tips.and.tricks.title=Dicas e Truques de Edição de Código
js.editor.code.inspection.checkmark=Se você olhar agora para o canto superior direito do editor, verá uma marca de seleção verde ({0}) confirmando que o arquivo não tem mais problemas. No entanto, ainda há um pequeno detalhe que pode ser otimizado para tornar o código mais curto. Posicione o cursor em {1} (linha 3) e pressione {2}.
js.editor.code.inspection.intro=Enquanto você trabalha no editor, o <ide/> analisa constantemente seu código, detecta vários problemas e sugere como ele pode ser melhorado. O arquivo aberto tem dois problemas destacados nas linhas 4 e 5. Vamos verificar o que são pressionando {0}.
js.editor.code.inspection.make.shorter=Agora, vamos encurtar nossa expressão de função. Selecione a correção rápida {0} e pressione {1}.
js.editor.code.inspection.next=Isso é tudo por esta lição. Clique no botão abaixo para iniciar a próxima ou use {0}.
js.editor.code.inspection.run.intention=Selecione {0} e pressione {1}.
js.editor.code.inspection.show.intentions.1=Você também pode usar {0} para pular de um erro para outro. Ou você pode explorar os problemas encontrados posicionando o mouse sobre eles.
js.editor.code.inspection.show.intentions.2=Neste arquivo, o IDE localizou uma variável não resolvida – uma que não foi definida em nenhum lugar do código. Ele sugere criar uma nova, {0}, como uma das correções possíveis, mas, em vez disso, precisamos adicionar um parâmetro book. Posicione o cursor em {1} e pressione {2} para ver a lista completa de correções.
js.editor.code.inspection.title=Inspeções de código
js.editor.completion.add.parameter=É assim que você pode consultar a documentação do JavaScript diretamente no <ide/>. Agora adicione {0} dentro de {1} para continuar.
js.editor.completion.choose.lookup=O <ide/> está repleto de recursos que ajudam você a escrever códigos melhores e a aumentar sua produtividade. Vamos começar com a conclusão de código. Ela permite que você programe mais rápido ao completar palavras-chave e símbolos de APIs da linguagem e dependências do projeto. Digite {0} e pressione {1} para autocompletar {2}.
js.editor.completion.choose.method=Assim, o completamento de código mostra sugestões sensíveis ao contexto enquanto você digita. Para adicionar uma dessas sugestões, você pode usar {0} como acabamos de fazer ou pressionar {1} para substituir um item existente. Agora adicione um {2} depois de {3}, digite {4} e complete automaticamente o método {5} com {0}.
js.editor.completion.console.log.argument=Finalmente, vamos completar a instrução {0}. Posicione o cursor dentro de {1} na linha 8 e adicione {2} usando a conclusão de código.
js.editor.completion.next=Isso é tudo para esta lição. Para iniciar a próxima, clique no botão abaixo ou use {0}.
js.editor.completion.parameter.info=A dica de ferramenta ({0}) que aparece após posicionar o cursor dentro de {1} permite procurar rapidamente os nomes dos parâmetros em métodos e funções. Em algumas situações, você pode querer revisar uma documentação mais detalhada. Vamos fazer isso agora pressionando {2}.
js.editor.completion.title=Conclusão de Código
js.editor.navigation.activate.structure=A janela de ferramentas {0} pode ajudá-lo a examinar um arquivo mais rapidamente. Ela fornece uma visão geral da estrutura e permite saltar para um item específico simplesmente digitando seu nome. Comece a digitar {1} em qualquer lugar na área da janela de ferramentas, pressione {2} e, em seguida, pressione {3} para fechar o painel e saltar para o código.
js.editor.navigation.choose.structure=Com este popup, você pode alternar rapidamente entre arquivos recentes e janelas de ferramentas da IDE. Uma dessas janelas de ferramentas pode ajudá-lo a navegar em um único arquivo. Clique na guia {0} para saber mais sobre isso.
js.editor.navigation.find.usages=Como resultado de nossas ações, o cursor moveu-se para {0} (linha 9). Vamos deixá-lo lá e pressionar {1} para abrir outra janela de ferramenta que pode ajudá-lo a encontrar rapidamente os usos de qualquer item.
js.editor.navigation.go.to.declaration=Observe o {0} ao lado de <strong>Ir para Declaração ou Usos</strong> – ele mostra os usos da definição e vice-versa. Vamos fechar o pop-up, posicionar o cursor em {1} (linha 16) e pressionar {0} para procurar sua declaração.
js.editor.navigation.hide.tool.window=Agora você pode ver os usos de giveTreat em todo o projeto e nas bibliotecas. Vamos fechar a janela de ferramentas com {0}.
js.editor.navigation.keymap.reference=Parabéns! Você chegou ao fim de {0}. Imprima a <a href="{1}">referência do mapa de teclas</a> para ter todos os atalhos à mão enquanto se sente em casa no <ide/>. Clique no botão abaixo para ir para o próximo módulo.
js.editor.navigation.recent.files=Vamos começar navegando pelo projeto. Pressione {0} para abrir o pop-up {1}.
js.editor.navigation.search.action=Agora que estamos na guia {0}, vamos começar a digitar {1} na barra de pesquisa para procurar um atalho para outro recurso de navegação útil.
js.editor.navigation.search.everywhere=Agora pressione {0} duas vezes para conhecer outro recurso que pode ajudá-lo a pesquisar mais rápido.
js.editor.navigation.search.everywhere.tabs=Esta é a janela pop-up {0}. Ela permite localizar instantaneamente qualquer ação, arquivo, classe ou símbolo, e exibe todas as correspondências em um único lugar. Se desejar realizar uma pesquisa mais específica, você pode pressionar {1} para alternar de {2} para qualquer outra aba, como {3} ou {4}. Ou você pode usar um atalho para abrir a aba específica de que precisa. Vamos tentar esta última opção com {5}.
js.editor.navigation.title=Navegação
js.editor.refactoring.replace=Substitua agora as duas ocorrências pela variável {0} chamada {1}.
js.editor.refactoring.select.expression=Vamos criar uma nova variável, {0}, que conterá {1}. Selecione a expressão {1} na lista e pressione {2}.
js.editor.refactorings.next=Você acabou de explorar duas maneiras de refatorar código no <ide/>. Imprima a <a href="{0}">referência do mapa de teclas</a> se preferir usar atalhos ou simplesmente continue usando o menu {1}. Clique no botão abaixo para iniciar a próxima lição ou use {2}.
js.editor.refactorings.rename=Com o {0}, você não precisa memorizar todas as refatorações ou seus atalhos. Clique em {1} para ver uma das refatorações mais populares em ação.
js.editor.refactorings.rename.apply=Renomeie o parâmetro {0} para {1} e pressione {2}. Esta ação aplicará as alterações em todos os arquivos do projeto.
js.editor.refactorings.shortcut=Muito bem! Vamos tentar refatorar o código usando um atalho. Coloque o cursor na propriedade {0} (linha 4) e pressione {1}.
js.editor.refactorings.this=O <ide/> possui <a href=''{0}''>vários refatoramentos</a> que podem reestruturar automaticamente o código existente sem alterar seu comportamento em todo o projeto. Vamos visualizar a lista de refatoramentos disponíveis para o parâmetro {1}. Pressione {2} ou selecione {3} no menu principal.
js.editor.refactorings.title=Refatorando seu código
js.getting.started.module.description=Descubra como simplificar os testes de unidade no {0} seguindo um exemplo que utiliza o Jest.
js.getting.started.module.name=Primeiros Passos com Testes
js.readme.description=Este curso interativo ajudará você a aprender como realizar algumas tarefas comuns, como refatorar código ou navegar por projetos.\n\nO curso será mais útil para quem é novo no {0}. No entanto, se você for um usuário experiente do {0} e quiser verificar se conhece todos os atalhos básicos, também o incentivamos a experimentá-lo.
js.readme.feedback.header=Compartilhar feedback
js.readme.usage.header=Como realizar o curso
js.testing.jest.coverage.result=Dessa forma, você pode gerar rapidamente um relatório de cobertura de código mostrando quantos arquivos foram cobertos por testes, incluindo a porcentagem de linhas cobertas nesses arquivos. Agora, vamos fechar o relatório de cobertura com {0}.
js.testing.jest.end=Parabéns! Você chegou ao fim deste módulo. A maior parte do que aprendemos também se aplica aos outros test runners que o <ide/> suporta (exceto pela cobertura de código e pelo modo watch). Para mais dicas e truques sobre como testar aplicativos com o Jest, confira <a href="{0}">este</a> post no blog. Se você usa outros test runners, pode querer explorar nossa <a href="{1}">ajuda na web</a>.
js.testing.jest.fix.test.1=Se você passar o mouse sobre {0} no editor, verá um pop-up explicando por que o teste falhou. A partir daí, você também poderá depurar um teste, se necessário.
js.testing.jest.fix.test.2=Vamos agora substituir o valor incorreto usado para {0}: na linha 6, substitua {1} por {2}.
js.testing.jest.navigate.1=Agora você pode ver a janela de ferramentas {0} com os resultados dos testes e um stack trace para os testes que falharam vindos de um executor de testes. Além de simplesmente acompanhar o progresso dos testes, você pode fazer muitas outras coisas aqui. Você pode reexecutar todos ({1}) ou apenas os testes que falharam ({2}), visualizar os testes aprovados ({3}) ou ativar o <a href="{4}">modo watch</a> para reexecutar automaticamente os testes após alterações.
js.testing.jest.navigate.2=Você também pode encontrar rapidamente um teste específico em {0}. Vamos tentar agora: coloque o cursor em qualquer lugar na área {0}, digite {1} e pressione {2} para ir para o nosso teste.
js.testing.jest.prepare=Com o <ide/>, todos os fluxos de trabalho de teste tornam-se mais fáceis. Vamos ver como. Para este módulo, usaremos o <a href="{0}">Jest</a> e um de <a href="{1}">seus projetos de exemplo</a> como exemplo, portanto, <strong>certifique-se de ter o Jest e o npm/Yarn instalados</strong> na sua máquina (consulte <a href="{2}">esta</a> página da web para obter mais informações). Começaremos criando uma configuração de execução/depuração específica para o Jest. No menu principal, selecione {3}. Em seguida, clique em {4}, adicione a configuração {5} com os parâmetros padrão e pressione {6} para salvá-la.
js.testing.jest.re.run.test.1=Agora que temos o valor correto para o resultado esperado, podemos executar o teste novamente. Está vendo o ícone {0} à esquerda do teste no editor? Esse ícone não apenas mostra o status dos testes executados recentemente, mas também permite que você execute e depure rapidamente um teste específico.
js.testing.jest.re.run.test.2=Clique nele e selecione {0}.
js.testing.jest.run=Agora, a nova configuração {0} está selecionada por padrão. Vamos clicar no botão {1} ({2}) logo ao lado dela.
js.testing.jest.success.run.coverage.1=Bom trabalho! O teste passou com sucesso.
js.testing.jest.success.run.coverage.2=Vamos dar uma olhada em outra ferramenta útil. Clique no ícone {0} localizado ao lado do menu de configurações de execução/depuração.
js.testing.jest.title=Fundamentos de testes em {0}