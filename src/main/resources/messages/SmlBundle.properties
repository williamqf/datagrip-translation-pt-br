sml.studiobot.onboarding.product.variant.selection.businesses.markdown=Inclui os recursos do Gemini para usuários individuais e foi projetado para atender às necessidades de privacidade, segurança e gerenciamento da sua empresa, como registros de auditoria e sem treinamento com o seu código. [Saiba mais](https://d.android.com/r/studio-ui/gemini-for-business)\n\nObservação: se você ainda não configurou o Gemini no Android Studio para empresas, saiba mais [aqui](https://d.android.com/r/studio-ui/gemini-for-business-setup).
sml.studiobot.onboarding.product.variant.selection.heading=Você está quase lá!
