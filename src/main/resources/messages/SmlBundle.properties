sml.studiobot.settings.codeSharing.alwaysShare.comment.html=<p>O Gemini usará o contexto do seu projeto junto com a sua consulta para oferecer melhores sugestões e respostas, de acordo com a nossa <a href="https://policies.google.com/privacy">política de privacidade</a></p><p></p><p>Observação: você pode usar um arquivo .aiexclude no seu projeto para excluir arquivos e diretórios específicos. <a href="https://d.android.com/r/studio-ui/gemini/data-and-privacy/aiexclude">Saiba mais</a></p>
