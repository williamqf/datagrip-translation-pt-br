sml.studiobot.onboarding.product.variant.selection.individuals.markdown=Use o poder do Gemini sem custos, com uma interface de chat que entende o seu código, preenchimento automático de código enquanto você escreve, além de geração e transformação de funções completas ou arquivos sob demanda. [Saiba mais](https://d.android.com/r/studio-ui/gemini)
