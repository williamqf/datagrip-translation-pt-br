sml.studiobot.onboarding.aida.simplified.step2.privacy.blurb1.markdown=O Aviso de Privacidade exibido abaixo e a [Política de Privacidade](https://policies.google.com/privacy) do Google descrevem como o Gemini processa seus dados.
sml.studiobot.onboarding.aida.simplified.step2.privacy.blurb2.markdown=Ao usar o Gemini no {0}, o Google coleta texto do chat, prompts, código relacionado, saída gerada, informações de uso de recursos relacionados e seu feedback. O Google utiliza esses dados para fornecer, melhorar e desenvolver produtos e serviços do Google e tecnologias de aprendizado de máquina, incluindo produtos corporativos do Google, como o Google Cloud.\n\nPara ajudar na qualidade e aprimorar nossos produtos, revisores humanos podem ler, anotar e processar seus prompts, código relacionado, saída gerada, informações de uso de recursos relacionados e seu feedback. Seus dados serão retidos por até 18 meses e armazenados de forma que o Google não possa identificar quem os forneceu. O Google não pode atender a solicitações de exclusão durante esse período.\n\n**Não inclua informações confidenciais ou pessoais que possam ser usadas para identificar você ou outras pessoas em seus prompts ou feedback.**
sml.studiobot.onboarding.aida.simplified.step2.privacy.title=Gemini e privacidade
sml.studiobot.onboarding.aida.simplified.step3.context.allowContext.dontAskAgain.text=Aplicar a todos os projetos
sml.studiobot.onboarding.aida.simplified.step3.context.allowContext.info.markdown=Permita o uso do contexto do projeto para ter acesso total a todos os recursos do Gemini.\n\nVocê também pode usar um arquivo .aiexclude no seu projeto para excluir arquivos e diretórios específicos. [Saiba mais](https://d.android.com/r/studio-ui/gemini/data-and-privacy/aiexclude)
sml.studiobot.onboarding.aida.simplified.step3.context.allowContext.radiobutton.text=Usar todos os recursos do Gemini (recomendado)
sml.studiobot.onboarding.aida.simplified.step3.context.blurb.markdown=O uso do contexto do projeto ajudará a gerar códigos mais específicos para sua base de código e projeto. Confirme com qual configuração você gostaria de começar. Elas podem ser alteradas a qualquer momento em **Settings > Tools > Gemini**.
sml.studiobot.onboarding.aida.simplified.step3.context.noContext.info.text=Não permita o uso do contexto do projeto e tenha acesso limitado aos recursos do Gemini. O Gemini usará apenas seus prompts e o histórico de conversas anteriores para responder. Alguns recursos, como o preenchimento de código por IA, não estarão disponíveis neste modo.
sml.studiobot.onboarding.aida.simplified.step3.context.noContext.radiobutton.text=Usar apenas o chat, sem contexto do projeto
sml.studiobot.onboarding.aida.simplified.step3.context.title=Usar contexto do projeto
