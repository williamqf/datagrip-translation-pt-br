sml.studiobot.onboarding.step2.privacyNotice.body.html=<html><head><style>%%STYLE%%</style></head><body>Este aviso e nossa <a href="https://policies.google.com/privacy">Política de Privacidade</a> descrevem como o Gemini lida com seus dados. Leia-os com atenção.<br/><br/><b>Seu código-fonte no Android Studio não está sujeito a este Aviso de Privacidade, exceto quando você o envia ao Gemini (por exemplo, comandos) ou quando usa o recurso de preenchimento de código por IA.</b> Quando você usa o Gemini no {0}, o Google coleta seus comandos, código relacionado, saídas geradas, informações de uso de recursos relacionados e seu feedback. O Google usa esses dados para fornecer, melhorar e desenvolver produtos e serviços do Google e tecnologias de aprendizado de máquina, incluindo produtos empresariais do Google, como o Google Cloud.<br/><br/>Para ajudar na qualidade e melhorar nossos produtos, revisores humanos podem ler, anotar e processar seus comandos, código relacionado, saídas geradas, informações de uso de recursos relacionados e seu feedback. <b>Não inclua informações sensíveis (por exemplo, confidenciais) ou pessoais que possam ser usadas para identificar você ou outras pessoas em seus comandos ou feedback.</b> Seus dados serão retidos por até 18 meses e armazenados de forma que o Google não possa identificar quem os forneceu. O Google não pode atender a solicitações de exclusão durante esse período.</body></html>
sml.studiobot.onboarding.step2.privacyNotice.body.markdown=Este aviso e nossa [Política de Privacidade](https://policies.google.com/privacy) descrevem como o Gemini gerencia seus dados. Leia-os com atenção.\n\n**Seu código-fonte no Android Studio não está sujeito a este Aviso de Privacidade, exceto quando você o envia para o Gemini (ex: prompts) ou quando usa o recurso de preenchimento automático de código com IA.** Quando você usa o Gemini no {0}, o Google coleta seus prompts, código relacionado, saída gerada, informações relacionadas ao uso de recursos e seu feedback. O Google usa esses dados para fornecer, melhorar e desenvolver produtos e serviços do Google e tecnologias de aprendizado de máquina, incluindo produtos corporativos do Google, como o Google Cloud.\n\nPara ajudar com a qualidade e melhorar nossos produtos, revisores humanos podem ler, anotar e processar seus prompts, código relacionado, saída gerada, informações relacionadas ao uso de recursos e seu feedback. **Não inclua informações confidenciais (por exemplo, sigilosas) ou pessoais que possam ser usadas para identificar você ou outras pessoas em seus prompts ou feedback.** Seus dados serão mantidos por até 18 meses e armazenados de uma forma que o Google não consiga identificar quem os forneceu. O Google não pode atender a solicitações de exclusão durante esse período.
sml.studiobot.onboarding.step2.privacyNotice.title.html=<html><b>Aviso de Privacidade do Gemini</b></html>
sml.studiobot.onboarding.step2.privacyNotice.title.plaintext=Aviso de Privacidade do Gemini
sml.studiobot.onboarding.step3.blurb.html=<html><head><style>%%STYLE%%</style></head><body><p>Ao testar o Gemini, veja algumas informações importantes:</p><ul><li>O Gemini usa seus comandos e o histórico de conversas anteriores para fornecer respostas. <b>Não é necessário compartilhar seu código para usar o Gemini.</b> <a href="https://d.android.com/r/studio-ui/gemini/data-and-privacy/sharing-code">Saiba mais</a></li><li>O Gemini pode gerar informações imprecisas ou ofensivas que não representam as opiniões do Google. Avaliar as respostas ajudará a tornar o Gemini melhor.</li><li><b>Use o código gerado com cautela.</b> <a href="https://g.co/legal/generative-code">Saiba mais</a></li></ul></body></html>
sml.studiobot.onboarding.step3.blurb.markdown=Ao experimentar o Gemini, aqui estão algumas coisas fundamentais que você deve saber:\n\n * O Gemini usa seus comandos e o histórico de conversas anteriores para fornecer respostas. **Você não precisa compartilhar seu código para usar o Gemini.** [Saiba mais](https://d.android.com/r/studio-ui/gemini/data-and-privacy/sharing-code)\n * O Gemini pode gerar informações imprecisas ou ofensivas que não representam as opiniões do Google. Avaliar as respostas ajudará a tornar o Gemini melhor.\n * **Use o código gerado com cautela.** [Saiba mais](https://g.co/legal/generative-code)
sml.studiobot.onboarding.step3.checkbox.html=<html><head><style>%%STYLE%%</style></head><body><p>Você deve ter pelo menos 18 anos de idade para usar o Gemini no {0}. O seu uso do Gemini está sujeito aos <a href="https://policies.google.com/terms">Termos de Serviço do Google</a> e aos <a href="https://policies.google.com/terms/generative-ai">Termos de Serviço Adicionais de IA Generativa</a></body></html>
sml.studiobot.onboarding.step3.checkbox.markdown=Você deve ter pelo menos 18 anos de idade para usar o Gemini no {0}. O uso do Gemini está sujeito aos [Termos de Serviço do Google](https://policies.google.com/terms) e aos [Termos de Serviço Adicionais de IA Generativa](https://policies.google.com/terms/generative-ai)
sml.studiobot.onboarding.step4.blurb.html=<html><head><style>%%STYLE%%</style></head><body><p>Obrigado por testar o Gemini!</p><p></p><p>Para concluir, confirme qual configuração de privacidade você gostaria de usar inicialmente. Elas podem ser alteradas a qualquer momento em <b>Configurações > Ferramentas > Gemini</b>.</p></body></html>
sml.studiobot.onboarding.step4.blurb.markdown=Obrigado por testar o Gemini!\n\nPara concluir, confirme qual configuração de privacidade você deseja usar para começar. Isso pode ser alterado a qualquer momento em **Configurações > Ferramentas > Gemini**.
