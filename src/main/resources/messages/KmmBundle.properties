wizard.project.distributionText=Selecione o tipo mais adequado de distribuição do framework Kotlin para o Xcode:\n<ul>\n<li><b>Gerenciador de dependências CocoaPods</b>: O módulo Kotlin Multiplatform é usado como uma dependência do CocoaPods. É necessário instalar a Ruby Gem.</li>\n<li><b>Framework comum</b>: O módulo Kotlin Multiplatform é integrado por meio de tarefas internas do Gradle e de configurações de etapas de build do Xcode. Não são necessárias ferramentas de terceiros.</li>\n</ul>
