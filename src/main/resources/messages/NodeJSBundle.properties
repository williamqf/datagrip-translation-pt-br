rc.nodejs.test.runner.type_script_loader.manual_set_loader_should_be_set_in_node_options=Para usar um loader diferente do <a href="https://tsx.is/">tsx</a> ou <a href="https://typestrong.org/ts-node/">ts-node</a>, especifique os parâmetros no campo de opções do Node: <code>--require loader-name</code> ou <code>--import loader-name</code>. Use <a href="https://nodejs.org/api/cli.html#--importmodule"><code>--import</code></a> para pré-carregar um módulo ECMAScript e use <a href="https://nodejs.org/api/cli.html#-r---require-module"><code>--require</code></a> com um módulo CommonJS.
