rc.nodejs.test.runner.node_js_version_does_not_support_correct_tests_filtration=A versão especificada do Node.js está em desenvolvimento, o que pode resultar em problemas na filtragem de testes e suítes. Use o Node.js 22.0.0 ou posterior. <a href="https://github.com/nodejs/node/issues/46728#issuecomment-1764968836">Saiba mais</a>.
rc.nodejs.test.runner.node_js_version_does_not_support_nested_tests_execution=A versão especificada do Node.js não suporta a <a href="https://github.com/nodejs/node/pull/48382">execução de testes aninhados</a>. Use o Node.js 20.4.0 ou posterior.
rc.nodejs.test.runner.node_js_version_does_not_support_test_runner=A versão especificada do Node.js não suporta o executor de testes. Use o Node.js 18.0.0 ou posterior.
rc.nodejs.test.runner.node_js_version_has_experimental_support=A versão especificada do Node.js suporta o executor de testes no modo experimental, portanto a filtragem de testes e suítes pode estar incorreta. Para suporte estável ao executor de testes, use o Node.js 20.0.0 ou posterior.
