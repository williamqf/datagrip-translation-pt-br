aidc.content.text=Este plugin pode registrar como você interage com o código, o IDE e plugins (por exemplo, AI Assistant e Junie). As interações registradas não são associadas à sua conta, mas podem conter texto/código que você edita e utiliza. Esses registros são usados para melhorar os IDEs, plugins e recursos de IA da JetBrains, incluindo o treinamento de modelos de ML. Sinta-se à vontade para participar dessa coleta de dados para ajudar a JetBrains a desenvolver modelos de IA melhores; você pode desativar essa opção nas configurações a qualquer momento. Para mais informações, entre em contato com <a href="https://jetbrains.slack.com/team/U0140KV2BT8">Maksim Sheptyakov</a>.
