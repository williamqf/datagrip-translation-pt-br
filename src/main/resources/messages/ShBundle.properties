this.word.is.constant.did.you.forget.the.on.a.variable=Esta palavra é uma constante. Você esqueceu o caractere '$' em uma variável?
this.word.is.outside.of.quotes.did.you.intend.to.nest.single.quotes.instead=Esta palavra está fora das aspas. Você pretendia 'aninhar '"'aspas simples'"' em vez disso'?
tilde.does.not.expand.in.quotes.use.home=O til não é expandido entre aspas. Use $HOME.
time.is.undefined.for.compound.commands.time.sh.c.instead='time' não está definido para comandos compostos. Use 'time sh -c' em seu lugar.
time.is.undefined.for.pipelines.time.single.stage.or.bash.c.instead='time' não está definido para pipelines. Use `time` em um único estágio ou `time bash -c` em vez disso.
tips.depend.on.target.shell.and.yours.is.unknown.add.a.shebang=As dicas dependem do shell de destino. Adicione um shebang.
to.assign.a.variable.use.just.var.value.no.set=Para atribuir uma variável, use 'var=valor', não 'set ..'.
to.assign.the.output.of.a.command.use.var.cmd=Para atribuir a saída de um comando, use 'var=$(cmd)'.
to.expand.via.indirection.use.name.foo.n.echo.name=Para expandir via indireção, use name="foo$n"; echo "${!name}".
to.read.lines.rather.than.words.pipe.redirect.to.a.while.read.loop=Para ler linhas em vez de palavras, utilize um pipe ou redirecione a saída para um loop 'while read'.
to.redirect.stdout.stderr.2.1.must.be.last.or.use.cmd.file.2.1.to.clarify=Para redirecionar stdout+stderr, '2>\\&1' deve vir por último (ou use '{ cmd > file; } 2>\\&1' para maior clareza).
to.run.commands.as.another.user.use.su.c.or.sudo=Para executar comandos como outro usuário, use 'su -c' ou 'sudo'.
tr.replaces.sets.of.chars.not.words.mentioned.due.to.duplicates='tr' substitui conjuntos de caracteres, não palavras (mencionado devido a duplicatas).
trapping.signals.by.number.is.not.well.defined.prefer.signal.names=A captura de sinais por número não está bem definida. Prefira nomes de sinais.
unexpected.start.of.line.if.breaking.lines.should.be.at.the.end.of.the.previous.one=Início inesperado de uma nova linha. Se estiver quebrando linhas, |/||/&& deve estar no final da anterior.
unknown.binary.operator=Operador binário desconhecido.
unknown.unaryoperator=Operador unário desconhecido.
use.a.subshell.to.avoid.having.to.cd.back=Use um ( subshell ) para evitar ter que retornar com cd.
use.array.item.to.append.items.to.an.array=Use 'array+=("item")' para anexar itens a um array.
use.cd.exit.in.case.cd.fails=Use cd … || exit em caso de falha do cd.
use.false.instead.of.empty.conditionals=Use 'false' em vez de condicionais '[' e '[[' vazios.
use.find.instead.of.ls.to.better.handle.non.alphanumeric.filenames=Use `find` em vez de `ls` para lidar melhor com nomes de arquivos não alfanuméricos.
use.foo.if.function.s.1.should.mean.script.s.1=Use 'foo "$@"' se o argumento '$1' da função deve representar o argumento '$1' do script.
use.for.arithmetics.e.g.i.i.2=Use `$((..))` para aritmética, por exemplo: i=$((i + 2))
use.glob.or.glob.so.names.with.dashes.won.t.become.options=Use './*glob*' ou '-- *glob*' para que nomes com traços não se tornem opções.
use.grep.q.instead.of.comparing.output.with.n=Use 'grep -q' em vez de comparar a saída com '[ -n .. ]'.
use.instead.of.deprecated=Use '$((..))' em vez do '$[..]' depreciado.
use.instead.of.to.avoid.subshell.overhead=Use `{ ..; }` em vez de `(..)` para evitar sobrecarga de subshell.
use.lower.to.support.accents.and.foreign.alphabets=Use '[:lower:]' para suportar acentos e alfabetos estrangeiros.
use.n.instead.of.z=Use `[ -n .. ]` em vez de `! [ -z .. ]`.
use.n.instead.of.z2=Use `-n` em vez de `! -z`.
use.notation.instead.of.legacy.backticked=Use a notação '$(…)' em vez da notação legada entre crases '' `…` ''.
use.or.quote.arguments.to.v.to.avoid.glob.expansion=Use `[[ ]]` ou coloque argumentos da opção '-v' entre aspas para evitar a expansão de glob.
use.own.script.or.sh.c.to.run.this.from.su=Use o próprio script ou sh -c '..' para executar isso a partir do su.
use.print0.0.or.find.exec.to.allow.for.non.alphanumeric.filenames=Use '-print0', '-0' ou 'find -exec +' para permitir nomes de arquivos não alfanuméricos.
use.single.quotes.otherwise.this.expands.now.rather.than.when.signalled=Use aspas simples para expandir apenas quando sinalizado, e não imediatamente.
use.spaces.not.commas.to.separate.array.elements=Use espaços, não vírgulas, para separar elementos de array.
use.upper.to.support.accents.and.foreign.alphabets=Use '[:upper:]' para suportar acentos e alfabetos estrangeiros.
use.var.command.to.assign.output.or.quote.to.assign.string=Use 'var=$(command)' para atribuir a saída (ou use aspas para atribuir uma string).
use.var.to.ensure.this.never.expands.to=Use "${var:?}" para garantir que isso nunca seja expandido para /* .
use.with.quotes.to.prevent.whitespace.problems=Use "$@" (com aspas) para evitar problemas com espaços em branco.
useless.cat.consider.cmd.file.or.cmd.file.instead='cat' redundante. Considere usar 'cmd < arquivo | ..' ou 'cmd arquivo | ..' em seu lugar.
useless.echo.instead.of.cmd.echo.foo.just.use.cmd.foo=echo redundante? Em vez de 'cmd $(echo foo)', use 'cmd foo'.
useless.echo.instead.of.echo.cmd.just.use.cmd=`echo` redundante? Em vez de `echo $(cmd)`, use `cmd`.
var.is.referenced.but.not.assigned='var' é referenciado, mas não atribuído.
var.was.modified.in.a.subshell.that.change.might.be.lost='var' foi modificado em um subshell. Essa alteração pode ser perdida.
variable.was.used.as.an.array.but.is.now.assigned.a.string=A variável foi usada como um array, mas agora recebeu uma string.
warning.deletes.a.system.directory=Aviso: exclui um diretório do sistema.
when.used.with.p.m.only.applies.to.the.deepest.directory=Quando usado com '-p', '-m' se aplica apenas ao diretório mais profundo.
which.is.non.standard.use.builtin.command.v.instead='which' não é padrão. Use o comando interno 'command -v' em seu lugar.
word.is.on.the.form.a.b.c.b.indicated.did.you.mean.abc.or.a.b.c=A palavra está no formato "A"B"C" (B indicado). Você quis dizer "ABC" ou "A"B"C"?
you.can.t.have.between.this.redirection.and.the.command.it.should.apply.to=Você não pode ter '|' entre este redirecionamento e o comando ao qual ele se aplica.
you.need.spaces.around.the.comparison.operator=Você precisa de espaços ao redor do operador de comparação.
you.probably.wanted.here=Use '\\&\\&'.