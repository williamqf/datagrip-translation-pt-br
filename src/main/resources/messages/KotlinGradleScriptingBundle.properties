notification.gradle.legacy.firstLoad=O code insight está desativado para evitar a configuração de build do Gradle.
notification.gradle.legacy.firstLoad.info=<div width=400><p>A fase de configuração do Gradle precisa ser executada para obter a Configuração do Script. O carregamento da configuração do script está desativado por padrão, pois pode consumir muitos recursos em projetos Gradle grandes.</p><p>Clique em "Carregar Configuração" para avaliar o script Kotlin DSL do Gradle.</p><p>Como alternativa, para carregar automaticamente a configuração quando o script for aberto pela primeira vez e recarregá-la sempre que os blocos de configuração do script de compilação forem alterados, você pode ativar o "recarregamento automático" para todos os scripts. Esta opção não é recomendada para projetos Gradle grandes com tempos de configuração longos.</p></div>
notification.gradle.legacy.outsideProject=Análise de código indisponível (projeto Gradle relacionado não vinculado).
notification.gradle.legacy.outsideProject.addToStandaloneHelp=<div width=400><p>O projeto Gradle que avalia este script precisa ser importado para ser analisado pela IDE. Tente reimportar o projeto Gradle vinculado ou vincule um novo projeto Gradle que avalie este script.</p><p>Como alternativa, você pode adicioná-lo aos scripts autônomos e sua configuração será carregada automaticamente.</p><p><b>OBSERVAÇÃO:</b> Cada script autônomo requer uma fase de configuração separada do Gradle para ser executado na atualização. Isso pode consumir muitos recursos para projetos Gradle grandes.</p></div>
notification.gradle.legacy.standalone.info=<div width=400><p>O projeto Gradle que avalia este script não foi importado no IDE. <br/><p><b>NOTA:</b> Cada script independente requer uma fase de configuração separada do Gradle para ser executada na atualização. Isso pode consumir muitos recursos em projetos Gradle grandes.</p></div>
notification.notEvaluatedInLastImport.addAsStandaloneAction=Adicionar aos scripts independentes
notification.notEvaluatedInLastImport.info=<div width=400><p>O projeto Gradle que avalia este script precisa ser importado para ser analisado pela IDE. Tente reimportar o projeto Gradle vinculado ou vincule um novo projeto Gradle que avalie este script.</p><p>Como alternativa, você pode adicioná-lo a scripts autônomos e sua configuração será carregada separadamente.</p><p><b>NOTA:</b> Cada script autônomo requer uma fase de configuração separada do Gradle a ser executada na atualização. Isso pode consumir muitos recursos em projetos Gradle grandes.</p></div>
