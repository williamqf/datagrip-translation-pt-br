ui.inspector.accessibility.audit.AccessibleActionNotNullInspection.description=A interface AccessibleAction deve ser implementada para a função "{0}". Ela permite que tecnologias assistivas, como leitores de tela e controle por voz, realizem ações sem interagir diretamente com o componente. Exemplos típicos de ações incluem clicar em um botão, ativar uma caixa de seleção ou exibir um menu de contexto.\n\nComo corrigir:\nCertifique-se de que o AccessibleContext do componente implemente a interface AccessibleAction com todas as ações disponíveis para o componente.
ui.inspector.accessibility.audit.AccessibleEditableTextNotNullInspection.description=A interface AccessibleEditableText deve ser implementada com base no estado acessível "editable" e na função "{0}". Ela permite que tecnologias assistivas, como leitores de tela e controle por voz, interajam com o componente de texto.\n\nComo corrigir:\nCertifique-se de que o AccessibleContext do componente implemente a interface AccessibleEditableText. Se o componente não deve ser editável, certifique-se de que o método AccessibleContext.getAccessibleStateSet() não retorne AccessibleState.EDITABLE.
ui.inspector.accessibility.audit.AccessibleNameAndDescriptionNotEqualInspection.description=As propriedades de nome e descrição acessíveis não devem ser iguais entre si. O nome é usado para transmitir o propósito principal do componente, enquanto a descrição pode ser usada para informações adicionais, como instruções ou comentários.\n\nComo corrigir:\nSe a descrição acessível duplicar o nome acessível e não houver informações adicionais adequadas para a descrição, deixe apenas o nome. Caso contrário, divida o texto em duas propriedades adequadamente.
ui.inspector.accessibility.audit.AccessibleNameNotEmptyForFocusableComponentsInspection.description=O nome acessível não deve estar vazio para componentes focáveis com a função "{0}". Caso contrário, é improvável que usuários de tecnologias assistivas interajam com eles. Por exemplo, usuários de leitores de tela podem não entender o propósito deste componente, e usuários de controle de voz não poderão ativá-lo usando o nome.\n\nComo corrigir:\nExistem algumas opções:\n1. Defina um nome para o componente usando o método getAccessibleContext().setAccessibleName() ou substitua o método getAccessibleName() no AccessibleContext do componente.\n2. O nome acessível também pode ser definido implicitamente usando o método JLabel.setLabelFor(Component), definindo a dica de ferramenta ou a propriedade de texto do componente.\n3. Se o componente for puramente decorativo e não houver um nome acessível adequado para ele, certifique-se de que ele não seja focável e que sua função acessível o represente corretamente.
ui.inspector.accessibility.audit.AccessibleNameNotEmptyForIcon.description=Ícones devem ter um nome acessível que descreva o que representam. Isso permite que tecnologias assistivas, como leitores de tela, transmitam adequadamente o significado do ícone para usuários que não podem vê-lo visualmente.\n\nComo corrigir:\nDefina um nome acessível descritivo para o ícone usando o método getAccessibleContext().setAccessibleName(). Se o ícone for puramente decorativo e não transmitir nenhuma informação, o nome acessível pode ser deixado vazio.
ui.inspector.accessibility.audit.AccessibleStateSetContainsFocusableInspection.description=O componente não possui o estado acessível "focusable". Com base na função acessível "{0}", espera-se que o componente possa receber foco por teclado para permitir a interação de usuários que dependem apenas do teclado para trabalhar com o IDE.\n\nComo corrigir:\nCertifique-se de que o componente seja focalizável chamando setFocusable(true) no componente e verificando se ele pode ser alcançado usando a navegação Tab/Shift-Tab. Se o componente não for interativo e não deva ser focalizável, considere alterar sua função acessível para uma função não interativa que represente melhor sua finalidade, como painel ou rótulo.
ui.inspector.accessibility.audit.AccessibleTextNotNullInspection.description=A interface AccessibleText deve ser implementada para a função acessível "{0}". Ela permite que tecnologias assistivas, como leitores de tela e controle por voz, acessem o conteúdo de texto do componente.\n\nComo corrigir:\nCertifique-se de que o AccessibleContext do componente implemente a interface AccessibleText. Se o componente de texto for um texto estático simples e não for destinado a ser interativo, considere alterar a função acessível para "label" e forneça o conteúdo do texto no nome acessível.
ui.inspector.accessibility.audit.AccessibleValueNotNullInspection.description=Espera-se que a interface AccessibleValue seja implementada para a função acessível "{0}". Ela permite que tecnologias assistivas, como leitores de tela, determinem e interajam com o valor do componente.\n\nComo corrigir:\nCertifique-se de que o AccessibleContext do componente implemente a interface AccessibleValue. Para componentes alternáveis, como caixas de seleção ou botões de rádio, o valor 0 deve ser retornado para o estado desativado e 1 para o estado ativado.
ui.inspector.accessibility.audit.ComponentWithIconHasNonDefaultAccessibleNameInspection.description=Componentes com ícones devem ter nomes acessíveis que descrevam tanto o ícone quanto o conteúdo de texto, em vez de apenas o texto, exceto quando o ícone for puramente decorativo e não transmitir nenhuma informação.\n\nComo corrigir:\nDefina um nome acessível que descreva tanto o ícone quanto o texto usando o método getAccessibleContext().setAccessibleName() ou sobrescreva o método getAccessibleName() do AccessibleContext do componente.
ui.inspector.accessibility.audit.ImplementsAccessibleInterfaceInspection.description=Todos os componentes de UI devem implementar a interface Accessible para fornecer metadados de acessibilidade para tecnologias assistivas, como leitores de tela e controle por voz.\n\nComo corrigir:\nImplemente a interface Accessible para o componente e forneça uma implementação de AccessibleContext adequada que descreva a função, o estado e outras propriedades do componente. Para componentes puramente decorativos (por exemplo, separadores), é aceitável não implementar a interface Accessible, mas ainda assim é recomendado.
