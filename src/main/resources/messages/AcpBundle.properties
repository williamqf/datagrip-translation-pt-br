acp.gemini.tos.content.text=Para usar o Gemini CLI no Assistente de IA, você precisa instalá-lo primeiro. Ele será instalado automaticamente quando você clicar em \u201CInstalar e Continuar\u201D. A instalação está sujeita à <a href="{0}">Licença Apache, Versão 2.0</a>.<br><br>Após a instalação, seus dados podem ser processados pelo provedor do Gemini CLI de acordo com os termos deles.<br><br>Seu uso do Gemini CLI com login JetBrains AI é regido pelo contrato da JetBrains aplicável. Se você optar por usar outros métodos de login/autorização de agente, o Serviço JetBrains AI não será usado e a JetBrains não se responsabiliza pelo processamento de suas entradas, saídas geradas ou quaisquer ações realizadas.
acp.codex.terms.of.service.text=Para usar o Codex no Assistente de IA, você precisa instalá-lo primeiro. Ele será instalado automaticamente quando você clicar em \u201CInstalar e Continuar\u201D. A instalação está sujeita à <a href="{0}">Licença Apache, Versão 2.0</a>.<br>Após a instalação, seus dados podem ser processados pelo provedor do Codex de acordo com os termos deles.<br>Seu uso do Codex com login JetBrains AI é regido pelo contrato da JetBrains aplicável. Se você optar por usar outros métodos de login/autorização de agente, o Serviço JetBrains AI não será usado e a JetBrains não se responsabiliza pelo processamento de suas entradas, saídas geradas ou quaisquer ações realizadas.
