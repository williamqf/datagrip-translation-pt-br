schema.type.unexpected=Tipo de esquema inesperado `{0}`.\nTipos suportados são:\n - `Boolean`, `String`, `Int`, `Path`, enums\n - interface `@Configurable` (deve ser declarada no mesmo diretório de origem)\n - `List<T>`, `Map<String, T>`, onde `T` é um tipo suportado.