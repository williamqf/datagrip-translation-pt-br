relaxng.convert-schema.advanced-options.dtd.tooltip.annotation-prefix=Os valores padrão são representados usando um atributo de anotação prefix:defaultValue, onde o prefixo é vinculado a http://relaxng.org/ns/compatibility/annotations/1.0 conforme definido pela Especificação do Comitê de Compatibilidade do DTD RELAX NG. Por padrão, o Trang usará a como prefixo, a menos que isso entre em conflito com um prefixo usado no DTD.
relaxng.convert-schema.advanced-options.dtd.tooltip.any-name=Especifica o nome da definição gerada para o conteúdo de elementos declarados no DTD como tendo um modelo de conteúdo ANY.
relaxng.convert-schema.advanced-options.dtd.tooltip.attlist-define=Isso especifica como construir o nome da definição que representa uma declaração de lista de atributos a partir do nome do elemento. O padrão de nome deve conter exatamente um caractere de porcentagem. Esse caractere de porcentagem é substituído pelo nome do elemento (após a substituição de dois-pontos) e o resultado é usado como o nome da definição.
relaxng.convert-schema.advanced-options.dtd.tooltip.colon-replacement=Substitui dois-pontos em nomes de elementos por caracteres ao construir os nomes das definições usadas para representar as declarações de elementos e declarações de listas de atributos no DTD. O Trang gera uma definição para cada declaração de elemento e declaração attlist no DTD. O nome da definição é baseado no nome do elemento. No RELAX NG, os nomes das definições não podem conter dois-pontos. No entanto, no DTD, o nome do elemento pode conter dois-pontos. Por padrão, o Trang tentará primeiro usar os nomes dos elementos sem prefixos. Se isso causar um conflito, ele substituirá os dois-pontos por um caractere de nome válido (tenta usar primeiro um ponto).
relaxng.convert-schema.advanced-options.dtd.tooltip.element-define=Especifica como construir o nome da definição que representa uma declaração de elemento a partir do nome do elemento. O padrão de nome deve conter exatamente um caractere de porcentagem. Esse caractere de porcentagem é substituído pelo nome do elemento (após a substituição de dois-pontos) e o resultado é usado como o nome da definição.
relaxng.convert-schema.advanced-options.dtd.tooltip.generate-start=Especifica se o Trang deve gerar um elemento start. Os DTDs não indicam quais elementos são permitidos como elementos de documento. O Trang assume que todos os elementos definidos, mas nunca referenciados, são permitidos como elementos de documento.
relaxng.convert-schema.advanced-options.dtd.tooltip.inline-attlist=Especifica para não gerar definições para declarações de lista de atributos e, em vez disso, mover os atributos declarados em declarações de lista de atributos para as definições geradas para declarações de elementos. Este é o comportamento padrão quando o módulo de saída é xsd. Caso contrário, o comportamento padrão é o descrito no parâmetro -i no-inline-attlist.
relaxng.convert-schema.advanced-options.dtd.tooltip.strict-any=Preserva a semântica exata dos modelos de conteúdo ANY usando uma escolha explícita de referências a todos os elementos declarados. Por padrão, o Trang usa um caractere curinga que permite qualquer elemento.
