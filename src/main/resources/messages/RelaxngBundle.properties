relaxng.convert-schema.advanced-options.xsd.tooltip.any-attribute-process-contents=Especifica o valor do atributo processContents de elementos anyAttribute.\nO padrão é skip (correspondente à semântica do RELAX NG).
relaxng.convert-schema.advanced-options.xsd.tooltip.any-process-contents=Especifica o valor para o atributo processContents de quaisquer elementos. \nO padrão é skip (correspondente à semântica RELAX NG), a menos que o \nformato de entrada seja dtd, caso em que o padrão é strict (correspondente à \nsemântica DTD).
relaxng.convert-schema.advanced-options.xsd.tooltip.disable-abstract-elements=Desabilita o uso de elementos abstratos e grupos de substituição\nno Esquema XML gerado. Isso também pode ser controlado usando\num atributo de anotação.
