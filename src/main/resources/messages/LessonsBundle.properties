refactoring.menu.introduce.parameter.eng=Suponha que você precise mover a expressão selecionada para o local de chamada e passá-la como um parâmetro do método que a contém. O {0} pode fazer exatamente isso. Agora, basta digitar <strong>pa</strong> (introduce <strong>pa</strong>rameter) ou <strong>ip</strong> (<strong>i</strong>ntroduce <strong>p</strong>arameter) para reduzir a lista proposta.
