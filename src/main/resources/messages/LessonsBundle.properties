readme.experienced.users.remark=Mesmo que uma lição pareça familiar, experimente-a: você pode descobrir exemplos úteis e atalhos desconhecidos para os recursos que você já utiliza ativamente!
readme.feedback.request=Ficaremos gratos se você deixar seu feedback sobre este curso!
readme.ift.description=Este curso interativo guiará você por diversos fluxos de trabalho e casos de uso da IDE. Ele vem com muitos atalhos de ação úteis. Você não precisa memorizar todos eles. Em vez disso, experimente-os e utilize os mais úteis no seu trabalho. Como você pode encontrar novos problemas no dia a dia, revisite este curso e experimente outros recursos. Fique atento a novas lições que ajudarão você a ser mais produtivo com o {0}.
readme.indexing.description=Você provavelmente está lendo este `README.md` durante a inicialização do projeto de aprendizado. Geralmente, a `indexação` é a operação que mais consome tempo durante a inicialização do projeto. O IDE precisará coletar informações sobre seu ambiente, projeto{0,choice,1#, bibliotecas|2#} e construir uma representação interna. Isso é necessário para navegação e busca rápidas.
readme.navigation.hint=O módulo `{0}` deste curso mostrará como utilizá-lo.
readme.shortcuts.header=Gerenciar atalhos
readme.shortcuts.problem.description=Alguns atalhos neste curso podem entrar em conflito com atalhos do sistema ou de outros aplicativos. Nesse caso, você pode clicar no atalho problemático no texto da lição. O pop-up aberto mostrará o nome da ação e atalhos alternativos. Você poderá aplicar a ação ou atribuir um novo atalho.
readme.start.header=Primeiros passos
readme.toolwindow.description=A janela de ferramentas `{0}` contém vários módulos com os respectivos conjuntos de lições que você pode realizar em qualquer ordem. Ao terminar de estudar uma lição, ela será marcada como concluída. Você pode usar uma lição concluída para referência ou reiniciá-la se quiser revisar seu conhecimento.
