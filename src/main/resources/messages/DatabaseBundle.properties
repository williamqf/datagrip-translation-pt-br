enable.jcef.message=<html>AVISO!<br><br>O visualizador de dados espaciais funciona apenas se o <a href='https://github.com/chromiumembedded/java-cef'>JCEF</a> estiver habilitado.<br><br>Em casos raros, a ativação do JCEF pode causar o travamento da IDE. Isso pode acontecer se você tiver instalado plugins que utilizam JavaFX.<br>Recomendamos que você faça uma cópia destas instruções para recuperar sua IDE no caso improvável de esse travamento ocorrer:<ol><li>Localize a pasta de configuração da sua IDE (para ajuda, consulte <a href='https://www.jetbrains.com/help/idea/2020.1/tuning-the-ide.html'>https://www.jetbrains.com/help/idea/2020.1/tuning-the-ide.html</a>).</li><li>Localize o arquivo \\&lt;config folder\\&gt;/options/ide.general.xml</li><li>Remova a seguinte linha do ide.general.xml:<pre>\\&lt;entry key="ide.browser.jcef.enabled" value="true" /\\&gt;</li></ol>Se encontrar qualquer dificuldade, entre em contato conosco em support@jetbrains.com</html>
