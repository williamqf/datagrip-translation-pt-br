#language=HTML
DataSourceSchemasPanel.schema.pattern.hint=A sintaxe é <strong>db1:sc1,sc2|db2:sc3</strong><br><table cellpadding=0> <tr><td><strong>@</strong></td><td>&mdash; banco de dados/esquema padrão</td></tr><tr><td><strong>*</strong></td><td>&mdash; todos os bancos de dados/esquemas</td></tr><tr><td><strong>{</strong><small>regexp</small><strong>}</strong></td><td>&mdash; bancos de dados/esquemas cujos nomes correspondem a <i>regexp</i></td></tr></table>Se apenas esquemas forem suportados, liste-os após <strong>*</strong><br>Exemplos:<table cellpadding=0><tr><td><strong>*:*</strong></td><td>&mdash; tudo</td></tr><tr><td><strong>@:*</strong></td><td>&mdash; tudo do banco de dados padrão</td></tr><tr><td><strong>@:@</strong></td><td>&mdash; esquema padrão</td></tr><tr><td><strong>{t.*}:@</strong></td><td>&mdash; esquema padrão em bancos de dados começando com <i>t</i></td></tr></table><strong>*:dbo|@:@|db1:s1,s2,s3</strong> &mdash; esquema <strong>dbo</strong> de todos os bancos de dados,<br> esquema padrão e três esquemas do banco de dados <strong>db1</strong>\n

#language=HTML
DataSourceSchemasPanel.object.filter.hint=Um &lt;padrão&gt; ou uma lista de &lt;tipo&gt;:[-]&lt;padrão&gt; separados por ||. Onde:<ol>  <li>&lt;tipo&gt; é um <b>{0}</b>,</li>  <li>&lt;padrão&gt; é uma <a href="#regex">expressão regular</a>; adicione o prefixo - (menos) para exclusão.</li></ol>Exemplos: <b>table:CUR_.*</b> ou <b>table:-OLD_.*||routine:DO.*||view:V_.*</b>
