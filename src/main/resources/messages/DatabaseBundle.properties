scriptGen.option.QualifyWithSchema.text=Qualificar objetos com nomes de esquema
scriptGen.option.QualifyWithSchema.description=Adiciona um nome de esquema aos nomes de objetos.\n<ul>\n<li><b>Nunca</b>: não adiciona um nome de esquema.</li>\n<li><b>Sempre</b>: adiciona um nome de esquema a todos os nomes de objetos.</li>\n<li><b>Automático</b>: omite o nome do esquema quando todos os objetos pertencem\na um único esquema ou o esquema é o atual. Na maioria dos casos, o esquema atual é o esquema que o usuário escolheu para fazer login.</li>\n</ul>\n<p>\nEsta opção afeta o código gerado e não afeta o código recebido diretamente do servidor.</p>
