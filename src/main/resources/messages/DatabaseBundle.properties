dv.option.sort.forest.tooltip=Habilita a classificação automática para pastas e fontes de dados. <br/> Esta opção desativa a reordenação manual de itens. <br/> Uma vez que a opção for desativada, a ordem anterior que foi definida manualmente <br/> será restaurada.
