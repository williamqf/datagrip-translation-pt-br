scriptGen.option.ConstraintContext.text=Posicionar restrições
scriptGen.option.ConstraintContext.description=Especifique onde colocar as restrições.\n<ul>\n<li><b>Dentro da Coluna</b> na definição da coluna quando a restrição é baseada em uma coluna.\nQuando a restrição é baseada em duas ou mais colunas, coloque as restrições\nna definição da tabela após todas as colunas.</li>\n<li><b>Dentro da Tabela</b> na definição da tabela, após todas as colunas.</li>\n<li><b>Após a Tabela</b> após a definição da tabela, usando ALTER TABLE ADD CONSTRAINT.</li>\n</ul>\n<p>\nO processamento de algumas declarações de chave estrangeira pode ser adiado para resolver dependências cíclicas.\n</p>
scriptGen.option.DisableDisabled.text=Com cláusulas ou instruções de desabilitação
