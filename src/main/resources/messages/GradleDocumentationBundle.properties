gradle.documentation.org.gradle.api.Project.apply.plugin.build-announcements=<p>Envia notificações locais para a sua área de trabalho sobre eventos interessantes no ciclo de vida do build.</p>
gradle.documentation.org.gradle.api.Project.apply.plugin.build-announcements.non-html=Envia anúncios locais para sua área de trabalho sobre eventos interessantes no ciclo de vida do build.
gradle.documentation.org.gradle.api.Project.apply.plugin.checkstyle=<p>Realiza verificações de qualidade nos arquivos-fonte Java do seu projeto usando <a class="ulink" href="http://checkstyle.sourceforge.net/index.html" target="_top">Checkstyle</a> e gera relatórios a partir dessas verificações.</p>
gradle.documentation.org.gradle.api.Project.apply.plugin.checkstyle.non-html=Realiza verificações de qualidade nos arquivos-fonte Java do seu projeto usando o Checkstyle e gera relatórios a partir dessas verificações.
gradle.documentation.org.gradle.api.Project.apply.plugin.codenarc=<p>Realiza verificações de qualidade nos arquivos-fonte Groovy do seu projeto usando o <a class="ulink" href="http://codenarc.sourceforge.net/index.html" target="_top">CodeNarc</a> e gera relatórios a partir dessas verificações.</p>
gradle.documentation.org.gradle.api.Project.apply.plugin.codenarc.non-html=Realiza verificações de qualidade nos arquivos-fonte Groovy do seu projeto usando o CodeNarc e gera relatórios a partir dessas verificações.
gradle.documentation.org.gradle.api.Project.apply.plugin.ear=<p>Adiciona suporte para a construção de aplicações J2EE.</p>
gradle.documentation.org.gradle.api.Project.apply.plugin.ear.non-html=Adiciona suporte para a construção de aplicações J2EE.
gradle.documentation.org.gradle.api.Project.apply.plugin.eclipse=<p>Gera arquivos que são usados pelo <a class="ulink" href="http://eclipse.org" target="_top">Eclipse IDE</a>, tornando assim possível importar o projeto para o Eclipse. Veja também o <a class="xref" href="http://www.gradle.org/docs/current/userguide/tutorial_java_projects.html">Capítulo 7, <i>Início Rápido do Java</i></a>.</p>
gradle.documentation.org.gradle.api.Project.apply.plugin.eclipse-wtp=<p>Faz o mesmo que o plugin eclipse, além de gerar arquivos de configuração do Eclipse WTP (Web Tools Platform). Após a importação para o Eclipse, seus projetos war/ear devem estar configurados para funcionar com o WTP. Veja também o <a class="xref" href="http://www.gradle.org/docs/current/userguide/tutorial_java_projects.html">Capítulo 7, <i>Início Rápido do Java</i></a>.</p>
gradle.documentation.org.gradle.api.Project.apply.plugin.eclipse-wtp.non-html=Faz o mesmo que o plugin eclipse, além de gerar arquivos de configuração do Eclipse WTP (Web Tools Platform). Após a importação para o Eclipse, seus projetos war/ear devem estar configurados para funcionar com o WTP.
gradle.documentation.org.gradle.api.Project.apply.plugin.eclipse.non-html=Gera arquivos que são usados pelo Eclipse IDE, tornando possível importar o projeto para o Eclipse.
gradle.documentation.org.gradle.api.Project.apply.plugin.findbugs=<p>Realiza verificações de qualidade nos arquivos-fonte Java do seu projeto usando o <a class="ulink" href="http://findbugs.sourceforge.net" target="_top">FindBugs</a> e gera relatórios a partir dessas verificações.</p>
gradle.documentation.org.gradle.api.Project.apply.plugin.findbugs.non-html=Executa verificações de qualidade nos arquivos de origem Java do seu projeto usando o FindBugs e gera relatórios a partir dessas verificações.
gradle.documentation.org.gradle.api.Project.apply.plugin.groovy=<p>Adiciona suporte para a construção de projetos Groovy. Consulte também o <a class="xref" href="http://www.gradle.org/docs/current/userguide/tutorial_groovy_projects.html">Capítulo 9, <i>Início Rápido do Groovy</i></a>.</p><p>Aplica automaticamente: java, groovy-base</p>
gradle.documentation.org.gradle.api.Project.apply.plugin.groovy.non-html=Adiciona suporte para a construção de projetos Groovy.
gradle.documentation.org.gradle.api.Project.apply.plugin.idea=<p>Gera arquivos e aplica personalizações específicas do IDEA que são usadas pelo <a class="ulink" href="https://www.jetbrains.com/idea/index.html" target="_top">Intellij IDEA IDE</a>, tornando possível importar o projeto para o IDEA.</p>
gradle.documentation.org.gradle.api.Project.apply.plugin.idea.non-html=Gera arquivos e aplica personalizações específicas do IDEA que são usadas pelo IDE IntelliJ IDEA, possibilitando a importação do projeto para o IDEA.
gradle.documentation.org.gradle.api.Project.apply.plugin.java=<p>Adiciona recursos de compilação, teste e empacotamento Java a um projeto. Ele serve como base para muitos outros plugins do Gradle. Consulte também o <a class="xref" href="http://www.gradle.org/docs/current/userguide/tutorial_java_projects.html">Capítulo 7, <i>Início Rápido do Java</i></a>.</p><p>Aplica automaticamente: java-base</p>
gradle.documentation.org.gradle.api.Project.apply.plugin.java.non-html=Adiciona recursos de compilação, teste e empacotamento Java a um projeto. Ele serve como base para muitos dos outros plugins do Gradle.
gradle.documentation.org.gradle.api.Project.apply.plugin.jdepend=<p>Realiza verificações de qualidade nos arquivos-fonte do seu projeto usando o <a class="ulink" href="http://clarkware.com/software/JDepend.html" target="_top">JDepend</a> e gera relatórios a partir dessas verificações.</p>
gradle.documentation.org.gradle.api.Project.apply.plugin.jdepend.non-html=Realiza verificações de qualidade nos arquivos-fonte do seu projeto usando o JDepend e gera relatórios a partir dessas verificações.
gradle.documentation.org.gradle.api.Project.apply.plugin.jetty=<p>Implanta sua aplicação web em um contêiner web Jetty incorporado ao build. Consulte também o <a class="xref" href="http://www.gradle.org/docs/current/userguide/web_project_tutorial.html">Capítulo 10, <i>Início Rápido de Aplicação Web</i></a>.</p><p>Aplica automaticamente: war</p>
