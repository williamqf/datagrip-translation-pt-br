gradle.cmd.option.build.cache=Habilita o cache de compilação do Gradle. O Gradle tentará reutilizar as saídas de compilações anteriores.
gradle.cmd.option.build.file=Especifica o arquivo de build.
gradle.cmd.option.configuration.cache=Habilita o cache de configuração. O Gradle tentará reutilizar a configuração de build de builds anteriores.
gradle.cmd.option.configuration.cache.problems=Configura como o cache de configuração lida com problemas (falha ou aviso).\nO padrão é falha.
gradle.cmd.option.configure.on.demand=Configurar apenas projetos necessários. O Gradle tentará reduzir o tempo de configuração para builds multiprojetos grandes.
gradle.cmd.option.console=Especifica o tipo de saída do console a ser gerada. Os valores são 'plain', 'auto' (padrão), 'rich' ou 'verbose'.
gradle.cmd.option.continue=Continuar a execução da tarefa após uma falha na tarefa.
gradle.cmd.option.continuous=A Build Contínua permite reexecutar automaticamente as tarefas solicitadas quando as entradas das tarefas mudam.
gradle.cmd.option.daemon=Usa o Gradle Daemon para executar o build. Inicia o Daemon se não estiver em execução.
gradle.cmd.option.debug=Registrar logs no modo debug (inclui stacktrace normal).
gradle.cmd.option.dependency.verification=Configura o modo de verificação de dependência (estrito, leniente ou desativado)
gradle.cmd.option.dry.run=Executa os builds com todas as ações de tarefas desativadas.
gradle.cmd.option.exclude.task=Especifique uma tarefa a ser excluída da execução.
gradle.cmd.option.export.keys=Exporta as chaves públicas usadas para a verificação de dependências.
gradle.cmd.option.foreground=Inicia o Gradle Daemon em primeiro plano.
gradle.cmd.option.full.stacktrace=Imprime o stacktrace completo (muito detalhado) para todas as exceções.
gradle.cmd.option.gradle.user.home=Especifica o diretório base do usuário do Gradle.
gradle.cmd.option.help=Exibe a mensagem de ajuda.
gradle.cmd.option.include.build=Inclui a build especificada no composite.
gradle.cmd.option.info=Define o nível de log como informação.
gradle.cmd.option.init.script=Especificar um script de inicialização.
gradle.cmd.option.max.workers=Configura o número de workers simultâneos que o Gradle tem permissão para usar.
gradle.cmd.option.no.build.cache=Desativa o cache de build do Gradle.
gradle.cmd.option.no.configuration.cache=Desativa o cache de configuração.
gradle.cmd.option.no.configure.on.demand=Desativa o uso da configuração sob demanda.
gradle.cmd.option.no.daemon=Não use o daemon do Gradle para executar o build. Útil ocasionalmente se você configurou o Gradle para sempre ser executado com o daemon por padrão.
gradle.cmd.option.no.parallel=Desabilita a execução paralela para construir projetos.
gradle.cmd.option.no.rebuild=Não reconstruir as dependências do projeto.
gradle.cmd.option.no.scan=Desativa a criação de um build scan.
gradle.cmd.option.no.watch.fs=Desabilita o monitoramento do sistema de arquivos.
gradle.cmd.option.offline=Executar o build sem acessar recursos de rede.
gradle.cmd.option.parallel=Constrói projetos em paralelo. O Gradle tentará determinar o número ideal de threads executoras para usar.
gradle.cmd.option.priority=Especifica a prioridade de agendamento para o daemon do Gradle e todos os processos iniciados por ele. Os valores são 'normal' (padrão) ou 'low'.
gradle.cmd.option.profile=Faz o perfilamento do tempo de execução do build e gera um relatório no diretório <build_dir>/reports/profile.
gradle.cmd.option.project.cache.dir=Especifica o diretório de cache específico do projeto. O padrão é .gradle no diretório raiz do projeto.
gradle.cmd.option.project.dir=Especifica o diretório inicial para o Gradle. O padrão é o diretório atual.
gradle.cmd.option.project.prop=Define a propriedade do projeto para o script de build (ex: -Pmyprop=myvalue).
gradle.cmd.option.quiet=Registrar apenas erros.
gradle.cmd.option.refresh.dependencies=Atualizar o estado das dependências.
gradle.cmd.option.refresh.keys=Atualizar as chaves públicas usadas para a verificação de dependência.
gradle.cmd.option.rerun=Ignorar resultados de tarefas específicas armazenados em cache anteriormente.
gradle.cmd.option.rerun.tasks=Ignorar resultados de tarefas armazenados em cache anteriormente.
gradle.cmd.option.scan=Cria um build scan. O Gradle emitirá um aviso se o plugin de build scan não tiver sido aplicado.
gradle.cmd.option.settings.file=Especificar o arquivo de configurações.
gradle.cmd.option.stacktrace=Imprime o stacktrace para todas as exceções.
gradle.cmd.option.status=Mostra o status de Gradle Daemons em execução e interrompidos recentemente.
gradle.cmd.option.stop=Interrompe o Gradle Daemon se ele estiver em execução.
gradle.cmd.option.system.prop=Define a propriedade do sistema da JVM (por exemplo, -Dmyprop=myvalue).
gradle.cmd.option.update.locks=Realiza uma atualização parcial do bloqueio de dependências, permitindo que as notações de módulo informadas alterem a versão.
gradle.cmd.option.version=Exibe informações da versão.
gradle.cmd.option.warn=Define o nível de log para aviso.
gradle.cmd.option.warning.mode=Especifica qual modo de avisos gerar. Os valores são 'all', 'fail', 'summary' (padrão) ou 'none'.
gradle.cmd.option.watch.fs=Ativa o monitoramento de alterações no sistema de arquivos, permitindo que os dados sobre o sistema de arquivos sejam reutilizados na próxima compilação.
gradle.cmd.option.write.locks=Persiste a resolução de dependências para configurações bloqueadas, ignorando informações de bloqueio existentes, caso existam.
gradle.cmd.option.write.verification.metadata=Gera checksums para as dependências usadas no projeto (lista separada por vírgulas).
