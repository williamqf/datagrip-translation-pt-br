gradle.documentation.org.gradle.api.Project.apply.plugin.antlr.non-html=Adiciona suporte para a geração de analisadores usando o Antlr
gradle.documentation.org.gradle.api.Project.apply.plugin.application=<p>Adiciona tarefas para executar e empacotar um projeto Java como um aplicativo de linha de comando.</p><p>Aplica automaticamente: java</p>
