environment.key.description.link.unlinked.project=Define se o IDE deve importar informações de projeto a partir de scripts de build disponíveis.\nO formato dos valores é o termo único 'all' ou uma lista de entradas separadas por vírgulas como '<Build system>:[import|skip]'.\n- Se 'all' for especificado, todos os scripts de build detectados serão usados para a importação\n- Se '<Build system>:import' for especificado, os scripts de build deste sistema de build serão usados para o processo de importação.\n- Se '<Build system>:skip' for especificado, os scripts de build não serão usados e a notificação sobre o uso desses scripts não será exibida na interface do IDE.\nExemplo de valor para esta chave: "Gradle:import,Ant:skip"
