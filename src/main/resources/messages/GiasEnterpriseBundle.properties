sml.studiobot.onboarding.gcp.project.selection.intro.markdown=Para usar o **Gemini para empresas**, você precisa selecionar um projeto do Google Cloud.\n\nAo continuar, você autoriza o Google a ativar as APIs necessárias para o Gemini em seu nome no projeto escolhido.
sml.studiobot.onboarding.gcp.project.selection.note.markdown=Observação: se você ainda não configurou o Gemini no Android Studio para Empresas, saiba mais [aqui](https://d.android.com/r/studio-ui/gemini-for-business-setup). Se a sua intenção era usar o nível individual, volte para a etapa anterior.
sml.studiobot.onboarding.gcp.project.selection.secondLine=Selecione um projeto do Google Cloud