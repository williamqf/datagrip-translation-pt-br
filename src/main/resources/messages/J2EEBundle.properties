javaee.starter.library.json-p.description=API para analisar, transformar e consultar dados JSON usando o modelo de objeto ou o modelo de streaming (JSR 353).
javaee.starter.library.jta.description=Fornece API para lidar com transações de forma independente da implementação do gerenciador de transações (JSR 907).
javaee.starter.library.mojarra.description=Implementação do padrão JSF.
javaee.starter.library.mvc.description=API de mecanismo de template para JAX-RS (JSR 371).
javaee.starter.library.nosql.description=Framework que simplifica a integração de aplicações Java com bancos de dados NoSQL
javaee.starter.library.rabbitmq.description=Cliente para o message broker RabbitMQ.
