go.quick.doc.assign.iota=Atribuir um valor a 'iota' não redefine o contador de 'builtin.iota'. Em vez disso, uma atribuição define uma nova constante 'iota' que oculta 'builtin.iota'.
go.quick.doc.blank.identifier.hint=O identificador em branco ('_') pode ser atribuído a ou declarado com qualquer valor de qualquer tipo. Os identificadores em branco são descartados e não são usados pelo compilador. Por exemplo, você pode considerar o uso de identificadores em branco quando deseja capturar um valor de retorno, mas não tem intenção de usar esse valor posteriormente.
