go.quick.doc.type.alias.hint=O tipo {0} é um alias do tipo {1}. Esses tipos são idênticos. Para obter mais informações, consulte {2}
go.quick.doc.type.assertions.hint=As asserções de tipo são usadas para verificar se uma variável é de algum tipo e retornar o valor da interface subjacente. As asserções de tipo funcionam apenas para interfaces. Por exemplo, no seguinte código: 'var x interface{} = 42 t := x.(int)', 'x' tem o tipo 'interface{}' com o valor int subjacente ('42'), e 'int' é o tipo concreto que queremos verificar. Se imprimirmos 't', a saída será '42'. Alterar o tipo concreto para 'string' ('t := x.(string)') causará um panic em tempo de execução. \nAs asserções de tipo podem retornar dois valores. Por exemplo, a expressão 't, ok := x.(int)' tem o booleano 'ok' que retorna 'true' se a asserção estiver correta. Se 'ok' for 'false', 't' é definido com um valor zero e nenhum panic ocorre.
go.quick.doc.type.definition.hint=O tipo {0} é um novo tipo com o tipo subjacente {1}. Esses tipos são diferentes. Para mais informações, consulte {2}
go.quick.doc.type.parameter.hint=A declaração {0} declara parâmetros de tipo. Esses parâmetros de tipo tornam {0} genérico. Um {0} genérico pode lidar com vários tipos. O conjunto de tipos possíveis é governado pela restrição do parâmetro de tipo. Para obter mais informações sobre genéricos, consulte {1}
go.quick.doc.type.parameter.hint.hyperlink.text=Tutorial: Primeiros passos com genéricos em go.dev
go.quick.doc.type.parameter.in.method.hint=O método é genérico porque o tipo base do receptor é um tipo genérico. A especificação do método deve declarar parâmetros de tipo que correspondam aos parâmetros de tipo do tipo base do receptor. Os argumentos de tipo do método devem usar as restrições de tipo que são usadas no tipo base do receptor. Para mais informações sobre genéricos, consulte {0}
