go.quick.doc.keyword.type.switch=Um switch de tipo corresponde ao tipo dinâmico do valor de interface 'x'. O tipo dinâmico é comparado com os tipos nos cases do 'switch'. Se uma atribuição curta de variável da forma 'v := x.(type)' for usada como guarda do switch e um case for usado para apenas um único tipo, 'v' terá o tipo especificado no case correspondente do switch.
