go.quick.doc.empty.interface.hint=Uma interface vazia 'interface{}' representa o conjunto de todos os tipos. Uma variável do tipo interface vazia pode armazenar um valor de qualquer tipo.
go.quick.doc.iota.example=Por exemplo, 'const (C0 = iota; C1; C2)' imprimirá '0', '1' e '2'. A contagem é redefinida para '0' cada vez que você usa 'const' em seu código. Para ver os valores das constantes atribuídas por 'iota', passe o ponteiro do mouse sobre a especificação da constante.
