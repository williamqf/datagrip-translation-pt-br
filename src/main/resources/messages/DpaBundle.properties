dpa.notification.InsufficientResourceEtw.text=<html>O número máximo de sessões de log no sistema foi atingido. Não é possível criar novos loggers até que uma sessão de log seja interrompida. Esse valor padrão é 64 na maioria dos sistemas. Você pode alterar esse valor editando a chave REG_DWORD EtwMaxLoggers em HKEY_LOCAL_MACHINESYSTEMCurrentControlSetControlWMI. Os valores permitidos são de 32 a 256, inclusive. É necessário reiniciar o sistema para que as alterações entrem em vigor.<br>Observe que os loggers usam recursos do sistema. O aumento do número de loggers no sistema terá um custo de desempenho se esses slots forem preenchidos.</html>
