html.text.trial.info=Aproveite o acesso total aos recursos do {0} durante o seu período de avaliação gratuita.<br><br>Observe que é necessária uma conexão com a internet para começar <br>e que você pode solicitar uma avaliação desta versão da IDE apenas uma vez. Após o período <br>de avaliação, você precisará de uma assinatura válida para continuar usando o produto.
html.text.trial.info.pycharm=Aproveite o acesso total aos recursos do PyCharm durante seu período de avaliação Pro.<br><br>É necessária uma conexão com a Internet para começar. Você pode solicitar uma avaliação uma vez por versão principal.<br>Após o término, uma assinatura Pro será necessária para o acesso total. O PyCharm permanece gratuito com os recursos principais.
html.text.short.trial.info=Gratuito para projetos comerciais e não comerciais. Válido por 30 dias.
html.text.non.commercial.license.info=De acordo com os termos e condições de uso não comercial, o IDE coleta os seguintes tipos de dados:<ul><li>Dados de uso para validar sua conformidade com os termos da licença não comercial. (Sempre ativado)</li><li>Estatísticas anônimas de uso de recursos para ajudar a orientar melhorias futuras do produto. (Sempre ativado)</li><li>Dados detalhados relacionados a código para treinar os modelos de IA que alimentam o produto. (Ativado por padrão, mas pode ser desativado em <em>Configurações | Compartilhamento de dados</em>)</li></ul>
html.text.stats.collection.info=Ao usar uma licença não comercial, você concorda que o produto enviará dados de uso para validar <br>sua conformidade com os termos da licença e estatísticas anônimas de uso de funcionalidades para <br>melhorias do produto à JetBrains. Mais informações estão disponíveis na <a href="https://www.jetbrains.com/legal/docs/privacy/privacy/"> Política de Privacidade da JetBrains </a>
html.text.non.commercial.collection.info=Ao concordar, eu entendo que o produto enviará: a) dados de uso para validar sua<br>conformidade com os termos da licença não comercial, b) estatísticas anônimas de uso de recursos<br>para melhorias futuras do produto. Os dados enviados estão em conformidade com a <a href="https://www.jetbrains.com/legal/docs/privacy/privacy/">Política de Privacidade da<br>JetBrains</a>.
