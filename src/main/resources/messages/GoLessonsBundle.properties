go126.recursive.type.constraints.intro=O Go 1.26 introduz suporte para restrições de tipo recursivas. Isso permite que parâmetros de tipo se refiram direta ou indiretamente a si mesmos.\nNeste exemplo, temos uma interface {0} que usa seu próprio parâmetro de tipo no método {1}.
