go.new.features.synctest.results=O {0} foi concluído quase instantaneamente. Isso ocorre porque o teste é executado em uma bolha de tempo simulado: a primeira chamada é executada instantaneamente, a segunda chamada é bloqueada, o tempo é adiantado em 10 segundos com {1} e a segunda chamada é concluída imediatamente sem qualquer espera real.
