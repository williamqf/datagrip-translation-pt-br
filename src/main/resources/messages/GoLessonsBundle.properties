go126.goroutine.leak.profiles.check.results=O código cria deliberadamente vazamentos de goroutine ao iniciar goroutines que bloqueiam indefinidamente enquanto esperam receber dados de um canal. Como o canal nunca é fechado ou gravado, essas goroutines nunca podem ser concluídas. O programa expõe o endpoint {0} para que você possa inspecionar as goroutines vazadas por meio da interface HTTP pprof.\nClique no link do servidor na saída.
go126.goroutine.leak.profiles.intro=O perfil de vazamento de goroutines é um novo recurso experimental de profiling que ajuda a encontrar goroutines que nunca terminam. Você o ativa compilando seu programa com {0}, o que também expõe um novo endpoint {1} em {2}.\nO runtime procura por goroutines que estão bloqueadas em canais, mutexes ou outras primitivas de concorrência e que não são mais acessíveis a partir de goroutines em execução. Isso permite detectar problemas como goroutines que bloqueiam para sempre em operações de canal, como mostrado neste exemplo onde várias goroutines esperam em um canal que nunca recebe gravações. A equipe do Go planeja ativá-lo por padrão no Go 1.27.
go126.goroutine.leak.profiles.run=Copie o comando destacado no editor e cole-o no terminal. Pressione {0}. Aguarde até ver {1} na linha de comando.
go126.goroutine.leak.profiles.title=Perfis de vazamento de goroutine
go126.goroutine.metrics.intro=O Go 1.26 adiciona novos contadores {0} que rastreiam goroutines em vários estados: created, live, runnable, running, waiting, not-in-go, além de threads de runtime.
go126.goroutine.metrics.results=Analise os contadores impressos. Este exemplo mostra como as novas métricas de goroutine refletem diferentes estados de execução: a contagem 'created' aumenta à medida que novas goroutines iniciam, a contagem 'waiting' cresce porque algumas goroutines estão bloqueadas em um mutex ou dormindo, as contagens 'runnable' e 'running' refletem uma goroutine que está sendo executada ativamente, a contagem 'syscall' ou 'cgo' permanece baixa porque nenhuma goroutine está bloqueada em chamadas de sistema e a métrica de threads 'live' relata quantas threads do SO pertencem atualmente ao runtime.
go126.goroutine.metrics.run=Execute o exemplo para imprimir as novas métricas. Clique com o botão direito no editor e selecione {0} ou {1}, dependendo do menu de contexto.
go126.goroutine.metrics.title=Métricas de goroutine
