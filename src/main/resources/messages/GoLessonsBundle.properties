go126.NewMultiHandler.intro=Este programa demonstra o registro de logs fan-out com {0}log/slog.NewMultiHandler. A parte principal é o multi-handler, que envia cada registro de log para múltiplos manipuladores simultaneamente: um manipulador de console envolvido por um manipulador de ocultação (redacting), um manipulador de arquivo JSON sem ocultação e um manipulador de console simples.\nDevido ao {1}NewMultiHandler, uma única chamada de log é gravada em várias saídas em paralelo. Dessa forma, você pode combinar diferentes comportamentos de log, como ocultar valores sensíveis apenas na saída do console enquanto mantém os dados completos em um arquivo, sem duplicar as chamadas de log em seu código.
go126.NewMultiHandler.title=Logging com 'slog.NewMultiHandler'
go126.cryptotest.artifacts.explanation={0} é um recurso de teste do Go 1.26 que fornece um local padrão para armazenar artefatos de teste, como arquivos, logs, snapshots ou dados gerados. Neste teste, a chave pública gerada é gravada em um arquivo dentro do diretório de artefatos. Ao executar testes com {1}, esses arquivos são preservados em vez de serem excluídos. Isso é importante porque facilita a depuração de falhas, permite que sistemas de CI coletem saídas automaticamente e remove a necessidade de manipulação personalizada de diretórios temporários.
go126.cryptotest.artifacts.title=Artefatos de teste e testes criptográficos determinísticos
go126.cryptotest.cryptotest.explanation={0} é um recurso do Go 1.26 de {1}. Ele substitui toda a aleatoriedade criptográfica usada pelos pacotes {2} e {3} por uma fonte determinística durante a execução do teste. Em nosso código, a chamada {4} garante que {5} sempre produza a mesma chave em cada execução. Isso é importante porque os testes criptográficos costumavam ser instáveis e impossíveis de validar com precisão. Agora você pode escrever asserções estáveis, reproduzir falhas e confiar nos resultados do CI.
