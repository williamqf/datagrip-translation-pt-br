go126.faster.memory.allocation.benchmark.125=Vamos executar um benchmark para ver o desempenho de alocações de pequenos objetos no Go 1.25. Usamos {0} para criar slices de diferentes tamanhos em um loop.\n Para executar todos os benchmarks, clique no ícone destacado e selecione a opção {1} para {2}.
