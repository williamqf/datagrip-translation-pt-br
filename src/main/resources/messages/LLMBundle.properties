user.intent.descriptions.assistant.capabilities=Perguntas sobre as funcionalidades e limitações de {0}.
user.intent.descriptions.code.conversion=Solicitações para traduzir ou converter código de uma linguagem de programação para outra, com base no trecho de código fornecido pelo usuário.
user.intent.descriptions.code.explain=Solicitações para esclarecer ou descrever o que um trecho de código fornecido faz, sem a necessidade de modificar ou gerar novo código. O usuário busca entender o propósito ou a função do código.
user.intent.descriptions.code.generation=Solicitações para geração de novo código com base em uma tarefa ou requisito descrito pelo usuário. O usuário pode fornecer algum contexto ou código existente, mas o objetivo principal é criar um novo código que atenda à solicitação do usuário.
user.intent.descriptions.code.modification=Solicitações para alterar ou melhorar um trecho de código existente fornecido pelo usuário. A resposta deve incluir o código modificado refletindo as alterações solicitadas, como otimização, adição de funcionalidades ou correção do código.
user.intent.descriptions.code.question=Consultas especificamente sobre um trecho de código fornecido. O usuário busca esclarecimento, validação ou compreensão de como o código funciona ou se ele está correto. O código deve ser explicitamente mencionado ou anexado, e o usuário não está pedindo para que o código seja alterado ou que bugs sejam encontrados.
user.intent.descriptions.code.refactoring=Solicitações para refatorar ou reorganizar o código existente, fornecido pelo usuário, para melhorar sua estrutura, legibilidade ou manutenibilidade sem alterar sua funcionalidade.
user.intent.descriptions.error.explanation=Solicitações em que o usuário descreve um problema, geralmente incluindo uma mensagem de erro ou saída incorreta, e solicita uma explicação ou correção. O usuário pode ou não fornecer o código relevante. O foco está em entender por que algo não está funcionando.
user.intent.descriptions.find.bugs=Solicitações voltadas especificamente para identificar e explicar bugs ou erros em um trecho de código fornecido. O usuário espera que a resposta aponte problemas e possivelmente sugira correções.
user.intent.descriptions.general.request=Solicitações de informações gerais que não exigem um snippet de código específico. Geralmente são perguntas do tipo 'como fazer', semelhantes às pesquisas no Google. Exemplos incluem perguntas sobre conceitos gerais, uso de ferramentas ou práticas de programação. Elas não exigem conhecimento da base de código do usuário.
user.intent.descriptions.intellij.question=Consultas relacionadas ao uso do IntelliJ IDEA, como acessar determinados recursos ou realizar tarefas específicas dentro da IDE.
user.intent.descriptions.other=Mensagens que não se encaixam em nenhuma outra categoria predefinida, como caracteres aleatórios ou conteúdo irrelevante.
user.intent.descriptions.project.specific=Perguntas focadas na estrutura geral, arquitetura ou detalhes específicos de um projeto em particular, em vez de consultas de codificação gerais. O usuário geralmente questiona sobre conceitos de alto nível ou a organização dentro de um projeto específico.
user.intent.descriptions.test.generation=Solicitações para criar casos de teste para um snippet de código fornecido. O usuário espera que a resposta inclua código de teste relevante que possa verificar a correção do código original.
web.search.add.command.name.add=Adicionar comando de pesquisa na Web
web.search.add.smart.function.presentation=Pesquisando na Web…