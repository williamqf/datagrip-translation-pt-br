codex.acp.agent.confirm.install.title=Instalar Codex
codex.acp.agent.confirm.install.message=Para usar o Codex no AI Assistant, o Codex será instalado automaticamente quando você clicar em "Instalar e Continuar".<br>A instalação está sujeita aos <a href="{0}">Termos de Uso</a> da OpenAI. Ao clicar em "Instalar e Continuar", você concorda com estes termos. O uso posterior do Codex no AI Assistant está sujeito aos <a href="{1}">Termos de Serviço do JetBrains AI</a>.<br>O uso do Codex consome créditos da sua cota do JetBrains AI, a menos que você tenha vinculado sua própria assinatura de um fornecedor terceirizado ou fornecido um token pessoal nas configurações do AI Assistant.
codex.acp.agent.confirm.install.jba=Para usar o Codex no AI Assistant, o Codex será instalado automaticamente ao clicar em "Instalar e Continuar".<br>A instalação está sujeita à <a href="{0}">Apache License, Version 2.0</a>. Após a instalação, seus dados podem ser processados por um provedor externo sob os termos deles.<br>O uso posterior do Codex no AI Assistant está sujeito aos <a href="{1}">Termos de Serviço do JetBrains AI</a>.<br>O uso do Codex consome créditos da sua cota do JetBrains AI, a menos que você tenha vinculado sua própria assinatura de um fornecedor terceirizado ou fornecido um token pessoal nas configurações do AI Assistant.
codex.acp.agent.confirm.install.byok=O Codex será instalado automaticamente quando você clicar em "Instalar e Continuar". A instalação está sujeita à <a href={0}>Apache License, Version 2.0</a>. Seus dados serão processados por um provedor externo de acordo com os termos dele. A JetBrains não se responsabiliza pelo processamento das suas entradas, pelos resultados gerados ou por quaisquer outras ações realizadas.
codex.acp.agent.confirm.install.enterprise=Para usar o Codex no AI Assistant, o Codex será instalado automaticamente quando você clicar em "Instalar e Continuar".<br>A instalação está sujeita à <a href="{0}">Apache License, Version 2.0</a>. Após a instalação, seus dados poderão ser processados por um provedor externo sob os termos deles.<br>O uso posterior do Codex no AI Assistant é regido pelos Termos de Licença Especial da JetBrains aplicáveis, dependendo se você estiver usando o JetBrains IDE Services na <a href="{1}">nuvem</a> ou <a href="{2}">localmente (on-premise)</a>.<br>O uso do Codex consome créditos da sua cota do JetBrains AI, a menos que você tenha vinculado sua própria assinatura de um fornecedor terceirizado ou fornecido um token pessoal nas configurações do AI Assistant.

