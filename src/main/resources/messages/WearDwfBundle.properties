inspection.feature.requires.higher.wff.version.description=<html>Alguns recursos exigem uma versão mínima do Watch Face Format.<br/>Saiba mais na documentação de <a href="https://developer.android.com/training/wearables/wff/features">recursos</a>.</html>
inspection.invalid.color.index.description=<html>Uma configuração de cores pode ter várias cores como parte de uma paleta. Se houver várias cores, a referência de configuração deverá especificar o índice de uma cor dentro dessa paleta. Por exemplo: [CONFIGURATION.myColor.0]. Se a paleta tiver apenas uma cor, o índice será opcional.<br/>Leia mais na documentação do <a href="https://developer.android.com/reference/wear-os/wff/user-configuration/color-configuration">ColorConfiguration</a>.</html>
inspection.invalid.color.index.invalid.index.in.range=O índice de cores deve ser um número inteiro no intervalo {0}
inspection.invalid.color.index.invalid.index.optional=O índice de cor é opcional e deve ser 0 se especificado
inspection.invalid.color.index.missing.colors=A configuração de cor deve declarar pelo menos uma cor em um ColorOption
inspection.invalid.color.index.missing.index=Deve ser especificado um índice de cor no intervalo {0}
inspection.invalid.complication.data.source.location.available.complication.types=Esta fonte de dados de complicação só pode ser usada em complicações com os seguintes tipos: {0}
inspection.invalid.complication.data.source.location.description=<html>Uma fonte de dados de complicação só pode ser usada sob uma tag <code>&lt;Complication&gt;</code> dentro de um Declarative Watch Face. As fontes de dados de complicação disponíveis dependem do tipo da Complicação. <br/>Leia mais na documentação do <a href="https://developer.android.com/reference/wear-os/wff/user-configuration/color-configuration">ColorConfiguration</a>.</html>
inspection.invalid.complication.data.source.location.missing.tag=As fontes de dados de complicações devem ser usadas dentro de uma tag <Complication>
