js.debugger.before.describe.tool.window=Ao pressionar {0}, duas ações ocorreram. Primeiro, o arquivo foi executado usando Node.js e a janela de ferramentas {1} foi aberta, exibindo o resultado da execução do código. Segundo, o <ide/> criou uma configuração de execução/depuração temporária para permitir a execução do arquivo dessa forma. Agora, use {2} para ocultar a janela de ferramentas e entender melhor a configuração de execução/depuração.
js.debugger.before.edit=Agora, e se você quiser ajustar as configurações desta nova configuração de execução/depuração ou usar uma diferente? Abra o menu {0} novamente e clique em "{1}".
js.debugger.before.intro.1=Com o <ide/>, você pode executar e depurar todos os tipos de aplicativos JavaScript diretamente de onde escreve seu código.
js.debugger.before.intro.2=Neste módulo, apresentaremos algumas etapas que serão úteis independentemente do tipo de código que você estiver depurando. Usaremos um aplicativo <a href=''{0}''>Node.js</a> muito básico como exemplo, que deve comparar dois números e retornar {1} ou {2}. Antes de continuar, certifique-se de que o Node.js esteja <a href=''{3}''>instalado</a> na sua máquina (para novas instalações, você precisará reiniciar o <ide/>). Se estiver pronto para continuar, pressione {4}.
js.debugger.before.manage.1=Este é o local para gerenciar as configurações de execução/depuração. Reserve um momento para explorar o que está disponível aqui e feche a janela quando estiver pronto para continuar.
js.debugger.before.manage.2=Reserve um momento para ver o que há aqui e feche a janela quando estiver pronto para continuar.
js.debugger.before.next=Esta lição termina aqui. Para iniciar a próxima lição, clique no botão abaixo ou use {0}.
js.debugger.before.save.1=Portanto, essas configurações servem como pontos de entrada para executar/depurar o aplicativo. Elas podem ser temporárias ou permanentes. A principal diferença é que as configurações temporárias são excluídas automaticamente se o limite padrão de 5 configurações for atingido.
js.debugger.before.save.2=Vamos ver como converter configurações temporárias em permanentes. Abra o menu suspenso {0} no canto superior direito e selecione {1}.
js.debugger.before.title=Antes da depuração: Configuração de Execução/Depuração
js.debugger.module.description=Saiba como executar o programa passo a passo e identificar problemas sem sair do IDE.
js.debugger.module.name={0} Depurador 101
js.debugger.part.1.gutter=Os números comparados {0} e {1} não são iguais, portanto, ao executar o código, você deveria obter {2}. Vamos descobrir por que você obteve {3}. Na linha 1, clique na medianiz (espaço vazio) entre o #1 e o código para inserir um ponto de interrupção.
js.debugger.part.1.next=A aba {0} lista todos os arquivos carregados no processo em execução no momento. Clique duas vezes para visualizar o conteúdo de qualquer arquivo. Para prosseguir para a segunda parte desta aula, clique no botão abaixo ou use {1}.
js.debugger.part.1.scripts.tab=A aba {0} exibe mensagens registradas pelo aplicativo, incluindo erros. Ao depurar aplicativos Node.js, o <ide/> também exibe a aba {1}, na qual você pode executar snippets de código JavaScript e visualizar mensagens do console. Alterne para a aba {2} para continuar.
js.debugger.part.1.set.breakpoint=Podemos usar breakpoints para pausar a execução do aplicativo. O círculo vermelho exibido na margem lateral é um breakpoint no <ide/>. Se clicar novamente, ele será removido. Você também pode clicar com o botão direito para personalizar seu comportamento, por exemplo, definindo uma condição. Clique no botão {0} no canto superior direito (ou pressione {1}) para continuar.
js.debugger.part.1.start.1=Agora que temos uma configuração de execução/depuração, vejamos como usar o depurador integrado.
js.debugger.part.1.start.2=Primeiro, execute o código mais uma vez para inspecionar o valor retornado, já que não focamos nisso na lição anterior. Clique no botão {0} ao lado da lista suspensa com as configurações para executar a configuração selecionada atualmente.
js.debugger.part.1.title=Depurar código. Parte 1
js.debugger.part.1.tool.window.1=Conheça a janela de ferramentas "{0}". No lado esquerdo, há ícones para parar/reiniciar a execução e gerenciar breakpoints. Na parte superior, há várias abas e um conjunto de ícones para percorrer o código passo a passo.
js.debugger.part.1.tool.window.2=A aba "{0}" onde estamos é onde a maior parte do trabalho é realizada. À direita, estão todas as {1} e seus valores, agrupados por escopo. A visualização "{2}" mostra a pilha de chamadas. Ao observar com atenção, você verá o estado do aplicativo em cada ponto do caminho de execução. Agora, mude para a aba "{3}".
js.debugger.part.2.buttons.1=Para saber mais sobre a execução passo a passo do programa, consulte a <a href="{0}">ajuda on-line</a>.
js.debugger.part.2.buttons.2=Agora, e se quisermos verificar o valor de uma expressão? O <ide/> permite que você faça isso rapidamente usando o recurso {0}. Pressione {1} para continuar.
js.debugger.part.2.end=Parabéns! Você concluiu o {0} e aprendeu os métodos básicos para depurar todos os tipos de aplicativos. Se desejar, você pode executar o código mais uma vez para confirmar que tudo está funcionando corretamente agora. Para saber mais sobre como depurar tipos específicos de aplicativos, consulte nossa <a href=''{1}''>Ajuda Web</a> e nossas <a href=''{2}''>postagens no blog</a>.
js.debugger.part.2.evaluate.1=Adicione {0} como uma expressão e pressione {1}. Veja o resultado: ele é igual a {2}. É aqui que está o problema. Para fazer com que a função capture números diferentes, a expressão precisa ser alterada ligeiramente para que seu resultado seja igual a {3}.
js.debugger.part.2.evaluate.2=Agora feche a janela pop-up e corrija o problema que encontramos no código. Na linha 2 em {0}, substitua {1} por {2}.
js.debugger.part.2.step.into.1=<strong>Importante</strong>: Certifique-se de que haja um ponto de interrupção na linha 1 e que o depurador esteja iniciado ({0}) e aberto na guia {1} antes de prosseguir.
js.debugger.part.2.step.into.2=Vamos continuar procurando bugs no código e aprender mais algumas informações úteis ao depurar no <ide/>. Para entender melhor como o código é executado, podemos adicionar mais pontos de interrupção e usar o botão {0} ({1}) para alternar entre eles, mas existe uma maneira mais rápida. Vamos pressionar {2} e usar {3} ({4}) para entrar na próxima linha de execução.
js.debugger.part.2.stop=Por fim, saiba como parar o depurador quando não precisar mais dele. Primeiro, clique no ponto de interrupção adicionado para removê-lo. Em seguida, use {0} ({1}) para parar o depurador e pressione {2} para fechar a janela de ferramentas.
js.debugger.part.2.title=Depurar código. Parte 2