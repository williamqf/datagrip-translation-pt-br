DotNetDebuggerGeneralConfigurableUi.help.label.de.optimize.methods.assemblies=O depurador configura o JIT para recompilar métodos do código externo, seja onde um ponto de interrupção foi inserido ou onde ocorreu um step into. Isso melhora a execução passo a passo, a avaliação e muitos outros recursos do depurador durante a depuração de código-fonte externo.
DotNetDebuggerGeneralConfigurableUi.help.label.disable.jit.optimizations=Esta opção evita a otimização de todos os assemblies (referências de sistema e binárias) compilados no modo Release se o processo for iniciado pelo depurador. Isso torna a execução do processo mais lenta, mas permite inspecionar variáveis locais otimizadas nesses assemblies.
DotNetDebuggerGeneralConfigurableUi.help.label.use.jit.for.precompiled.assemblies=Se uma imagem pré-compilada (NGen, CrossGen ou qualquer AOT) for carregada para um assembly, o JIT não será executado e a desativação da otimização JIT não terá efeito. Esta opção permite que o depurador ignore a imagem pré-compilada e faça com que o JIT compile o assembly. Isso retarda a inicialização do processo, mas permite inspecionar variáveis locais otimizadas no assembly (se a otimização JIT estiver desativada).
