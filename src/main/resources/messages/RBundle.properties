inlay.hints.exclude.list.pattern.explanation=Para desativar dicas de um método, use o padrão apropriado: <p> <code><b>Kernel.*</b></code> - métodos do módulo 'Kernel'<br> <code><b>Kernel.*(*, *)<b></code> - métodos do módulo 'Kernel' com dois parâmetros<br> <code><b>Kernel::*</b></code> - métodos singleton do módulo 'Kernel'<br> <code><b>*.puts<b></code> - métodos 'puts'<br> <code><b>(*name)<b></code> - métodos de parâmetro único em que o nome do parâmetro termina com 'name'<br> <code><b>(key, value)<b></code> - métodos com dois parâmetros, 'key' e 'value'<br> </p>
