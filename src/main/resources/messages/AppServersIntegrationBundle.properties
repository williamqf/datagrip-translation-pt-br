libraries.node.text.application.server=As bibliotecas contêm classes que adicionam diversas funcionalidades aos seus aplicativos. As bibliotecas também incluem arquivos de origem e JavaDocs que podem ajudá-lo a desenvolver seus projetos.<br><br> O IntelliJ IDEA usa bibliotecas para auxiliá-lo no preenchimento de código, validação, realce de erros, etc.<br><br>As bibliotecas do servidor de aplicativos fazem parte de um servidor de aplicativos (WebSphere, WebLogic, Tomcat, etc.) e estão disponíveis para seus aplicativos Web e Java EE configurados com esses servidores.<br><br>Expanda o nó e selecione itens secundários para gerenciar as bibliotecas do servidor de aplicativos instaladas em seu sistema. <br><br> Para anexar uma biblioteca a um módulo, selecione esse módulo, clique na guia Dependências, clique em Adicionar e especifique o local da biblioteca.
