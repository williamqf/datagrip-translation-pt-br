swift.rdt.test.more=É isso! Para certos frameworks (como o <strong>Quick</strong>), o <ide/> oferece uma renderização ainda melhor dos resultados de teste. Para uma visão geral de todos os frameworks de teste suportados pelo <ide/>, assista a <a href="https://www.youtube.com/watch?v=DXvx6xNG_jc">este vídeo</a>.
