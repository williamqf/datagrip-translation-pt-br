documentation.raw.byte.string.literals.def=<h3>Literais de string de bytes brutos</h3>
documentation.raw.byte.string.literals.p1=<p>Literais de string de bytes brutos não processam nenhum escape. Eles começam com o caractere <code class="hljs">U+0062</code> (<code class="hljs">b</code>), seguido por <code class="hljs">U+0072</code> (<code class="hljs">r</code>), seguido por menos de 256 caracteres <code class="hljs">U+0023</code> (<code class="hljs">#</code>) e um caractere <code class="hljs">U+0022</code> (aspas duplas). O <em>corpo da string bruta</em> pode conter qualquer sequência de caracteres ASCII e só pode terminar com outro caractere <code class="hljs">U+0022</code> (aspas duplas) seguido pelo mesmo número de caracteres <code class="hljs">U+0023</code> (<code class="hljs">#</code>) que antecederam o caractere <code class="hljs">U+0022</code> (aspas duplas) de abertura. Literais de string de bytes brutos não podem conter nenhum byte não-ASCII.</p>
documentation.raw.byte.string.literals.p2=<p>Todos os caracteres contidos no corpo da string bruta representam sua codificação ASCII. O caractere <code class="hljs">U+0022</code> (aspas duplas) (a menos que seja seguido por pelo menos tantos caracteres <code class="hljs">U+0023</code> (<code class="hljs">#</code>) quantos os usados para iniciar o literal de string bruta) ou <code class="hljs">U+005C</code> (<code class="hljs"></code>) não tem nenhum significado especial.</p>
documentation.raw.byte.string.literals.p3=<p>Exemplo de literais de string de bytes:</p>
documentation.raw.string.literals.def=<h3>Literais de String Brutos</h3>
documentation.raw.string.literals.p1=<p>Literais de string brutos não processam sequências de escape. Eles começam com o caractere <code>U+0072</code> (<code>r</code>), seguido por menos de 256 caracteres <code>U+0023</code> (<code>#</code>) e um caractere <code>U+0022</code> (aspas duplas). O <em>corpo da string bruta</em> pode conter qualquer sequência de caracteres Unicode e só é terminado por outro caractere <code>U+0022</code> (aspas duplas) seguido pela mesma quantidade de caracteres <code>U+0023</code> (<code>#</code>) que precederam o caractere <code>U+0022</code> (aspas duplas) de abertura.</p>
documentation.raw.string.literals.p2=<p>Todos os caracteres Unicode contidos no corpo da literal de string bruta representam a si mesmos. O caractere <code>U+0022</code> (aspas duplas) (a menos que seja seguido por pelo menos a mesma quantidade de caracteres <code>U+0023</code> (<code>#</code>) usados para iniciar a literal de string bruta) ou <code>U+005C</code> (<code></code>) não possui nenhum significado especial.</p>
documentation.raw.string.literals.p3=<p>Exemplos de literais de string:</p>
