aiplugin.timeline.emptyState.sampleQuery4.answer=O Gemini Code Assist pode ajudar você a fazer o seguinte:\n\n* Gerar código e testes para seu projeto\n* Fornecer orientação sobre o que você está tentando fazer com seu código\n* Usar o contexto da sua base de código local para fornecer respostas fundamentadas no chat\n* Explicar o código para você\n* Mostrar sugestões e conclusões de código\n* Encontrar bugs e sugerir correções\n\nPara saber mais sobre como usar o Gemini no seu IDE, consulte:\n\n* [Escrever código no IntelliJ com a assistência do Gemini](https://developers.google.com/gemini-code-assist/ui/write-code)\n* [Ver o Codelab](https://codelabs.developers.google.com/codelabs/cloud-developer-duetai?hl=en#0)
