libraries.node.text.ide=As bibliotecas contêm classes que adicionam diversas funcionalidades aos seus aplicativos. As bibliotecas também incluem arquivos de origem e JavaDocs que podem ajudá-lo a desenvolver seus projetos.<br><br>O IntelliJ IDEA usa bibliotecas para auxiliá-lo com a conclusão de código, validação, realce de erros, etc.<br><br>As bibliotecas globais são referenciadas em todo o projeto e podem ser usadas em todos os módulos. Além disso, elas estão disponíveis para todos os projetos criados localmente em seu computador.<br><br>Observe que as bibliotecas globais não estão disponíveis para as pessoas com quem você compartilha seu projeto. Se estiver compartilhando o projeto com sua equipe, use bibliotecas de projeto em seu lugar.<br><br>Expanda o nó e selecione os itens filhos para gerenciar as bibliotecas globais. <br><br>Para anexar uma biblioteca a um módulo, selecione esse módulo, clique na guia Dependências, clique em Adicionar e especifique o local da biblioteca.
libraries.node.text.module=As bibliotecas contêm classes que adicionam diversas funcionalidades aos seus aplicativos. As bibliotecas também incluem arquivos de origem e JavaDocs que podem ajudá-lo a desenvolver seus projetos.<br><br>O IntelliJ IDEA usa bibliotecas para auxiliá-lo na conclusão de código, validação, realce de erros, etc.<br><br>As bibliotecas de módulo são referenciadas apenas a partir do módulo ao qual estão vinculadas. Expanda o nó e selecione os itens secundários para gerenciar as bibliotecas de módulo.<br><br>Para anexar uma biblioteca a um módulo, selecione esse módulo, clique na guia Dependências, clique em Adicionar e especifique o local da biblioteca.
libraries.node.text.project=As bibliotecas contêm classes que adicionam várias funcionalidades aos seus aplicativos. As bibliotecas também incluem arquivos de origem e JavaDocs que podem ajudá-lo a desenvolver seus projetos.<br><br>O IntelliJ IDEA usa bibliotecas para auxiliá-lo com o preenchimento de código, validação, realce de erros, etc.<br><br>As bibliotecas de projeto são referenciadas em todo o projeto e podem ser usadas em todos os módulos. Além disso, elas estão disponíveis para todos com quem você compartilha o projeto.<br><br>Expanda o nó e selecione os itens filhos para gerenciar as bibliotecas do projeto.<br><br>Para anexar uma biblioteca a um módulo, selecione o módulo, clique na guia Dependências, clique em Adicionar e especifique o local da biblioteca.
