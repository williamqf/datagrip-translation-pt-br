notification.trace.data.sharing.internal.text=O IDE pode registrar como você interage com o código, o IDE e os plug-ins (como o AI Assistant e o Junie). Isso nos ajuda a melhorar a funcionalidade dos produtos da JetBrains e a treinar nossos modelos de ML. Os dados registrados não estão vinculados à sua Conta da JetBrains, mas podem conter elementos do texto ou código que você edita. Você pode optar por sair a qualquer momento em {0} | Aparência & Comportamento | Configurações do Sistema | Compartilhamento de Dados. <a href="https://www.jetbrains.com/legal/docs/terms/product_data_collection/">Saiba mais</a>.
