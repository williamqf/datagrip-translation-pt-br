EntityPropertiesPanel.performance.manyToManyCollectionInfo=Quando uma Collection é usada para mapear uma associação ManyToMany, o Hibernate não consegue excluir essa associação da tabela de junção de forma eficiente. \nEm vez disso, ele remove todos os registros associados à entidade proprietária e reinsere os restantes. Alterar o tipo de coleção para Set reduz o número de consultas necessárias para a exclusão.
