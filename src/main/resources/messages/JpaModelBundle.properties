EntityPropertiesPanel.performance.oneToManyJoinColumnInfo=OneToMany unidirecional com @JoinColumn pode causar consultas adicionais.\n Como a coluna de junção não está presente na entidade JPA referenciada e apenas no banco de dados, o Hibernate a atualiza em uma consulta separada.\n Tornar a associação bidirecional resolve este problema.
EntityPropertiesPanel.performance.oneToManyJoinTableListInfo=O OneToMany unidirecional com @JoinTable introduz uma nova tabela, o que exige consultas de insert/delete adicionais e ocupa espaço.\nA mesma associação pode ser expressa com um único @JoinColumn.
