db.generated.id.description=<ul><li><b>NONE</b> - nem o banco de dados nem o ORM fornecem o valor do ID. O ID deve ser atribuído explicitamente no código-fonte.</li><li><b>IDENTITY</b> - o ID é gerenciado pelo banco de dados. Funciona para tipos de incremento automático e no caso de usar `nextval("sequence_name")` ou qualquer outra função como o valor padrão para a coluna ID.</li><li><b>SEQUENCE</b> - o ID é gerenciado pelo ORM. A estratégia requer uma sequência no lado do banco de dados. Otimizado para inserção em massa.</li></ul>
db.generated.id.description.uuid=<ul><li><b>NONE</b> - nem o banco de dados nem o ORM fornecem o valor do ID. O ID deve ser atribuído explicitamente no código-fonte.</li><li><b>UUID</b> - o ID é gerenciado pelo cliente. O valor pode ser atribuído usando o Hibernate Generator, inicialização de campo ou fábricas personalizadas. Esta é a única opção para sistemas distribuídos com diversas instâncias de aplicativos e bancos de dados implantadas mundialmente.</li></ul>
