spring.controller.request.param.help.authenticatedPrincipal=Anotação usada para resolver Authentication.getPrincipal() em um argumento de método.
spring.controller.request.param.help.bindingResult=Para acesso a erros de validação e vinculação de dados de um objeto de comando (ou seja, um argumento @ModelAttribute) ou erros da validação de argumentos @RequestBody ou @RequestPart. Você deve declarar um argumento Errors ou BindingResult imediatamente após o argumento do método validado.
spring.controller.request.param.help.csrfToken=Fornece informações sobre o token CSRF esperado.
spring.controller.request.param.help.errors=Para acessar erros de validação e vinculação de dados de um objeto de comando (ou seja, um argumento @ModelAttribute) ou erros da validação de argumentos @RequestBody ou @RequestPart. Você deve declarar um argumento Errors ou BindingResult imediatamente após o argumento do método validado.
spring.controller.request.param.help.httpEntity=Para acesso aos cabeçalhos e ao corpo da requisição. O corpo é convertido com um HttpMessageConverter.
spring.controller.request.param.help.httpMethod=O método HTTP da requisição.
spring.controller.request.param.help.httpSession=Força a presença de uma sessão. Como consequência, tal argumento nunca é nulo. Observe que o acesso à sessão não é thread-safe.
spring.controller.request.param.help.inputStream=Para acessar o corpo bruto da requisição conforme exposto pela Servlet API.
spring.controller.request.param.help.locale=O locale da requisição atual, determinado pelo LocaleResolver mais específico disponível (na prática, o LocaleResolver ou LocaleContextResolver configurado).
spring.controller.request.param.help.map=Para acesso ao modelo que é usado em controladores HTML e exposto a templates como parte da renderização da visualização.
spring.controller.request.param.help.model=Para acessar o modelo que é utilizado em controllers HTML e exposto a templates como parte da renderização da view.
spring.controller.request.param.help.modelMap=Para acesso ao modelo usado em controladores HTML e exposto a templates como parte da renderização da visualização.
spring.controller.request.param.help.nativeWebRequest=Acesso genérico a parâmetros de requisição e atributos de requisição e sessão, sem o uso direto da API Servlet.
spring.controller.request.param.help.oAuth2AuthorizedClient=As implementações desta interface são responsáveis pelo gerenciamento geral de cliente(s) autorizado(s).
spring.controller.request.param.help.outputStream=Para acesso ao corpo da resposta bruto conforme exposto pela Servlet API.
spring.controller.request.param.help.pagination=Um objeto que contém informações de paginação.
spring.controller.request.param.help.principal=Usuário autenticado no momento, possivelmente uma classe de implementação Principal específica, se conhecida. Observe que este argumento não é resolvido antecipadamente se estiver anotado, para permitir que um resolvedor personalizado o resolva antes de recorrer à resolução padrão via HttpServletRequest#getUserPrincipal. Por exemplo, o Spring Security Authentication implementa Principal e seria injetado como tal via HttpServletRequest#getUserPrincipal, a menos que também esteja anotado com @AuthenticationPrincipal, caso em que será resolvido por um resolvedor personalizado do Spring Security através de Authentication#getPrincipal.
spring.controller.request.param.help.pushBuilder=API PushBuilder do Servlet 4.0 para pushes programáticos de recursos HTTP/2. Observe que, de acordo com a especificação do Servlet, a instância PushBuilder injetada pode ser nula se o cliente não suportar esse recurso HTTP/2.
spring.controller.request.param.help.reader=Para acesso ao corpo bruto da requisição conforme exposto pela Servlet API.
spring.controller.request.param.help.redirectAttributes=Especifique os atributos a serem usados em caso de redirecionamento (ou seja, para serem anexados à query string) e atributos flash a serem armazenados temporariamente até a requisição após o redirecionamento.
spring.controller.request.param.help.servletRequest=Acesso genérico à requisição servlet
spring.controller.request.param.help.servletResponse=Acesso genérico à resposta do servlet
spring.controller.request.param.help.sessionStatus=Para marcar o processamento do formulário como concluído, o que dispara a limpeza dos atributos de sessão declarados por meio de uma anotação @SessionAttributes em nível de classe.
spring.controller.request.param.help.sort=Opção de ordenação para consultas. Você deve fornecer pelo menos uma lista de propriedades para ordenar que não deve conter strings nulas ou vazias. A direção padrão é DEFAULT_DIRECTION.
spring.controller.request.param.help.uriComponentsBuilder=Para preparar uma URL relativa ao host, porta, esquema, caminho de contexto da requisição atual e à parte literal do mapeamento do servlet.
spring.controller.request.param.help.webRequest=Estende a interface ServletRequest para fornecer informações de requisição para servlets HTTP. O contêiner de servlet cria um objeto HttpServletRequest e o passa como um argumento para os métodos de serviço do servlet (doGet, doPost, etc).
spring.controller.request.param.help.webResponse=Estende a interface ServletResponse para fornecer funcionalidade específica de HTTP ao enviar uma resposta. Por exemplo, possui métodos para acessar cabeçalhos e cookies HTTP. O contêiner servlet cria um objeto HttpServletResponse e o passa como um argumento para os métodos de serviço do servlet (doGet, doPost, etc).
spring.controller.request.param.help.writer=Para acesso ao corpo bruto da resposta conforme exposto pela Servlet API.
spring.controller.request.param.help.zoneId=O fuso horário associado à requisição atual, conforme determinado por um LocaleContextResolver.
spring.mvc.controllers.not.found=Nenhum controlador Spring MVC encontrado
