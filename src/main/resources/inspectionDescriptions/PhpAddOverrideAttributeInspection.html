Sugere a adição do atributo <code>#[Override]</code> a métodos que sobrescrevem um método de mesmo nome em uma classe pai ou em qualquer interface implementada.
<p>
  O atributo <code>#[Override]</code> está disponível apenas a partir do PHP 8.3. Para mais detalhes, consulte <a href="https://wiki.php.net/rfc/marking_overriden_methods">PHP RFC: Marking overridden methods (wiki.php.net)</a>.
</p>
