Reporta grupos de não captura desnecessários (que não têm efeito no resultado da correspondência).
<p><b>Exemplo:</b></p>
<pre><code>
  Everybody be cool, (?:this) is a robbery!
</code></pre>
<p>Após a aplicação da correção rápida:</p>
<pre><code>
  Everybody be cool, this is a robbery!
</code></pre>
