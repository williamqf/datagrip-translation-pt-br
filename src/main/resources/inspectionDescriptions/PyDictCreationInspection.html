<p>Relata casos em que a criação de um dicionário pode ser reescrita usando um literal de dicionário.</p>
<p>Essa abordagem pode melhorar o desempenho.</p>
<p><b>Exemplo:</b></p>
<pre><code>
dic = {}
dic['var'] = 1
</code></pre>
<p>Após a aplicação do quick fix, o código se torna:</p>
<pre><code>
dic = {'var': 1}
</code></pre>
</body>
