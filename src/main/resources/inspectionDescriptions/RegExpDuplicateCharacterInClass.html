Relata caracteres duplicados em classes de caracteres de expressões regulares (RegExp).
Caracteres duplicados são redundantes e podem ser removidos sem alterar a semântica da expressão regular.
<p><b>Exemplo:</b></p>
<pre><code>
  [aabc]
</code></pre>
<p>Após aplicar a correção rápida:</p>
<pre><code>
  [abc]
</code></pre>
