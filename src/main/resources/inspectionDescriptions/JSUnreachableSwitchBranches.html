<body>
Reporta ramificações <code>case</code> inacessíveis em instruções <code>switch</code>. <p>Exemplo:</p>
<pre><code>
/**
 * @param {('foo' | 'bar')} p
 */
function foo(p) {
    switch (p) {
        case 'foo': break;
        case 'bar': break;
        case 'baz': break; // inacessível
    }
}
</code></pre>
