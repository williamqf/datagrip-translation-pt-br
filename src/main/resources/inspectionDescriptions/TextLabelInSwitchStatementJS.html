Relata instruções rotuladas dentro de instruções <code>switch</code>, o que geralmente é causado por erros de digitação.
<p>Exemplo:</p>
<pre><code>
    <b>switch</b>(x)
    {
        <b>case</b> 1:
        case2:   //Erro de digitação!
        <b>case</b> 3:
            <b>break</b>;
    }
</code></pre>
