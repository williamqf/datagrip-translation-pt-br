Relata variáveis, métodos e classes com o sinal de dólar (<code>$</code>) em seus nomes. Embora tais nomes sejam válidos em Java, recomenda-se fortemente não utilizá-los fora de código Java gerado.
<p><b>Exemplo:</b></p>
<pre><code>
  class SalaryIn${}
</code></pre>
<p>A correção rápida de renomeação é sugerida apenas no editor.</p>
