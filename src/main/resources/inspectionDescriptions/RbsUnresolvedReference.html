Relata referências que não podem ser resolvidas para nenhuma declaração. Referências não resolvidas frequentemente ocorrem devido a erros de digitação e podem levar a erros como <code>UnknownMethodAlias</code> e <code>UnknownTypeName</code>.
<p>Exemplo:</p>
<pre><code># 'Undefined' não encontrado
type example = Undefined</code></pre>
