Relata ramos duplicados em alternâncias de expressões regulares.
Ramos duplicados reduzem a velocidade de correspondência e tornam a intenção da expressão obscura.
<p><b>Exemplo:</b></p>
<pre><code>
  (alpha|bravo|charlie|alpha)
</code></pre>
<p>Após a aplicação da correção rápida:</p>
<pre><code>
  (alpha|bravo|charlie)
</code></pre>
<!-- tooltip end -->
