Relata variáveis com nomes negativos, como: <code>disabled</code>, <code>hidden</code> ou <code>isNotChanged</code>.
<p>Inverter o valor <code>boolean</code> e remover a negação do nome geralmente ajuda a tornar o código mais fácil de entender.</p>
<p>Exemplo:</p>
<pre><code>
    boolean disabled = false;
</code></pre>
