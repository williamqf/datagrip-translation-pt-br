<body>
Relata operações de atribuição que podem ser substituídas por atribuições com operador para tornar o código mais conciso e claro.
<p>
  Exemplo:
<pre>
<code>  x = x + 3;</code>
  <code>x = x / 3;</code>
</pre>
<p>Após a aplicação da correção rápida, o resultado será:
<pre>
  <code>x += 3;</code>
  <code>x /= 3;</code>
</pre>
</body>
