</p>
<p>
  Sugere substituir tuplas de elemento único pelo próprio tipo.
</p>
<!-- tooltip end -->
<p>
  <b>Exemplo:</b>
</p>
<pre><code>
  func foo() -> (Int) {}
</code></pre>
<p>

</p>
<pre><code>
  func foo() -> Int {}
</code></pre>
