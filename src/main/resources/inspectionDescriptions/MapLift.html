<p>Relata o uso de <code>map.lift(n)</code> e sugere a substituição por <code>map.get(n)</code>.</p>
<p><b>Exemplo:</b></p>
<pre><code>
  val m = Map(1 -> 1)
  m.lift(1)
</code></pre>
<p>Após a correção rápida ser aplicada:</p>
<pre><code>
  val m = Map(1 -> 1)
  m.get(1)
</code></pre>
