<p>Relata a ausência de comentários de codificação no Python 2.</p>
<p><b>Exemplo:</b></p>
<pre><code>
class Book(object):
    def __init__(self):
        pass
</code></pre>
<p>Após a aplicação da correção rápida, o comentário ausente será adicionado:</p>
<pre><code>
# coding=utf-8
class Book(object):
    def __init__(self):
        pass
</code></pre>
</body>
