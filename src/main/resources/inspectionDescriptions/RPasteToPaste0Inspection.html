<html>
<body>
<p>Relata um separador vazio na função <code>'paste'</code>.
  A correção rápida substitui a chamada de <code>'paste'</code> pela função <code>'paste0'</code>.
<p><b>Exemplo:</b></p>
<p>
  <code>
    paste("a", "b", sep = '')
  </code>
</p>
<p>
  Ao aplicar a correção rápida, o código muda para:
</p>
<p>
  <code>
    paste0("a", "b")
  </code>
</p>
</body>
</html>
