<body>
Relata atribuições aos parâmetros de um loop <b>for</b> dentro do corpo do loop.
<p>Embora ocasionalmente seja intencional, essa construção pode ser extremamente confusa e geralmente é resultado de um erro de digitação.</p>
<p><b>Exemplo:</b></p>
<pre><code>
  for (value in [1, 2, 3]) {
      value = 4 // aviso
  }
</code></pre>
</body>
