<p>Relata instruções <code>if</code> que podem ser simplificadas em uma única instrução.</p>
<p><b>Exemplo:</b></p>
<pre><code>
  fun test(): Boolean {
      if (foo()) {
         return true
      } else {
         return false
      }
  }
</code></pre>
<p>Após a aplicação da correção rápida:</p>
<pre><code>
  fun test(): Boolean {
      return foo()
  }
</code></pre>
