Relata chamadas dos métodos <code>assertTrue()</code> e <code>assertNotTrue()</code> que fornecem uma chamada <code>array_key_exists()</code> como argumento. Tais chamadas podem ser substituídas por uma chamada ao método dedicado <code>assertArrayHasKey()</code>.

<p>
  Para mais detalhes, consulte <a href="https://phpunit.readthedocs.io/en/stable/assertions.html#assertarrayhaskey">assertArrayHasKey (phpunit.readthedocs.io)</a>.
