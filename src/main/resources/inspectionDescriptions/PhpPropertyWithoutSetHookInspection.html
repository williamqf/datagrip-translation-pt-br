Relata propriedades com um hook <code>get</code> que podem ser substituídas por uma propriedade promovida com um modificador de visibilidade assimétrica <code>private(set)</code>.
<p>
  A visibilidade assimétrica é suportada no PHP 8.4 e superior.
  Para mais detalhes, consulte o <a href="https://wiki.php.net/rfc/asymmetric-visibility-v2">PHP RFC: Asymmetric Visibility v2</a>.
</p>
