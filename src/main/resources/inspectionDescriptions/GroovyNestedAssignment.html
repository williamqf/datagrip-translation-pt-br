Relata expressões de atribuição aninhadas em outras expressões.
Embora extremamente concisas, tais expressões podem ser confusas e violam o princípio de design geral de que uma determinada construção deve realizar apenas uma tarefa.
<p><b>Exemplo:</b></p>
<pre>
<code>
a = b = 1
</code>
</pre>
