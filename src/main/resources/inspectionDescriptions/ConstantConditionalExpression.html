Relata expressões condicionais onde a condição é uma constante <code>true</code> ou <code>false</code>.
Essas expressões às vezes são o resultado de refatoração automática e podem ser simplificadas.
<p>Exemplo:</p>
<pre><code>
  return true ? "Yes" : "No";
</code></pre>
<p>Após aplicar o ajuste rápido:</p>
<pre><code>
  return "Yes";
</code></pre>
