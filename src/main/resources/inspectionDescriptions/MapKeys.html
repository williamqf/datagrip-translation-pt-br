<p>Relata métodos não-padrão para extrair chaves de <code>Map</code>.</p>
<p><b>Exemplo:</b></p>
<pre><code>
  val map = Map(1 -> 42)
  map.map(_._1)
  map.map(_._1).toSet
  map.map(_._1).toIterator
</code></pre>
<p>Após a aplicação do quick-fix:</p>
<pre><code>
  val map = Map(1 -> 42)
  map.keys
  map.keySet
  map.keysIterator
</code></pre>
