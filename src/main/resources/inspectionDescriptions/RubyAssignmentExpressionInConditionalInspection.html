Relata o uso de expressões de atribuição em condições.
A atribuição em condições pode dificultar a leitura do código e, geralmente, é um erro de digitação (uso de <code>=</code> em vez de <code>==</code>).
<p>Use a caixa de seleção <i>Relatar atribuições entre parênteses</i> para realçar atribuições dentro de parênteses.</p>
