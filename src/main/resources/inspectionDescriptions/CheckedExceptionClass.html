Relata classes de exceção verificadas (ou seja, subclasses de <code>java.lang.Exception</code> que não são subclasses de <code>java.lang.RuntimeException</code>).
<p>Alguns padrões de codificação proíbem classes de exceção verificadas definidas pelo usuário.</p>
<p><b>Exemplo:</b></p>
<pre><code>
  class IllegalMoveException extends Exception {}
</code></pre>
