<p>Relata a ausência de <code>exec</code> na forma shell do comando ENTRYPOINT.</p>
<p>
  Para garantir que o <code>docker stop</code> sinalize corretamente qualquer executável ENTRYPOINT de longa execução, ele precisa ser iniciado com <code>exec</code>.
</p>
<p>
  Consulte a <a href="https://docs.docker.com/reference/dockerfile/#shell-form-entrypoint-example">referência do Dockerfile</a> para obter mais informações.
</p>
