Relata alternâncias de caracteres únicos em expressões regulares.
Usar uma classe de caracteres é mais simples.
Isso também pode melhorar o desempenho da correspondência.
<p><b>Exemplo:</b></p>
<pre><code>
  a|b|c|d
</code></pre>
<p>Após a aplicação da correção rápida:</p>
<pre><code>
  [abcd]
</code></pre>
<!-- tooltip end -->
<p>
<small>Novidade na versão 2017.1</small>
