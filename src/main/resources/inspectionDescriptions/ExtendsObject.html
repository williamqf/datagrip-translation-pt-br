Relata classes que declaram explicitamente estender <code>java.lang.Object</code>.
<p>Essa declaração é redundante e pode ser removida com segurança.</p>
<p>Exemplo:</p>
<pre><code>
  class MyClass extends Object {
  }
</code></pre>
<p>A correção rápida remove a cláusula <code>extends Object</code> redundante:</p>
<pre><code>
  class MyClass {
  }
</code></pre>
