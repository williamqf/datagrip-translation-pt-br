Relata qualquer uso de <code>java.lang.Random</code> ou <code>java.lang.Math.random()</code>.
<p>
  Em ambientes seguros, o <code>java.secure.SecureRandom</code> é uma escolha melhor, pois fornece geração de números aleatórios criptograficamente segura.
</p>
<p><b>Exemplo:</b></p>
<pre><code>
  long token = new Random().nextLong();
</code></pre>
