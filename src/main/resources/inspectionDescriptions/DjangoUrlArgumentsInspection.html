<body>
<p>Reporta parâmetros ausentes em arquivos de template se o caminho da URL na função <code>url()</code> contiver parâmetros.</p>
<p><b>Exemplo:</b></p>
<p>No arquivo <code>url.py</code></p>
<pre><code lang="Python">
url(r'^(?P&lt;question_id&gt;[0-9]+)/', views.detail, name='detail')
</code></pre>
<p>No arquivo de template</p>
<pre><code lang="DjangoTemplate">
{% url 'polls:detail' %}
</code></pre>
</body>
</html>
