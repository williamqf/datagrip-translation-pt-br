Relata classes que contêm apenas propriedades <code>readonly</code> e às quais o modificador <code>readonly</code> pode ser adicionado.
<p>
  Classes readonly são suportadas no PHP 8.2 e versões posteriores.
  Para mais detalhes, consulte o <a href="https://wiki.php.net/rfc/readonly_classes#proposal">Readonly classes RFC (php.net)</a>.
</p>
