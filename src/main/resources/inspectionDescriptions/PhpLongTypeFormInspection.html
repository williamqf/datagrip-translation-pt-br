Relata o uso de palavras-chave de tipo na forma longa.
<p>
  De acordo com a PSR-12, as formas curtas das palavras-chave de tipo devem ser usadas, ou seja, <code>bool</code> em vez de <code>boolean</code>, <code>int</code> em vez de <code>integer</code>, etc.
</p>
<p>
  Para obter mais detalhes, consulte <a href="https://www.php-fig.org/psr/psr-12/#25-keywords-and-types">Keywords and Types (php-fig.org)</a>.
</p>
