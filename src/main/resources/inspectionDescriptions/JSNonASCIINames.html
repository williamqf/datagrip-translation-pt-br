Relata símbolos não ASCII em nomes.<br/><br/>
Se a opção "Permitir apenas nomes ASCII" estiver selecionada, todos os nomes que contêm símbolos não ASCII serão relatados.<br/>
Caso contrário, serão relatados todos os nomes que contêm tanto símbolos ASCII quanto não ASCII.
