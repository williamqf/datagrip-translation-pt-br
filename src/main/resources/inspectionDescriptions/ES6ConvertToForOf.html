Relata o uso de loops <code><a href="https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Statements/for...in">for..in</a></code> em arrays. Sugere substituí-los por loops <code><a href="https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Statements/for...of">for..of</a></code>.
<br/>O loop <code>for..of</code> (introduzido no ECMAScript 6) itera sobre objetos <code>iterable</code>.
Para arrays, essa estrutura é preferível ao <code>for..in</code>, pois lida apenas com os valores do array, e não com as propriedades do objeto array.
