Relata referências não resolvidas inseridas por <a href="https://www.jetbrains.com/help/idea/using-language-injections.html">injeção de linguagem</a>.
<p>Exemplo:</p>
<pre><code lang="java">
    @Language("file-reference")
    String fileName = "/home/user/nonexistent.file"; // Realçado quando o arquivo não existe
</code></pre>
