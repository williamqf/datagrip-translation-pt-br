Relata o uso incorreto de instruções de transferência de fluxo de controle, como <code>return</code>, <code>retry</code>, <code>redo</code>, <code>break</code> e <code>continue</code>.
<p>Exemplo:</p>
<pre>
<code>i = 1
while true
  if i * 6 >= 30
    retry
  end
  puts i * 6
  i += 1
end</code>
</pre>
