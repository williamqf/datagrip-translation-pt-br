<p>Relata chamadas desnecessárias para <code>Map.get</code>/<code>Option.get</code> ao obter um valor de um mapa por meio de uma chave</p>.
<p><b>Exemplo:</b></p>
<pre><code>
  val map = Map( 1 -> 42 )
  map.get(k).get
</code></pre>
<p>Após a correção rápida ser aplicada:</p>
<pre><code>
  val map = Map( 1 -> 42 )
  map(k)
</code></pre>
