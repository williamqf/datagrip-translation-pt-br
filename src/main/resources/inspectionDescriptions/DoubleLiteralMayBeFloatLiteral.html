Relata expressões literais <code>double</code> que são imediatamente convertidas para <code>float</code>.
<p>Essas expressões literais podem ser substituídas por um literal <code>float</code> equivalente.</p>
<p><b>Exemplo:</b></p>
<pre><code>float f = (float)1.1;</code></pre>
<p>Após aplicar a correção rápida:</p>
<pre><code>float f = 1.1f;</code></pre>
