<p>Relata chamadas de função ou asserções que falharam em testes Pest. Isso ajuda a detectar as linhas com falha no código mais rapidamente e a iniciar a depuração imediatamente.</p>
<p><b>Exemplo:</b></p>
<pre><code>
  test("1 is 2", function() {
      expect(1)->toBe(2); //highlighted
  }
</code></pre>
