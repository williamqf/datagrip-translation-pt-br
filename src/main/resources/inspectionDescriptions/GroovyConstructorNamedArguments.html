<body>
Relata argumentos nomeados em chamadas de construtor de classe padrão que não correspondem às propriedades da classe.
<p><b>Exemplo:</b></p>
<pre><code>
  class Person {
      def name
      def age
  }

  // a propriedade 'firstName' não existe
  new Person(firstName: "John")
</code></pre>
