<p>Relata instruções <code>from __future__ import</code> que não foram usadas no início do arquivo.</p>
<p><b>Exemplo:</b></p>
<pre><code>
a = 1
from __future__ import print_function
print()
</code></pre>
<p>Após a aplicação da correção rápida, o código mudará para:</p>
<pre><code>
from __future__ import print_function

a = 1
print()
</code></pre>
