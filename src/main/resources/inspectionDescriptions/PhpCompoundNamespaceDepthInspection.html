Reporta o uso de namespaces compostos com profundidade superior a dois níveis.

<p>De acordo com a PSR-12, namespaces compostos com profundidade superior a dois níveis não devem ser usados.</p>

<p>
  Para mais detalhes, consulte <a href="https://www.php-fig.org/psr/psr-12/#3-declare-statements-namespace-and-import-statements">PSR-12: Extended Coding Style (php-fig.org)</a>.
