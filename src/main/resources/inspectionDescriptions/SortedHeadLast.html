<p>Relata classificação e uso de <code>head</code> ou <code>last</code> e sugere a sustituição por <code>max</code> ou <code>min</code>.</p>
<p><b>Exemplo:</b></p>
<pre><code>
  Seq("abc", "defg", "h").sorted.head
  Seq("abc", "defg", "h").sortBy(_.length).last
</code></pre>
<p>Após a aplicação da correção rápida:</p>
<pre><code>
  Seq("abc", "defg", "h").min
  Seq("abc", "defg", "h").maxBy(_.length)
</code></pre>
