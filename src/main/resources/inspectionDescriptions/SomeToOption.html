<p>Reporta e substitui <code>Some(a)</code> por <code>Option(a)</code>.</p>

<p><code>Option</code> fará uma verificação adicional se <code>a</code> é <code>null</code> e, se for, resultará em <code>None</code>.</p>

<p><b>Exemplo:</b></p>
<pre><code>
  Some(a)
</code></pre>
<p>Após a correção rápida ser aplicada:</p>
<pre><code>
  Option(a)
</code></pre>
