<body>
Relata padrões de arquivo redundantes nos casos em que já existe outro padrão que define o mesmo escopo de arquivo ou um escopo mais amplo.
Por exemplo, em <code>[{*.java,*}]</code>, o primeiro padrão <code>*.java</code> define um escopo mais restrito do que <code>*</code>.
Isso torna o primeiro padrão redundante, podendo ser removido.
