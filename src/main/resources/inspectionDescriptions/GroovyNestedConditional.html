<body>
Relata expressões condicionais ternárias aninhadas dentro de outras expressões condicionais.
Tais condições aninhadas podem ser muito confusas. Para fins desta inspeção, expressões "Elvis" são consideradas como expressões condicionais.
<p><b>Exemplo:</b></p>
<pre>
<code>
return (condition ? "result" : null) ?: "fail"
</code>
</pre>
</body>
