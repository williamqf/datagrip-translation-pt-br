Relata chamadas de <code>equals()</code> em que o alvo e o argumento têm tipos incompatíveis.
<p>Embora tais chamadas possam ser teoricamente úteis, é muito provável que sejam um bug.</p>
<p><b>Exemplo:</b></p>
<pre><code>
    new HashSet&lt;String&gt;() == new TreeSet&lt;Integer&gt;())
</code></pre>
