<p>Relata classes anotadas com <code>@Path</code> que não possuem métodos de recurso.
  Uma classe de recurso raiz deve ter pelo menos um método de recurso anotado com <code>@Path</code> ou qualquer <code>@HttpMethod</code> (<code>@GET</code>, <code>@POST</code>, etc.).</p>
