Relata consultas SQL do Room que usam parâmetros de consulta sem nome (por exemplo, <code>WHERE id = ?</code>). Isso não é suportado pelo analisador de consultas do Room, que exige parâmetros de consulta nomeados (por exemplo, <code>WHERE id = :id</code>) que correspondam aos argumentos do método anotado com <code>@Query</code>.
