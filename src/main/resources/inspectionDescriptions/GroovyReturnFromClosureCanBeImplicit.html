Relata instruções <code>return</code> no final de closures que podem ser tornadas implícitas.
<p>
  Closures do Groovy retornam implicitamente o valor da última instrução nelas contida.
</p>

<p><b>Exemplo:</b></p>
<pre><code>
  def foo = {
    return 1
  }
</code></pre>

<p>Após a aplicação do ajuste rápido:</p>
<pre><code>
  def foo = {
    1
  }
</code></pre>

</body>
