<html>
<body>
Relata loops <code>forEach</code> que não utilizam o valor iterável.
<p><b>Exemplo:</b></p>
<pre><code>
  listOf(1, 2, 3).forEach { }
</code></pre>
<p>A correção rápida introduz um parâmetro anônimo na seção <code>forEach</code>:</p>
<pre><code>
  listOf(1, 2, 3).forEach { _ -> }
</code></pre>
</body>
