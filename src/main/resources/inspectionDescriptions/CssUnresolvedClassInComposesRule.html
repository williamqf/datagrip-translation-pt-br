<body>
Relata referências de classe CSS em regras <a href="https://github.com/css-modules/css-modules#composition">'composes'</a> que não podem ser resolvidas para nenhum alvo válido.
<p><b>Exemplo:</b></p>
<pre><code>
  .className {/* ... */}

  .otherClassName {
    composes: className;
  }
</code></pre>
<!-- tooltip end -->
</body>
