Relata expressões de acesso a membros static em traits. Esse acesso direto foi depreciado a partir do PHP 8.1. Em vez disso, membros static devem ser acessados na classe que utiliza a trait.
<p>
  Para mais detalhes, consulte <a href="https://wiki.php.net/rfc/deprecations_php_8_1#accessing_static_members_on_traits">Depreciações do PHP 8.1: Acessando membros static em traits (php.net)</a>.
</p>
