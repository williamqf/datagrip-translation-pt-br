<p>Relata literais de ponto flutuante que terminam com um ponto decimal ('.').</p>
<p>É recomendado que os usuários evitem utilizá-los para prevenir a confusão com a sintaxe de chamada de método.</p>
<p><b>Exemplo:</b></p>
<pre><code>
  var x = 1.
</code></pre>
<p>Após a aplicação da correção rápida:</p>
<pre><code>
  var x = 1.0
</code></pre>
