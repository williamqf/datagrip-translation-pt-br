Relata funções de cor <code>hsl()</code> ou <code>hwb()</code> ou a notação de cor hexadecimal.
<p>Sugere substituir tais valores de cor pelas funções de cor <code>rgb()</code> ou <code>rgba()</code> equivalentes.</p>
<p><b>Exemplo:</b></p>
<pre><code>#0c0fff</code></pre>
<p>Após aplicar a correção rápida:</p>
<pre><code>rgb(12, 15, 255)</code>.</pre>
