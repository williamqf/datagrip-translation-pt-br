<html>
<body>Relata <a href="https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Operators/function">expressões de função</a>.
Sugere convertê-las em <a href="https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Functions/Arrow_functions">arrow functions</a>.
<p>Exemplo:</p>
<pre><code>arr.map(function(el) {return el + 1})</code></pre>
<p>Após a aplicação do quick fix, o código ficará assim:</p>
<pre><code>arr.map(el => el + 1)</code></pre>
</body>
</html>
