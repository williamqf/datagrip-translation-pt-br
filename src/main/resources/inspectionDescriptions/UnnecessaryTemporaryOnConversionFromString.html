Relata a criação de objetos temporários desnecessários ao converter de <code>String</code> para tipos primitivos.
<p><b>Exemplo:</b></p>
<pre><code>
  new Integer("3").intValue()
</code></pre>
<p>Após a aplicação do ajuste rápido:</p>
<pre><code>
  Integer.valueOf("3")
</code></pre>
