Relata comentários inline antes de argumentos em chamadas de função que contêm apenas o nome do parâmetro e, portanto, servem como dicas. No PHP 8.0 e versões posteriores, argumentos nomeados podem ser usados como alternativa.

  Para mais detalhes, consulte <a href="https://wiki.php.net/rfc/match_expression_v2">Argumentos nomeados (php.net)</a>.
