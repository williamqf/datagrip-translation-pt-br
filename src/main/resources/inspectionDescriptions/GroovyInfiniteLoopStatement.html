Relata instruções <code>for</code>, <code>while</code> ou <code>do</code> que só podem ser encerradas por meio do lançamento de uma exceção. Embora tais instruções possam estar corretas, elas geralmente são o resultado de um erro.
<p><b>Exemplo:</b></p>
<pre>
<code>
while(true) {
  Thread.sleep(1000)
}
</code>
</pre>
