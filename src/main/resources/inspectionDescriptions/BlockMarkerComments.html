<body>
Relata comentários usados como marcadores de bloco de código.
A correção rápida remove esses comentários.
<p>Exemplo:</p>
<pre><code>
  while (i &lt; 10) {
    i++;
  } // end while
</code></pre>
<p>Após a aplicação da correção rápida:</p>
<pre><code>
  while (i &lt; 10) {
    i++;
  }
</code></pre>
<!-- tooltip end -->
</body>
