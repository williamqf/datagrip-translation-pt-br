<body>
Relata diretivas taglib JSP que não possuem os atributos <code>uri</code> ou <code>tagdir</code>.

<p><b>Exemplo:</b></p>
<pre><code>
&lt;html&gt;
  &lt;body&gt;
    &lt;%@ taglib prefix="html"%&gt; // Erro: o atributo `uri` ou `tagdir` deve ser especificado
    ...
  &lt;/body&gt;
&lt;/html&gt;
</code></pre>
</body>
