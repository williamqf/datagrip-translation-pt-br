<p>Reporta propriedades CSS shorthand (por exemplo, <code>border</code>, <code>font</code>, <code>padding</code>, etc.) na API do Selenium.
  O Selenium WebDriver não suporta propriedades CSS shorthand.</p>
<p><b>Exemplo:</b></p>
<pre><code lang="JavaScript">
  webElement.getCssValue("<b>font</b>"); // Erro: O Selenium WebDriver não suporta propriedades CSS shorthand
</code></pre>
