<p>Relata parâmetros ou variáveis locais aos quais o modificador <code>final</code> poderia ser adicionado.</p>

<p><b>Exemplo:</b></p>
<pre><code>
  def list = [1,2,3]
  return list
</code></pre>
<p>Após a aplicação da correção rápida:
<pre><code>
  final def list = [1,2,3]
  return list
</code></pre>
