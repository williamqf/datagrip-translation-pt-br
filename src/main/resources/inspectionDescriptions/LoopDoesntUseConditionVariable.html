Relata condições de loop que não são atualizadas dentro do loop.
Isso pode indicar um defeito no código e resultar em um loop infinito em tempo de execução.
<p><b>Exemplo:</b></p>
<pre><code>
    int i = 0, j = 0;
    while (i &lt; 10) {
        ++j;
    }
</code></pre>
