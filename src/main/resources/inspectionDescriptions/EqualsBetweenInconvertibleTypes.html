Relata chamadas a <code>equals()</code> onde o alvo e o argumento possuem tipos incompatíveis.
<p>Embora tais chamadas possam ser teoricamente úteis, elas provavelmente são bugs.</p>
<p><b>Exemplo:</b></p>
<pre><code>
  new HashSet&lt;String&gt;().equals(new TreeSet&lt;Integer&gt;());
</code></pre>
