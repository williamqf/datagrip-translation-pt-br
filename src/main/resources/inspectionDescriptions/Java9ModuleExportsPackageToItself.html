Relata pacotes exportados para ou abertos no mesmo módulo Java 9 em que estão definidos.
A correção rápida remove tais diretivas do <code>module-info.java</code>.
<p>Exemplo:</p>
<pre><code>
  module com.mycomp {
    exports com.mycomp.main to com.mycomp;
  }
</code></pre>
<p>Após a aplicação da correção rápida:</p>
<pre><code>
  module main {
  }
</code></pre>
