<html>
<body>
Relata inconsistências nos atributos das tags GSP.
<p><b>Exemplos:</b></p>
<ul>
  <li>O atributo <code>contextPath</code> na tag <code>&lt;g:render&gt;</code> é marcado como não utilizado se o atributo <code>plugin</code> estiver presente</li>
  <li>A tag <code>&lt;if&gt;</code> é marcada com um aviso se não possuir o atributo <code>test</code> nem o atributo <code>env</code></li>
</ul>
</body>
</html>
