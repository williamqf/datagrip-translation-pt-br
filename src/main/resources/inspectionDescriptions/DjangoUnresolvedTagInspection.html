<p>
  Relata tags não resolvidas em templates Django.
</p>
<p><b>Exemplo:</b></p>
<pre><code lang="DjangoTemplate">
&lt;h1&gt;{{ question.question_text }}&lt;/h1&gt;
&lt;start&gt;
</code></pre>
<p>A IDE destaca <code>&lt;start&gt;</code>. Você pode remover esta tag ou aplicar uma correção rápida para adicionar <code>&lt;start&gt;</code> às tags HTML personalizadas.</p>
