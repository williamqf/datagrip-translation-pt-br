<p>
  Relata o uso de heredoc como o último argumento (destino) de um comando ADD/COPY.
</p>
<p><b>Exemplos:</b></p>
Este código define um destino inválido:
<pre><code>
  COPY foo &lt;&lt;EOF1 bar &lt;&lt;EOF2
  file content 1
  EOF1
  file content 2
  EOF2
</code></pre>
</body>
