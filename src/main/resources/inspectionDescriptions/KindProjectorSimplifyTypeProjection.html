<p>Relata as projeções de tipo e sugere convertê-las para o formato <b>Kind Projector</b>.</p>
<p><b>Exemplo:</b></p>
<pre><code>
  def a: ({type L[A] = (A, A)})#L
</code></pre>
<p>Após a aplicação de correção rápida:</p>
<pre><code>
  def a: Lambda[A => (A, A)]
</code></pre>
<!-- tooltip end -->
<p><small>Esta inspeção é executada quando o plugin Kind Projector é ativado.</small></p>
