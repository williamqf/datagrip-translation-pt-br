Relata erros em definições <code>macro_rules!</code>. Por exemplo:
<ul>
    <li>Relata especificadores de fragmento de metavariável inválidos.</li>
    <li>Detecta o especificador de fragmento <code>pat</code> seguido por `|` (na edição 2021 e posteriores).</li>
    <li>Relata a ausência de `;` (ou `,` no Macro 2.0) entre regras de macro.</li>
</ul>
