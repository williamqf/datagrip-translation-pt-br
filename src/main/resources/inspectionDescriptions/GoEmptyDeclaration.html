Relata declarações vazias.
<p>Declarações vazias não têm efeito. Removê-las pode melhorar a legibilidade do código.</p>
<p>Exemplo:</p>
<pre><code>func main() {
 const () // declaração vazia
}</code></pre>
<p>Você pode aplicar a correção rápida <b>Remover declaração vazia</b> para remover esta declaração.</p>
