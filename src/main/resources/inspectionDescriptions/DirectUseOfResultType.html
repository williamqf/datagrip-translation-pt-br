Reporta funções que usam o <code>Result</code> como tipo de retorno.
<p>
Não use <code>Result</code> como tipo de retorno.
Lance exceções, use tipos anuláveis ou use uma classe de resultado específica do domínio para indicar falhas.
</p>
<p><b>Exemplo:</b></p>
<pre><code>
  fun foo() = Result.success(true)
</code></pre>
