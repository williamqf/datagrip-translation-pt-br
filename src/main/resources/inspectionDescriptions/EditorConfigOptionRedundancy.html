<html>
<body>
Relata propriedades redundantes quando outra seção aplicável já contém a mesma propriedade e valor.
<p>
Exemplo:
<pre><code>
[*]
indent_size=4
[*.java]
indent_size=4
</code></pre>
Ambas se aplicam a arquivos <code>*.java</code> e definem o mesmo valor de <code>indent_size</code>.
</body>
</html>
