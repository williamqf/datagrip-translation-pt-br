<body>
Relata expressões que podem ser fatoradas (ou seja, reorganizadas para extrair fatores comuns).
Isso reduz a redundância e pode melhorar a legibilidade do código.
<p><b>Exemplo:</b></p>
<pre><code>
  a &amp;&amp; b || a &amp;&amp; c
</code></pre>
<p>Após aplicar a correção rápida:</p>
<pre><code>
  a &amp;&amp; (b || c)
</code></pre>
<!-- tooltip end -->
<p><small>Novidade na versão 2021.3</small></p>
</body>
</html>
