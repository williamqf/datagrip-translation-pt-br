Relata expressões literais <code>int</code> que são imediatamente convertidas para <code>long</code>.
<p>Tais expressões literais podem ser substituídas por um literal <code>long</code> equivalente.</p>
<p><b>Exemplo:</b></p>
<pre><code>Long l = (long)42;</code></pre>
<p>Após aplicar o ajuste rápido:</p>
<pre><code>Long l = 42L;</code></pre>
