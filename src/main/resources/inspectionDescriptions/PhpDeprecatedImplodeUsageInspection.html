<p>A partir do PHP 7.4, não é recomendado o uso de <code>implode</code> e <code>join</code> passando um array como primeiro argumento e uma string como segundo argumento.</p>
<p>
  Para mais detalhes, consulte <a href="https://wiki.php.net/rfc/deprecations_php_7_4#implode_parameter_order_mix">Deprecations for PHP 7.4 (php.net)</a>.
