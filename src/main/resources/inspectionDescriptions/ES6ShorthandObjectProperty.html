<html>
<body>
Relata propriedades de objeto que podem ser convertidas para o estilo shorthand do ES6 e fornece uma correção rápida para realizar a conversão.
<!-- tooltip end -->
<p>Exemplo:</p>
<pre><code>
var obj = {foo:foo}
</code></pre>
<p>Após a aplicação da correção rápida, o código ficará assim:</p>
<pre><code>
var obj = {foo}
</code></pre>

</body>
</html>
