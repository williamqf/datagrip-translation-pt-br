Relata o uso dos atributos <code>#[proc_macro]</code>, <code>#[proc_macro_attribute]</code> e <code>#[proc_macro_derive]</code> em crates que não são de macro procedural.
Esses atributos funcionam apenas em crates de macro procedural (ou seja, crates onde a chave <code>proc-macro</code> está definida como <code>true</code> no Cargo.toml).
