Relata códigos inalcançáveis que nunca serão executados em qualquer fluxo de controle e podem ser removidos com segurança.
<p>Exemplo:</p>
<pre>
<code>def largest_number(x, y)
  if x > y
    return x
  else
    return y
  end
  puts 'The largest number is ' + x #código inalcançável
end</code>
</pre>
