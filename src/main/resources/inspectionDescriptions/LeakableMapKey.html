Relata o uso de <code>Language</code> ou <code>FileType</code> como chaves de mapa no código do plugin.
<p>
  Esse tipo de uso pode impedir que o plugin seja descarregado corretamente.
</p>
<p>
  Considere usar <code>String</code> como chave em seu lugar.
</p>
<p>
  Para mais detalhes, consulte <a href="https://plugins.jetbrains.com/docs/intellij/dynamic-plugins.html">Plugins dinâmicos</a> na documentação do SDK.
</p>
