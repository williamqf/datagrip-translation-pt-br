<body>
Reporte qualquer expressão booleana usada duas vezes que possa ser fatorada para reduzir a redundância e melhorar a legibilidade do código.
<p><b>Exemplo:</b></p>
<pre><code>
  a &amp;&amp; b || a &amp;&amp; c
</code></pre>
<p>Após aplicar a correção rápida:</p>
<pre><code>
  a &amp;&amp; (b || c)
</code></pre>
<!-- tooltip end -->
<p><small>Nova funcionalidade na versão 2021.3</small></p>
</body>
