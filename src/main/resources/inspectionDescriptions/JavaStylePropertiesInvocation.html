<body>
<p>Relata propriedades acessadas por meio de chamadas de método.</p>
<p><b>Exemplo:</b></p>
<pre><code>
  class Foo {
      int foo
  }

  def bar = new Foo()
  print(<b>bar.getFoo()</b>)
</code></pre>
<p>Após a aplicação do ajuste rápido:</p>
<pre><code>
  class Foo {
      int foo
  }

  def bar = new Foo()
  print(<b>bar.foo</b>)
</code></pre>
</body>
