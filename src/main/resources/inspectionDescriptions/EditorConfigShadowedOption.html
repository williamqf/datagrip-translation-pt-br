<html>
<body>
Relata propriedades que já foram definidas em outras seções.
<p>Exemplo:
<pre><code>
[*.java]
indent_size=4
[{*.java,*.js}]
indent_size=2
</code></pre>
A segunda seção também inclui todos os arquivos <code>*.java</code>, mas também redefine <code>indent_size</code>.
Como resultado, o valor "2" será usado para arquivos que correspondam a <code>*.java</code>.
</body>
</html>
