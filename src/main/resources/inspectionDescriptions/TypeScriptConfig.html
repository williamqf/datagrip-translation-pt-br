Relata inconsistências nas propriedades <code>paths</code>, <code>checkJs</code> ou <code>extends</code> no arquivo <code>tsconfig.json</code>.
<br>
A propriedade <code>checkJs</code> deve possuir <code>allowJs</code>.
<br>
A propriedade <code>extends</code> deve ser uma referência de arquivo válida.
