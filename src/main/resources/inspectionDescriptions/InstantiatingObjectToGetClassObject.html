Relata o código que instancia uma classe para obter seu objeto de classe.
<p>O desempenho é melhor ao acessar o objeto da classe diretamente pelo nome.</p>
<p><b>Exemplo:</b></p>
<pre><code>
  Class&lt;?&gt; c = new Sample().getClass();
</code></pre>
<p>Após a aplicação do ajuste rápido:</p>
<pre><code>
  Class&lt;?&gt; c = Sample.class;
</code></pre>
