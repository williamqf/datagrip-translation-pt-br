<p>Relata chamadas a <code>run()</code> em <code>java.lang.Thread</code> ou em qualquer uma de suas subclasses.</p>
<p>
  Embora ocasionalmente intencional, isso geralmente indica um erro, pois <code>run()</code> não inicia uma nova thread.
  Para executar o código em uma thread separada, deve-se usar <code>start()</code>.</p>
