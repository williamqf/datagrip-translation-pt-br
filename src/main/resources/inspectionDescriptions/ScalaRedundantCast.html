<body><p>Relata conversões redundantes <code>asInstanceOf</code> e sugere removê-las.</p>
<p>Uma conversão é redundante se o tipo de expressão for o mesmo do tipo de conversão.</p>

<p><b>Exemplo:</b></p>
<pre><code>
  "test".asInstanceOf[String]
</code></pre>
<p>Após a aplicação da correção rápida:</p>
<pre><code>
  "test"
</code></pre>
