Denunciar quando <code>0</code> é usado em vez de <code>nil</code>.
Isso pode ser um problema em certos casos, como quando <code>0</code> é armazenado num array. Você pode querer usar <code>0</code> em vez de <code>nil</code> para armazenar o valor <code>NSNumber</code>.
