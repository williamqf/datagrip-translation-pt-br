Relata tentativas de acesso de escrita em propriedades <code>private(set)</code> ou <code>protected(set)</code> realizadas fora de seu escopo de visibilidade <code>set</code>.
<p>A visibilidade assimétrica é suportada no PHP 8.4 e versões posteriores. Para mais informações, consulte o <a href="https://wiki.php.net/rfc/asymmetric-visibility-v2">PHP RFC: Asymmetric Visibility v2</a>.</p>
