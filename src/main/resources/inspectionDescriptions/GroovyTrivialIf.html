<html>
<body>
Relata instruções <code>if</code> que podem ser simplificadas para uma única atribuição ou instrução <code>return</code>.

<p><b>Exemplo:</b></p>
<pre><code>
  if (foo())
    return true;
  else
    return false;
</code></pre>

<p>Após aplicar a correção rápida:</p>
<pre><code>
  return foo();
</code></pre>
</body>
