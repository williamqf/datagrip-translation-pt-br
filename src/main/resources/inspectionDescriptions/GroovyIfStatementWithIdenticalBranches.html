<html>
<body>
Reporta instruções <code>if</code> com os ramos "then" e <code>else</code> idênticos.
Tais instruções quase certamente indicam um erro do programador.
<p><b>Exemplo:</b></p>
<pre>
<code>
if (condition) {
  print "foo"
} else {
  print "foo"
}
</code>
</pre>
<p>Após aplicar a correção rápida:</p>
<pre>
<code>
print "foo"
</code>
</pre>
</body>
</html>
