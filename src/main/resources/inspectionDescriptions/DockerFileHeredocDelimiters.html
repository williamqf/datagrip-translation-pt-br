<p>
  Relata delimitadores heredoc não fechados no final do arquivo.
</p>
<p><b>Exemplos:</b></p>
Este código relatará os delimitadores FILE2 e FILE3 ausentes.
<pre><code>
  RUN &lt;&lt;FILE1 cat &gt; file1 && &lt;&lt;FILE2 cat &gt; file2 && &lt;&lt;FILE3 cat &gt; file3
  mkdir -p foo/bar
  FILE1
</code></pre>
