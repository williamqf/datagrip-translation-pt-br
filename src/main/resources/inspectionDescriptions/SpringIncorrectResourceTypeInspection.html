<p>Relata arquivos incorretos referenciados em contextos de aplicação XML.</p>

<p><b>Exemplo:</b></p>
<pre><code>
  &lt;beans&gt;
    &lt;import resource="imported-app-context.xml"/&gt;
    &lt;import resource="banner.txt"/&gt;&lt;!-- Relata 'Tipo de recurso incorreto', pois um contexto de aplicação Spring XML é esperado aqui --&gt;
  &lt;/beans&gt;
</code></pre>
