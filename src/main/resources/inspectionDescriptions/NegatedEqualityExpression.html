Relata expressões de igualdade negadas por uma expressão de prefixo.
<p>Essas expressões podem ser simplificadas usando o operador <code>!=</code>.</p>
<p>Exemplo:</p>
<pre><code>
  !(i == 1)
</code></pre>
<p>Após a aplicação do ajuste rápido:</p>
<pre><code>
  i != 1
</code></pre>
