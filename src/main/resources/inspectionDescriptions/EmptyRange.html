<html>
<body>
Relata intervalos que estão vazios porque o valor <code>start</code> é maior que o valor <code>endInclusive</code>.
<p><b>Exemplo:</b></p>
<pre><code>
  val range = 2..1
</code></pre>
<p>A correção rápida altera o operador <code>..</code> para <code>downTo</code>:</p>
<pre><code>
  val range = 2 downTo 1
</code></pre>
</body>
</html>
