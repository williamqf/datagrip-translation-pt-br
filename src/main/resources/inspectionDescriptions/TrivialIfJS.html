<body>
Reporta instruções <code>if</code> que podem ser simplificadas para uma atribuição única ou uma instrução <code>return</code>. <p>Exemplo:</p>
<pre><code>
if(foo())
 {
  return true;
 }
 else
 {
   return false;
 }
</code></pre>
<p>Após a aplicação da correção rápida, o código ficará assim:</p>
<pre>
 <code>return foo();</code>
</pre>
</body>
