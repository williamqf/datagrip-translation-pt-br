Relata a instanciação de <code>Thread</code> ou de suas subclasses sem especificar um parâmetro <code>Runnable</code> ou sobrescrever o método <code>run()</code>.
Tais threads não têm utilidade.
<p><b>Exemplo:</b></p>
<pre><code>
  new Thread().start();
</code></pre>
