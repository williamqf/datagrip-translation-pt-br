<p>Detecta chaves não utilizadas em descritores TOML de catálogos de versões.</p>

<p><b>Exemplo:</b></p>

<pre><code lang="groovy">
// build.gradle
dependencies {
  implementation libs.foo.bar
}
</code></pre>

<pre><code lang="toml">
# libs.versions.toml
[libraries]
foo-bar = "com.gradle:example:1.0.0"
bar-baz = "com.gradle:example:2.0.0" # bar-baz é destacado
</code></pre>


</body>
