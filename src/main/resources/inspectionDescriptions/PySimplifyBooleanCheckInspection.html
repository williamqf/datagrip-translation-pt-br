<p>Relata comparações de igualdade com literais booleanos.</p>
<p><b>Exemplo:</b></p>
<pre><code>
def func(s):
    if s.isdigit() == True:
        return int(s)
</code></pre>
<p>Após a aplicação da correção rápida, o fragmento de código será simplificado para:</p>
<pre><code>
def func(s):
    if s.isdigit():
        return int(s)
</code></pre>
