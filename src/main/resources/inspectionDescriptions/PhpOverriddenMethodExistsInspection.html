Relata o uso do atributo <code>#[Override]</code> em métodos que não possuem um método pai para sobrescrever.
<p>
  O uso do atributo <code>#[Override]</code> para expressar a intenção no código é suportado no PHP 8.3 e versões superiores.
  Para mais detalhes, consulte <a href="https://wiki.php.net/rfc/marking_overriden_methods">PHP RFC: Marking overridden methods (wiki.php.net)</a>.
</p>
