Relata o uso da palavra-chave <code>var</code> ao declarar propriedades de classe.

<p>De acordo com a PSR-12, a palavra-chave <code>var</code> nunca deve ser usada para declarar uma propriedade.</p>

<p>
  Consulte <a href="https://www.php-fig.org/psr/psr-12/#43-properties-and-constants">PSR-12: Extended Coding Style (php-fig.org)</a> para obter detalhes.
</p>
