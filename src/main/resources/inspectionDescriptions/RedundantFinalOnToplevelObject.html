<p>Relata modificadores <code>final</code> em objetos de nível superior.</p>
<p>Eles são redundantes de acordo com a <a href="https://www.scala-lang.org/files/archive/spec/2.13/05-classes-and-objects.html#final">especificação Scala</a>.</p>

<p>A correção rápida remove o modificador <code>final</code>.</p>

<p><b>Exemplo:</b></p>
<pre><code>
  final object Test
</code></pre>
<p>Depois que a correção rápida é aplicada:</p>
<pre><code>
  object Test
</code></pre>
