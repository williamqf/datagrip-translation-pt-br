<p>Relata quando uma coleção é invertida explicitamente antes de chamar <code>find</code>.</p>

<p> A correção rápida usará <code>xs.findLast(f)</code>, que pode ser mais eficiente em alguns casos.</p>
<p><b>Exemplo:</b></p>
<pre><code>
  Seq(1, 2).reverse.find(_ == 2)
</code></pre>
<p>Após a correção rápida ser aplicada:</p>
<pre><code>
  Seq(1, 2).findLast(_ == 2)
</code></pre>
