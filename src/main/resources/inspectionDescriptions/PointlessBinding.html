<p>Relata vinculações explícitas triviais que declaram uma classe implementada por si mesma e não possuem anotações <code>@ImplementedBy</code> ou <code>@ProvidedBy</code> conflitantes.
  Tais vinculações são redundantes e podem causar confusão à medida que o programa evolui.</p>
