<p>Reporta expressões cujo valor não é usado.</p>

<p>Expressões que possuem efeitos colaterais ou desviam o fluxo de controle não são reportadas.</p>

<p><b>Exemplo:</b></p>
<pre><code>
  def test(): Int = {
    3 // não usado
    3
  }
</code></pre>
<p>Após a aplicação da correção rápida:</p>
<pre><code>
  def test(): Int = {
    3
  }
</code></pre>
