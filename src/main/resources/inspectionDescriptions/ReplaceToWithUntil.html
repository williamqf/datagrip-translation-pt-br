<p>Relata intervalos inclusivos em vez de exclusivos.</p>

<p>A correção rápida transformará o intervalo inclusivo em um exclusivo.</p>

<p><b>Exemplo:</b></p>
<pre><code>
  0 to x - 1
</code></pre>
<p>Após a correção rápida ser aplicada:</p>
<pre><code>
  0 until x
</code></pre>
