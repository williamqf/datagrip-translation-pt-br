<p>Relata comparações com <code>None</code>. Esse tipo de comparação deve ser sempre realizado utilizando <code>is</code> ou <code>is not</code>, e nunca operadores de igualdade.</p>
<p><b>Exemplo:</b></p>
<pre><code>
a = 2


if a == None:
    print("Success")
</code></pre>
<p>Após a aplicação da correção rápida, o código torna-se:</p>
<pre><code>
a = 2


if a is None:
    print("Success")
</code></pre>
</body>
