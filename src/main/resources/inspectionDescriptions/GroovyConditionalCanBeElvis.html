<body>
Relata expressões ternárias que podem ser substituídas por expressões Elvis.
<p><b>Exemplo:</b></p>
<pre><code>
  def notNull(o, defaultValue) {
      o != null ? o : defaultValue
  }
</code></pre>
<p>Após a aplicação da correção rápida:</p>
<pre><code>
  def notNull(o, defaultValue) {
      o ?: defaultValue
  }
</code></pre>
</body>
