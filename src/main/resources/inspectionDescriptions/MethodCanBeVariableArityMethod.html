Relata métodos que podem ser convertidos em métodos de aridade variável (varargs).
<p><b>Exemplo:</b></p>
<pre><code>
  void process(String name, Object[] objects);
</code></pre>
<p>Após aplicar a correção rápida:</p>
<pre><code>
  void process(String name, Object... objects);
</code></pre>
