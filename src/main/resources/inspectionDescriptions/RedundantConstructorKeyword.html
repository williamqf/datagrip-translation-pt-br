<p>Relata a palavra-chave 'constructor' redundante em construtores primários.</p>
<p><b>Exemplo:</b></p>
<pre><code>
  class Foo <b>constructor</b>(x: Int, y: Int)
</code></pre>
<p>Após a aplicação da correção rápida:</p>
<pre><code>
  class Foo(x: Int, y: Int)
</code></pre>
