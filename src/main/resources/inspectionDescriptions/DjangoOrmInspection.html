<p>Relata vários métodos que podem não ser chamados devido a certas razões de ORM.</p>
<p><b>Exemplo:</b></p>
<pre><code lang="Python">
class Choice:
    question = ForeignKey(Question, null=False)


choice_set = Question.objects.get(id=1).choice_set.remove()
</code></pre>
<p>Se a chave estrangeira tiver <code>null=False</code>, a função <code>remove</code> não poderá ser chamada.</p>
