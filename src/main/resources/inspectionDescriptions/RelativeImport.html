<p>Informa sobre as importações que não usam uma referência totalmente qualificada.</p>
<p><b>Exemplo:</b></p>
<pre><code>
  package org.something

  import someInnerPackage
</code></pre>
<p>Após a correção rápida ser aplicada:</p>
<pre><code>
  package org.something

  import org.something.someInnerPackage
</code></pre>
