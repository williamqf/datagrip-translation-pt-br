Relata funções anônimas. Nomes explícitos para expressões de função podem ajudar na depuração.
Expressões de função sem nome são ignoradas se a propriedade <code>name</code> for especificada no padrão ECMAScript 6.
Por exemplo, <code>var bar = function() {};</code> não será relatado.
