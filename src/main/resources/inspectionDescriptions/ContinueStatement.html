<body>
Relata instruções <code>continue</code>.
<p>As instruções <code>continue</code> tornam a refatoração complexa e podem ser confusas.</p>
<p>Exemplo:</p>
<pre><code>
  void foo(List&lt;String&gt; strs) {
    for (String str : strs) {
      if (str.contains("skip")) continue;
      handleStr(str);
    }
  }
</code></pre>
