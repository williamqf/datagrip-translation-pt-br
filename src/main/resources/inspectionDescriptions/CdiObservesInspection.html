<p>Relata definições incorretas de métodos observadores.</p>

<ul>
  <li>Deve conter apenas um parâmetro <code>@Observes</code></li>
  <li>Não pode possuir parâmetros anotados com <code>@Disposes</code></li>
  <li>Não pode utilizar as anotações <code>@Inject</code> e <code>@Produces</code></li>
</ul>
