<p>Relata instâncias em templates Django onde há um fechamento de comentário de linha <code>#}</code> sem uma abertura de comentário de linha correspondente.</p>
<p><b>Exemplo:</b></p>
<pre><code lang="DjangoTemplate">
comentário #}
</code></pre>
<p>O IDE destaca <code>#}</code> porque ele requer um token <code>{#</code> correspondente.</p>
