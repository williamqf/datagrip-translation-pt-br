<p>Relata definições <code>&lt;flow&gt;</code> se um registro WebFlow (<a href="https://docs.spring.io/spring-webflow/docs/current/api/org/springframework/webflow/definition/registry/FlowDefinitionRegistry.html">FlowRegistration</a>) não estiver configurado no contexto da aplicação Spring.</p>

<p><b>Exemplo:</b></p>
<pre><code>
  <strong>&lt;flow&gt;</strong>  &lt;!--"Configuração de fluxo não encontrada, verifique as configurações do Spring" --&gt;
     ...
  &lt;/flow&gt;</code></pre>
</body>
</html>
