<p>Relata casos em que uma classe no Python 2 não possui o método <code>__init__</code> e sua classe pai também não possui este método.</p>
<p><b>Exemplo:</b></p>
<pre><code>
class Book():
    pass
</code></pre>
<p>A correção rápida adicionará o método <code>__init__</code>:</p>
<pre><code>
class Book():
    def __init__(self):
        pass
</code></pre>
