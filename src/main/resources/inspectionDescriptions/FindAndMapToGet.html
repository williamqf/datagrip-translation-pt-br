<p>Reporta uma chamada para <code>find</code> e <code>map</code> no <code>Map</code> e sugere substituir por <code>get</code>.</p>
<pre><code>
  val map = Map(1 -> 42)
  map.find(_._1 == k).map(_._2)
</code></pre>
<p>Depois que a correção rápida for aplicada:</p>
<pre><code>
  val map = Map(1 -> 42)
  map.get(k)
</code></pre>
