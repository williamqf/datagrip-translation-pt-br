Relata o código antigo da escola: uso de literais de coleção, acessores de coleção e literais de <code>NSNumber</code> .
<p><b>Exemplo:</b></p>
<pre><code>
  NSString *myString = [myArray objectAtIndex:1];
</code></pre>
<p>Após aplicar a correção rápida:</p>
<pre><code>
  NSString *myString = myArray[1];
</code></pre>
