<body>
Relata as seguintes violações da especificação EJB:
<ul>
  <li>A classe implementa uma interface que não é permitida</li>
  <li>A classe contém campos static não final</li>
</ul>

<p><b>Exemplo:</b></p>
<pre><code>
public class SessionEJB {
  public SessionEJB() {}

  static Object data; // Erro: campos static mutáveis não são permitidos
}
</code></pre>
</body>
