<p>Esta inspeção identifica as chamadas de método onde o receptor pode ser <code>null</code>, ajudando a detectar possíveis <code>NullPointerExceptions</code> antes que eles ocorram em tempo de execução.</p>
<p><b>Exemplo:</b></p>
<pre>
<code>
def sayHello(@Nullable greeting: String): Unit = {
  println(greeting.toLowerCase)
}
</code>
</pre>
