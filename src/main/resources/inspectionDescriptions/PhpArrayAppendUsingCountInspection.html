Relata chamadas <code>count($array)</code> usadas como um índice de array para anexar elementos ao array: <code>$array[count($array)] = 42</code>. Nesses casos, é recomendado usar a sintaxe de colchetes (<code>$array[] = 42</code>), que não adiciona a sobrecarga de chamar uma função.
