Relata instruções de código que não podem ser executadas.
<p>
    A correção rápida remove o código inacessível.
</p>

<p><b>Exemplo:</b></p>
<pre><code>
  fun value(): Int {
      return 42
      print("Hello, world !")
  }
</code></pre>
<p>Após aplicar a correção rápida:</p>
<pre><code>
  fun value(): Int {
      return 42
  }
</code></pre>
