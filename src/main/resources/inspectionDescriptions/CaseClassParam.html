<html>
<body><p>Denuncia modificadores <code>val</code> redundantes em parâmetros <code>case class</code>.</p>
<p><b>Exemplo:</b></p>
<pre><code>
  case class W (val x: Int)
</code></pre>
<p>Após a aplicação da correção rápida:</p>
<pre><code>
  case class W (x: Int)
</code></pre>
