Relata versões divergentes da Kotlin stdlib e do compilador.
<p><b>Exemplo:</b></p>
<pre><code>
  dependencies {
    classpath "org.jetbrains.kotlin:kotlin-stdlib:0.0.1"
  }
</code></pre>
<p>Para corrigir este problema, altere a versão da Kotlin stdlib para corresponder à versão do compilador Kotlin.</p>
