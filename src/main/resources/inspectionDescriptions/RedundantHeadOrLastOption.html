<p>Relata <code>headOption</code> e <code>lastOption</code> em uma instância de <code>Option</code>.</p>

<p>A correção rápida remove essas chamadas redundantes.</p>

<p><b>Exemplo:</b></p>
<pre><code>
  Opção(1).lastOption
</code></pre>
<p>Após a correção rápida ser aplicada:</p>
<pre><code>
  Opção(1)
</code></pre>
