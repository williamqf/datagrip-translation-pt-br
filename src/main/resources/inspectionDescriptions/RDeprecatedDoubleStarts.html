<p>Relata o uso do operador de exponenciação depreciado <code>**</code>. Recomenda-se usar <code>^</code> em seu lugar.
<p><b>Exemplo:</b></p>
<pre><code>
x &lt;- a + b**2
</code></pre>
<p>Após aplicar a correção rápida, o código mudará para:</p>
<pre><code>
x  &lt;- a + b^2
</code></pre>
</body>
