<body>
Relata tipos de retorno <code>Unit</code> redundantes que podem ser omitidos.
<p><b>Exemplo:</b></p>
<pre><code>
  fun test(): Unit {
      ...
  }
</code></pre>
<p>A correção rápida remove o tipo de retorno <code>Unit</code>:</p>
<pre><code>
  fun test() {
      ...
  }
</code></pre>
<!-- tooltip end -->
