<p>Reporta métodos <a href="https://docs.spring.io/spring-framework/docs/current/javadoc-api/org/springframework/scheduling/annotation/Scheduled.html">@Scheduled</a> incorretos.</p>

<p>De acordo com a documentação do Spring, o método agendado deve retornar void e não deve aceitar nenhum argumento.
  Se o método precisar interagir com outros objetos do contexto da aplicação, tais objetos devem ser fornecidos via injeção de dependência.</p>
