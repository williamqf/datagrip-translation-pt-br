Relata propriedades <code>private</code> com métodos de acesso <code>getter</code> e/ou <code>setter</code> que podem ser substituídas por propriedades <code>public</code> com hooks de propriedade <code>get</code> e/ou <code>set</code>.
<p>
  Hooks de propriedade <code>get</code> e <code>set</code> são suportados no PHP 8.4 e versões posteriores.
  Para mais detalhes, consulte <a href="https://wiki.php.net/rfc/property-hooks#references">PHP RFC: Property hooks</a>.
</p>
