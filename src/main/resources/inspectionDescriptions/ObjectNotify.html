Relata chamadas para <code>Object.notify()</code>. Embora ocasionalmente útil, em quase todos os casos <code>Object.notifyAll()</code> é uma escolha melhor, pois chamar <code>Object.notify()</code> pode levar a um deadlock.
Para uma discussão sobre o assunto, consulte <i>Concurrent Programming in Java</i> de Doug Lea.
