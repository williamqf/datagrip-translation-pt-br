Relata nomes totalmente qualificados que podem ser substituídos por um alias de importação existente.
<p><b>Exemplo:</b></p>
<pre><code>
import foo.Foo as Bar
fun main() {
    foo.Foo()
}
</code></pre>
<p>Após aplicar a correção rápida:</p>
<pre><code>
import foo.Foo as Bar
fun main() {
    Bar()
}
</code></pre>
</body>
