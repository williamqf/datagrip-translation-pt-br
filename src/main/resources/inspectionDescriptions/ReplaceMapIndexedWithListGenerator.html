<body>
Relata chamadas <code>mapIndexed</code> que podem ser substituídas por um gerador <code>List</code>.
<p><b>Exemplo:</b></p>
<pre><code>
  val a = listOf(1, 2, 3).mapIndexed { i, _ ->
      i + 42
  }
</code></pre>
<p>Após aplicar a correção rápida:</p>
<pre><code>
  val a = List(listOf(1, 2, 3).size) { i ->
          i + 42
  }
</code></pre>
</body>
