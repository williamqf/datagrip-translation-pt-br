<p>Reporta referências de arquivo não resolvidas em literais de string nas tags Django <code>extends</code> e <code>include</code>.</p>
<p><b>Exemplo:</b></p>
<pre><code lang="DjangoTemplate">
{% extends "../DjangoApp/templatetags/base.html"%}
</code></pre>
<p>Neste exemplo, o trecho <code>base.html</code> é destacado porque não está disponível no local especificado.</p>
</body>
