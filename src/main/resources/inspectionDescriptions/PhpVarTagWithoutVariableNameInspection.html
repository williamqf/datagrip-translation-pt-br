Relata tags de tipo PHPDoc (<code>@var</code>, <code>@type</code>, <code>@param</code>) sem nomes de variável/parâmetro especificados.
Tais tags não fornecem nenhuma informação de tipo para a expressão e devem ser removidas ou estendidas para incluir o nome da variável específica para a qual o tipo é fornecido.
