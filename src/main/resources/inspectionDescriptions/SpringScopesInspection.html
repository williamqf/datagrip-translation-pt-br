<html>
<body>
<p>Relata valores desconhecidos para o atributo <code>scope</code> no elemento <code>&lt;bean&gt;</code>.</p>

<p><b>Exemplo:</b></p>
<pre><code>
  &lt;beans&gt;
    &lt;bean class="beans.FooComponent" id="foo" scope="unknown"/&gt;
    &lt;!-- Relata "Não é possível resolver o símbolo 'unknown'" --&gt;
    &lt;bean class="beans.BarComponent" id="bar" scope="prototype"/&gt;
  &lt;/beans&gt;
</code></pre>
</body>
</html>
