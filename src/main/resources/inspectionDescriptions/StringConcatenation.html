Relata a concatenação de <code>String</code>. Em ambientes internacionalizados, a concatenação pode estar incorreta e pode ser substituída pelo uso de <code>java.text.MessageFormat</code> ou classes semelhantes.
<p><b>Exemplo:</b></p>
<pre><code>
  String getMessage(String string, int number) {
    return string + number;
  }
</code></pre>
