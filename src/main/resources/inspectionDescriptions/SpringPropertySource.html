<p>Relata arquivos ou diretórios não resolvidos nas anotações <a href=https://docs.spring.io/spring-framework/docs/current/javadoc-api/org/springframework/context/annotation/PropertySource.html>@PropertySource</a> e <a href="https://docs.spring.io/spring-framework/docs/current/javadoc-api/org/springframework/test/context/TestPropertySource.html">@TestPropertySource</a>.</p>

<p><b>Exemplo:</b></p>
<pre><code lang="java">
  @Configuration
  @PropertySource("classpath:/com/mycompany/unknown.properties") // Relata "Não é possível resolver o arquivo 'unknown.properties'"
  public class AppConfig {...}
</code></pre>
</body>
</html>
