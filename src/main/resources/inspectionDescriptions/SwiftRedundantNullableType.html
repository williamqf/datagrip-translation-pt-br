<p>
  Relata o uso de <code>?</code> que pode ser omitido, por exemplo, se o tipo inferido da expressão atribuída não for anulável.
</p>
<p>
  Sugere a remoção do <code>?</code> redundante na declaração de tipo.
</p>
<!-- tooltip end -->
<p>
  <b>Exemplo:</b>
</p>
<pre><code>
  let x: Int? = 42
</code></pre>
<p>
  Após aplicar a correção rápida:
</p>
<pre><code>
  let x: Int = 42
</code></pre>
</body>
</html>
