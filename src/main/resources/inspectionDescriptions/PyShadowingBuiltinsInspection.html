<p>Relata o sombreamento de nomes integrados (built-ins), como <code>len</code> ou <code>list</code>.</p>
<p><b>Exemplo:</b></p>
<pre><code>
def len(a, b, c):
    d = a + b + c
    return d
</code></pre>
<p>Neste fragmento de código, o nome integrado <code>len</code> é utilizado. O IDE sugere a aplicação da refatoração de renomeação como uma correção.</p>
