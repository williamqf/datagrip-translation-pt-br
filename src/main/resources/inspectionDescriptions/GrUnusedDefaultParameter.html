<p>Relata parâmetros padrão não utilizados.</p>
<pre><code>
  def foo(a, <b>b = 2</b>) {}
</code></pre>
<p>Se todas as chamadas de <code>foo</code> incluírem explicitamente o argumento para <code>b</code>, o inicializador de <code>b</code> será realçado como "não utilizado" e haverá uma opção para removê-lo.</p>
