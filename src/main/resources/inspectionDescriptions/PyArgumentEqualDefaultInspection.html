<p>Relata casos em que os argumentos passados para uma função são iguais ao valor padrão do parâmetro.</p>
<p>Para evitar a degradação do desempenho, esta inspeção está desativada por padrão.</p>
<p><b>Exemplo:</b></p>
<pre><code>
def my_function(a: int = 2):
    print(a)


my_function(2)
</code></pre>
