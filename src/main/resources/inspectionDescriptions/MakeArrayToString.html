<p>Informa matrizes que estão sendo passadas para <code>print</code> ou <code>println</code> e sugere convertê-las em strings adequadas</p>.
<p><b>Exemplo:</b></p>
<pre><code>
  var x: Array[Int]
  print(x)
</code></pre>
<p>Após a correção rápida ser aplicada:</p>
<pre><code>
  var x: Array[Int]
  print(x.mkString("Array(", ", ", ")"))
</code></pre>
