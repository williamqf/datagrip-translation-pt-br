<body>
Para garantir a consistência entre diferentes ferramentas, links de arquivos não devem conter espaços.
<p><b>Exemplo:</b></p>
<pre><code>
  [Some file link](some file.md)
</code></pre>
<p>A correção rápida substituirá os espaços pelos seus equivalentes codificados em URL:</p>
<pre><code>
  [Some file link](some%20file.md)
</code></pre>
</body>
</html>
