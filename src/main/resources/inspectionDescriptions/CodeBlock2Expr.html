<body>
Relata expressões lambda que contêm um corpo de bloco de código quando um corpo em estilo de expressão poderia ser usado.
O resultado da conversão é mais curto e claro.
<p>Exemplo:</p>
<pre><code>
  Comparable&lt;String&gt; c = o -> {return 0;};
</code></pre>
<p>Após a aplicação da correção rápida:</p>
<pre><code>
  Comparable&lt;String&gt; c = o -> 0;
</code></pre>
<!-- tooltip end -->
