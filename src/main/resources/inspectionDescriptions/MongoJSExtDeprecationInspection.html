Relata o uso de métodos depreciados em códigos MongoDB e JavaScript.
<p>A correção rápida substitui os métodos depreciados pelas alternativas recomendadas.</p>
<p>Exemplo:</p>
<pre><code>
  db.my_collection.insert()
</code></pre>
<p>Após aplicar a correção rápida:</p>
<pre><code>
  db.my_collection.insertOne()
</code></pre>
</body>
