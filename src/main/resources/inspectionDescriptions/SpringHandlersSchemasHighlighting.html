<p>Relata referências não resolvidas de classes e arquivos nos arquivos <code>spring.handlers</code> e <code>spring.schemas</code>.</p>

<p><b>Exemplo de arquivo <code>spring.handlers</code>:</b></p>
<pre><code>
   a=my.company.MyHandler
   b=my.company.UnknownHandler // Relata "Não é possível resolver a classe 'my.company.UnknownHandler'"
</code></pre>
</body>
