<body>
Relata parâmetros lambda que não têm seu tipo especificado e sugere a adição da declaração de tipo ausente.
<p>Exemplo:</p>
<pre><code>
  Function&lt;String, Integer&gt; length = a -&gt; a.length();
</code></pre>
<p>Após a aplicação da correção rápida:</p>
<pre><code>
  Function&lt;String, Integer&gt; length = (String a) -&gt; a.length();
</code></pre>
<!-- tooltip end -->
</body>
