<html>
<body>
Relata casos em que a anotação <code>@Language</code> é aplicada a elementos de tipos diferentes de <code>String</code> ou <code>String[]</code>.
<p><b>Exemplo:</b></p>
<pre><code>
  @Language("HTML") <b>int</b> i;
</code></pre>
<p>Após a aplicação da correção rápida:</p>
<pre><code>
  <b>int</b> i;
</code></pre>
</body>
</html>
