Reporta o atributo <code>alt</code> ausente em tags <code>img</code> ou <code>applet</code>, ou em elementos <code>area</code> de mapas de imagem. Sugere a adição do atributo obrigatório com o texto alternativo para o conteúdo da tag. Baseado em WCAG 2.0: <a href="https://www.w3.org/TR/WCAG20-TECHS/H24.html">H24</a>, <a href="https://www.w3.org/TR/WCAG20-TECHS/H35.html">H35</a>, <a href="https://www.w3.org/TR/WCAG20-TECHS/H36.html">H36</a>, <a href="https://www.w3.org/TR/WCAG20-TECHS/H37.html">H37</a>.
