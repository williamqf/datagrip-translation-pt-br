<body>
Relata operadores condicionais ternários na forma <code>x ? true : false</code> ou similares que podem ser consideravelmente simplificados.

<p><b>Exemplo:</b></p>
<pre><code>
  foo() ? true : false
</code></pre>

<p>Após a aplicação da correção rápida:</p>
<pre><code>
foo()
</code></pre>

</body>
