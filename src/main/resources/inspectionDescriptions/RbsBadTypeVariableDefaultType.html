Relata o tipo padrão em uma declaração de variável de tipo que não é um subtipo do limite superior. O tipo padrão deve ser um subtipo de qualquer limite superior especificado.
<p>Exemplo:</p>
<pre><code># 'String' não é um subtipo de 'Numeric'
class Example[A &lt; Numeric = String]
end
</code></pre>
