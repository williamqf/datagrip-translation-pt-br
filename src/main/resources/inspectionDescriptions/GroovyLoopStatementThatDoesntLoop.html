Relata instruções <code>for</code> ou <code>while</code> cujo corpo é garantido de ser executado no máximo uma vez. Embora tais instruções possam ser escritas intencionalmente, elas geralmente indicam um erro.
<p><b>Exemplo:</b></p>
<pre>
<code>
  for (int i in 0..&lt;10) {
    return
  }
</code>
</pre>
