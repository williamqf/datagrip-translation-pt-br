Relata instruções <code>if</code>, <code>while</code>, <code>do</code> ou <code>for</code> com corpos vazios.
<p>Embora ocasionalmente intencional, essa estrutura é confusa e geralmente é o resultado de um erro de digitação.</p>
<p>O ajuste rápido remove a instrução.</p>
<p><b>Exemplo:</b></p>
<pre><code>
  if (a &gt; b) {}
</code></pre>
