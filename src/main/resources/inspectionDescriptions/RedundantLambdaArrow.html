<p>Relata setas de lambda redundantes em lambdas que não possuem parâmetros.</p>
<p><b>Exemplo:</b></p>
<pre><code>
  fun foo(f: () -> Unit) = f()

  fun bar() {
      foo { <b>-></b> println("Hi!") }
  }
</code></pre>
<p>Após a aplicação da correção rápida:</p>
<pre><code>
  fun foo(f: () -> Unit) = f()

  fun bar() {
      foo { println("Hi!") }
  }
</code></pre>
