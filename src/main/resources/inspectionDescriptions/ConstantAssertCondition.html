Relata instruções <code>assert</code> com condições constantes. Instruções <code>assert</code> com uma condição constante sempre falham ou sempre têm sucesso.
Tais instruções podem ser remanescentes de uma refatoração e provavelmente não são intencionais.
<p><b>Exemplo:</b></p>
<pre><code>
    void foo() {
        assert true;
    }
</code></pre>
