<html>
<body>
Relata o <code>$placeholder</code> dentro de requisições. 
<p>Um <code>$placeholder</code> a ser substituído pelo usuário é criado automaticamente quando a ferramenta não consegue reconhecer parte da requisição. Por exemplo, o mapeamento de requisição <code>/aaaa/*/bbb</code> será gerado como <code>GET localhost/aaaa/{{$placeholder}}/bbb</code>.
</body>
</html>
