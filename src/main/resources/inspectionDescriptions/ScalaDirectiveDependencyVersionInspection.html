<p>Relata usos de versões desatualizadas de dependência de biblioteca em diretivas Scala e sugere substituí-las com versões estáveis mais novas.</p>
<p><b>Exemplo:</b></p>
<pre><code>
  //> usando test.dep org.scalatest::scalatest:3.0.7
</code></pre>
<p>Após a correção rápida ser aplicada:</p>
<pre><code>
  //> usando test.dep org.scalatest::scalatest:3.0.8
</code></pre>
