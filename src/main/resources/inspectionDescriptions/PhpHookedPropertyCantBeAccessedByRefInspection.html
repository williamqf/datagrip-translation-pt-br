Relata tentativas de modificar indiretamente propriedades com hooks.
<p>
  No PHP 8.4 e superior, retornar uma propriedade com suporte por referência via <code>&get</code> só é permitido se não houver um hook <code>set</code> definido.
  Para mais detalhes, consulte a <a href="https://wiki.php.net/rfc/property-hooks#references">PHP RFC: Property hooks</a>.
</p>
