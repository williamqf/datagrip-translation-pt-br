<body>
Relata o uso de <code>java.awt.Color</code> para criar cores cinzas.
<p>
  A correção rápida <b>Converter para 'Gray'</b> usará a constante <code>com.intellij.ui.Gray</code> em seu lugar.
</p>
<p>Exemplo:</p>
<pre><code lang="java">
// Incorreto:
Color gray = new Color(37, 37, 37);

// Correto:
Color gray = Gray._37;
</code></pre>
</body>
</html>
