<html>
<body>
<p>Relata o uso de <code>'='</code> como um operador de atribuição e sugere o uso de <code>'&lt;-'</code> em seu lugar.</p>
<p>
  Exemplo:
</p>
<p>
  <code>
    a = 10
  </code>
</p>
<p>
  Quando você aplicar a correção rápida, o código mudará para:
</p>
<p>
  <code>
    a &lt;- 10
  </code>
</p>
</body>
</html>
