Relata referências a variáveis, mixins ou funções declaradas em outro arquivo que não foi explicitamente <a href="https://sass-lang.com/documentation/at-rules/import">importado</a> no arquivo atual.
<p><b>Exemplo:</b></p>
<pre><code>
* {
  margin: $var-in-other-file;
}
</code></pre>
