<body>
Relata inconsistências entre arquivos YAML e esquemas JSON, se um esquema for especificado.
<p><b>Exemplo de esquema:</b></p>
<pre><code>
  {
    "properties": {
      "SomeNumberProperty": {
        "type": "number"
      }
    }
  }
</code></pre>
<p><b>Abaixo está um exemplo com o aviso correspondente:</b></p>
<pre><code>
  SomeNumberProperty: hello world
</code></pre>
</body>
