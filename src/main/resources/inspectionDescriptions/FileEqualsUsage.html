<body>
Relata o uso dos métodos <code>java.io.File.equals()/hashCode()/compareTo()</code>.
<p>
  Eles não levam em conta a insensibilidade a maiúsculas e minúsculas no macOS.
</p>
<p>
  Em vez disso, use os métodos <code>com.intellij.openapi.util.io.FileUtil.filesEquals()/fileHashCode()/compareFiles()</code>.
</p>
</body>
