<p>Relata tags não fechadas em Scaladoc.</p>
<p><b>Exemplo:</b></p>
<pre><code>
  /**
   * ''
   *
   * [[
   *
   * `
   */
  class A
</code></pre>
<p>Após aplicar a correção rápida:</p>
<pre><code>
  /**
   * &#39;&#39;
   *
   * &#91;&#91;
   *
   * &#96;
   */
  class A
</code></pre>
