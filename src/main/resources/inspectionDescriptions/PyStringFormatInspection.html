<p>Reporta erros em operações de formatação de string.</p>
<p><b>Exemplo 1:</b></p>
<pre><code>
"Hello {1}".format("people")
</code></pre>
<p><b>Exemplo 2:</b></p>
<pre><code>
def bar():
    return 1


"%s %s" % bar()
</code></pre>
<p>A correção consiste em reescrever o fragmento de formatação de string para estar em conformidade com a <a href="https://docs.python.org/3/library/string.html#format-string-syntax">sintaxe de formatação</a>.</p>
