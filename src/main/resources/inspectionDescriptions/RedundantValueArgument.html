Relata argumentos que são iguais ao valor padrão do parâmetro correspondente.
<p><b>Exemplo:</b></p>
<pre><code>
fun foo(x: Int, y: Int = 2) {}

fun bar() {
    foo(1, 2)
}
</code></pre>
<p>Após a aplicação da correção rápida:</p>
<pre><code>
fun bar() {
    foo(1)
}
</code></pre>
