<body>
<p>Relata referências totalmente qualificadas que podem ser substituídas por um import.</p>
<p><b>Exemplo:</b></p>
<pre><code>
  def swingBuilder = new groovy.swing.SwingBuilder()
</code></pre>
<p>Após a aplicação da correção rápida:</p>
<pre><code>
  import groovy.swing.SwingBuilder
 
  def swingBuilder = new SwingBuilder()
</code></pre>
</body>
