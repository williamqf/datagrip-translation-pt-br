<body>
Relata instruções <code>if</code> que contêm um ramo <code>else</code> e cuja condição está negada.
Inverter a ordem dos ramos <code>if</code> e <code>else</code> geralmente melhora a clareza de tais instruções.
<p><b>Exemplo:</b></p>
<pre>
<code>
if (!condition) {
  return "1"
} else {
  return "2"
}
</code>
</pre>
</body>
