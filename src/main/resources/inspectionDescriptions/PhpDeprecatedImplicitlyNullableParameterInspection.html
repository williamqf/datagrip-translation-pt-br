Relata o uso descontinuado de tipos de parâmetros implicitamente anuláveis.
<!-- tooltip end -->
<p>A partir do PHP 8.4, o uso de <code>null</code> como valor padrão de um parâmetro sem declarar <code>null</code> na declaração do tipo foi descontinuado.
<p>
  Consulte <a href="https://wiki.php.net/rfc/deprecate-implicitly-nullable-types">Deprecate implicitly nullable parameter types</a> para obter detalhes.
</p>
