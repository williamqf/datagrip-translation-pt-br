Relata expressões condicionais que possuem ramos <code>then</code> e <code>else</code> idênticos.
<p>Tais expressões quase certamente indicam um erro. Esta inspeção oferece uma correção para simplificar a expressão condicional.</p>
<p>Exemplo:</p>
<pre><code>
  int y = x == 10 ? 4 : 4;
</code></pre>
<p>Após aplicar a correção rápida:</p>
<pre><code>
  int y = 4;
</code></pre>
