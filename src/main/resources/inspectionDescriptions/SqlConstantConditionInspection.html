<body>
Reporta condições em cláusulas WHERE ou JOIN que são sempre TRUE ou sempre FALSE.
<p>Exemplo (MySQL):</p>
<pre><code>CREATE TABLE t1 (a TEXT, b INT, c BOOLEAN);
SELECT a FROM t1 WHERE 'Cat' = 'Cat';</code></pre>
<p><code>'Cat' = 'Cat'</code> é sempre true e será reportado.</p>
</body>
