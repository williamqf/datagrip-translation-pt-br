Relata o uso de sintaxe depreciada a partir do Puppet 4, como:
<ul>
  <li>Nomes de <code>class</code> para classes</li>
  <li>Nomes de variáveis em letras maiúsculas</li>
  <li>Variáveis qualificadas com sublinhados</li>
</ul>
