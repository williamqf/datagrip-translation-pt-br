Relata literais <code>long</code> terminados com um 'l' minúsculo. Esses literais podem ser confusos, pois o 'l' minúsculo é muito semelhante ao literal '1' (um).
<p><b>Exemplo:</b></p>
<pre><code>
  long nights = 100l;
</code></pre>
<p>Após a aplicação da correção rápida:</p>
<pre><code>
  long nights = 100L;
</code></pre>
