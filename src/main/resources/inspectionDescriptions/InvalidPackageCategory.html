Verifica se o campo <code>categories</code> na seção <code>[package]</code> do Cargo.toml está em conformidade com as <a href="https://doc.rust-lang.org/cargo/reference/manifest.html#the-categories-field">regras do crates.io</a>:
<ul>
    <li>As categorias devem ser escolhidas da <a href="https://crates.io/category_slugs">lista de slugs de categoria válidos</a></li>
    <li>São permitidas no máximo 5 categorias</li>
</ul>
