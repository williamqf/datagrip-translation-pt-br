<p>Relata invocações de métodos posfixados.</p>
<p>Pode interferir na inferência de ponto e vírgula. É <a href="https://twitter.com/#!/odersky/status/49882758968905728">recomendado</a> que os usuários utilizem uma notação normal de ponto.</p>

<p><b>Exemplo:</b></p>
<pre><code>
  "test" length
</code></pre>
<p>Após a correção rápida ser aplicada:</p>
<pre><code>
  "test".length
</code></pre>
