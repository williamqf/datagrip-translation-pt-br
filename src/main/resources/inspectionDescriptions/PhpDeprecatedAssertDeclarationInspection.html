Relata declarações da função <code>assert()</code>.
<ul>
  <li>É proibido declarar a função <code>assert()</code> no namespace global.</li>
  <li>A partir do PHP 7.3, declarar a função <code>assert()</code> em namespaces não globais foi descontinuado.</li>
</ul>
<p>
  Para mais detalhes, consulte <a href="https://www.php.net/manual/en/function.assert.php">assert (php.net)</a>.
</p>
