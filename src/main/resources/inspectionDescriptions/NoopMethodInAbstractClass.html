Relata métodos no-op (sem operação) em classes <code>abstract</code>.
<p>Geralmente, um design melhor é tornar tais métodos <code>abstract</code>, para que as classes que herdam esses métodos forneçam uma implementação.</p>
<p><b>Exemplo:</b></p>
<pre><code>
  abstract class Test {
    protected void doTest() {
    }
  }
</code></pre>
