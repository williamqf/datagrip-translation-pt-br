<p>Relatórios de chamadas não prefixas para <code>unary_!</code>, <code>unary_~</code>e assim por diante. Sugere substituí-las com
  o operador prefixo.</p>
<p><b>Exemplo:</b></p>
<pre><code>
  val x = true.unary_!;
</code></pre>
<p>Após a aplicação da correção rápida:</p>
<pre><code>
  val x = !true
</code></pre>
