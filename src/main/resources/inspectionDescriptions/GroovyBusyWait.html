Relata chamadas a <code>java.lang.Thread.sleep()</code> feitas dentro de um loop.
<p>
  Tais chamadas indicam uma "espera ativa" (busy-waiting). A espera ativa é frequentemente ineficiente e pode levar a deadlocks inesperados, pois a thread em espera ativa não libera os recursos bloqueados.
</p>
