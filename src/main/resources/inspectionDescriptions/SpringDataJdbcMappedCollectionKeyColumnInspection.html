A anotação <code>@MappedCollection</code> em atributos persistentes do tipo List/Map requer o atributo <code>keyColumn</code>. Seu valor padrão é o nome da tabela com o sufixo '_key', mas é muito provável que essa coluna não exista.
É recomendável especificar o valor explicitamente.
