<p>Relata argumentos incorretos em funções de definição de etapa.</p>
<p><b>Exemplo:</b></p>
<pre><code>
from behave import *


@given("I'm ready")
def step_impl(context,a):
    raise NotImplementedError(u'STEP: Given I\'m ready')
</code></pre>
<p>O argumento <code>a</code> inadequado é realçado. Uma correção rápida o removerá.</p>
