<body>
Relata arrays criados especificamente para serem passados como um parâmetro vararg.
<p>Exemplo:</p>
<p><code>Arrays.asList(new String[]{"Hello", "world"})</code></p>
<p>A correção rápida substituirá o inicializador do array por argumentos individuais:</p>
<p><code>Arrays.asList("Hello", "world")</code></p>
</body>
