<p>Reporta o uso do <code>Project</code> e sugere a substituição por <code>project.in</code>.</p>
<p><b>Exemplo:</b></p>
<pre><code>
  val proj = Project("proj", path)
</code></pre>
<p>Após a correção rápida:</p>
<pre><code>
  val proj = project.in(path)
</code></pre>
