<body>
Relata atribuições de variáveis que podem ser combinadas com a declaração da variável.
<p>Exemplo:</p>
<pre><code>
  int x;
  x = 1;
</code></pre>
<p>A correção rápida converte a atribuição em um inicializador:</p>
<pre><code>
  int x = 1;
</code></pre>
