<p>Relata pontos e vírgulas no final de instruções.</p>
<p><b>Exemplo:</b></p>
<pre><code>
def my_func(a):
    c = a ** 2;
    return c
</code></pre>
<p>O IDE oferece uma correção rápida para remover o ponto e vírgula no final. Após a aplicação, o código se torna:</p>
<pre><code>
def my_func(a):
    c = a ** 2
    return c
</code></pre>
