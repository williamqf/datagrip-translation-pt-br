<body>
Relata anotações em formato abreviado e sugere reescrevê-las no formato normal com nomes de atributos.
<p>Exemplo:</p>
<pre><code>
  @SuppressWarnings("foo")
</code></pre>
<p>Após aplicar a correção rápida:</p>
<pre><code>
  @SuppressWarnings(value = "foo")
</code></pre>
</body>
</html>
