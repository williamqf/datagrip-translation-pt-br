Relata chamadas <code>array_search()</code> usadas apenas para verificar se um elemento existe em um array, ou seja, expressões como <code>if (array_search($a, $b) === false) {}</code>. Tais chamadas podem ser substituídas com segurança por chamadas <code>in_array()</code>.
