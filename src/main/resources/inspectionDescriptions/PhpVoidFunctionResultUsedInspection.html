  Relata o uso do valor de retorno de funções <code>void</code> ou <code>never</code>.
<p>
  Como funções <code>void</code> não têm valor de retorno e funções <code>never</code> encerram a execução ou lançam uma exceção, esse uso é muito provavelmente um erro de programação.
</p>
