<p>Reporta <code>find</code> e um teste de vazio, e sugere utilizar <code>exists</code> ao invés.</p>
<p><b>Exemplo:</b></p>
<pre><code>
  var x: Seq[Int]
  x.find(p).isDefined
  x.find(p) != None
  x.find(p).isEmpty
</code></pre>
<p>Após a correção rápida ser aplicada:</p>
<pre><code>
  var x: Seq[Int]
  x.exists(p)
  x.exists(p)
  !x.exists(p)
</code></pre>
