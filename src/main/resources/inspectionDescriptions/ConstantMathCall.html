Relata chamadas de métodos <code>java.lang.Math</code> ou <code>java.lang.StrictMath</code> que podem ser substituídas por constantes simples de tempo de compilação.
<p><b>Exemplo:</b></p>
<pre><code>double v = Math.sin(0.0);</code></pre>
<p>Após a aplicação da correção rápida:</p>
<pre><code>double v = 0.0;</code></pre>
