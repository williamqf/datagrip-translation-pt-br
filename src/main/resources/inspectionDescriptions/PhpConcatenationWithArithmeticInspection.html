Relata expressões de concatenação de strings usadas com os operadores <code>+</code>, <code>-</code>, <code>&lt;&lt;</code> e <code>&gt;&gt;</code>.

A partir do PHP 8, a operação de concatenação tem uma precedência menor, portanto, tais expressões podem produzir resultados inesperados.
<p>
  Para mais detalhes, consulte <a href="https://wiki.php.net/rfc/concatenation_precedence">Concatenation precedence (php.net)</a>.
</p>
