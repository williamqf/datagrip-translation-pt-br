<body>
Relata escapes octais que são facilmente confundidos com referências retroativas (backreferences).
Use escapes hexadecimais para evitar confusão.
<p><b>Exemplo:</b></p>
<pre><code>
  \07
</code></pre>
<p>Após a aplicação da correção rápida:</p>
<pre><code>
  \x07
</code></pre>
<!-- tooltip end -->
<p><small>Novidade na versão 2017.1</small>
</body>
</html>
