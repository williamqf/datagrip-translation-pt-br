<p>Relata chamadas a <code>wait()</code> que não são realizadas dentro de um loop.</p>
<p>O <code>wait()</code> é geralmente usado para suspender uma thread até que uma determinada condição se torne verdadeira, e essa condição deve ser verificada após o retorno de <code>wait()</code>. Usar um loop é a maneira mais fácil de fazer isso.</p>
