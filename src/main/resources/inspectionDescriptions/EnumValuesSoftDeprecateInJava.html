<p>
    O uso de <code>Enum.getEntries()</code> pode melhorar o desempenho do código.
</p>

    <b>Mais detalhes:</b> <a href="https://youtrack.jetbrains.com/issue/KT-48872">KT-48872 Fornecer uma substituição moderna e eficiente para Enum.values()</a>
