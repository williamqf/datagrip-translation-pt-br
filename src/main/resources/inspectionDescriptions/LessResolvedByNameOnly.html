Relata referências a variáveis ou mixins declarados em outro arquivo que não foram explicitamente <a href="http://lesscss.org/features/#import-atrules-feature">importados</a> no arquivo atual.
<p><b>Exemplo:</b></p>
<pre><code>
* {
  margin: @var-in-other-file;
}
</code></pre>
