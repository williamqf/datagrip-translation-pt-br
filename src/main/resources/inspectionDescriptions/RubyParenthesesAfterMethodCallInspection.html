Relata chamadas de método sem argumentos que incluem parênteses.
<p>Exemplo:</p>
<pre>
<code># Má prática
gets.chomp()</code>
</pre>

Uma correção rápida pode ser usada para remover os parênteses redundantes. O resultado após a aplicação da correção rápida é o seguinte:

<pre>
<code># Boa prática
gets.chomp</code>
</pre>
<p><span style="font-size: smaller;">Inspirado pelo <a href="https://github.com/rubocop/ruby-style-guide#method-call-with-no-arguments-">'RuboCop'</a></span></p>
