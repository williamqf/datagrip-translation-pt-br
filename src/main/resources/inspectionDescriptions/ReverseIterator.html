<p>Informa quando uma coleção é invertida explicitamente para adquirir um iterador inverso.</p>

<p>O reparo rápido usa <code>reverseIterator</code> no lugar.</p>

<p><b>Exemplo:</b></p>
<pre><code>
  var seq: Seq[Int]
  seq.reverse.iterator
</code></pre>
<p>Após o reparo rápido ser aplicado:</p>
<pre><code>
  var seq: Seq[Int]
  seq.reverseIterator
</code></pre>
