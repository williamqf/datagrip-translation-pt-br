Relata o uso de variáveis de classe. As variáveis de classe fazem parte do estado de execução global, facilitando a criação acidental de dependências ocultas. Isso pode tornar o sistema propenso a erros; portanto, recomenda-se evitar o uso de variáveis de classe.
