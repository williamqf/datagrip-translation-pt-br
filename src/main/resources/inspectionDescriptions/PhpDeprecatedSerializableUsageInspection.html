Relata o uso da interface <code>Serializable</code> depreciada.
<!-- tooltip end -->
<p>
  A partir do PHP 8.1, classes não abstratas que implementam <code>Serializable</code> e não implementam <code>__serialize()</code> e <code>__unserialize()</code> emitirão um aviso de depreciação.
</p>
<p>
  Para mais detalhes, consulte <a href="https://wiki.php.net/rfc/custom_object_serialization">Phasing out Serializable (php.net)</a>.
</p>
