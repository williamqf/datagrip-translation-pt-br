<html>
<body>
<p>Relata casos em que <code>':::'</code> é usado como o operador de acesso ao namespace e sugere o uso de <code>'::'</code>, se possível.</p>
<p><b>Exemplo:</b></p>
<p>
  <code>
    base:::print("Hello world!")
  </code>
</p>
<p>
  Quando você aplica a correção rápida, o código muda para:
</p>
<p>
  <code>
    base::print("Hello world!")
  </code>
</p>
</body>
</html>
