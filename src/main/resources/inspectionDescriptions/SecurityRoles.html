<body>
Relata nomes de funções de segurança inválidos.

<p><b>Exemplo:</b></p>
<pre><code>
  &lt;web-app&gt;
    &lt;security-role&gt;
      &lt;role-name&gt;custom#role&lt;/role-name&gt; // Erro: nome inválido
    &lt;/security-role&gt;
    &lt;security-role&gt;
      &lt;role-name&gt;customRole&lt;/role-name&gt; // Nome válido
    &lt;/security-role&gt;
  &lt;/web-app&gt;
</code></pre>
</body>
