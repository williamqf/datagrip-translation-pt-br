Relata comparações em que o método <code>compare</code> é supérfluo.
<p>Exemplo:</p>
<pre><code>
  boolean result = Integer.compare(a, b) == 0;
</code></pre>
<p>Após a aplicação da correção rápida:</p>
<pre><code>
  boolean result = a == b;
</code></pre>
