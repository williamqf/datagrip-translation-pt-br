<p>Os itens de lista ordenada devem ser numerados sequencialmente começando em 1.</p>
<p>A motivação por trás disso é que a maioria dos processadores Markdown ignora a numeração de listas ordenadas. O processador gerará um elemento <code>&lt;ol&gt;</code> para essas listas, que numerará os itens sequencialmente a partir de 1.</p>
