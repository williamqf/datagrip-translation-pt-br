<body>
Relata arrow functions cujo corpo consiste apenas em chaves e exatamente uma instrução.
Sugere a conversão para a sintaxe concisa sem chaves.
<!-- tooltip end -->
<pre><code>
    let incrementer = (x) => {return x + 1};
</code></pre>
<p>Após a aplicação da correção rápida, o trecho de código ficará assim:</p>
<pre><code>
    let incrementer = (x) => x + 1;
</code></pre>
</body>
