<body>
Relata chamadas <code>Hash[...]</code> estruturadas incorretamente. Existem 3 formas corretas de criar um novo hash usando <code>[...]</code>:
<ul>
  <li><code>Hash['a', 100, 'b', 200]</code></li>
  <li><code>Hash[ [ ['a', 100], ['b', 200] ] ]</code></li>
  <li><code>Hash['a' => 100, 'b' => 200]</code></li>
</ul>
<p><span style="font-size: smaller;">Inspirado no <a
  href="https://github.com/bbatsov/ruby-style-guide">'Ruby Style Guide'</a></span></p>
</body>
