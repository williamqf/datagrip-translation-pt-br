<p>Relata conversões encadeadas de sequência para <code>Set</code> e vice-versa, e sugere substituí-las por uma chamada <code>.distinct</code>.</p>
<p><b>Exemplo:</b></p>
<pre><code>
  Seq(1).toSet.toSeq
  List(1).toSet.toList
</code></pre>
<p>Após a correção rápida ser aplicada:</p>
<pre><code>
  Seq(1).distinct
  List(1).distinct
</code></pre>
