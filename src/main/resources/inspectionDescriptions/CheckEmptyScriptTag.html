<html>
<body>
Relata tags vazias que não funcionam corretamente em alguns navegadores.
<p><b>Exemplo:</b></p>
<pre><code>
  &lt;html>
    &lt;script/>
  &lt;/html>
</code></pre>
<p>Após aplicar a correção rápida:</p>
<pre><code>
  &lt;html>
    &lt;script>&lt;/script>
  &lt;/html>
</code></pre>
</body>
</html>
