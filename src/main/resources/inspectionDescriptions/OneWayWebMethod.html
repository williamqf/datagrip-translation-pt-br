<p>Reporta métodos de Java Web Service anotados com <code>@javax.jws.Oneway</code> que possuem um tipo de retorno diferente de void.</p>
<p>Existem duas correções rápidas possíveis: remover a anotação <code>@Oneway</code> do método ou alterar o tipo de retorno para <code>void</code>.</p>
