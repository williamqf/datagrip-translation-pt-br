<body>
<p>Relata casos em que declarações de lista podem ser reescritas usando literais de lista.</p>
<p>Isso garante um melhor desempenho para a aplicação.</p>
<p><b>Exemplo:</b></p>
<pre><code>
l = [1]
l.append(2)
</code></pre>
<p>Após a aplicação da correção rápida, o código se torna:</p>
<pre><code>
l = [1, 2]
</code></pre>
</body>
