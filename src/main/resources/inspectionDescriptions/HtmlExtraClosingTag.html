<html>
<body>
Relata tags de fechamento redundantes para elementos vazios, como <code>img</code> ou <code>br</code>.
<p><b>Exemplo:</b></p>
<pre><code>
  &lt;html>
    &lt;body>
      &lt;br>&lt;/br>
    &lt;/body>
  &lt;/html>
</code></pre>
<p>Após a aplicação da correção rápida:</p>
<pre><code>
  &lt;html>
    &lt;body>
      &lt;br>
    &lt;/body>
  &lt;/html>
</code></pre>
</body>
</html>
