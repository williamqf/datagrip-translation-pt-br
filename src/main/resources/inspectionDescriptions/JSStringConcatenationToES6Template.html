Relata a concatenação de strings. Sugere substituí-la por <a href="https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Template_literals">template literals</a>.
<p>Exemplo</p>
<pre><code> "result: " + a + "." </code></pre>
 <p>Após a aplicação da correção rápida, o código será semelhante a:</p>
 <pre><code> `result: ${a}.` </code></pre>
