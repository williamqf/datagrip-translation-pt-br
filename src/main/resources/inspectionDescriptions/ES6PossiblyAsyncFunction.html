Relata o uso de <code>await</code> em funções que podem ter a intenção de serem assíncronas, mas que carecem do modificador <code>async</code>.
<!-- tooltip end -->
Embora <code>await</code> possa ser usado como um identificador, é provável que a intenção fosse utilizá-lo como um operador; portanto, a função que o contém deve ser definida como <code>async</code>.
