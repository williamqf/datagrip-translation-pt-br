Relata expressões duplicadas nos rótulos <code>case</code> de uma instrução <code>switch</code>.
<p><b>Exemplo:</b></p>
<pre>
<code>
switch (n) {
  case 1: // duplicado
    break
  case 1: // duplicado
    System.out.println("2")
    break
  default:
    System.out.println("default");
}
</code>
</pre>
