<p>Reporta o uso de <code>'&lt;&lt;-'</code> ou <code>'-&gt;&gt;'</code> como operadores de atribuição.</p>

<p><b>Exemplo</b></p>:

<p><code>x &lt;&lt;- 12</code></p>

<p>O uso desses operadores pode causar múltiplos erros e confusão no código. Recomenda-se substituí-los por <code>&gt;-</code>.</p>
</body>
