Relata tentativas de referenciar membros de uma classe ECMAScript por meio do qualificador <code>this.</code> em uma função aninhada que não seja uma lambda.<br/>
O <code>this</code> em uma função aninhada que não seja uma lambda é o <code>this</code> da própria função e não está relacionado à classe externa.
