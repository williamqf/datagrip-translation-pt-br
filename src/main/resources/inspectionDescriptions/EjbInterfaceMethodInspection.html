Relata as seguintes violações da especificação EJB:
<ul>
  <li>Classes EJB expostas por meio de uma interface</li>
  <li>Nomes de métodos em conflito com nomes reservados da especificação</li>
</ul>

<p><b>Exemplo:</b></p>
<pre><code>
public interface EntityHome extends javax.ejb.EJBHome {
  void ejbExampleMethod() // Erro: conflito de nome
}
</code></pre>
