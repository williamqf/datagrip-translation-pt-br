<html>
<body>
<p>Relata sequências inseguras geradas pelo operador de dois-pontos (<code>:</code>) e sugere substituí-las por chamadas seguras.</p>
<p><b>Exemplo:</b></p>
<pre><code>
    a &lt;- 1:length(c)
    b &lt;- 1:nrow(data.frame())
</code></pre>
<p>
  Ao aplicar a correção rápida, o código mudará para:
</p>
<pre><code>
    a &lt;- seq_along(c)
    b &lt;- seq_len(nrow(data.frame()))
  </code></pre>
</body>
</html>
