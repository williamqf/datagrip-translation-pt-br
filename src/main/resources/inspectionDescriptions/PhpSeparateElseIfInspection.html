Relata o uso de estruturas <code>else if</code> especificadas com duas palavras.

<p>De acordo com a PSR-12, você deve usar <code>elseif</code> em vez de <code>else if</code> para que todas as palavras-chave de controle pareçam uma única palavra.</p>

<p>
  Para mais detalhes, consulte <a href="https://www.php-fig.org/psr/psr-12/#51-if-elseif-else">PSR-12: Extended Coding Style (php-fig.org)</a>.
</p>
