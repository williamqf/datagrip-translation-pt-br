Relata instruções <code>break</code> condicionais no início ou no fim de um loop e sugere a adição de uma condição de loop para tornar o código mais conciso.
<p>Exemplo:</p>
<pre><code>
  <b>while</b> (true) {
    <b>if</b> (i  == 23) <b>break</b>;
    i++;
  }
</code></pre>
<p>Após aplicar a correção rápida:</p>
<pre><code>
  <b>while</b> (i != 23) {
    i++;
  }
</code></pre>
