<p>Relatórios casos onde <code>sort</code> e <code>filter</code> poderiam ser trocados para melhor desempenho.</p>
<p><b>Exemplo:</b></p>
<pre><code>
  var seq: Seq[Int]
  seq.sortWith(lessThan).filter(p)
  seq.sortBy(f).filter(p)
</code></pre>
<p>Após a aplicação da correção rápida:</p>
<pre><code>
  var seq: Seq[Int]
  seq.filter(p).sortWith(lessThan)
  seq.filter(p).sortBy(f)
</code></pre>
