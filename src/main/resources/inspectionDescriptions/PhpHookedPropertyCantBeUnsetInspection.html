Relata tentativas de chamar a função <code>unset()</code> em propriedades com hooks.
<p>No PHP 8.4 e superior, ao usar hooks <code>get</code> ou <code>set</code> em propriedades, operações de escrita <code>unset()</code> não são permitidas nessas propriedades. Para mais detalhes, consulte <a href="https://wiki.php.net/rfc/property-hooks#interaction_with_isset_and_unset">PHP RFC: Property hooks</a>.
