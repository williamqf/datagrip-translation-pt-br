<p>Reporta acesso ao primeiro elemento de uma coleção por índice ao invés de <code>head</code>.</p>
<p><b>Exemplo:</b></p>
<pre><code>
  var seq: Seq[Int]
  seq(0)
  seq.apply(0)
</code></pre>
<p>Após a correção rápida:</p>
<pre><code>
  var seq: Seq[Int]
  seq.head
  seq.head
</code></pre>
