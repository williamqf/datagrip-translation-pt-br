Relata entradas (padrões) duplicadas em arquivos de ignorados (por exemplo, .gitignore, .hgignore).
Entradas duplicadas nesses arquivos são redundantes e podem ser removidas.

<p>Exemplo:</p>
<pre><code>
    # Diretório de saída
    /out/
    /target/
    /out/
</code></pre>
