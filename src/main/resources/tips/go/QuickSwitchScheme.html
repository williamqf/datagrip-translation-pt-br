<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Troca de esquema</b></p><p>Do editor, com um único atalho de teclado, você pode aplicar diferentes estilos de código, esquemas de cores ou mapas de teclas. Pressione <span class="shortcut">&shortcut:QuickChangeScheme;</span> (<span class="control">Visualizar | Troca rápida de esquema</span>) para especificar o esquema para o qual irá trocar.</p></body></html>
