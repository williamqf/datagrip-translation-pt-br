<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Criar dump de goroutines</b></p><p>Durante o processo de depuração, você pode criar um dump de todas as goroutines que o programa está usando ao clicar no botão <span class="control">Dump de goroutines</span>. Na guia "Dump", você pode aplicar filtros para procurar uma goroutine específica e investigar os resultados refinados.</p><p class="image"><img src="images/go_tod_dump_goroutines.png" alt="Filtro de pesquisa de uma goroutine específica" style="border: 1px solid #55555;" /></p></body></html>
