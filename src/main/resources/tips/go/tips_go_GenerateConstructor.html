<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Crie uma função para criar valores de tipo struct</b></p><p>Para criar um construtor, posicione o cursor no código e pressione <span class="shortcut">&shortcut:Generate;</span>. No menu "Gera", selecione "Gera construtor". Selecione os campos que serão usados no construtor e clique em "OK".</p></body></html>
