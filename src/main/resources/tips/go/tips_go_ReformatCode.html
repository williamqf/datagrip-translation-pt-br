<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Formatação de Código</b></p><p><span class="shortcut">&shortcut:ReformatCode;</span> (<span class="control">Código | Formatar Código</span>) formata o código selecionado, o arquivo atual ou até mesmo uma pasta de diretórios. A ação também otimiza as declarações de imports e remove declarações não utilizadas.</p></body></html>
