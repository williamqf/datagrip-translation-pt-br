<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Comparação com o clipboard</b></p><p>Para comparar o editor ativo com o conteúdo do clipboard, clique com o botão direito do mouse em qualquer lugar do editor e, no menu de contexto, selecione "<span class="control">Comparar com o clipboard</span>".</p></body></html>
