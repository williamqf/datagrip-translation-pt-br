<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Executar e depurar a execução com privilégios elevados</b></p><p>Para aumentar os privilégios do processo da aplicação, acesse o diálogo "<span class="control">Configurações de execução/depuração</span>", disponível em <span class="control">Executar | Editar configurações</span>, e clique na configuração da aplicação. Depois, marque a checkbox "<span class="control">Executar com sudo</span>".</p></body></html>
