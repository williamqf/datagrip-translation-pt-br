<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Ir para o tipo</b></p><p>Para abrir um tipo no editor, pressione <span class="shortcut">&shortcut:GotoClass;</span> (<span class="control">Ir | Tipo</span>), digite o nome do tipo e clique no tipo na lista de candidatos.</p><p class="image"><img src="images/go_tips_goto_class.png" alt="Go to Type" style="border: 1px solid #55555;" /></p></body></html>
