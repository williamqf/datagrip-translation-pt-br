<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Pesquisar uma inspeção de código</b></p><p>Para encontrar e executar uma inspeção rapidamente, pressione <span class="shortcut">&shortcut:RunInspection;</span> e digite o nome da inspeção ou do seu grupo. Selecione a inspeção da lista de sugestões e especifique o escopo. <p class="image"><img src="images/tips_go_gotoinspection.png" alt="executar inspeção pelo nome" style="border: 1px solid #55555;" /></p></p></body></html>
