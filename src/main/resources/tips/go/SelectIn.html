<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Seleção no local</b></p><p>Para selecionar rapidamente o elemento que está editando atualmente (um tipo, arquivo, método ou campo) em outra view, pressione <span class="shortcut">&shortcut:SelectIn;</span> ou chame " <span class="control">Navegar | Ir para | Seleção no Local</span>".</p></body></html>
