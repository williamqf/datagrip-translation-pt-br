<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Usando o Destaque da Sintaxe</b></p><p>Você pode destacar cada parâmetro e as variáveis locais em cores diferentes. Para habilitar o <span class="control">Destaque da Sintaxe</span>, pressione <span class="shortcut">&shortcut:ShowSettings;</span> para abrir as configurações, e vá para "<span class="control">Editor | Esquema de cores | Padrões de linguagem</span>".</p></body></html>
