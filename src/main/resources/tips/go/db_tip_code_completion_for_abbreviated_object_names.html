<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Conclusão de código de nome abreviado</b></p><p>Conclua os nomes de objetos no formato camelCase, separados por hifens (-) ou sublinhados (_). Para iniciar a conclusão de código, use a primeira letra de cada palavra no nome.</p></body></html>
