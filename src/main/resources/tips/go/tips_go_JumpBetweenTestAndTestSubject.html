<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Navegar por Testes, Tipos e Funções</b></p><p>Pressione <span class="shortcut">&shortcut:GotoTest;</span> ou selecione "<span class="control">Navegar | Ir para Teste</span>" e navegue do teste para o tipo ou função. A mesma ação pode ser usada para gerar um novo teste para uma função, arquivo ou pacote.</p><p class="image"><img src="images/tips_go_tod_1_go_to_test.png" alt="Ir para o teste e retornar" style="border: 1px solid #55555;" /></p></body></html>
