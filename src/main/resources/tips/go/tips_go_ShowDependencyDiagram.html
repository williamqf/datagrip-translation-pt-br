<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Criar um diagrama de dependência</b></p><p>Você pode criar um diagrama de dependência para projetos do Go module. Para criar o diagrama, clique com o botão direito do mouse no arquivo <span class="control">go.mod</span> no projeto e selecione <span class="control">Diagramas | Show Diagram</span> (Mostrar diagrama).</p></body></html>
