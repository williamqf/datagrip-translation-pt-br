<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Avaliar expressões no editor</b></p><p>Avalie rapidamente qualquer expressão da IDE durante uma sessão de depuração. Inicie uma sessão de depuração <span class="shortcut">&shortcut:Depurar;</span>, então clique na expressão enquanto pressiona a tecla <span class="shortcut">Alt</span> (Windows e Linux) / <span class="shortcut">Alt</span> (macOS).</p><p class="image"><img src="images/tips_go_tod_1_inspect_expression.png" alt="Avaliar uma expressão arbitrária do editor" style="border: 1px solid #55555;" /></p></body></html>
