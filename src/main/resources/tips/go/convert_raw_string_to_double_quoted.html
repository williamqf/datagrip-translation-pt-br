<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/dicas.css"></head><body><p>Você pode converter rapidamente uma string entre aspas simples e uma string entre aspas duplas e vice-versa.</p><p>Para realizar esta conversão, pressione <span class="shortcut">&shortcut:ShowIntentionActions;</span> e selecione <span class="control">Converter string literal raw em string literal com aspas duplas</span>.</p><p class="image"><img src="images/go_conversion_between_different_kinds_of_string_literals.png" alt="Conversão entre diferentes tipos de literais de string" style="border: 1px solid #55555;" /></p></body></html>
