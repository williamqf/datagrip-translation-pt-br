<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Searches Recentes</b></p><p>Use a funcionalidade Search Recentes ao pesquisar strings de texto em arquivos. Use <span class="shortcut">&shortcut:Find;</span> para abrir a barra de pesquisa e <span class="shortcut">&shortcut:ShowSearchHistory;</span> para exibir uma lista com suas pesquisas recentes.</p><p class="image"><img src="images/go_searchhistory.png" alt="searches recentes" style="border: 1px solid #55555;" /></p></body></html>
