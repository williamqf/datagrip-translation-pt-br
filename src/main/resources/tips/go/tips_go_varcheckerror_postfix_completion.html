<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Manipulação de erros com identificador que retorna erros</b></p><p>Depois de um identificador que retorna erros, digite <span class="code_emphasis">.vce</span>, e o IDE adiciona automaticamente um nome de variável padrão e retorna o erro da função.</p><p class="image"><img src="images/go_tips_varcheckerror_postfix_completion.png" alt="The vce postfix template" style="border: 1px solid #55555;" /></p></body></html>
