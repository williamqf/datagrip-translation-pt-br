<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Busca de ação</b></p><p>Se você não souber o atalho para chamar uma ação, pressione <span class="shortcut">&shortcut:GotoAction;</span> para iniciar a digitação do nome da ação. Para aplicar a ação, selecione-a na lista de sugestões. O atalho é exibido próximo ao nome da ação.</p><p class="image"><img src="images/go_tips_find_action.png" alt="Find action" style="border: 1px solid #55555;" /></p></body></html>
