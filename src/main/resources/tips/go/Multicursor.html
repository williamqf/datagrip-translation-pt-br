<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Uso de múltiplos cursores</b></p><p>O GoLand permite o uso de múltiplos cursores. Pressione <span class="shortcut">Shift+Alt</span> enquanto clica em várias outras posições para adicionar cursores adicionais ao editor.</p><p class="image"><img src="images/tips_go_tod_1_multiple_carets.png" alt="Multiple selection" style="border: 1px solid #55555;" /></p><p>Pressione <span class="shortcut">&shortcut:EditorEscape;</span> para remover todos os cursores, exceto o mais recentemente adicionado.</p></body></html>
