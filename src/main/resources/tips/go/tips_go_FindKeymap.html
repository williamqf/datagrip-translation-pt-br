<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Modificando atalhos</b></p><p>Para modificar um atalho, pressione <span class="shortcut">&shortcut:ShowSettings;</span> para abrir as configurações, selecione "<span class="control">Mapeamento de teclas</span>". Clique no botão "<span class="control">Pesquisar ação com atalho</span>", pressione o atalho já existente, selecione a ação correspondente e configure o novo atalho.</p></body></html>
