<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Destaque de instruções 'return' e 'panic'</b></p><p>Para exibir todas as instruções <span class="code_emphasis">return</span> e <span class="code_emphasis">panic</span> em uma função, pressione <span class="shortcut">&shortcut:HighlightUsagesInFile;</span> com o cursor posicionado na palavra-chave <span class="code_emphasis">func</span> e <span class="code_emphasis">return</span> ou na função <span class="code_emphasis">panic</span>.</p><p class="image"><img src="images/tips_go_tod_1_highlight_entry_points.png" alt="Highlight exit points" style="border: 1px solid #55555;" /></p></body></html>
