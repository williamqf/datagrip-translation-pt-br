<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Feche as guias do editor</b></p><p>Você pode fechar as guias do editor e das janelas de ferramentas sem usar o comando do menu de contexto. Para isso, clique na guia que você deseja fechar com o botão central do mouse ou use <span class="shortcut">Shift+LeftClick</span>.</p></body></html>
