<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Copiar as pilhas de gorrotinas durante a depuração</b></p><p>Para copiar as pilhas de frames para a área de transferência, clique com o botão direito do mouse na lista de gorrotinas na janela de ferramentas "Depurador" e selecione "Copiar pilha".</p><p class="image"><img src="images/tips_go_copy_stack.png" alt="Copiar pilha" style="border: 1px solid #55555;" /></p></body></html>
