<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Selecione todas as ocorrências do código sob o cursor</b></p><p>Para editar todas as ocorrências da palavra ou do símbolo atual em um arquivo, pressione <span class="shortcut">&shortcut:SelectAllOccurrences;</span> para chamar a ação "<span class="control">Selecionar todas as ocorrências</span>". Pressione <span class="shortcut">&shortcut:EditorEscape;</span> para liberar a seleção.</p><p class="image"><img src="images/tips_go_edit_all_occurrences.png" alt="Selecionar todas as ocorrências" style="border: 1px solid #55555;" /></p></body></html>
