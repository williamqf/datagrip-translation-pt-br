<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Autocompletar com negação</b></p><p>No Go, você adiciona um ponto de exclamação <span class="code_emphasis">!</span> para negar expressões booleanas.</p><p>Para autocompletar no código, pressione <span class="shortcut">&shortcut:CodeCompletion;</span>, selecione a variável e digite <span class="code_emphasis">!</span>.</p></body></html>
