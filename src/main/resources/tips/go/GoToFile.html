<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Acesse o arquivo</b></p><p>Para abrir um arquivo rapidamente, pressione <span class="shortcut">&shortcut:GotoFile;</span> (<span class="control">Navegação | Arquivo</span>) e comece a digitar o nome do arquivo. Você pode usar o ícone de filtro para procurar somente tipos de arquivo específicos:</p><p class="image"><img src="images/go_gotofile.png" alt="Go to file" style="border: 1px solid #55555;" /></p></body></html>
