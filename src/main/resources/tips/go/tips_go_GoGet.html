<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Instalando pacotes que utilizam GOPATH</b></p><p>Para instalar um pacote ausente, clique na declaração do pacote e pressione <span class="shortcut">&shortcut:ShowIntentionActions;</span> e selecione <span class="control">go get -t &lt;package_name&gt;</span>.</p><p>Esse método se aplica a projetos que utilizam GOPATH.</p><p class="image"><img src="images/tips_go_tod_1_go_get.png" alt="Use intention actions para obter um pacote" style="border: 1px solid #55555;" /></p></body></html>
