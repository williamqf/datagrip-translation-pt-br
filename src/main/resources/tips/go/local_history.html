<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Histórico local</b></p><p>O histórico local permite rastrear todas as mudanças feitas em um arquivo, tipo, método ou trecho de código e, se necessário, revertê-las para um ponto estável. Para ver o histórico local, selecione "Arquivo | Histórico local | Mostrar histórico" no menu principal.</p></body></html>
