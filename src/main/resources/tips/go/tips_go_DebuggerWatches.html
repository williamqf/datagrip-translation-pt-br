<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Avalie expressões repetidamente ao depurar o código</b></p><p>Para avaliar repetidamente expressões no contexto do quadro de pilha atual, use <span class="control">Watches</span> na ferramenta <span class="control">Debugger</span>. A guia <span class="control">Watches</span> fica oculta por padrão. Para abrir a guia <span class="control">Watches</span>, clique no ícone <span class="control">Watches</span> (<img src="images/app.debugger.watch.png" alt="the Watches icon"/>).</p><p class="image"><img src="images/tips_go_tod_1_watches.png" alt="Working with watches" style="border: 1px solid #55555;" /></p></body></html>
