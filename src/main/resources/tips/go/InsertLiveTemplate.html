<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Exibir modelos ativos disponíveis</b></p><p>Caso não se lembre da abreviação de um modelo ativo, pressione <span class="shortcut">&shortcut:InsertLiveTemplate;</span> para exibir uma lista de candidatos correspondentes ao contexto atual. Por exemplo, digite <span class="code_emphasis">fo</span> e pressione <span class="shortcut">&shortcut:InsertLiveTemplate;</span> para verificar o que ocorre.</p><p class="image"><img src="images/go_tips_insert_live_template.png" alt="Inserir modelo ativo" style="border: 1px solid #55555;" /></p></body></html>
