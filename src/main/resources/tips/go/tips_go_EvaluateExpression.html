<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Avaliar Expressões</b></p><p>Durante a depuração, selecione "<span class="control">Executar | Ações de Depuração | Avaliar Expressão</span>" ou pressione <span class="shortcut">&shortcut:EvaluateExpression;</span> para avaliar qualquer expressão dentro do contexto do frame de pilha atual.</p><p class="image"><img src="images/tips_go_tod_1_evaluate_expresion.png" alt="Avaliar Expressão" style="border: 1px solid #55555;" /></p></body></html>
