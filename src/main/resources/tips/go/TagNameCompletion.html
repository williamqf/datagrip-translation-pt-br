<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Preenchimento do nome de tag XML</b></p><p><span class="shortcut">Alt+Enter</span> Pressione duas vezes para preencher o nome de tag XML de um namespace que não foi declarado no arquivo atual. Se o namespace ainda não foi declarado, a declaração será gerada automaticamente.</p><p class="image"><img src="images/go_tips_tagNameCompletion.png" alt="Tag name completion" style="border: 1px solid #55555;" /></p></body></html>
