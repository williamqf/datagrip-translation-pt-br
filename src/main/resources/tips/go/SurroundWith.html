<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Envolver uma porção do código</b></p><p>Para envolver rapidamente um bloco de código num constructo válido, selecione o bloco de código pretendido no editor e prima <span class="shortcut">&shortcut:SurroundWith;</span> (<span class="control">Code | Surround With</span>).</p><p>A lista de opções ou wrappers disponíveis varia consoante o contexto e a linguagem.</p><p class="image"><img src="images/go_generate_code_surround.png" alt="wrap code into the if statement" style="border: 1px solid #55555;" /></p></body></html>
