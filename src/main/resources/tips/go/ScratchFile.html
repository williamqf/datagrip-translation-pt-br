<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Cria arquivo temporário para ideias de código</b></p><p>Para criar um protótipo rápido de código, você pode criar um arquivo temporário que não precisa ser nomeado ou salvo no projeto. Pressione <span class="shortcut">&shortcut:NewScratchFile;</span> (<span class="control">Arquivo | Novo | Arquivo temporário</span>) e depois especifique o tipo do arquivo.</p></body></html>
