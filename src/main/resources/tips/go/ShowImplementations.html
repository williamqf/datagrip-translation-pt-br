<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Visualizar todos os tipos que implementam a interface selecionada.</b></p><p>Para ir para implementação clique na interface e vá em "<span class="control">Navegar | Implementação</span>" (<span class="shortcut">&shortcut:GotoImplementation;</span>), escolha a implementação desejada na lista e pressione <span class="shortcut">&shortcut:EditorEnter;</span>.</p><p class="image"><img src="images/tips_go_tod_1_show_implementations.png" alt="See the list of all the types that implement the selected interface or any of interface methods" style="border: 1px solid #55555;" /></p></body></html>
