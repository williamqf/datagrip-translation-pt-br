<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Avaliação de expressão</b></p><p>Na janela " <span class="control">Pesquisar em todos os lugares</span> " (<span class="shortcut">Shift</span> duas vezes), é possível avaliar expressões aritméticas simples.</p><p>Digite a expressão a ser avaliada no campo de pesquisa. O resultado da avaliação será exibido nos resultados da pesquisa.</p></body></html>
