<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Templates de pós-fixo: convertendo uma string em um número</b></p><p>Você pode usar os templates de pós-fixo <span class="code_emphasis">parseInt</span> e <span class="code_emphasis">parseFloat</span> para converter strings em números.</p><p>Lembre-se de que, caso você precise manipular o valor <span class="code_emphasis">err</span> gerado pelo template, considere usar o template de pós-fixo <span class="code_emphasis">nn</span>.</p><p class="image"><img src="images/go_tips_converting_string_to_number.png" alt="Postfix templates: string-to-number conversion" style="border: 1px solid #55555;" /></p></body></html>
