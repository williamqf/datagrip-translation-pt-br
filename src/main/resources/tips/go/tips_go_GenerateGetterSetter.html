<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Gerar getters e setters</b></p><p>É possível gerar getters e setters separadamente ou usar uma ação para gerar os dois métodos.</p><p>Coloque o cursor no código e pressione <span class="shortcut">&shortcut:Generate;</span>. Na janela "<span class="control">Gerar</span> ", selecione "<span class="control">getter e setter</span> ".</p><p class="image"><img src="images/tips_go_generate_getter_setter.png" alt="Gerar getters e setters" style="border: 1px solid #55555;" /></p></body></html>
