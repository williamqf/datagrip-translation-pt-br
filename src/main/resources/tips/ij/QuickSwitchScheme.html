<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Trocar esquemas</b></p><p>Você pode aplicar, através do editor e apenas com um comando de teclado, um estilo de código, esquema de cores ou mapeamento de teclas diferente.<span class="shortcut">&shortcut:QuickChangeScheme;</span> (ou pressione <span class="control">Exibir | Troca rápida de esquema</span>) e especifique o esquema que deseja mudar.</p></body></html>
