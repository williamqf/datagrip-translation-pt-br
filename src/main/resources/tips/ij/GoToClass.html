<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Ir para a classe</b></p><p>Para abrir uma classe rapidamente no editor, pressione <span class="shortcut">&shortcut:GotoClass;</span> (<span class="control">Navegar | Classe</span>) e comece a digitar o nome da classe. Em seguida, clique na classe exibida na lista de conclusão.</p><p class="image"><img src="images/ij_tips_gotoclass.png" alt="ir para classe" style="border: 1px solid #55555;" /></p></body></html>
