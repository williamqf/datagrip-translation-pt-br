<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Ir para arquivo</b></p><p>Para abrir um arquivo rapidamente, pressione <span class="shortcut">&shortcut:GotoFile;</span> (<span class="control">Navegar | Arquivo</span>) e comece a digitar o nome do arquivo. Use o ícone de filtro para pesquisar apenas nos tipos de arquivo selecionados:</p><p class="image"><img src="images/ij_tips_gotofile.png" alt="Ir para arquivo" style="border: 1px solid #55555;" /></p></body></html>
