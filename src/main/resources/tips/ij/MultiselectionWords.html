<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Selecionar vários elementos de código</b></p><p>Para selecionar vários elementos de código, mantenha pressionada a tecla <span class="shortcut">Shift+Alt</span> (Windows e Linux) / <span class="shortcut">Shift+Alt</span> (macOS) e clique duas vezes em cada palavra que deseja selecionar.</p><p class="image"><img src="images/ij_tips_multiselection_words.png" alt="Selecionando várias palavras" style="border: 1px solid #55555;" /></p></body></html>
