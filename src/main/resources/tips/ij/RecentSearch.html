<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Histórico de pesquisa recente</b></p><p>Ao pesquisar por uma string de texto em um arquivo, o histórico de pesquisa recente pode ser usado. Pressione <span class="shortcut">&shortcut:Find;</span> para abrir a barra de pesquisa e pressione <span class="shortcut">&shortcut:ShowSearchHistory;</span> para exibir uma lista das entradas recentes.</p><p class="image"><img src="images/ij_tips_searchhistory.png" alt="Histórico de pesquisa recente" style="border: 1px solid #55555;" /></p></body></html>
