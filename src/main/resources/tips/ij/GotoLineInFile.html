<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Ir para a linha</b></p><p>É possível abrir uma linha específica de um arquivo no editor. Pressione <span class="shortcut">&shortcut:GotoFile;</span> (<span class="control">Ir | Arquivo</span>) comece a digitar o nome do arquivo e depois digite <span class="code_emphasis">:</span> seguido do número da linha.</p><p class="image"><img src="images/ij_tips_gotolinenumber.png" alt="Ir para a linha específica" style="border: 1px solid #55555;" /></p></body></html>
