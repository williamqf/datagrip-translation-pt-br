<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Navegar para o elemento selecionado</b></p><p>Para selecionar rapidamente na outra perspectiva o elemento que você está editando (classe, arquivo, método ou campo), pressione <span class="shortcut">&shortcut:SelectIn;</span> ou invoque "<span class="control">Navegar | Navegar para o elemento selecionado</span>".</p><p class="image"><img src="images/ij_tips_selectin.png" alt="Menu pop-up do elemento selecionado" style="border: 1px solid #55555;" /></p></body></html>
