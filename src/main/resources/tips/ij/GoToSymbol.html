<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Ir para Símbolo</b></p><p>Para abrir rapidamente classes, campos ou funções no editor, pressione <span class="shortcut">&shortcut:GotoSymbol;</span> ( <span class="control">Navegar | Símbolo</span> ), comece a digitar seu nome.</p><p class="image"><img src="images/ij_tips_gotosymbol.png" alt="Ir para símbolo" style="border: 1px solid #55555;" /></p></body></html>
