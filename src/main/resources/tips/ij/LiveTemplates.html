<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Live Templates</b></p><p>Use live templates to insert frequently used code constructs.</p><p class="image"><img src="images/ij_tips_live_templates_1.png" alt="Live template" style="border: 1px solid #55555;" /></p><p>For example, type <span class="code_emphasis">psvm</span> and press <span class="shortcut">Tab</span> to insert a <span class="code_emphasis">main()</span> method declaration template and type <span class="code_emphasis">sout</span> to insert a print statement.</p><p class="image"><img src="images/ij_tips_live_templates_2.png" alt="Apply a live template" style="border: 1px solid #55555;" /></p></body></html>
