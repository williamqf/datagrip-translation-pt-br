<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Geração de Código</b></p><p>No IntelliJIDEA, você pode gerar métodos get e set correspondentes aos campos em uma classe. Para isso, posicione o cursor em uma classe e pressione <span class="shortcut">&shortcut:Generate;</span> (<span class="control">Código | Gerar</span>).</p><p class="image"><img src="images/ij_tips_generate_getter_setter.png" alt="Gerar get e set" style="border: 1px solid #55555;" /></p></body></html>
