<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Assistência à codificação</b></p><p>Ao usar <span class="code_emphasis">Stream</span> para processar dados de <span class="code_emphasis">Collection</span>, comece a entrada do método <span class="code_emphasis">Stream</span> na instância <span class="code_emphasis">Collection</span>. A IntelliJIDEA obterá a instância <span class="code_emphasis">Stream</span>.</p><p class="image"><img src="images/tips_completion_stream.png" alt="Preenchimento de fluxos" style="border: 1px solid #55555;" /></p></body></html>
