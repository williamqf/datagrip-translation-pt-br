<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Documentação Rápida de Código</b></p><p>Para visualizar rapidamente a documentação de uma classe ou método na posição do cursor, pressione <span class="shortcut">&shortcut:QuickJavaDoc;</span> (ou <span class="control">Visualizar | Documentação Rápida</span>).</p><p class="image"><img src="images/ij_tips_quick_javadoc.png" alt="Exibição da documentação rápida" style="border: 1px solid #55555;" /></p></body></html>
