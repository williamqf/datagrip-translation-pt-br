<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Comentário e descomentário do código</b></p><p>Você pode comentar e des comentar linhas de código e blocos de código usando atalhos:</p><p><span class="shortcut">&shortcut:CommentByLineComment;</span>: Para comentário de uma linha (<span class="code_emphasis">//...</span>)</p><p><span class="shortcut">&shortcut:CommentByBlockComment;</span>: Para comentário de blocos (<span class="code_emphasis">/*...*/</span>)</p></body></html>
