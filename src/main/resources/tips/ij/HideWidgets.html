<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Configurar widgets na barra de status</b></p><p>É possível configurar o conjunto de widgets que são exibidos na barra de status. Para isso, clique com o botão direito em um widget e escolha os itens que serão exibidos.</p><p class="image"><img src="images/ij_tips_hide_widgets.png" alt="Widgets popup" style="border: 1px solid #55555;" /></p></body></html>
