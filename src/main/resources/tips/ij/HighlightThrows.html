<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Destacar Declarações Que Podem Lançar Exceções</b></p><p>É possível exibir todas as declarações em um método que podem lançar uma exceção específica. Posicione o cursor na declaração <span class="code_emphasis">throws</span> e pressione <span class="shortcut">&shortcut:HighlightUsagesInFile;</span>.</p><p class="image"><img src="images/ij_tips_highlightExceptions.png" alt="Highlight caught exceptions" style="border: 1px solid #55555;" /></p></body></html>
