<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Histórico local</b></p><p>O histórico local permite que você rastreie todas as alterações em um arquivo, classe, método ou trecho de código e reverta para um ponto estável conforme necessário. Para exibir o histórico local, no menu principal, selecione "<span class="control">Arquivo | Histórico local | Exibir histórico</span> ".</p></body></html>
