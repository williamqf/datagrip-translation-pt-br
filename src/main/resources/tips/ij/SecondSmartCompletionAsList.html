<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Smart Type Completion</b></p><p>Quando você precisa de um tipo de coleção, invoque o Smart Type Completion (<span class="shortcut">&shortcut:SmartTypeCompletion;</span>) duas vezes. O IDE encontrará uma matriz do mesmo tipo de componente e sugerirá uma conversão usando a chamada <span class="code_emphasis">Arrays.asList()</span>.</p></body></html>
