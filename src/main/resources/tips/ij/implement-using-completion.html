<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Geração de boilerplate com autocompletar</b></p><p>Você pode gerar código boilerplate como getters e setters ou implementar métodos de interface usando autocompletar.</p><p>Para isso, basta começar a digitar o nome do método. Por exemplo, digite <span class="control">gn</span> para gerar <span class="control">getName()</span> ou digite <span class="control">ct</span> para implementar <span class="control">compareTo()</span>.</p><p class="imagem"><img src="images/tips_completion_generate.png" alt="Gerando um getter com autocompletar" style="border: 1px solid #55555;" /></p></body></html>
