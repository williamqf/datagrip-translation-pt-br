<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Preenchimento de código de acordo com tipo</b></p><p>Após a palavra-chave <span class="code_emphasis">new</span> use o preenchimento de "acordo de tipo" <span class="shortcut">&shortcut:SmartTypeCompletion;</span> para instanciar um objeto do tipo necessário.</p><p class="image"><img src="images/ij_tips_smart_completion_after_new.png" alt="Smart completion after the 'new' keyword" style="border: 1px solid #55555;" /></p></body></html>
