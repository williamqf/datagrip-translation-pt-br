<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Reordenando sugestões de preenchimento automático</b></p><p>Sugestões de preenchimento automático podem ser reordenadas por relevância ou ordem alfabética.</p><p>Para reordenar em ordem alfabética, selecione a opção "Ordenar por Nome". Para reordenar por ordem de relevância, desmarque a caixa "Ordenar por Nome".</p><p class="image"><img src="images/ij_tips_change_lookup_sorting.png" alt="alterando ordenação de preenchimento automático" style="border: 1px solid #55555;" /></p></body></html>
