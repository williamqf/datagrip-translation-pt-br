<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Visualizando documentação de Spring Bean</b></p><p>Você pode acessar a documentação do Spring Bean do editor diretamente. Posicione o cursor no Bean e pressione <span class="shortcut">&shortcut:SelectIn;</span> , depois selecione <span class="control">Spring Bean</span> . A janela de ferramentas "<span class="control">Spring</span> " será exibida contendo todas as informações disponíveis.</p><p class="image"><img src="images/spring_open_bean.png" alt="Visualizando documentação de Spring Bean" style="border: 1px solid #55555;" /></p></body></html>
