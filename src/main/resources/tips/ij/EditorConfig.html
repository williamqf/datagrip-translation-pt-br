<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>EditorConfig para o estilo de código</b></p><p>Você pode sobrepor as configurações de estilo de código do IDE com as do EditorConfig (<a href="https://editorconfig.org/">https://editorconfig.org/</a>).</p><p>Crie um novo arquivo <span class="code_emphasis">.editorconfig</span> no nó onde deseja alterar o estilo de código e especifique suas novas configurações preferidas.</p><p class="image"><img src="images/ij_tips_editor_config.png" alt="Configurações EditorConfig" style="border: 1px solid #55555;" /></p></body></html>
