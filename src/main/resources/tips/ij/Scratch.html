<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Arquivos Scratch</b></p><p>Arquivos Scratch são arquivos temporários que permitem que você experimente e faça protótipos de código em um editor sem precisar criar um arquivo de projeto.</p><p>Para criar um arquivo Scratch, pressione <span class="shortcut">&shortcut:NewScratchFile;</span> e selecione a linguagem que você deseja usar.</p></body></html>
