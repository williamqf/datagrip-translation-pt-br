<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Criar TAGs de Propriedades Ant</b></p><p>Você pode começar uma referência também para uma propriedade ou alvo Ant não definido. Pressione <span class="shortcut">&shortcut:ShowIntentionActions;</span> e escolha " <span class="control">Criar Propriedade</span> " na lista de ações intencionais para criar a TAG necessária sem sair da edição atual.</p></body></html>
