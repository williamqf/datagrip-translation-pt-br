<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Fechando abas do editor</b></p><p>Para fechar todas as abas exceto a atual, pressione <b>Alt</b> (Windows e Linux) ou <b>Alt</b> (macOS) e clique no ícone da cruz na aba do editor atual.</p><p class="image"><img src="images/ps_tips-close_others.png" alt="Close others" style="border: 1px solid #55555;" /></p></body></html>
