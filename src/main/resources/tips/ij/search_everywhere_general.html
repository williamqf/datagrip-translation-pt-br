<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Procura qualquer coisa</b></p><p>Pressione <span class="shortcut">Shift</span> 2 vezes para abrir o popup "<span class="control">Procurar em qualquer lugar</span>".</p><p>Procura qualquer elemento do código-fonte, ficheiros, ações, elementos da IU e até mesmo confirmações do Git.</p><p class="image"><img src="images/tips_search_everywhere.png" alt="Search Everywhere" style="border: 1px solid #55555;" /></p></body></html>
