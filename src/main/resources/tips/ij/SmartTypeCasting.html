<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Preenchimento de correspondência de tipo</b></p><p>Quando o valor da expressão precisa ser convertido para o tipo necessário, use o preenchimento de "correspondência de tipo". Por exemplo</p><span class="code_emphasis"><p>                 String s = (             </p></span><p>digite e pressione <span class="shortcut">&shortcut:SmartTypeCompletion;</span> para ver o que acontece.</p></body></html>
