<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><h2><b>Como envolver um trecho de código</b></h2><p>Para envolver um bloco de código rapidamente em um construtor válido, selecione o bloco de código no editor e pressione <span class="shortcut">&shortcut:SurroundWith;</span> ( <span class="control">Código | Envolver</span>).</p><p>A lista de opções ou invólucros disponíveis varia dependendo do contexto e do idioma.</p><p class="image"><img src="images/ij_tips_surround_with.png" alt="Como envolver" style="border: 1px solid #55555;" /></p></body></html>
