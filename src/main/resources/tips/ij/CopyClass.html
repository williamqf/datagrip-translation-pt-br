<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Copiando uma classe</b></p><p>Use " <span class="control">Refatorar | Copiar classe</span> " para criar uma cópia da classe selecionada.</p><p>Esta refatoração auxilia quando for necessário criar uma classe semelhante a uma classe existente, mas não for possível colocar funcionalidades comuns em uma superclasse comum.</p></body></html>
