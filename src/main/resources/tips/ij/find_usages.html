<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Localizar ocorrências</b></p><p>Pressione <span class="shortcut">&shortcut:FindUsages;</span> para localizar rapidamente todas as ocorrências do código que referenciam o símbolo na posição do cursor. Não importa se este símbolo é uma classe, método, campo, parâmetro ou parte de outra declaração.</p><p class="image"><img src="images/tips_find_usages.png" alt="Find Usages" style="border: 1px solid #55555;" /></p></body></html>
