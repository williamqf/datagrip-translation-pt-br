<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Pesquisa CamelCase em qualquer lugar</b></p><p>Você pode utilizar CamelCase na caixa de diálogo "Pesquisa em Qualquer Lugar" (pressione Shift 2 vezes) para restringir a lista de resultados ao pesquisar por classes, arquivos ou símbolos.</p><p class="image"><img src="images/ij_tips_goto_camel_completion.png" alt="Complementação de código com CamelCase na pesquisa" style="border: 1px solid #55555;" /></p></body></html>
