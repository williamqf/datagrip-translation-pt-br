<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Palavras-chave para impressão</b></p><p>Use palavras-chave para deixar seus impressos (<span class="control">Arquivo | Imprimir</span>) úteis e bonitos.</p><p>Por exemplo, ao usar <span class="code_emphasis">$DATE$</span> e <span class="code_emphasis">$TIME$</span>, você pode especificar a data e hora exatas no impresso.</p></body></html>
