<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Autocompletar código</b></p><p>O Autocompletar código sugere opções acessíveis a partir da posição atual do cursor durante a digitação. Pressione <span class="shortcut">&shortcut:CodeCompletion;</span> duas vezes para exibir também classes e membros inacessíveis.</p><p class="image"><img src="images/ij_tips_second_code_completion.png" alt="Conclusão de código estendida" style="border: 1px solid #55555;" /></p></body></html>
