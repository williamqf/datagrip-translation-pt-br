<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Autocomplete de código na barra de pesquisa</b></p><p>Quando você pesquisar um texto no arquivo atual <span class="shortcut">&shortcut:Find;</span>, pressione <span class="shortcut">&shortcut:CodeCompletion;</span> na barra de pesquisa para evitar a necessidade de digitar a sequência de caracteres inteira.</p><p class="image"><img src="images/ij_tips_CodeCompletionSearch.png" alt="autocomplete de código na pesquisa" style="border: 1px solid #55555;" /></p></body></html>
