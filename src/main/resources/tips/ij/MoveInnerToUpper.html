<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Refatoração Move</b></p><p>Quando você invoca a refatoração <span class="control">Move</span> <span class="shortcut">&shortcut:Move;</span> para uma classe interna declarada <span class="control">static</span>, será exibida uma mensagem pedindo para você confirmar se você deseja torná-la uma classe de nível superior ou movê-la para uma outra classe.</p><p class="image"><img src="images/ij_tips_move_inner.png" alt="Move inner class" style="border: 1px solid #55555;" /></p></body></html>
