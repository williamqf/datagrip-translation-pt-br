<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Executar testes</b></p><p>Para executar todos os métodos em uma determinada classe de teste, basta clicar no <img src="images/app.actions.runAll.png" alt="botão Executar todos"/> na margem e selecionar "<span class="control">Executar '&lt;TestClass&gt;'</span>".</p><p class="image"><img src="images/ij_tips_run_all_tests.png" alt="Executar todos os testes" style="border: 1px solid #55555;" /></p><p>Para executar um único método, clique em <img src="images/app.actions.execute.png" alt="botão Executar"/> na margem.</p></body></html>
