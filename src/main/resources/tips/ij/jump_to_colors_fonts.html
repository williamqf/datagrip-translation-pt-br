<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Personalizar as cores do código</b></p><p>Se não gosta das cores do código, pressione <span class="shortcut">&shortcut:GotoAction;</span>, digite <span class="code_emphasis">Jump</span> e clique em "<span class="control">Ir para Cores e fontes</span>". Você irá para a página de configuração onde pode alterar as cores do elemento do código na posição do cursor.</p></body></html>
