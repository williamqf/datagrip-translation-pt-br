<html>

<body>
    <p>
        A ação <span class="controle">Mover Declaração para Cima/Baixo</span>
        é útil para reorganizar o seu código, por exemplo,
        para aproximar uma declaração de variável para uso da variável.</p>
    <p>
        Selecione um fragmento de código e pressione <span class="atalho">Control/Cmd + Shift + Cima</span>
        ou <span class="atalho">Control/Cmd + Shift + Baixo</span>.</p>
</body>
</html>
