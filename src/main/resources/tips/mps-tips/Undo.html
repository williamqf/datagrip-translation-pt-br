<p>A combinação de teclas <span class="shortcut">Control/Cmd + Z</span> permite que você rapidamente reverta suas alterações recentes.
    Toda vez que você se encontrar cometendo um erro ao digitar, criar ou excluir, use <b>Undo</b> para voltar ao caminho certo.
    O Undo também funciona para alterações feitas no <b>painel Project View</b>.</p>
