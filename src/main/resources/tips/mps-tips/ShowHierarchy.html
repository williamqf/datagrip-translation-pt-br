<p>Para visualizar rapidamente a hierarquia de herança de um elemento, utilize <span class="shortcut">&shortcut:TypeHierarchy;</span>
    (<span class="control">Visão | Type Hierarchy</span>).
    Você também pode invocar a visualização da hierarquia direto do editor para verificar a hierarquia da classe que está sendo editada no momento.</p>
