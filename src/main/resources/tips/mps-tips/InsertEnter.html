<p>Pressionar a tecla <span class="shortcut">Enter</span> normalmente insere um novo elemento logo após a posição atual
e permite editá-lo imediatamente. A tecla <span class="shortcut">Insert</span>
ou <span class="shortcut">Shift + Enter</span> fará o mesmo para uma posição logo antes da posição atual.</p>
