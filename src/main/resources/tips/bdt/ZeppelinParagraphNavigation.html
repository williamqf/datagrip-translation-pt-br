<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Navegação de parágrafos no Zeppelin</b></p><p>Para navegar rapidamente entre os parágrafos de um bloco de notas do Zeppelin, clique no ícone <img src="images/app.actions.forward.png" alt="The Right Arrow icon"/> para selecionar um parágrafo.</p><p class="image"><img src="images/bdt_paragraph_navigation_tips.png" alt="Paragraph Navigation" style="border: 1px solid #55555;" /></p><p>Use a caixa de pesquisa para filtrar a lista de parágrafos.</p></body></html>
