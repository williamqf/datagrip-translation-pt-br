<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Executar um parágrafo do Zeppelin</b></p><p>Para executar um parágrafo selecionado em seu caderno do Zeppelin, pressione <span class="shortcut">Shift+Enter</span> .</p><p>Você também pode clicar no botão "<span class="control">Mais</span> " no lado direito do parágrafo e selecionar a ação de execução correspondente.</p></body></html>
