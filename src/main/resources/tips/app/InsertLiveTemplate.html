<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Veja modelos ativos disponíveis</b></p><p>Se você não se lembra de uma abreviação de modelo ativo, pressione <span class="shortcut">&shortcut:InsertLiveTemplate;</span> para ver uma lista de sugestões para o contexto atual. Por exemplo, digite <span class="code_emphasis">it</span> e pressione <span class="shortcut">&shortcut:InsertLiveTemplate;</span> para ver o que acontece. </p><p class="image"><img src="images/ij_tips_insert_live_template.png" alt="Inserir modelo ativo" style="border: 1px solid #55555;" /></p></body></html>
