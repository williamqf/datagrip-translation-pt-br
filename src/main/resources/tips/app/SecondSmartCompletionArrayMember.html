<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Completação de código compatível com tipo</b></p><p>Quando há um array do tipo esperado no contexto, invoke a conclusão de código compatível com tipo (<span class="shortcut">&shortcut:SmartTypeCompletion;</span>) duas vezes. O IDE irá sugerir obter um elemento deste array.</p></body></html>
