<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Arquivos temporários</b></p><p>Os arquivos temporários são arquivos transitórios que permitem que você experimente e prototipe no editor, sem criar arquivos de projeto.</p><p>Para criar um arquivo temporário, pressione <span class="shortcut">&shortcut:NewScratchFile;</span> e então selecione a linguagem que será usada.</p></body></html>
