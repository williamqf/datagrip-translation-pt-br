<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Copiar uma classe</b></p><p>Use <span class="control">Refatorar | Copiar Classe</span> para criar uma classe que é uma cópia da classe selecionada.</p><p>Isso é útil quando você precisa criar uma classe similar a uma já existente, e não é viável colocar a funcionalidade compartilhada em uma superclasse comum.</p></body></html>
