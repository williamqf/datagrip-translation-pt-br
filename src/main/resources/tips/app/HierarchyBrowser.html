<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Visualizar hierarquia de herança</b></p><p>Para ver a hierarquia de herança da classe selecionada, pressione <span class="shortcut">&shortcut:TypeHierarchy;</span> (<span class="control">Navegar | Hierarquia de Tipo</span>). Você também pode invocar a visualização de hierarquia diretamente do editor para ver a hierarquia da classe atualmente editada.</p><p class="image"><img src="images/ij_tips_hierarchy_browser.png" alt="Navegador de hierarquia de tipo" style="border: 1px solid #55555;" /></p></body></html>
