<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Fechar as abas do editor</b></p><p>Para fechar todas as abas do editor com exceção da atual, mantenha pressionado <span class="shortcut">Alt</span> (no Windows e Linux) / <span class="shortcut">⌥</span> (no macOS) e clique no ícone de cruz da aba atual do editor.</p><p class="image"><img src="images/ps_tips-close_others.png" alt="Fechar outras" style="border: 1px solid #55555;" /></p></body></html>
