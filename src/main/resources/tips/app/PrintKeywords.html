<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Use palavras-chave para impressos</b></p><p>Para tornar seus impressos (<span class="control">Arquivo | Imprimir</span>) agradáveis e informativos, use palavras-chave.</p><p>Por exemplo, use <span class="code_emphasis">$DATE$</span> e <span class="code_emphasis">$TIME$</span> para especificar a data e hora exatas do impresso.</p></body></html>
