<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Alternar esquema</b></p><p>Você pode aplicar um estilo de código, esquema de coloração ou mapeamento de teclas diferentes com uma única tecla a partir do editor. Pressione <span class="shortcut">&shortcut:QuickChangeScheme;</span> (<span class="control">Visualizar | Alternar esquema rápido</span>) para especificar o esquema para o qual deseja alternar.</p></body></html>
