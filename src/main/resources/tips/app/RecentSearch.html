<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Histórico recente de pesquisa</b></p><p>Ao pesquisar uma string de texto em um arquivo, utilize o histórico recente de pesquisa. Pressione <span class="shortcut">&shortcut:Find;</span> para abrir a barra de pesquisa e, em seguida, pressione <span class="shortcut">&shortcut:ShowSearchHistory;</span> para exibir a lista de entradas recentes.</p><p class="image"><img src="images/ij_tips_searchhistory.png" alt="Histórico recente de pesquisa" style="border: 1px solid #55555;" /></p></body></html>
