<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Escolha o shell do terminal</b></p><p>Use seu shell preferido no Terminal.</p><p>Na caixa de diálogo <span class="control">Settings/Preferences</span> <span class="shortcut">&shortcut:ShowSettings;</span>, vá em <span class="control">Ferramentas | Terminal</span> e especifique o caminho para o executável do seu shell.</p></body></html>
