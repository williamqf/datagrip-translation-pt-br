<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Visualice resultados da pesquisa</b></p><p>Você pode usar a área <span class="control">Visualizar</span> da caixa de diálogo <span class="control">Pesquisar em arquivos</span> (<span class="shortcut">&shortcut:FindInPath;</span>) para pesquisa mais rápida sem sair da caixa de diálogo. A caixa de diálogo <span class="control">Visualizar</span> exibe os 100 primeiros resultados.</p></body></html>
