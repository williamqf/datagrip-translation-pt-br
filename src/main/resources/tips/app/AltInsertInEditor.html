<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Geração de código</b></p><p>O IntelliJIDEACommunity pode gerar métodos getter e setter para campos na sua classe. Com o cursor dentro da classe, pressione <span class="shortcut">&shortcut:Generate;</span> (<span class="control">Code | Generate</span>).</p><p class="image"><img src="images/ij_tips_generate_getter_setter.png" alt="Geração de getter e setter" style="border: 1px solid #55555;" /></p></body></html>
