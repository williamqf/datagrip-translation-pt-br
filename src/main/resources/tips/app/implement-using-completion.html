<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Gere código padrão com preenchimento de código</b></p><p>Você pode gerar código padrão, como getters e setters, e implementar métodos de interface usando o preenchimento de código.</p><p>Basta começar a digitar o nome do método, por exemplo, <span class="control">gn</span> para gerar <span class="control">getName()</span> ou <span class="control">ct</span> para implementar <span class="control">compareTo()</span>.</p><p class="image"><img src="images/tips_completion_generate.png" alt="Gerando um getter usando preenchimento de código" style="border: 1px solid #55555;" /></p></body></html>
