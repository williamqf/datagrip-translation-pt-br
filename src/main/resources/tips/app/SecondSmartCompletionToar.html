<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Preenchimento de código compatível com tipo</b></p><p>Quando um tipo de matriz for esperado, invoque o preenchimento de código compatível com tipo (<span class="shortcut">&shortcut:SmartTypeCompletion;</span>) duas vezes. O IDE pesquisará coleções com o mesmo tipo de componente e sugerirá convertê-las usando a chamada <span class="code_emphasis">toArray()</span>.</p></body></html>
