<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/dicas.css"></head><body><p><b>Encontrar Ação</b></p><p>Se você não se lembra de um atalho que chama uma ação, pressione <span class="atalho">&atalho:GotoAction;</span> e comece a digitar o nome da ação. Para aplicar a ação, selecione-a na lista de sugestões. Um atalho é exibido próximo ao nome da ação.</p><p class="imagem"><img src="imagens/dicas_encontrar_acao.png" alt="Encontrar ação" style="border: 1px solid #55555;" /></p></body></html>
