<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/dicas.css"></head><body><p><b>Restaurar modelos ativos</b></p><p>Se você modificou um modelo ativo, ele é marcado em azul. Para reverter o modelo ao seu estado original, clique com o botão direito do mouse e escolha <span class="control">Restaurar padrões</span> no menu de contexto.</p></body></html>
