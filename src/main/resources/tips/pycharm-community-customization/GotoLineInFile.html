<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Navegue para uma linha</b></p><p>Você pode abrir um arquivo no editor em uma linha de código específica. Pressione <span class="shortcut">&shortcut:GotoFile;</span> (<span class="control">Navegar | Arquivo</span>), comece digitando o nome do arquivo e digite <span class="code_emphasis">:</span> seguido pelo número da linha.</p></body></html>
