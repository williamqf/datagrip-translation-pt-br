<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Conclusão de código na barra de pesquisa</b></p><p>Pressione <span class="shortcut">&shortcut:CodeCompletion;</span> na barra de pesquisa quando você estiver procurando por texto no arquivo atual <span class="shortcut">&shortcut:Find;</span>, dessa forma você não precisará digitar a palavra ou expressão inteira.</p><p class="image"><img src="images/py_tips_CodeCompletionInSearch.png" alt="Conclusão de código na pesquisa" style="border: 1px solid #55555;" /></p></body></html>
