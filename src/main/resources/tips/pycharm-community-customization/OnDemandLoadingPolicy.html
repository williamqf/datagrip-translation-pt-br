<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p>Se o carregamento de variáveis durante a depuração demorar muito, você poderá ver as mensagens de aviso <span class="control">Carregamento com tempo limite</span>.</p><p>Clique no link <span class="control">Alternar para carregamento sob demanda</span> na janela <span class="control">Variáveis</span> para alternar para o modo quando as variáveis são carregadas sob solicitação do usuário.</p></body></html>
