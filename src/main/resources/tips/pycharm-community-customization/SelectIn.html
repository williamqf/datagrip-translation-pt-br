<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Selecionar em</b></p><p>Para selecionar rapidamente o elemento atualmente editado (uma classe, arquivo, método ou campo) em outra view, pressione <span class="shortcut">&shortcut:SelectIn;</span> ou chame <span class="control">Navigate | Select In</span>.</p></body></html>
