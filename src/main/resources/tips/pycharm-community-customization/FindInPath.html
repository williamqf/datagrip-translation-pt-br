<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Pré-visualizar resultados de pesquisa</b></p><p>Você pode usar a área de <span class="control">Pré-visualização</span> do diálogo <span class="control">Localizar em Arquivos</span> (<span class="shortcut">&shortcut:FindInPath;</span>) para uma pesquisa mais rápida sem sair do diálogo. O diálogo <span class="control">Pré-visualização</span> mostra os 100 primeiros resultados. </p></body></html>
