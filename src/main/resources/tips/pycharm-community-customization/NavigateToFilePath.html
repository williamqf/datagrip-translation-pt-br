<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Abrir</b></p><p>Para navegar para qualquer parte do caminho do arquivo, <span class="shortcut">Ctrl+Clique</span> (no Windows e Linux)/ <span class="shortcut">⌘Clique</span> (no macOS) na sua aba no editor. Selecione o elemento desejado, e ele será aberto no navegador de arquivos.</p><p class="image"><img src="images/py_tips_navigateToFilePath.png" alt="Navegar para o caminho do arquivo" style="border: 1px solid #55555;" /></p></body></html>
