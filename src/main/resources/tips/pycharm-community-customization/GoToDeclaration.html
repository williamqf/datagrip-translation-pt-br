<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Navegue para a declaração</b></p><p>Para navegar para a declaração de uma classe, método ou variável de seu uso, coloque o cursor no símbolo e pressione <span class="shortcut">&shortcut:GotoDeclaration;</span> (<span class="control">Navegação | Declaração ou Usos</span>). Você também pode <span class="shortcut">Ctrl+Clique</span> um uso para ir para a declaração.</p><p class="image"><img src="images/py_tips_ctrl_click.png" alt="Vá para Declaração com Ctrl/Cmd+Clique" style="border: 1px solid #55555;" /></p></body></html>
