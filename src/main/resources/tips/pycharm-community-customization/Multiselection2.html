<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Selecione vários fragmentos de código</b></p><p>Para selecionar vários fragmentos de texto, pressione e segure <span class="shortcut">Shift+Alt+Ctrl</span> (Windows e Linux) e <span class="shortcut">Shift+Alt (Option)+Cmd</span> (macOS) e arraste o mouse pelo texto:</p><p class="image"><img src="images/py_tips_multiselection2.png" alt="Seleção múltipla" style="border: 1px solid #55555;" /></p></body></html>
