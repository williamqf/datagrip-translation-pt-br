<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Personalizando as cores do código</b></p><p>Se você não gosta da cor do seu código, pressione <span class="shortcut">&shortcut:GotoAction;</span>, digite <span class="code_emphasis">Jump</span> e clique em <span class="control">Jump to Colors and Fonts</span>. Você será levado para a página de configurações onde poderá modificar a cor do elemento do código no cursor.</p></body></html>
