<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Trocar o esquema</b></p><p>Você pode aplicar um estilo de código, esquema de cores ou mapeamento de teclas diferente usando somente uma tecla, direto do editor. Pressione <span class="shortcut">&shortcut:QuickChangeScheme;</span> (<span class="control">Visualizar | Troca Rápida de Esquema</span>) para especificar o esquema para o qual você quer trocar.</p></body></html>
