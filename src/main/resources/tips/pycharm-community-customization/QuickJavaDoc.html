<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Documentação rápida do código</b></p><p>Para ver rapidamente a documentação para uma classe ou método no cursor, pressione <span class="shortcut">&shortcut:QuickJavaDoc;</span> (<span class="control">Ver | Documentação Rápida</span>).</p><p class="image"><img src="images/py_tips_quick_javadoc.png" alt="Ver documentação rápida" style="border: 1px solid #55555;" /></p></body></html>
