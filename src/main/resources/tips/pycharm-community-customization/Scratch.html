<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Arquivos rascunho</b></p><p>Arquivos rascunho são arquivos temporários que permitem que você experimente e prototipe no editor, sem criar quaisquer arquivos de projeto.</p><p>Para criar um arquivo rascunho, pressione <span class="shortcut">&shortcut:NewScratchFile;</span>, e então selecione a linguagem a ser usada.</p></body></html>
