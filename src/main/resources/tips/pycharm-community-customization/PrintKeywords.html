<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Palavras-chave para impressões</b></p><p>Para tornar as suas impressões (<span class="control">Arquivo | Imprimir</span>) agradáveis e informativas, use palavras-chave.</p><p>Por exemplo, use <span class="code_emphasis">$DATA$</span> e <span class="code_emphasis">$TIME$</span> para especificar a data e hora exatas da impressão.</p></body></html>
