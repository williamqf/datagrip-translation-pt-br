<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>EditorConfig para estilo de código</b></p><p>Você pode sobrepor as configurações de estilo de código da IDE com configurações do EditorConfig (<a href="https://editorconfig.org/">https://editorconfig.org/</a>).</p><p>Crie um novo arquivo <span class="code_emphasis">.editorconfig</span> no nó em que você quer alterar o estilo de código e especifique novas configurações conforme desejar.</p><p class="image"><img src="images/tips_editor_config.png" alt="Configurações do EditorConfig" style="border: 1px solid #55555;" /></p></body></html>
