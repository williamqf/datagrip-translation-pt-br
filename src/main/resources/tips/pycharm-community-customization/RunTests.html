<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Rodar testes</b></p><p>Para rodar rapidamente todos os métodos em uma classe de teste, clique em <img src="images/app.actions.runAll.png" alt="o botão Run All"/> na margem e selecione <span class="control">Run '&lt;TestClass&gt;'</span>:</p><p>Para rodar um único método, clique em <img src="images/app.actions.execute.png" alt="o botão Run"/> na margem.</p></body></html>
