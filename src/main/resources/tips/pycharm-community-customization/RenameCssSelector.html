<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Renomear seletores CSS em HTML</b></p><p>Você pode renomear os seletores CSS diretamente no HTML. Posicione o cursor no seletor a ser renomeado e pressione <span class="shortcut">&shortcut:RenameElement;</span>.</p><p class="image"><img src="images/ps_tips-RenameCssSelector.png" alt="Renomear um seletor CSS" style="border: 1px solid #55555;" /></p></body></html>
