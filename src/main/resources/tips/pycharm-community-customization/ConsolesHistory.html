<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p>Se você já passou algum tempo trabalhando nos consoles interativos, não precisa redigitar os comandos inseridos anteriormente para repeti-los. Em vez disso, pressione <span class="shortcut">Ctrl+Up</span>/<span class="shortcut">Ctrl+Down</span> (no Window/Linux) e <span class="shortcut">Up</span>/<span class="shortcut">Down</span> (no macOS) para navegar pelo histórico de comandos.</p></body></html>
