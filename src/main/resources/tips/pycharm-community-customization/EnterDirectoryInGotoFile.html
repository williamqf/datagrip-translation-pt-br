<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Pesquisa em diretórios aninhados</b></p><p>Você pode pular para um arquivo localizado em um diretório profundamente aninhado pressionando <span class="shortcut">&shortcut:GotoFile;</span> e digitando vários caracteres dos diretórios envolventes e do nome do arquivo. Use uma barra ou uma barra invertida como delimitador.</p><p class="image"><img src="images/py_tips_enterDirectory.png" alt="Locate a file" style="border: 1px solid #55555;" /></p></body></html>
