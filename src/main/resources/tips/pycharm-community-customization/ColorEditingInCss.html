<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Configure cores em arquivos CSS</b></p><p>O PyCharm Community facilita a especificação de cores em arquivos CSS. As propriedades <span class="code_emphasis">color</span> possuem ícones das cores correspondentes na lateral do editor. Clique no ícone e escolha a cor usando o seletor de cores.</p><p class="image"><img src="images/py_tips_cssColor.png" alt="CSS color" style="border: 1px solid #55555;" /></p></body></html>
