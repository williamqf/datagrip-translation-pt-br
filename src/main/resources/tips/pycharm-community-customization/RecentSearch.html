<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Histórico de pesquisas recentes</b></p><p>Ao pesquisar por uma string em um arquivo, use o histórico de pesquisas recentes. Pressione <span class="shortcut">&shortcut:Find;</span> para abrir a barra de pesquisa e em seguida pressione <span class="shortcut">&shortcut:ShowSearchHistory;</span> para mostrar a lista de entradas recentes.</p><p class="image"><img src="images/py_tips_recentSearch.png" alt="Histórico de pesquisas recentes" style="border: 1px solid #55555;" /></p></body></html>
