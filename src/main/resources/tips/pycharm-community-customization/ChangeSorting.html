<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Classificar sugestões de complementação</b></p><p>Você pode classificar sugestões de complementação por relevância ou alfabeticamente.</p><p>Para classificar alfabeticamente, selecione a opção <span class="control">Classificar por nome</span>. Para classificar por relevância, desmarque a caixa de seleção <span class="control">Classificar por nome</span>.</p><p class="image"><img src="images/py_tips_changeLookupSorting.png" alt="Alterar classificação de pesquisa" style="border: 1px solid #55555;" /></p></body></html>
