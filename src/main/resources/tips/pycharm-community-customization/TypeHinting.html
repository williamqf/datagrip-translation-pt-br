<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p>Use <span class="control">dicas de tipo</span> para informar o PyCharm sobre os tipos esperados de parâmetros, variáveis locais, campos ou valores de retorno.</p><p>Quando o tipo esperado é especificado em uma docstring ou uma anotação de tipo, o PyCharm fornece sugestões de preenchimento de código para o tipo específico:</p><p class="image"><img src="images/py_tips_type_hinting_return.png" alt="Type Hinting" style="border: 1px solid #55555;" /></p></body></html>
