<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/dicas.css"></head><body><p><b>Avaliar expressões matemáticas</b></p><p>Você pode avaliar expressões aritméticas simples com a janela <span class="control">Search Everywhere</span> (<span class="shortcut">Shift</span> duas vezes).</p><p>Entre com uma expressão que você deseja avaliar no campo de pesquisa. O resultado será mostrado nos resultados da pesquisa.</p><p class="image"><img src="images/py_dicas_avaliar_expressao.png" alt="Avaliar expressão" style="border: 1px solid #55555;" /></p></body></html>
