<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/dicas.css"></head><body><p><b>Fechar todas as abas do editor</b></p><p>Para fechar todas as abas do editor, clique com o botão direito em uma aba e selecione <span class="control">Fechar todas as abas</span>.</p><p>Para fechar todas as abas, exceto a ativa, pressione <span class="shortcut">Alt</span> (Windows e Linux) ou <span class="shortcut">Alt(Option)</span> (macOS) e clique no botão <span class="control">Fechar</span> na aba ativa.</p></body></html>
