<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Copie como rich text</b></p><p>Você pode copiar texto do editor como rich text para colar em qualquer outro editor que reconheça RTF.</p><p>Certifique-se de que a caixa de seleção <span class="control">Copiar como rich text</span> esteja marcada na página <span class="control">Editor | General</span> da caixa de diálogo <span class="control">Configurações</span> (<span class="shortcut">&shortcut:ShowSettings;</span>).</p></body></html>
