<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Fechando abas do editor</b></p><p>Você pode fechar abas no editor e nas janelas de ferramentas sem usar os comandos do menu de contexto. Clique na aba a ser fechada com o botão do meio do mouse ou use <span class="shortcut">Shift+Clique</span> nela.</p></body></html>
