<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Fechando abas do editor</b></p><p>Para fechar todas as abas do editor, exceto a atual, mantenha <u><span class="shortcut">Alt</span></u> (Windows e Linux) ou <u><span class="shortcut">Alt (Option)</span></u> (macOS) pressionado e clique na aba do editor atual.</p></body></html>
