<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Personalize a cor do código</b></p><p>Se você não gosta da cor do seu código, pressione <span class="shortcut">&shortcut:GotoAction;</span>, digite <span class="code_emphasis">Saltar</span> e clique em <span class="control">Ir para Cores e Fontes</span>. Você será direcionado para a página de configurações onde pode modificar a cor do elemento de código no cursor.</p></body></html>
