<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Alterar a porta do servidor Web embutido</b></p><p>Para alterar a porta do servidor Web embutido, vá até o diálogo <span class="control">Configurações</span> (<span class="shortcut">&shortcut:ShowSettings;</span>) em <span class="control">Construir, executar, implantar | Depurador</span> e defina um novo valor para o campo <span class="control">Porta do servidor embutido</span> .</p></body></html>
