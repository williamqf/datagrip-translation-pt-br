<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>CamelCase na pesquisa em qualquer lugar</b></p><p>O uso de CamelCase no pop-up "Pesquisa <span class="control">em qualquer lugar</span>" (pressione <span class="shortcut">Shift</span> duas vezes) filtra a lista de resultados enquanto você busca por classes, arquivos ou símbolos.</p><p class="image"><img src="images/py_tips_camel_goto.png" alt="CamelCase na lista Ir para arquivo" style="border: 1px solid #55555;" /></p></body></html>
