<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Selecionar em local específico</b></p><p>Para selecionar rapidamente o elemento que você está editando no momento (classe, arquivo, método ou campo) em outra exibição, pressione <span class="shortcut">&shortcut:SelectIn;</span> ou chame "<span class="control">Navegar | Navegar até a seleção</span>".</p><p class="image"><img src="images/py_tips-select_in.png" alt="Pop-up Selecionar em" style="border: 1px solid #55555;" /></p></body></html>
