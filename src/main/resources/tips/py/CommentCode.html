<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Comentário de linha e bloco no código</b></p><p>É possível comentar e descomentar linhas e blocos de código usando atalhos:</p><p><span class="shortcut">&shortcut:CommentByLineComment;</span>: Linhas individuais (<span class="code_emphasis">//...</span>)</p><p><span class="shortcut">&shortcut:CommentByBlockComment;</span>: Blocos (<span class="code_emphasis">/*...*/</span>)</p></body></html>
