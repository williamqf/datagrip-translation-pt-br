<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Histórico Local</b></p><p>O Histórico Local permite rastrear todas as modificações de um arquivo, classe, método ou trecho de código e executar o rollback para um ponto estável quando necessário. Para exibir o Histórico Local, acesse " <span class="control"> Arquivo | Histórico Local | Exibir Histórico </span> " no menu principal.</p></body></html>
