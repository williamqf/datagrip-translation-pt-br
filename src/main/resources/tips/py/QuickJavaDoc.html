<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Documentação de código rápido</b></p><p>Para ver rapidamente a documentação da classe ou do método na posição do cursor, pressione <span class="shortcut">&shortcut:QuickJavaDoc;</span> (<span class="control">Ver | Documentação rápida</span>).</p><p class="image"><img src="images/py_tips_quick_javadoc.png" alt="Exibir documentação rápida" style="border: 1px solid #55555;" /></p></body></html>
