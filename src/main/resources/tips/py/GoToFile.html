<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Vá para o arquivo</b></p><p>Para abrir um arquivo rapidamente, pressione <span class="shortcut">&shortcut:GotoFile;</span> (<span class="control">Ir | Arquivo</span>) e comece a digitar o nome do arquivo. O ícone de filtro pode ser usado para pesquisar apenas os tipos de arquivo selecionados:</p><p class="image"><img src="images/py_gotofile.png" alt="Vá para o arquivo" style="border: 1px solid #55555;" /></p></body></html>
