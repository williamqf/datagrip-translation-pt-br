<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Exibir hierarquia de herança</b></p><p>Para exibir a hierarquia de herança da classe selecionada, pressione <span class="shortcut">&shortcut:TypeHierarchy;</span> (<span class="control">Navegar | Hierarquia de tipo</span>). Você também pode invocar o visualizador de hierarquia diretamente do editor para inspecionar a hierarquia da classe atualmente sendo editada.</p><p class="image"><img src="images/py_tips-hierarchy_browser.png" alt="Navegador de hierarquia de tipos" style="border: 1px solid #55555;" /></p></body></html>
