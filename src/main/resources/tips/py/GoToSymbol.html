<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Vá para o símbolo</b></p><p>Para abrir rapidamente classes, campos e funções no editor, pressione <span class="shortcut">&shortcut:GotoSymbol;</span> (<span class="control">Navegar | Símbolo</span>) e comece a digitar o nome.</p><p class="image"><img src="images/py_tips_goto_symbol.png" alt="Go To Symbol" style="border: 1px solid #55555;" /></p></body></html>
