<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Renomeação inline</b></p><p>Ao iniciar uma alteração no nome de um elemento de código ou na assinatura de um método, o PyCharm exibe um ícone <img src="images/app.actions.refactoringBulb.png" alt="Ícone de refatoração inline"/> na sarjeta. Clicar neste ícone da sarjeta aplicará as alterações sugeridas.</p><p class="image"><img src="images/py_rename_inline.png" alt="Renomeação inline" style="border: 1px solid #55555;" /></p></body></html>
