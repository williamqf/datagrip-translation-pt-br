<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Composição de Cores em Arquivos CSS</b></p><p>No PyCharm, é fácil definir cores em arquivos CSS. Na barra lateral do editor, há um ícone de cor correspondente à propriedade <span class="code_emphasis">color</span>. Ao clicar nesse ícone, é possível selecionar a cor desejada usando o seletor de cores.</p><p class="image"><img src="images/py_tips_cssColor.png" alt="CSS color" style="border: 1px solid #55555;" /></p></body></html>
