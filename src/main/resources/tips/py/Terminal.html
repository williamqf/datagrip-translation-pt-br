<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Terminal interno do PyCharm</b></p><p>Não há necessidade de fechar o PyCharm para trabalhar em seu shell favorito. Em vez disso, você pode usar o terminal interno local. Para abrir o terminal interno, pressione <span class="shortcut">&shortcut:ActivateTerminalToolWindow;</span> ou clique em <img src="images/terminal.icons.expui.toolwindow.terminal.png" alt="o botão da janela de ferramenta do Terminal"/>.</p><p class="image"><img src="images/py_tips_terminal.png" alt="Janela de ferramenta do Terminal" style="border: 1px solid #55555;" /></p></body></html>
