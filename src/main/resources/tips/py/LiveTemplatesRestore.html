<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Restaurar Live Templates</b></p><p>Quando um Live Template for modificado, ele é marcado com a cor azul. Para restaurar o molde ao seu status original, clique com o botão direito do mouse sobre ele e selecione "<span class="control">Restaurar Padrão</span> " no menu de contexto.</p></body></html>
