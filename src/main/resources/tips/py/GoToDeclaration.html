<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Ir para Declaração</b></p><p>Para ir da utilização de uma classe, método ou variável para a sua declaração, posicione o cursor no símbolo e pressione <span class="shortcut">&shortcut:GotoDeclaration;</span> (<span class="control">Navegar | Declaração ou Utilização</span>). Também pode ir para a declaração ao clicar na utilização com <span class="shortcut">Ctrl+clique esquerdo</span>.</p><p class="image"><img src="images/py_tips_ctrl_click.png" alt="Ir para Declaração com Ctrl/Cmd+Clique" style="border: 1px solid #55555;" /></p></body></html>
