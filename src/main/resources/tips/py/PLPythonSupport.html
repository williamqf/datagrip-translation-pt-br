<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p>PyCharm suporta a injeção da linguagem <a href="https://www.postgresql.org/docs/14/plpython.html">PL/Python</a> em operadores <span class="code_emphasis">CREATE FUNCTION</span> e <span class="code_emphasis">CREATE PROCEDURE</span> do PostgreSQL.</p><p>Defina explicitamente <span class="code_emphasis">plpythonu</span> como a linguagem da função para destacar o código Python.</p><p>O código Python inserido deve ter indentação de acordo com a função na qual estiver contido.</p><p class="image"><img src="images/py_plpy_support.png" alt="Injeção de código PL/Python destacada" style="border: 1px solid #55555;" /></p></body></html>
