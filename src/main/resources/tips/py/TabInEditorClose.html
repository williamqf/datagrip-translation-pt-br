<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Fechando abas do editor</b></p><p>É possível fechar as abas do editor e das janelas de ferramentas sem usar o comando de menu de contexto. Para isso, clique na aba que deseja fechar com o botão do meio do mouse ou use <span class="shortcut">Shift+clique esquerdo</span>.</p></body></html>
