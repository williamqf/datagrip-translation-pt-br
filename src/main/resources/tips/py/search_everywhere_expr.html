<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Avaliar Expressões</b></p><p>Na caixa de diálogo <span class="control">Pesquisar em Todos os Lugares</span> (pressione <span class="shortcut">Shift</span> duas vezes), você pode avaliar expressões aritméticas simples.</p><p>Digite a expressão a ser avaliada no campo de pesquisa. O resultado da avaliação será exibido nos resultados da pesquisa.</p><p class="image"><img src="images/py_tips_evaluate_expression.png" alt="Evaluate expression" style="border: 1px solid #55555;" /></p></body></html>
