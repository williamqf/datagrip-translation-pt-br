<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Copiar como Rich Text</b></p><p>Você pode copiar texto do editor como Rich Text e colá-lo em outros editores que reconheçam RTF.</p><p>Verifique se a caixa de seleção <span class="control">Copiar como Rich Text</span> na página <span class="control">Editor | Geral</span> do diálogo <span class="control">Configurações</span> (<span class="shortcut">e Atalho:ShowSettings;!</span>) está marcada.</p></body></html>
