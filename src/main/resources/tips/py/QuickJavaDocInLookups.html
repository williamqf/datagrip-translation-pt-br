<h1><b>Exibir informações de referência de código</b></h1>
<p>Use <span class="shortcut" shortcut="QuickJavaDoc">;</span> (<span class="control">Visualizar | Documentação rápida</span>), <span class="shortcut" shortcut="ParameterInfo">;</span> (<span class="control">Visualizar | Informações do parâmetro</span>) <span class="shortcut" shortcut="GotoDeclaration">;</span> (<span class="control">Ir para | Declaração</span>). Atalhos semelhantes também estão disponíveis na lista de sugestões durante a digitação de código, e não apenas no editor.</p>
<p class="image">
<img src="images/py_tips_quick_javadoc_in_lookups.png" alt="Visualizar documentação rápida nas listas de sugestões" style="border: 1px solid #55555;">
</p>
