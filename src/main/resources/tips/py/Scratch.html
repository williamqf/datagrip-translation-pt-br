<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Arquivo temporário</b></p><p>O arquivo temporário é um arquivo que permite que você experimente ou faça um protótipo de um código em um editor, sem precisar criar um arquivo de projeto.</p><p>Para criar um arquivo temporário, pressione <span class="shortcut">&shortcut:NewScratchFile;</span> e então selecione uma linguagem para usar.</p></body></html>
