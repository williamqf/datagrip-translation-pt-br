<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><span class="control">Sugestões de tipo</span> permitem que você informe ao PyCharm o tipo necessário para parâmetros, variáveis locais, campos e valores de retorno.</p><p>Se o tipo esperado for especificado em docstrings ou anotações de tipo, o PyCharm fornecerá sugestões de preenchimento de código para o tipo especificado.</p><p class="image"><img src="images/py_tips_type_hinting_return.png" alt="Sugestões de tipo" style="border: 1px solid #55555;" /></p></body></html>
