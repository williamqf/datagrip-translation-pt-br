<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Ordem das sugestões de complementação</b></p><p>As sugestões de complementação podem ser ordenadas por relevância ou ordem alfabética.</p><p>Para ordenar alfabeticamente, selecione a opção "<span class="control">Ordenar por nome</span>". Para ordenar pela relevância, desmarque a opção "<span class="control">Ordenar por nome</span>".</p><p class="image"><img src="images/py_tips_changeLookupSorting.png" alt="Alterar ordenação de busca" style="border: 1px solid #55555;" /></p></body></html>
