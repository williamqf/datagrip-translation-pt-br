<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Pesquisa de inspeção de código</b></p><p>Para encontrar e executar uma inspeção rapidamente, pressione <span class="shortcut">&shortcut:RunInspection;</span> e digite o nome da inspeção ou do respectivo grupo. Selecione a inspeção na lista de candidatos e especifique o intervalo. <p class="image"><img src="images/py_tips_go_to_inspection.png" alt="Execute a inspeção por nome" style="border: 1px solid #55555;" /></p></p></body></html>
