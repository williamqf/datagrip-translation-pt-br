<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Navegue até a solicitação do acessório do pytest</b></p><p>Você pode navegar rapidamente do <i>acessório do pytest</i> para o código sob teste. Clique com o botão direito do mouse no acessório que você deseja selecionar no editor e, no menu de contexto, selecione <span class="control">Navegar | Declaração</span>.</p></body></html>
