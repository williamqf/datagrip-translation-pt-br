<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Abrir</b></p><p>Para navegar para qualquer parte do caminho do arquivo, <span class="shortcut">Control+LeftClick</span> (Windows e Linux) / <span class="shortcut">Control+LeftClick</span> (macOS) na aba do editor. Selecione o elemento desejado e ele será aberto com o navegador de arquivos.</p><p class="image"><img src="images/py_tips_navigateToFilePath.png" alt="Navigate to file path" style="border: 1px solid #55555;" /></p></body></html>
