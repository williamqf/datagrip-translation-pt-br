<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Executar teste</b></p><p>Para executar rapidamente todos os métodos em uma classe de teste, clique no botão <img src="images/app.actions.runAll.png" alt="the Run All button"/> na margem e selecione "<span class="control">Executar '&lt;TestClass&gt;'</span>".</p><p>Para executar um único método, clique no botão <img src="images/app.actions.execute.png" alt="the Run button"/> na margem.</p></body></html>
