<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Fechar abas de editor</b></p><p>Para fechar todas as abas do editor exceto a atual, pressione <span class="shortcut">Alt</span> (Windows e Linux) ou <span class="shortcut">Alt (Option)</span> (macOS) e clique no botão <img src="images/app.expui.general.closeSmall.png" alt="the Close button"/> Fechar na aba do editor atual.</p><p class="image"><img src="images/py_tips-close_others.png" alt="Close others" style="border: 1px solid #55555;" /></p></body></html>
