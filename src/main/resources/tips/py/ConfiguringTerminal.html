<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Escolha o Shell do Terminal</b></p><p>Use seu shell favorito no terminal embutido.</p><p>Na caixa de diálogo "Configurações" <span class="shortcut">&shortcut:ShowSettings;</span>, navegue até "Ferramentas | Terminal" e especifique o caminho para o executável do shell.</p></body></html>
