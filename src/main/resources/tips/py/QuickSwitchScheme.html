<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Troca de esquema</b></p><p>Do editor, com uma única operação do teclado, você pode aplicar diferentes estilos de código, esquemas de cores ou mapas de teclas. Para especificar o esquema de sua preferência, pressione <span class="shortcut">&shortcut:QuickChangeScheme;</span> (<span class="control">Exibir | Troca rápida de esquema</span>).</p></body></html>
