<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Personalizando as cores do código</b></p><p>Se você não gostar da cor do código, pressione <span class="shortcut">&shortcut:GotoAction;</span> , digite <span class="code_emphasis">Jump</span> e clique em "<span class="control">Navegar para cores e fontes</span>". Isso vai levar você à página de configuração do Editor, onde é possível alterar as cores dos elementos de código abaixo do cursor.</p></body></html>
