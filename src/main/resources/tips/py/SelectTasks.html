<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Removendo tarefas</b></p><p>Ao trabalhar com uma lista de tarefa grande, não é preciso remover as tarefas uma por uma. Selecione todas as tarefas que deseja remover utilizando as teclas <span class="shortcut">Shift</span> ou <span class="shortcut">Ctrl / Command</span>, clique na seta para a direita e, em seguida, clique em "<span class="control">Remover</span>".</p></body></html>
