<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Pré-visualização dos resultados da pesquisa</b></p><p>Use a área "Pré-visualizar" da caixa de diálogo "Pesquisar em arquivo" (<span class="shortcut">&shortcut:FindInPath;</span>) para encontrar rapidamente, sem sair da caixa de diálogo. A caixa de diálogo "Pré-visualizar" mostra os primeiros 100 resultados.</p></body></html>
