<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Mudar o esquema</b></p><p>No editor, é possível aplicar estilos de código, esquemas de cores ou atalhos de teclado diferentes em apenas um comando de teclado. Pressione <span class="shortcut">&shortcut:QuickChangeScheme;</span> (<span class="control">Exibir | Mudar a esquema rapidamente</span>) e especifique o esquema para o qual deseja mudar.</p></body></html>
