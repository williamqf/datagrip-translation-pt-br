<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Plugin de Terminal</b></p><p>Ao instalar o plugin de Terminal, você pode usar o terminal no DataGrip.</p><p>Para instalar o plugin, abra "<span class="control">Configurações</span>" <span class="shortcut">&shortcut:ShowSettings;</span>, vá para "<span class="control">Plugins</span>". No campo de busca digite "<span class="control">Terminal</span>" e então clique em "<span class="control">Instalar</span>".</p><p class="image"><img src="images/tips_db_DBTerminal.png" alt="Install Terminal plugin" style="border: 1px solid #55555;" /></p></body></html>
