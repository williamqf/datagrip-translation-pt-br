<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Live Template de Contexto</b></p><p>O Live Template de Contexto é a solução caso você queira gerar declarações simples diretamente do "<span class="control">Database Explorer</span>"。 Se você deseja executar consultas no banco atual, pode utilizar a ação "<span class="control">SQL Script</span>" no menu de contexto e selecionar o template necessário.</p></body></html>
