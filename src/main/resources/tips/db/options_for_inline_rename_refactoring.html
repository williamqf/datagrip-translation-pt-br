<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Refatoração de renomeação inline</b></p><p>Ao pressionar <span class="shortcut">&shortcut:RenameElement;</span> para renomear um elemento, clique no ícone próximo ao elemento e escolha se deseja renomear nos comentários e strings ou em todas as ocorrências de texto.</p><p class="image"><img src="images/db_tips_options_for_inline_rename_refactoring.png" alt="Options for the rename refactoring" style="border: 1px solid #55555;" /></p></body></html>
