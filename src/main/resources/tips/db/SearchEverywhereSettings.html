<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Pesquisa de configurações e plug-ins</b></p><p>Insira <span class="code_emphasis">/</span> no campo de pesquisa da janela "Pesquisar em qualquer lugar" (pressione <span class="shortcut">Shift</span> duas vezes) para pesquisar grupos de configurações, opções e plug-ins.</p><p class="image"><img src="images/db_tips_search_everywhere_settings.png" alt="Pesquisar em qualquer lugar: configurações, plug-ins, mapeamentos de URL" style="border: 1px solid #55555;" /></p></body></html>
