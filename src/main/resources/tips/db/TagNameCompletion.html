<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Complementação de nomes de tag XML</b></p><p>Pressione <span class="shortcut">&shortcut:CodeCompletion;</span> duas vezes para complementar nomes de tag XML de um namespace que não foi declarado no arquivo atual. Se o namespace ainda não tiver sido declarado, a declaração será gerada automaticamente.</p><p class="image"><img src="images/go_tips_tagNameCompletion.png" alt="Complementação de nome de tag" style="border: 1px solid #55555;" /></p></body></html>
