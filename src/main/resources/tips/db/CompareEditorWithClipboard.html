<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Comparar com a área de transferência</b></p><p>Para comparar o editor ativo com o conteúdo da área de transferência, clique com o botão direito do mouse em qualquer lugar do editor e selecione <span class="control">Comparar com a área de transferência</span> no menu de contexto.</p></body></html>
