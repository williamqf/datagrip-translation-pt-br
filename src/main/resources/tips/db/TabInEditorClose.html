<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Fechar abas do editor</b></p><p>Você pode fechar abas do editor e da janela de ferramentas sem usar o comando do menu de contexto. Para isso, clique na aba que deseja fechar com o botão do meio do mouse ou use <span class="shortcut">Shift+LeftClick</span>.</p></body></html>
