<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Pesquisa de Ação</b></p><p>Se não lembrar do atalho para chamar uma ação, pressione <span class="shortcut">&shortcut:GotoAction;</span> para começar a digitar o nome da ação. Para aplicar a ação, selecione-a na lista de candidatos. O atalho é exibido próximo ao nome da ação.</p><p class="image"><img src="images/db_tips_find_action.png" alt="Find action" style="border: 1px solid #55555;" /></p></body></html>
