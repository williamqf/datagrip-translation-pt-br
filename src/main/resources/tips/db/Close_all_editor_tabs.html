<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Fechar todas as guias do editor</b></p><p>Para fechar todas as guias do editor, clique com o botão direito do mouse em uma guia e selecione "<span class="control">Fechar todas as guias</span>".</p><p>Para fechar todas as guias exceto a guia ativa, pressione <span class="shortcut">Alt</span> (Windows e Linux) / <span class="shortcut">Alt</span> (macOS) e clique no botão "<span class="control">Fechar</span>" da guia ativa.</p></body></html>
