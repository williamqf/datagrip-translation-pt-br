<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Visualizar o conteúdo de um arquivo sem abri-lo em uma janela pop-up</b></p><p>Para abrir a janela de definição rápida, selecione o arquivo na janela de ferramentas <span class="control">Arquivos</span> (<span class="control">Exibir | Janelas de ferramentas | Arquivos</span>) e pressione <span class="shortcut">&shortcut:QuickPreview;</span>.</p><p class="image"><img src="images/tips_db_quick_definition_of_file.png" alt="Definição rápida do conteúdo do arquivo" style="border: 1px solid #55555;" /></p></body></html>
