<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Comentario e descomentário de código</b></p><p>É possível comentar e desmarcar linhas de código e blocos de código usando atalhos:</p><p><span class="shortcut">&shortcut:CommentByLineComment;</span>: Para comentários de linha única (<span class="code_emphasis">--...</span>)</p><p><span class="shortcut">&shortcut:CommentByBlockComment;</span>: Para blocos de comentários (<span class="code_emphasis">/*...*/</span>)</p></body></html>
