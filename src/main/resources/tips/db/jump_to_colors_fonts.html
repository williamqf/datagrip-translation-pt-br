<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Cor customizada para o código</b></p><p>Se você não estiver gostando da cor do código, faça um <span class="shortcut">&shortcut:GotoAction;</span>, digite <span class="code_emphasis">Jump</span> e clique em "<span class="control">Go to color and fonts</span> ". Você irá para uma página de configuração onde você poderá alterar a cor do elemento de código no cursor do seu caret.</p></body></html>
