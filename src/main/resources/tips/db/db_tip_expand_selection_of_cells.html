<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Ampliar a seleção das células</b></p><p>É possível ampliar a seleção de itens contidos em uma célula (<span class="shortcut">&shortcut:EditorSelectWord;</span>) para a coluna, linha ou tabela inteira.</p><p>Ou, se quiser reduzir a seleção, pressione <span class="shortcut">&shortcut:EditorUnSelectWord;</span>.</p><p class="image"><img src="images/tips_db_expand_selection_of_cells.png" alt="Ampliar a seleção das células" style="border: 1px solid #55555;" /></p></body></html>
