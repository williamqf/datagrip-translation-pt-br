<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Envolver fragmentos de código</b></p><p>Para envolver rapidamente um bloco de código em um construtor válido, selecione o bloco de código no editor e pressione <span class="shortcut">&shortcut:SurroundWith;</span> (<span class="control">Código | Envolver</span>).</p><p>A lista de opções ou wrappers disponíveis varia de acordo com o contexto e a linguagem.</p><p class="image"><img src="images/db_generate_code_surround.png" alt="envolver código na declaração if" style="border: 1px solid #55555;" /></p></body></html>
