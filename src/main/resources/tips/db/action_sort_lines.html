<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Ordenar linhas</b></p><p>Ao trabalhar com arquivos CSV ou procurar por valores duplicados, é possível usar a ação "<span class="control">Ordenar linhas</span> " para ordenar as linhas em ordem alfabética. Selecione as linhas a serem ordenadas e pressione <span class="shortcut">&shortcut:GotoAction;</span> e digite <span class="code_emphasis">Sort Lines</span> .</p><p class="image"><img src="images/tips_db_action_sort_lines.png" alt="Ordenar linhas alfabeticamente" style="border: 1px solid #55555;" /></p></body></html>
