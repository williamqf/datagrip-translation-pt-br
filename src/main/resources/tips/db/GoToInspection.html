<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Buscar inspeções de código</b></p><p>Para encontrar e executar uma inspeção rapidamente, pressione <span class="shortcut"> &shortcut:RunInspection;</span> e digite o nome da inspeção ou do grupo. Selecione uma inspeção na lista de candidatos e especifique o escopo. <p class="image"><img src="images/tips_db_gotoinspection.png" alt="run inspection by name" style="border: 1px solid #55555;" /></p></p></body></html>
