<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Expandir lista de colunas</b></p><p>Expanda com um asterisco (<span class="code_emphasis">*</span>) para que seja mostrada uma lista de todas as colunas da tabela. Se houver nomes de colunas conflitantes, estes serão qualificados.</p><p class="image"><img src="images/tips_db_expand_list_of_columns.png" alt="Expandir lista de colunas" style="border: 1px solid #55555;" /></p></body></html>
