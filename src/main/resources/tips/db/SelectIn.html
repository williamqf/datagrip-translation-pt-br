<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Selecionar no local</b></p><p>Para selecionar rapidamente o elemento atual sendo editado (tabela, arquivo ou campo) em outra visualização, pressione <span class="shortcut">&shortcut:SelectIn;</span> ou invoque "<span class="control">Navegar | Selecionar local de destino</span>".</p><p class="image"><img src="images/db_tips_selectin.png" alt="Janela pop-up Selecionar no local" style="border: 1px solid #55555;" /></p></body></html>
