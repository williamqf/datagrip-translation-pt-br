<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Preenchimento de código no editor de código</b></p><p>Para exibir as sugestões de preenchimento de código disponíveis no editor de código, clique duas vezes em uma célula e pressione <span class="shortcut">Ctrl+Espaço</span>.</p><p class="image"><img src="images/tips_db_code_completion_in_code_editor.png" alt="Code completion in the code editor" style="border: 1px solid #55555;" /></p></body></html>
