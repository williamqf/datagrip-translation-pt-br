<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Pesquisa por CamelCase em qualquer lugar</b></p><p>É possível usar CamelCase no campo de pesquisa "Pesquisa em qualquer lugar" (<span class="shortcut">Shift</span> pressionado duas vezes) para restringir a lista de resultados obtidos ao pesquisar por tabelas, arquivos ou símbolos.</p><p class="image"><img src="images/db_tips_camel_completion_search_everywhere.png" alt="Código de conclusão CamelCase" style="border: 1px solid #55555;" /></p></body></html>
