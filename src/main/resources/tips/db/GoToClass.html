<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Ir para tabela, exibição ou rotina</b></p><p>Para abrir rapidamente uma tabela, exibição ou rotina no editor, pressione <span class="shortcut">&shortcut:GotoClass;</span> (<span class="control">Navegar | Tabela/Exibição/Rotina</span>) e comece a digitar o nome da tabela, exibição ou rotina.</p><p class="image"><img src="images/db_tips_goto_class.png" alt="Ir para tabela, exibição ou rotina" style="border: 1px solid #55555;" /></p></body></html>
