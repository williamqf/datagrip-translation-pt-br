<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Histórico de pesquisa recente</b></p><p>Ao pesquisar strings de texto dentro de um arquivo, você pode utilizar o histórico de pesquisa recente. Pressione <span class="shortcut">&shortcut:Find;</span> para abrir a barra de pesquisa e <span class="shortcut">&shortcut:ShowSearchHistory;</span> para exibiruma lista de entradas recentes.</p><p class="image"><img src="images/db_searchhistory.png" alt="Histórico de pesquisa recente" style="border: 1px solid #55555;" /></p></body></html>
