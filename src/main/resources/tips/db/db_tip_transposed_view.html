<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Transpose table view</b></p><p>When you have a table with many columns and a few rows it may be more convenient to view and edit data using the transposed view. Transposed view flips rows and columns.</p><p class="image"><img src="images/tips_db_transposed_view.png" alt="Using a transposed view" style="border: 1px solid #55555;" /></p></body></html>
