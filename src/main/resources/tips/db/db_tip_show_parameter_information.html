<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Exibir informações do parâmetro</b></p><p>O popup "Informações do parâmetro" ("<span class="control">Exibir | Informações do parâmetro</span>" ou <span class="shortcut">&shortcut:ParameterInfo;</span>) permite que você verifique se os valores corretos foram passados para um parâmetro de um statement, procedimento ou função.</p><p class="image"><img src="images/tips_db_show_parameter_information.png" alt="Exibir informações do parâmetro" style="border: 1px solid #55555;" /></p></body></html>
