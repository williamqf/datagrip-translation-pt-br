<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Ir para a declaração</b></p><p>Para ir para a definição de uma coluna, tabela ou outro objeto, selecione o nome do objeto no código e depois vá para "<span class="control">Navegar | Declaração</span> <span class="shortcut">&shortcut:GotoDeclaration;</span>". Você também pode pressionar <span class="shortcut">Control</span> e clicar na referência.</p><p class="image"><img src="images/db_tips_gotodeclaration.png" alt="Ir para a declaração" style="border: 1px solid #55555;" /></p></body></html>
