<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Histórico local</b></p><p>Use o histórico local para acompanhar todas as alterações para um arquivo, classe, método ou trecho de código e reverter para um ponto estável, se necessário. Para exibir o histórico local, selecione <span class="control">Arquivo | Histórico local | Exibir histórico</span> no menu principal.</p></body></html>
