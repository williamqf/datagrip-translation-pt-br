<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Personalização da cor do código</b></p><p>Se não gostar da cor do código, pressione <span class="shortcut">&shortcut:GotoAction;</span>, digite <span class="code_emphasis">Jump</span> e clique em <span class="control">ir para esquema de cores e fontes</span>. Você será levado para uma página de configurações onde poderá alterar a cor do elemento de código na posição do cursor.</p></body></html>
