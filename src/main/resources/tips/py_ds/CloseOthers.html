<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Fechando abas do editor</b></p><p>Para fechar todas as abas do editor com exceção da aba atual, pressione a tecla <span class="shortcut">Alt</span> (Windows e Linux) ou <span class="shortcut">Alt (Option)</span> (macOS) e clique no botão <img src="images/app.expui.general.closeSmall.png" alt="the Close button"/> para fechar a aba atual do editor.</p></body></html>
