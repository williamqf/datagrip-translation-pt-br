<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Terminal integrado PyCharm</b></p><p>Você não precisa sair do PyCharm para trabalhar com seu shell favorito. Em vez disso, você pode usar o terminal local incorporado. Para abri-lo, pressione <span class="shortcut">&shortcut:ActivateTerminalToolWindow;</span> ou clique <img src="images/terminal.icons.expui.toolwindow.terminal.png" alt="o botão da janela de ferramenta Terminal"/></p><p class="image"><img src="images/py_tips_terminal.png" alt="Janela de ferramenta Terminal" style="border: 1px solid #55555;" /></p></body></html>
