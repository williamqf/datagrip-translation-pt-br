<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/dicas.css"></head><body><p><b>Navegar para declaração</b></p><p>Para navegar para a declaração de uma classe, método ou variável de seu uso, posicione o cursor no símbolo e pressione <span class="shortcut">&shortcut:GotoDeclaration;</span> (<span class="control">Navegar | Declaração ou Usos</span>).  Você também pode usar <span class="shortcut">Ctrl+Click</span> em um uso para ir para a declaração.</p><p class="image"><img src="images/py_dicas_ctrl_click.png" alt="Ir para Declaração com Ctrl/Cmd+Click" style="border: 1px solid #55555;" /></p></body></html>
