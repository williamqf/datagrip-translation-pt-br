<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Ordenar sugestões de preenchimento</b></p><p>Você pode ordenar sugestões de preenchimento por relevância ou alfabeticamente.</p><p>Para ordenar alfabeticamente, selecione a opção <span class="control">Ordenar por Nome</span>. Para ordenar por relevância, desmarque a caixa <span class="control">Ordenar por Nome</span>.</p><p class="image"><img src="images/py_tips_changeLookupSorting.png" alt="Alterar ordenação da pesquisa" style="border: 1px solid #55555;" /></p></body></html>
