<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Busque por inspeções de código</b></p><p>Para encontrar e rodar rapidamente uma inspeção, pressione <span class="shortcut">&shortcut:RunInspection;</span> e comece a digitar o nome da inspeção ou seu grupo. Escolha a inspeção na lista de sugestões e especifique o escopo. <p class="image"><img src="images/py_tips_go_to_inspection.png" alt="Rodar inspeção por nome" style="border: 1px solid #55555;" /></p></p></body></html>
