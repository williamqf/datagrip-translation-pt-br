<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Pesquise configurações e plugins</b></p><p>Digite <span class="code_emphasis">/</span> no campo de pesquisa da janela Pesquisar em qualquer lugar (pressione <span class="shortcut">Shift</span> duas vezes) para pesquisar um grupo de configurações, suas opções e plugins.</p><p class="image"><img src="images/py_tips_search_everywhere_settings.png" alt="Pesquisar em qualquer lugar: configurações, plugins, mapeamentos de URL" style="border: 1px solid #55555;" /></p></body></html>
