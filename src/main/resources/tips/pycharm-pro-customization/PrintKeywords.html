<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/dicas.css"></head><body><p><b>Palavras-chave para impressões</b></p><p>Para que suas impressões (<span class="control">Arquivo | Imprimir</span>) fiquem bonitas e informativas, use palavras-chave.</p><p>Por exemplo, use <span class="code_emphasis">$DATA$</span> e <span class="code_emphasis">$HORA$</span> para especificar a data e hora exata da impressão.</p></body></html>
