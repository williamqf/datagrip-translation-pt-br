<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Abre</b></p><p>Para navegar em qualquer parte do caminho do arquivo, <span class="shortcut">Ctrl+Click</span> (no Windows e Linux)/ <span class="shortcut">⌘Click</span> (no macOS) sua aba no editor. Selecione o elemento desejado e ele será aberto no navegador de arquivos.</p><p class="image"><img src="images/py_tips_navigateToFilePath.png" alt="Navegue até o caminho do arquivo" style="border: 1px solid #55555;" /></p></body></html>
