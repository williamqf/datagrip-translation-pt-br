<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Emmet</b></p><p>Use <span class="control">Emmet</span> para acelerar o desenvolvimento de HTML, XML ou CSS.</p><p> Na caixa de diálogo <span class="control">Configurações</span> (<span class="shortcut">&shortcut:ShowSettings;</span>), vá para <span class="control">Editor | Emmet</span> e selecione a caixa de seleção <span class="control">Habilitar Emmet</span> na página <span class="control">Emmet | HTML</span>, <span class="control">Emmet | CSS</span> ou <span class="control">Emmet | JSX</span>.</p></body></html>
