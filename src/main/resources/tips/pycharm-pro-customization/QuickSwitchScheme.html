<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Trocar esquema</b></p><p>Você pode aplicar uma nova formatação de código, esquema de cores ou mapeamento de teclas com um único atalho de teclado diretamente no editor. Pressione <span class="shortcut">&shortcut:QuickChangeScheme;</span> (<span class="control">Visualizar | Troca Rápida de Esquema</span>) para especificar o esquema para o qual você deseja alternar.</p></body></html>
