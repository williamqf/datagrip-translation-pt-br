<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Restaurar modelos ativos</b></p><p>Se você modificou um modelo ativo, ele ficará marcado com uma cor azul. Para reverter o modelo ao seu estado original, clique com o botão direito do mouse nele e escolha <span class="control">Restaurar padrões</span> no menu de contexto.</p></body></html>
