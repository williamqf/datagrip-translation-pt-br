<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Modo de seleção de colunas</b></p><p>Para selecionar um pedaço retangular de código, arraste o mouse enquanto pressiona  <span class="shortcut">Shift+Alt</span> (no Windows e Linux) /  <span class="shortcut">Shift+Alt (Option)</span> (no macOS) .</p><p class="image"><img src="images/py_tips_columnSelection.png" alt="Seleção de colunas" style="border: 1px solid #55555;" /></p></body></html>
