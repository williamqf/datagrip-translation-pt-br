<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Arquivos temporários</b></p><p>Scratch files são arquivos temporários que permitem que você experimente e prototipe no editor, sem criar nenhum arquivo de projeto.</p><p>Para criar um scratch file, pressione <span class="shortcut">&shortcut:NewScratchFile;</span>, e selecione a linguagem a ser utilizada.</p></body></html>
