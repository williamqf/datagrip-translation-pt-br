<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Remova tarefas</b></p><p>Ao trabalhar com uma lista ampla de tarefas, você não precisa removê-las uma por uma. Selecioner várias tarefas usando <span class="shortcut">Shift</span> ou <span class="shortcut">Control/Command</span>, clique na seta para direita e, em seguida, clique em <span class="control">Remover</span>.</p></body></html>
