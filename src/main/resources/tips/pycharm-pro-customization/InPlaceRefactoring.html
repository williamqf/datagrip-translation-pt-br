<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Renomeação In-Place</b></p><p>Quando você inicia a renomeação de qualquer elemento de código ou muda uma assinatura de método, o PyCharm exibe o ícone <img src="images/app.actions.refactoringBulb.png" alt="Ícone de refatoração in-place"/> na sarjeta. Clique no ícone da sarjeta e aplique quaisquer sugestões de alteração.</p><p class="image"><img src="images/py_rename_inline.png" alt="Renomeação in-place" style="border: 1px solid #55555;" /></p></body></html>
