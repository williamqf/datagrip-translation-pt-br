<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p>Se você deseja atualizar um pacote para o seu interpretador Python para qualquer versão de pré-lançamento (como beta ou release candidate), clique em <span class="control">Mostrar early releases</span> na caixa de diálogo <span class="control">Python Interpreter</span> (<span class="control">Settings | Project | Project Interpreter</span>) e prossiga com a atualização do pacote.</p></body></html>
