<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Separadores de método</b></p><p>Habilite linhas de separação entre métodos no editor para distinguir o corpo de cada método de relance. Na página <span class="control">Editor | Geral | Aparência</span> da caixa de diálogo <span class="control">Configurações</span> <span class="shortcut">&shortcut:ShowSettings;</span>, selecione a caixa de seleção <span class="control">Mostrar separadores de método</span>.</p><p class="image"><img src="images/py_methodseparators.png" alt="Mostrar separadores de método" style="border: 1px solid #55555;" /></p></body></html>
