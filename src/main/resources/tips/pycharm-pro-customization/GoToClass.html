<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p>Para abrir rapidamente qualquer classe no editor, pressione <span class="shortcut">&shortcut:GotoClass;</span> (<span class="control">Navegar | Classe</span>) e comece a digitar o nome da classe. Então, clique na classe da lista de sugestões.</p><p class="image"><img src="images/py_tips_goto_class.png" alt="Ir para Classe" style="border: 1px solid #55555;" /></p><p>Da mesma forma, você pode abrir qualquer arquivo no seu projeto usando <span class="shortcut">&shortcut:GotoFile;</span> (<span class="control">Navegar | Arquivo</span>).</p></body></html>
