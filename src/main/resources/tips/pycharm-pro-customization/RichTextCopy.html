<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Copiar como texto rico</b></p><p>Você pode copiar o texto do editor como texto rico para colá-lo em qualquer outro editor que reconheça RTF.</p><p>Verifique se a caixa de seleção <span class="control">Copiar como texto rico</span> está selecionada na página <span class="control">Editor | Geral</span> da caixa de diálogo <span class="control">Configurações</span> (<span class="shortcut">&shortcut:ShowSettings;</span>) </p></body></html>
