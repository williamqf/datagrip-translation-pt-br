<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Filtrar comentários TODO por escopos</b></p><p>Se você está trabalhando em um projeto grande contendo vários itens TODO, você pode filtrar esses itens por escopos.</p><p>Use a guia <span class="control">Baseado em Escopo</span> na janela de ferramentas <span class="control">TODO</span> para exibir apenas os itens que pertencem ao escopo de interesse.</br></p><p class="image"><img src="images/py_tips_todo_scopes.png" alt="TODO scopes" style="border: 1px solid #55555;" /></p></body></html>
