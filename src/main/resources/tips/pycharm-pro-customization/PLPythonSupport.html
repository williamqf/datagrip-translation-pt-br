<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p>PyCharm suporta inserções de <a href="https://www.postgresql.org/docs/14/plpython.html">linguagem PL/Python</a> para PostgreSQL nos operadores <span class="code_emphasis">CREATE FUNCTION</span> e <span class="code_emphasis">CREATE PROCEDURE</span>.</p><p>Defina <span class="code_emphasis">plpythonu</span> explicitamente como a linguagem da função para que o código Python seja destacado.</p><p>O código Python injetado deve ser recuado em relação à função contendo.</p><p class="image"><img src="images/py_plpy_support.png" alt="Inserção de código PL/Python destacada" style="border: 1px solid #55555;" /></p></body></html>
