<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Extraindo um método</b></p><p>A refatoração <span class="control">Extrair Método</span> cria um método a partir de um fragmento de código. Selecione um bloco de código e pressione <span class="shortcut">&shortcut:ExtractMethod;</span> (<span class="control">Refatorar | Extrair | Método</span>).</p></body></html>
