<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Mudar a porta do servidor web embutido</b></p><p>Para mudar a porta do servidor web embutido, na caixa de diálogo <span class="control">Settings</span> (<span class="shortcut">&shortcut:ShowSettings;</span>), vá para <span class="control">Build, Execution, Deployment | Debugger</span>) e configure o novo valor no campo <span class="control">Porta do servidor embutido</span>.</p></body></html>
