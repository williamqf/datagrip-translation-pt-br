<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Executar testes</b></p><p>Para executar rapidamente todos os métodos em uma classe de teste, clique em <img src="images/app.actions.runAll.png" alt="o botão Executar tudo"/> na sarjeta e selecione <span class="control">Executar '&lt;TestClass&gt;'</span>:</p><p>Para executar um único método, clique em <img src="images/app.actions.execute.png" alt="o botão Executar"/> na sarjeta.</p></body></html>
