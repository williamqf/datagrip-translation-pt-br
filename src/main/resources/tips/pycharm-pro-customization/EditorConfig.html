<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>EditorConfig para estilo do código</b></p><p>Você pode sobrescrever as configurações de estilo do código do IDE com as do EditorConfig (<a href="https://editorconfig.org/">https://editorconfig.org/</a>).</p><p>Crie um novo arquivo <span class="code_emphasis">.editorconfig</span> no nó em que você deseja alterar o estilo do código e especifique as novas configurações como desejar.</p><p class="image"><img src="images/py_tips_editor_config.png" alt="Configurações do EditorConfig" style="border: 1px solid #55555;" /></p></body></html>
