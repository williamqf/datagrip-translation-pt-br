<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Navegue para um símbolo</b></p><p>Para abrir uma classe, campo ou função de forma rápida no editor, pressione <span class="shortcut">&shortcut:GotoSymbol;</span> (<span class="control">Navegar | Símbolo</span>) e comece a digitar seu nome.</p><p class="image"><img src="images/py_tips_goto_symbol.png" alt="Ir para o Símbolo" style="border: 1px solid #55555;" /></p></body></html>
