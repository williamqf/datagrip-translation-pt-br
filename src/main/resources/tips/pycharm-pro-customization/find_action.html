<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Encontrar Ação</b></p><p>Se você não lembra o atalho para uma determinada ação, pressione <span class="shortcut">&shortcut:IrParaAção;</span> e comece a digitar o nome da ação. Para aplicar a ação, selecione-a na lista de sugestões. Um atalho é exibido próximo ao nome da ação.</p><p class="image"><img src="images/py_tips_find_action.png" alt="Encontrar ação" style="border: 1px solid #55555;" /></p></body></html>
