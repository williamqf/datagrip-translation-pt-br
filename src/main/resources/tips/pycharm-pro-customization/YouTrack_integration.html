<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Integre seu IDE com YouTrack</b></p><p>Gerencie seus projetos eficientemente com YouTrack. Se você tem uma instância YouTrack, você pode usar o plugin <span class="control">YouTrack Integration</span> para trabalhar com seus problemas diretamente no PyCharm.</p><p class="image"><img src="images/py_tips_youtrack_integration.png" alt="YouTrack integration" style="border: 1px solid #55555;" /></p><p>YouTrack é gratuito para equipes de 10 para sempre. <a href="https://www.jetbrains.com/youtrack/download/get_youtrack.html#section=incloud">Experimente YouTrack</a>.</p></body></html>
