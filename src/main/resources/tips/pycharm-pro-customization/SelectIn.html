<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Selecionar Em</b></p><p>Para selecionar rapidamente o elemento atualmente editado (uma classe, arquivo, método ou campo) em outra exibição, pressione <span class="shortcut">&shortcut:SelectIn;</span> ou chame <span class="control">Navegar | Selecionar Em</span>.</p><p class="image"><img src="images/py_tips-select_in.png" alt="Janela pop-up Selecionar Em" style="border: 1px solid #55555;" /></p></body></html>
