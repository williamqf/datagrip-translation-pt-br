<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/dicas.css"></head><body><p><b>Busca em diretórios aninhados</b></p><p>Você pode ir para um arquivo localizado em um diretório aninhado profundamente pressionando <span class="atalho">&atalho:IrParaArquivo;</span> e digitando vários caracteres dos diretórios envolventes e nome do arquivo. Use uma barra ou uma barra invertida como um delimitador.</p><p class="imagem"><img src="images/py_dicas_entrarDiretorio.png" alt="Encontre um arquivo" style="border: 1px solid #55555;" /></p></body></html>
