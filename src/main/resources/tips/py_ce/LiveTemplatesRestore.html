<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Restaurar Live Template</b></p><p>Quando um Live Template é modificado, ele será marcado em azul. Para restaurar o template ao seu estado original, clique com o botão direito no template e selecione "Restore in Default" no menu de contexto.</p></body></html>
