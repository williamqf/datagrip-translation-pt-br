<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Copiar como Texto Rico</b></p><p>Você pode copiar texto do editor como Texto Rico e colá-lo em outro editor que reconheça RTF.</p><p>Verifique se a caixa de seleção <span class="control">Copiar como Texto Rico</span> está marcada nas opções <span class="control">Editor | Geral</span> da caixa de diálogo <span class="control">Opções</span> (<span class="shortcut">&shortcut:ShowSettings;</span>).</p></body></html>
