<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Executar testes</b></p><p>Para executar todos os métodos de uma classe de teste rapidamente, clique em <img src="images/app.actions.runAll.png" alt="the Run All button"/> no gutter e selecione " <span class="control">Executar '&lt;TestClass&gt;'</span> ". </p><p>Para executar um único método, clique em <img src="images/app.actions.execute.png" alt="the Run button"/> no gutter.</p></body></html>
