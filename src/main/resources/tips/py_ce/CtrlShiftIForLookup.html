<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Definição rápida</b></p><p>Você pode chamar o <span class="control">Visualizador de definição rápida</span> (<span class="shortcut">&shortcut:QuickImplementations;</span>) para itens na lista de preenchimento de código, assim como para comandos de navegação para uma classe, arquivo ou símbolo.</p><p class="image"><img src="images/py_tips_ctrl_shift_in_lookup.png" alt="Definição rápida do Ctrl na lista de sugestões" style="border: 1px solid #55555;" /></p></body></html>
