<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Fechar guias do editor</b></p><p>Para fechar todas as guias do editor, exceto a atual, pressione <span class="shortcut">Alt</span> (Windows e Linux) ou <span class="shortcut">Alt (Option)</span> (macOS) e clique em <img src="images/app.expui.general.closeSmall.png" alt="o botão Fechar"/> na guia do editor atual.</p><p class="image"><img src="images/py_tips-close_others.png" alt="Fechar outras" style="border: 1px solid #55555;" /></p></body></html>
