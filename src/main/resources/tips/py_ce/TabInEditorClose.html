<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Fechar guias do editor</b></p><p>É possível fechar guias do editor e de ferramentas sem precisar usar comandos de menu de contexto. Para isso, clique na guia que deseja fechar com o botão do meio do mouse ou use <span class="shortcut">Shift+LeftClick</span>.</p></body></html>
