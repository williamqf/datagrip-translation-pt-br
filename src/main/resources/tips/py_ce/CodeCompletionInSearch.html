<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Preenchimento automático de código na barra de pesquisa</b></p><p>Ao pesquisar texto no arquivo atual <span class="shortcut">&shortcut:Find;</span>, basta pressionar <span class="shortcut">&shortcut:CodeCompletion;</span> na barra de pesquisa para não precisar digitar toda a string.</p><p class="image"><img src="images/py_tips_CodeCompletionInSearch.png" alt="Preenchimento automático de código na pesquisa" style="border: 1px solid #55555;" /></p></body></html>
