<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Filtrar comentários TODO por escopo</b></p><p>Quando você está trabalhando em um projeto grande com muitos itens TODO, você pode filtrá-los por escopo.</p><p>Use a aba "<span class="control">Com base no escopo</span>" na janela de ferramentas "<span class="control">TODO</span>" para ver apenas itens relevantes para o escopo no qual você está trabalhando.</p><p class="image"><img src="images/py_tips_todo_scopes.png" alt="escopos TODO" style="border: 1px solid #55555;" /></p></body></html>
