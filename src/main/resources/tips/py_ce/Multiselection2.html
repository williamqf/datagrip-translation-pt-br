<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Selecionar vários trechos de código</b></p><p>Para selecionar vários fragmentos de texto, segure <span class="shortcut">Shift+Alt+Ctrl</span> (Windows e Linux) ou <span class="shortcut">Shift+Alt (Option)+Cmd</span> (macOS) e arraste o mouse sobre o texto. </p><p class="image"><img src="images/py_tips_multiselection2.png" alt="Multiple selection" style="border: 1px solid #55555;" /></p></body></html>
