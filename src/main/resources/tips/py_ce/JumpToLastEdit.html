<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Navegar para a última alteração</b></p><p>Para retornar ao local em que você alterou o código pela última vez, pressione <span class="shortcut">&shortcut:JumpToLastChange;</span> ou selecione <span class="control">Navegar | Último local de edição</span> no menu principal.</p><p>Pressione <span class="shortcut">&shortcut:JumpToLastChange;</span> várias vezes para percorrer o histórico de alterações.</p></body></html>
