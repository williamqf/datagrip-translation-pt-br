<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Avaliar expressões</b></p><p>Na janela <span class="control">Encontre no Arquivo</span> (<span class="shortcut">Shift</span> 2 vezes), você pode avaliar expressões aritméticas simples.</p><p>Insira a expressão que você deseja avaliar no campo de pesquisa. O resultado da avaliação será exibido nos resultados da pesquisa.</p><p class="image"><img src="images/py_tips_evaluate_expression.png" alt="Avaliar expressão" style="border: 1px solid #55555;" /></p></body></html>
