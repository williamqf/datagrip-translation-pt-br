<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Ir para linha</b></p><p>É possível abrir uma linha específica de um arquivo no editor. Pressione <span class="shortcut">Atalho:GotoFile;</span> (<span class="control">Ir | Arquivo</span>), comece a digitar o nome do arquivo e, em seguida, digite <span class="code_emphasis">:</span> depois do número da linha.</p></body></html>
