<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Troca de esquema</b></p><p>No editor, com apenas um atalho do teclado, é possível aplicar um estilo de código, esquema de cores ou mapa de teclas diferente. Pressione <span class="shortcut">&shortcut:QuickChangeScheme;</span> (<span class="control">View | Quick Switch Scheme</span>) para especificar o esquema para a troca.</p></body></html>
