<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Búsqueda de Ações</b></p><p>Caso não lembre o atalho para uma ação, pressione <span class="shortcut">&shortcut:GotoAction;</span> para começar a digitar o nome da ação. Para aplicar a ação, selecione-a na lista de candidatos. O atalho é mostrado próximo ao nome da ação.</p><p class="image"><img src="images/tips_find_action.png" alt="Buscar ação" style="border: 1px solid #55555;" /></p></body></html>
