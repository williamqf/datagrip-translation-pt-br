<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Arquivo temporário</b></p><p>Um arquivo temporário permite que você experimente e crie protótipos de código no editor sem precisar criar um arquivo de projeto.</p><p>Para criar um arquivo temporário, pressione <span class="shortcut">&shortcut:NewScratchFile;</span> e selecione a linguagem que será usada.</p></body></html>
