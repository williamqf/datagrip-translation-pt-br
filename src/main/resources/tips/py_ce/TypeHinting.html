<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><span class="control">Dicas de tipo</span> permitem que você informe ao PyCharm qual tipo é necessário para parâmetros, variáveis locais, campos e valores de retorno.</p><p>O PyCharm pode fornecer sugestões de preenchimento de código para um determinado tipo se ele for especificado em um docstring ou anotação de tipo.</p><p class="image"><img src="images/py_tips_type_hinting_return.png" alt="Type Hinting" style="border: 1px solid #55555;" /></p></body></html>
