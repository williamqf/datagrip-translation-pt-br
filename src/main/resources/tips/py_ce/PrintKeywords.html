<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Palavras-chave para impressão</b></p><p>Para tornar suas impressões (<span class="control">Arquivo | Imprimir</span>) úteis e bonitas, utilize palavras-chave.</p><p>Por exemplo, você pode usar <span class="code_emphasis">$DATE$</span> e <span class="code_emphasis">$TIME$</span> para especificar a data e hora exatas no material impresso.</p></body></html>
