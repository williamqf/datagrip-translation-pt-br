<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Histórico de Busca</b></p><p>O histórico de busca pode ser usado para procurar sequências de texto em arquivos. Pressione <span class="shortcut">&shortcut:Find;</span> para abrir a barra de busca e pressione <span class="shortcut">&shortcut:ShowSearchHistory;</span> para mostrar uma lista de entradas recentes.</p><p class="image"><img src="images/py_tips_recentSearch.png" alt="Histórico de Busca" style="border: 1px solid #55555;" /></p></body></html>
