<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Busca de inspeção de código</b></p><p>Para encontrar e executar uma inspeção rapidamente, pressione <span class="shortcut">&shortcut:RunInspection;</span> e digite o nome da inspeção ou seu grupo. Selecione a inspeção na lista de candidatos e especifique o escopo. <p class="image"><img src="images/py_tips_go_to_inspection.png" alt="Executar inspeção por nome" style="border: 1px solid #55555;" /></p></p></body></html>
