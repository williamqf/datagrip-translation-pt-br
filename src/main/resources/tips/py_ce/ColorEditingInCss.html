<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Configuração de cores em arquivos CSS</b></p><p>No PyCharmCommunity, é fácil especificar cores em arquivos CSS. Na sarjeta do editor, há um ícone colorido que corresponde à propriedade <span class="code_emphasis">color</span>. Ao clicar nesse ícone, você pode usar o seletor de cores para escolher a cor desejada.</p><p class="image"><img src="images/py_tips_cssColor.png" alt="CSS color" style="border: 1px solid #55555;" /></p></body></html>
