<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Editar tags simultaneamente</b></p><p>As tags de início e fim de arquivos XML / HTML podem ser editadas simultaneamente.</p><p>Na página "Configurações" (<span class="shortcut">&shortcut:ShowSettings;</span>) seção "Configurações<span class="control"> | Geral | Teclas de atalho | HTML/CSS</span>", confirme que a opção "Editar &lt;tag&gt;&lt;/tag&gt; simultaneamente" esteja ativada.</p></body></html>
