<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Customização de cores do código</b></p><p>Caso não goste das cores do código, pressione <span class="shortcut">&shortcut:GotoAction;</span>, digite <span class="code_emphasis">Jump</span> e então clique em "<span class="control">Ir para cores e fontes</span>". Isso o levará para a página de configuração, onde você poderá alterar a cor do elemento do código na posição do cursor.</p></body></html>
