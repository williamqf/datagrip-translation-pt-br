<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Modo de Seleção de Colunas</b></p><p>Para selecionar um retângulo de código, pressione <span class="shortcut">Shift+Alt</span> (Windows e Linux) / <span class="shortcut">Shift+Alt (Option) </span> (macOS) e arraste o mouse.</p><p class="image"><img src="images/py_tips_columnSelection.png" alt="Seleção de colunas" style="border: 1px solid #55555;" /></p></body></html>
