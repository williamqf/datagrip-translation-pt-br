<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Completar nome de tag XML</b></p><p>Pressione <span class="shortcut">&shortcut:CodeCompletion;</span> duas vezes para completar o nome de tag XML de um namespace que não foi declarado no arquivo atual. Se o namespace ainda não foi declarado, uma declaração será gerada automaticamente.</p><p class="image"><img src="images/ps_tips-tagNameCompletion.png" alt="Completar nome de tag" style="border: 1px solid #55555;" /></p></body></html>
