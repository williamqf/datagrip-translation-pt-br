<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Selecione em local</b></p><p>Para selecionar o elemento atualmente em edição (classe, arquivo, método ou campo) em outra exibição, pressione <span class="shortcut">&shortcut:SelectIn;</span> ou acesse <span class="control">Navegação | Selecionar local</span>。</p></body></html>
