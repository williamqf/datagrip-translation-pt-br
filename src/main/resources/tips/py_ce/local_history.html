<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Histórico Local</b></p><p>O Histórico Local permite que você acompanhe todas as alterações em um arquivo, classe, método ou trecho de código, e as reverta a um ponto estável conforme necessário. Para exibir o Histórico Local, selecione "<span class="control">Arquivo | Histórico Local | Mostrar Histórico</span>" no menu principal.</p></body></html>
