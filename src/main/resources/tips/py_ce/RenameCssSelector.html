<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Alteração do nome dos seletores CSS no HTML</b></p><p>Você pode alterar o nome de seletores CSS diretamente no HTML. Posicione o cursor no seletor cujo nome você deseja alterar e pressione <span class="shortcut">&shortcut:RenameElement;</span>.</p><p class="image"><img src="images/ps_tips-RenameCssSelector.png" alt="Alteração do nome de um seletor CSS" style="border: 1px solid #55555;" /></p></body></html>
