<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Arraste e solte um arquivo CSV para criar uma tabela</b></p><p>Para adicionar dados de um arquivo CSV, arraste e solte o arquivo no nó "<span class="control">Tabelas</span>" da fonte de dados ou na tabela.</p><p>Arquivos CSV e TSV podem ser exibidos como texto ou tabela.</p></body></html>
