<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Executando uma query</b></p><p>Para executar uma query, clique com o botão direito do mouse na query e selecione "<span class="control">Executar</span>" ou use o atalho (Cmd + Enter no macOS, Ctrl + Enter no Windows e Linux).</p><p class="image"><img src="images/db_pl_tips_DBRunQuery.png" alt="Executando uma query de um console de query" style="border: 1px solid #55555;" /></p></body></html>
