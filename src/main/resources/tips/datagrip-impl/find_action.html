<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Encontrar Ação</b></p><p>Caso não se lembre de um atalho que chama uma ação, pressione <span class="shortcut">&shortcut:AçãoIr;</span> e comece a digitar o nome da ação. Para aplicar a ação, selecione-a da lista de sugestões. Um atalho é exibido perto do nome da ação.</p><p class="image"><img src="images/db_tips_find_action.png" alt="Encontrar ação" style="border: 1px solid #55555;" /></p></body></html>
