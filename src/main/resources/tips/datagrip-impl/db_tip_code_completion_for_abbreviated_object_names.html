<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Preenchimento de código para nomes abreviados</b></p><p>Preencha nomes de objeto escritos em camelCase, nomes-de-objetos-hífenados ou nomes_com_sublinhado. Para iniciar o preenchimento de código, use as primeiras letras das palavras no nome.</p></body></html>
