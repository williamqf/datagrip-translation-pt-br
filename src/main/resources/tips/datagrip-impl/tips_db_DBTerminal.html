<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Plugin do Terminal</b></p><p>Você pode instalar o plugin do Terminal e então usar o Terminal diretamente no DataGrip.</p><p>Para instalar um plugin, abra <span class="control">Settings</span> <span class="shortcut">&shortcut:ShowSettings;</span> e navegue até <span class="control">Plugins</span>. Digite <span class="control">Terminal</span> no campo de pesquisa e clique em <span class="control">Install</span>.</p><p class="image"><img src="images/tips_db_DBTerminal.png" alt="Instale o plugin do Terminal" style="border: 1px solid #55555;" /></p></body></html>
