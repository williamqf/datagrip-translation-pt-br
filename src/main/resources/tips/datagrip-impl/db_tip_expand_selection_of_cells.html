<html><head><meta charset="UTF-8"><link href="css/tips.css" rel="stylesheet"></head><body><p><b>Expandir seleção de células</b></p><p>Você pode expandir a seleção (<span class="shortcut">&shortcut:EditorSelectWord;</span>) de itens a partir de uma célula para uma coluna, uma linha ou toda a tabela.</p><p>Como alternativa, para reduzir a seleção, pressione <span class="shortcut">&shortcut:EditorUnSelectWord;</span>.</p><p class="image"><img src="images/tips_db_expand_selection_of_cells.png" alt="Expandir seleção de células" style="border: 1px solid #55555;" /></p></body></html>
