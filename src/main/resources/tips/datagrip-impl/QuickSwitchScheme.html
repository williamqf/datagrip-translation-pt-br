<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Alterar esquema</b></p><p>Você pode aplicar um estilo de código, esquema de cores ou mapa de teclas diferente com apenas uma tecla de atalho diretamente do editor. Pressione <span class="shortcut">&shortcut:QuickChangeScheme;</span> (<span class="control">Visualizar | Trocar Esquema Rapidamente</span>) para especificar o esquema para o qual deseja alternar.</p></body></html>
