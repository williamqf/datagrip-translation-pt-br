<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Organizar sugestões de preenchimento automático</b></p><p>Você pode organizar sugestões de preenchimento automático por relevância ou alfabeticamente.</p><p>Para organizar alfabeticamente, selecione a opção <span class="control">Organizar por Nome</span>. Para organizar por relevância, desmarque a caixa de seleção <span class="control">Organizar por Nome</span>.</p><p class="image"><img src="images/db_change_lookup_sorting.png" alt="Alterar ordenação de pesquisa" style="border: 1px solid #55555;" /></p></body></html>
