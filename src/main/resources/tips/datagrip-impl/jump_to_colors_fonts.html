<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Personalizar cor do código</b></p><p>Se você não gosta da cor do seu código, pressione <span class="shortcut">&shortcut:GotoAction;</span>, digite <span class="code_emphasis">Jump</span>, e clique <span class="control">Jump to Colors and Fonts</span>. Você será levado para uma página de configurações onde poderá modificar a cor do elemento do código ao lado do cursor.</p></body></html>
