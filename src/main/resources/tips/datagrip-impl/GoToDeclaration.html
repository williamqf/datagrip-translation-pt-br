<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Navegar para declaração</b></p><p>Para ir à definição de uma coluna, tabela ou qualquer outro objeto, selecione o nome do objeto em seu código e navegue para <span class="control">Navegar | Declaração</span> <span class="shortcut">&shortcut:GotoDeclaration;</span>. Alternativamente, pressione <span class="shortcut">Ctrl</span> e clique em uma referência.</p><p class="image"><img src="images/db_tips_gotodeclaration.png" alt="Ir para declaração" style="border: 1px solid #55555;" /></p></body></html>
