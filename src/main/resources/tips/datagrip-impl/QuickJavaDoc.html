<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Documentação rápida do código</b></p><p>Para visualizar rapidamente a documentação de uma tabela ou uma coluna no cursor, pressione <span class="shortcut">&shortcut:QuickJavaDoc;</span> (<span class="control">Exibir | Documentação rápida</span>).</p><p class="image"><img src="images/tips_db_tod_1_quick_doc.png" alt="Exibir documentação rápida" style="border: 1px solid #55555;" /></p></body></html>
