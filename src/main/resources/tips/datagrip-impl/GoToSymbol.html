<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Navegar para um símbolo</b></p><p>Para abrir rapidamente uma tabela, um arquivo ou um símbolo, pressione <span class="shortcut">&shortcut:GotoSymbol;</span> (<span class="control">Navegar | Símbolo</span>) e comece a digitar seu nome. Selecione um símbolo da lista de sugestões.</p><p class="image"><img src="images/db_goto_symbol.png" alt="Ir para símbolo" style="border: 1px solid #55555;" /></p></body></html>
