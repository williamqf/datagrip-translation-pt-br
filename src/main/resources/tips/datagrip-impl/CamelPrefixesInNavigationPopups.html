<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Maiúsculas e minúsculas nas pesquisas em qualquer lugar</b></p><p>Use a combinação de letras maiúsculas e minúsculas no popup <span class="control">Pesquisar em qualquer lugar</span> (pressionar duas vezes <span class="shortcut">Shift</span>) para filtrar a lista de resultados quando procurar uma tabela, arquivo ou símbolo.</p><p class="image"><img src="images/db_tips_camel_completion_search_everywhere.png" alt="Preenchimento automático com combinação de letras maiúsculas e minúsculas" style="border: 1px solid #55555;" /></p></body></html>
