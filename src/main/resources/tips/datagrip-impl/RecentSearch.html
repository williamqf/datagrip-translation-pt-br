<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Histórico de pesquisa recente</b></p><p>Ao pesquisar por uma string de texto em um arquivo, use o histórico de pesquisa recente. Pressione <span class="shortcut">&shortcut:Find;</span> para abrir a barra de pesquisa e então pressione <span class="shortcut">&shortcut:ShowSearchHistory;</span> para mostrar a lista de entradas recentes.</p><p class="image"><img src="images/db_searchhistory.png" alt="Histórico de pesquisa recente" style="border: 1px solid #55555;" /></p></body></html>
