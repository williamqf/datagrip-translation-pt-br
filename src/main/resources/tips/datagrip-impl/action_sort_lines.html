<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Ordenar linhas</b></p><p>Quando você trabalha com arquivos CSV ou quer encontrar valores duplicados, ordene as linhas alfabeticamente usando a ação <span class="control">Ordenar linhas</span>. Selecione as linhas que você quer ordenar, pressione <span class="shortcut">&shortcut:GotoAction;</span> e digite <span class="code_emphasis">Ordenar linhas</span>.</p><p class="image"><img src="images/tips_db_action_sort_lines.png" alt="Ordenar linhas alfabeticamente" style="border: 1px solid #55555;" /></p></body></html>
