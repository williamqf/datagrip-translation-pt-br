<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Ordem de classificação natural</b></p><p>Se você desativar a opção <span class="control">Alfabeticamente</span> nas opções de exibição do <span class="control">Database Explorer</span>, a ordem de classificação natural será aplicada aos objetos.</p><p>A captura de tela a seguir mostra a ordem das tabelas quando a opção <span class="control">Alfabeticamente</span> está desativada.</p><p class="image"><img src="images/db_tips_natural_sort_order.png" alt="Ordem de classificação natural" style="border: 1px solid #55555;" /></p></body></html>
