<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Visualização transposta para tabelas</b></p><p>Quando você tem muitas colunas e apenas algumas linhas, uma visualização transposta pode ajudá-lo a ver seus dados de uma forma mais amigável. Em uma visualização transposta, colunas e linhas são intercambiadas.</p><p class="image"><img src="images/tips_db_transposed_view.png" alt="Usando uma visualização transposta" style="border: 1px solid #55555;" /></p></body></html>
