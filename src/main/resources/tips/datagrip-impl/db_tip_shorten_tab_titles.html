<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Encurtar Títulos de Abas</b></p><p>Por padrão, a opção <span class="control">Encurtar Títulos de Aba</span> está habilitada. O nome da fonte de dados na aba é encurtado para 36 caracteres.</p><p>Para desabilitar esta funcionalidade, clique com o botão direito em uma aba de um console de consulta e selecione <span class="control">Encurtar Títulos de Aba</span>.</p><p class="image"><img src="images/db_tips_shorten_tab_titles.png" alt="Encurtar Títulos de Aba" style="border: 1px solid #55555;" /></p></body></html>
