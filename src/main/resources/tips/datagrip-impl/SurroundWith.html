<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Envolva fragmentos de código</b></p><p>Você pode rapidamente envolver um bloco de código em construções úteis. Selecione-o no editor e pressione <span class="shortcut">&shortcut:SurroundWith;</span> (<span class="control">Código | Surround With</span>).</p><p>A lista de opções ou wrappers disponíveis é sensível ao contexto e depende da linguagem. </p><p class="image"><img src="images/db_generate_code_surround.png" alt="envolver código na declaração if" style="border: 1px solid #55555;" /></p></body></html>
