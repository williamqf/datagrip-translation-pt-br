<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Expandir uma lista de colunas</b></p><p>Expanda um asterisco (<span class="code_emphasis">*</span>) para uma lista de todas as colunas que estão disponíveis numa tabela. No caso de conflitos entre nomes de colunas, estes nomes de colunas são qualificados.</p><p class="image"><img src="images/tips_db_expand_list_of_columns.png" alt="Expandir uma lista de colunas" style="border: 1px solid #55555;" /></p></body></html>
