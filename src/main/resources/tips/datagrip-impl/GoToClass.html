<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Navegue para uma tabela, uma <i>view</i> ou uma rotina</b></p><p>Para abrir rapidamente qualquer tabela, <i>view</i> ou rotina no editor, pressione <span class="shortcut">&shortcut:GotoClass;</span> (<span class="control">Navegar | Tabela/<i>View</i>/Rotina</span>) e comece a digitar o nome da tabela, da <i>view</i> ou da rotina. </p><p class="image"><img src="images/db_tips_goto_class.png" alt="Vá para uma tabela, <i>View</i> ou uma rotina" style="border: 1px solid #55555;" /></p></body></html>
