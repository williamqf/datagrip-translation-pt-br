<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Preenchimento Automático de Nomes de Tag XML</b></p><p>Pressione <span class="shortcut">&shortcut:CodeCompletion;</span> duas vezes para preencher automaticamente os nomes de tag XML em namespaces que não estão declarados no arquivo atual. Se o namespace ainda não estiver declarado, a declaração será gerada automaticamente.</p><p class="image"><img src="images/go_tips_tagNameCompletion.png" alt="Completar nome de tag" style="border: 1px solid #55555;" /></p></body></html>
