<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Modo somente leitura para tabelas</b></p><p>Para proteger uma tabela contra modificações acidentais, você pode torná-la somente leitura. Para ativar o modo somente leitura, clique em <img src="images/app.ide.readwrite.png" alt="Modo de leitura e escrita"/> no canto inferior direito do workspace.</p><p class="image"><img src="images/tips_db_read_only_for_table.png" alt="Somente leitura para a tabela" style="border: 1px solid #55555;" /></p></body></html>
