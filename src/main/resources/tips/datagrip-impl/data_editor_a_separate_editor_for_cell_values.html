<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p>Pode formatar cadeias XML e JSON de uma linha num editor em separado para valores de célula.</p><p>Além disso, pode obter uma pré-visualização das imagens no editor de valores. Note que o tamanho LOB está limitado a 1024 bytes. Pode alterar este valor em <span class="control">Base de dados | Editor e visualizador de dados</span>.</p><p class="image"><img src="images/db_separate_editor_for_cell_values.png" alt="Um editor separado para valores de célula" style="border: 1px solid #55555;" /></p></body></html>
