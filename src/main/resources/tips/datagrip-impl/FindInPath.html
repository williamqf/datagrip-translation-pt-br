<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Visualização de resultados da pesquisa</b></p><p>Você pode usar a área de <span class="control">Visualização</span> da caixa de diálogo <span class="control">Find in Files</span> (<span class="shortcut">&shortcut:FindInPath;</span>) para uma pesquisa mais rápida, sem sair da caixa de diálogo. A caixa de diálogo <span class="control">Visualização</span> exibe os primeiros 100 resultados.</p></body></html>
