<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Exibir hierarquia de herança</b></p><p>Para visualizar a hierarquia de herança de uma classe selecionada, pressione <span class="shortcut">&shortcut:TypeHierarchy;</span> (<span class="control">Navegar | Hierarquia de tipos</span>). Também é possível chamar a exibição de hierarquia diretamente do editor para ver a hierarquia da classe em edição.</p><p class="image"><img src="images/ps_tips-hierarchy_browser.png" alt="Navegador de hierarquia de tipos" style="border: 1px solid #55555;" /></p></body></html>
