<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Comentando e descomentando código</b></p><p>Você pode comentar e descomentar linhas de código e blocos de código utilizando atalhos:</p><p><span class="shortcut">&shortcut:CommentByLineComment;</span>: Para comentários de uma única linha (<span class="code_emphasis">//...</span>)</p><p><span class="shortcut">&shortcut:CommentByBlockComment;</span>: Para comentários de bloco (<span class="code_emphasis">/*...*/</span>)</p></body></html>
