<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Renomear seletor CSS no HTML</b></p><p>É possível renomear seletor CSS diretamente no HTML. Posicione o cursor no seletor que deseja renomear e pressione <span class="shortcut">&shortcut:RenameElement;</span>.</p><p class="image"><img src="images/ps_tips-RenameCssSelector.png" alt="Renomear um seletor CSS" style="border: 1px solid #55555;" /></p></body></html>
