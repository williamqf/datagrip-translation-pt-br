<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Exibição da descrição da opção de menu</b></p><p>Para descobrir o propósito de um item no menu principal, passe o mouse sobre ele. A barra de status na parte inferior da janela do aplicativo exibirá uma breve descrição do item.</p></body></html>
