<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Selectionar em local</b></p><p>Para selecionar rapidamente o elemento atualmente editado (classe, arquivo, método ou campo) em outra exibição, pressione <span class="shortcut">&shortcut:SelectIn;</span> ou invoque "<span class="control">Navegar | Selecionar no destino</span>".</p><p class="image"><img src="images/ps_tips-select_in.png" alt="Popup Selecionar em" style="border: 1px solid #55555;" /></p></body></html>
