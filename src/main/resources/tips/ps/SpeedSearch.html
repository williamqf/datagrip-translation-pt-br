<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Busca rápida em árvore de diretórios</b></p><p>A busca rápida pode ser usada em todas as árvores de diretório, como na tool window "<span class="control">Projeto</span>". Ao começar a digitar, os itens necessários são localizados imediatamente.</p><p class="image"><img src="images/ps_tips-speed_search.png" alt="Busca rápida" style="border: 1px solid #55555;" /></p></body></html>
