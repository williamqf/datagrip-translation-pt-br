<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Histórico de Pesquisa Recentes</b></p><p>Ao pesquisar strings de texto em arquivos, você pode usar o histórico de pesquisa recente. Pressione <span class="shortcut">&shortcut:Find;</span> para abrir a barra de pesquisa e <span class="shortcut">&shortcut:ShowSearchHistory;</span> para exibir uma lista de entradas recentes.</p><p class="image"><img src="images/ps_tips-recentSearch.png" alt="Histórico de pesquisa recente" style="border: 1px solid #55555;" /></p></body></html>
