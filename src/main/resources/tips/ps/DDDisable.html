<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Movendo por arrastar e soltar</b></p><p>Ao habilitar &quot;<span class="control">Habilitar arrastar e soltar somente quando Alt for pressionado</span>&quot; em &quot;<span class="control">Configurações | Aparência e comportamento | Aparência | Opções da interface do usuário</span>&quot;, você pode evitar mover botões de janelas de ferramentas e guias do editor acidentalmente.</p><p class="image"><img src="images/ps_tips-dddisable.png" alt="Drag-n-Drop with ALT pressed only option" style="border: 1px solid #55555;" /></p></body></html>
