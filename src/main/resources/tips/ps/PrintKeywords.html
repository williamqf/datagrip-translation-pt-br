<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Palavras-chave para impressão</b></p><p>Para tornar informativas e visualmente atraentes as impressões (<span class="control">Arquivo | Imprimir</span>), utilize palavras-chave.</p><p>Por exemplo, utilizando <span class="code_emphasis">$DATE$</span> e <span class="code_emphasis">$TIME$</span>, pode especificar a data e hora exatas na impressão.</p></body></html>
