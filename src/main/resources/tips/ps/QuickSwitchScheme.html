<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Mudar o esquema</b></p><p>A partir do editor e com apenas um atalho do teclado, você pode aplicar diferentes estilos de código, esquemas de cores ou mapeamentos de teclado. Pressione <span class="shortcut">&shortcut:QuickChangeScheme;</span> ( <span class="control">Exibir | Alterar esquema rapidamente</span>) e especifique para qual esquema você deseja alterar.</p></body></html>
