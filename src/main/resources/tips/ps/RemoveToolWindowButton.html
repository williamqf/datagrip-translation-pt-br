<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Ocultar as barras de ferramentas</b></p><p>É possível ocultar barras de ferramentas que não são necessárias no momento.</p><p>Clique com o botão direito do mouse na barra de ferramentas que você deseja ocultar e selecione "<span class="control">Remover da barra lateral</span> ".</p><p class="image"><img src="images/ps_tips-remove_from_sidebar.png" alt="Remover uma barra de ferramentas da barra lateral" style="border: 1px solid #55555;" /></p></body></html>
