<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Fechando abas do Editor</b></p><p>É possível fechar abas de editores e ferramentas sem utilizar os comandos do menu de contexto. Para isso, clique na aba que deseja fechar utilizando o botão central do mouse ou o atalho <span class="shortcut">Shift + clique esquerdo</span>.</p></body></html>
