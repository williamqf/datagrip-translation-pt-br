<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Personalização de cores de código</b></p><p>Se você não gosta das cores do código, pressione <span class="shortcut">&shortcut:GotoAction;</span>, digite <span class="code_emphasis">Jump</span> e clique em "<span class="control">Ir para cores e fontes</span>". Você será levado para a página de configurações onde poderá alterar as cores dos elementos do código na posição do cursor.</p></body></html>
