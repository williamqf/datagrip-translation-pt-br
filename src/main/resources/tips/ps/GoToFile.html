<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Ir para arquivo</b></p><p>Para abrir um arquivo rapidamente, pressione <span class="shortcut">&shortcut:GotoFile;</span> (<span class="control">Navegação | Arquivo</span>) e comece a digitar o nome do arquivo. Use o ícone de filtro para pesquisar somente os tipos de arquivo selecionados:</p><p class="image"><img src="images/ps_tips-goto_file.png" alt="Ir para arquivo" style="border: 1px solid #55555;" /></p></body></html>
