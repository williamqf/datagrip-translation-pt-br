<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Arquivos Rascunho</b></p><p>Arquivos Rascunho são arquivos temporários que permitem experimentar e prototipar código no editor sem criar um arquivo de projeto.</p><p>Para criar um Arquivo Rascunho, pressione <span class="shortcut">&shortcut:NewScratchFile;</span> e depois selecione a linguagem a ser utilizada.</p><p class="image"><img src="images/ps_tips-scratch.png" alt="Arquivos Rascunho" style="border: 1px solid #55555;" /></p></body></html>
