<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Acessando janelas de ferramentas rapidamente</b></p><p>Passe o mouse pelo  <img src="images/app.general.tbHidden.png" alt="the Tool windows icon"/> no canto inferior esquerdo da janela do PhpStorm para acessar rapidamente janelas de ferramentas disponíveis.</p><p>Uma lista de janelas de ferramentas será exibida e você poderá selecionar a desejada:</p><p class="image"><img src="images/ps_tips-showToolWindows.png" alt="Tool windows list" style="border: 1px solid #55555;" /></p></body></html>
