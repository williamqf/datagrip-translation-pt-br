<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Substituindo caracteres especiais</b></p><p>Os caracteres especiais em arquivos XML ou HTML podem ser substituídos por valores ASCII iniciados por apóstrofo. Para fazê-lo, selecione os caracteres e, no menu principal, selecione <span class="control">Editar | Codificar caracteres especiais XML/HTML</span> .</p></body></html>
