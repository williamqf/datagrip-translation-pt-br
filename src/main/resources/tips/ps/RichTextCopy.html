<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Copiar como RichText</b></p><p>Você pode copiar texto do editor como RichText e colar em outros editores que reconheçam o formato RTF.</p><p>Verifique se a caixa de seleção <span class="control">Copiar como RichText</span> está marcada na página <span class="control">Editor | Geral</span> da caixa de diálogo <span class="control">Configurações</span> (<span class="shortcut">&shortcut:ShowSettings;</span>).</p></body></html>
