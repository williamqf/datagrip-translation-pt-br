<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Sugestão de código durante a pesquisa</b></p><p>Ao buscar um texto, no arquivo atual <span class="shortcut">&shortcut:Find;</span>, pressione <span class="shortcut">&shortcut:CodeCompletion;</span> na barra de pesquisa para não precisar digitar a sequência inteira de caracteres.</p><p class="image"><img src="images/ps_tips-CodeCompletionInSearch.png" alt="Preenchimento automático de código na pesquisa" style="border: 1px solid #55555;" /></p></body></html>
