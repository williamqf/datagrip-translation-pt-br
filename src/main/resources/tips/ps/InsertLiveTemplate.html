<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Exibir Live Templates Disponíveis</b></p><p>Se não lembrar da abreviatura do Live Template, pressione <span class="shortcut">&shortcut:InsertLiveTemplate;</span> para ver uma lista de sugestões para o contexto atual. Por exemplo, digite <span class="code_emphasis">it</span> e pressione <span class="shortcut">&shortcut:InsertLiveTemplate;</span> para ver o que acontece.</p><p class="image"><img src="images/ps_tips-insert_live_template.png" alt="Insert live template" style="border: 1px solid #55555;" /></p></body></html>
