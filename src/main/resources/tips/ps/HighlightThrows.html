<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Destacando statements que podem lançar exceções</b></p><p>Você pode exibir todos os statements em um método que pode lançar uma exceção específica. Posicione o cursor dentro da tag <span class="code_emphasis">@throws</span> do PHPDoc do método e pressione <span class="shortcut">&shortcut:HighlightUsagesInFile;</span>. Isso também funciona com <span class="code_emphasis">try</span> e <span class="code_emphasis">catch</span>.</p><p class="image"><img src="images/ps_tips-highlightExceptions.png" alt="Highlight caught exceptions" style="border: 1px solid #55555;" /></p></body></html>
