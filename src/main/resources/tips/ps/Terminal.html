<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Terminal embutido do PhpStorm</b></p><p>Não é preciso fechar o PhpStorm para trabalhar com o seu shell preferido. Ao invés disso, você pode usar o terminal local embutido. Para abrir o terminal local, pressione <span class="shortcut">&shortcut:ActivateTerminalToolWindow;</span> ou clique em <img src="images/terminal.icons.expui.toolwindow.terminal.png" alt="o botão da janela de ferramenta do Terminal"/>.</p><p class="image"><img src="images/ps_tips-terminal.png" alt="Terminal tool window" style="border: 1px solid #55555;" /></p></body></html>
