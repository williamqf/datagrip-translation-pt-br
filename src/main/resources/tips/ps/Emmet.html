<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Emmet</b></p><p><span class="control">Emmet</span> pode acelerar o desenvolvimento HTML, XML ou CSS.</p><p>No diálogo "Configurações" (<span class="shortcut">&shortcut:ShowSettings;</span>), vá para "Editor | Emmet" e marque a caixa de seleção "Habilitar Emmet" na página "Emmet | HTML", "Emmet | CSS" ou "Emmet | JSX".</p><p class="image"><img src="images/ps_tips-emmet.png" alt="Configurações Emmet" style="border: 1px solid #55555;" /></p></body></html>
