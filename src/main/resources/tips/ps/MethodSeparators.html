<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Separador de Métodos</b></p><p>Habilite o separador de métodos no editor para distinguir visualmente o corpo dos métodos de forma rápida: Na caixa de diálogo " <span class="control">Configurações</span> ", na aba "<span class="control">Editor | Geral | Aparência</span> " ( <span class="shortcut">&shortcut:ShowSettings;</span> ), selecione a checkbox "<span class="control">Mostrar separadores de métodos</span> ".</p><p class="image"><img src="images/ps_tips-method_separator.png" alt="Opção Mostrar separadores de métodos" style="border: 1px solid #55555;" /></p></body></html>
