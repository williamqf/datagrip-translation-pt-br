<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Localizar Usos</b></p><p><span class="shortcut">&shortcut:FindUsages;</span> pressione para encontrar rapidamente todas as ocorrências de código que fazem referência ao símbolo no local do cursor. Não importa se o símbolo é uma classe, método, campo, parâmetro ou faz parte de outra declaração.</p><p class="image"><img src="images/ps_tips_get_started_find_usages.png" alt="Localizar usos" style="border: 1px solid #55555;" /></p></body></html>
