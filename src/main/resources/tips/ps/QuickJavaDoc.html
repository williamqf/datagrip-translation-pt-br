<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Documentação rápida do código</b></p><p>Para exibir rapidamente a documentação da classe ou do método na posição do cursor, pressione <span class="shortcut">&shortcut:QuickJavaDoc;</span> (<span class="control">Exibir | Documentação rápida</span>).</p><p class="image"><img src="images/ps_tips-quick_javadoc.png" alt="Exibir documentação rápida" style="border: 1px solid #55555;" /></p></body></html>
