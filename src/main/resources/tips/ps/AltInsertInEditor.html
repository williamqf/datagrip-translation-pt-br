<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Geração de código</b></p><p>O PhpStorm pode gerar métodos getter e setter correspondentes aos campos em uma classe. Para fazer isso, com o cursor na classe, pressione <span class="shortcut">&shortcut:Generate;</span> (<span class="control">Código | Gerar</span>).</p><p class="image"><img src="images/ps_tips-alt_insert_in_editor.png" alt="Gerar getter e setter" style="border: 1px solid #55555;" /></p></body></html>
