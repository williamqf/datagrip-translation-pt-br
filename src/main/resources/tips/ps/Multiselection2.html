<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Seleção de várias localidades no código</b></p><p>Para selecionar vários fragmentos de texto e alterá-los simultaneamente, pressione <span class="shortcut">Alt</span> (Windows e Linux) / <span class="shortcut">Alt</span> (macOS) enquanto arrasta o mouse sobre o texto.</p><p class="image"><img src="images/ps_tips-multiselection2.png" alt="Seleção múltipla" style="border: 1px solid #55555;" /></p></body></html>
