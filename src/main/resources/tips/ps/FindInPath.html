<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Pré-visualização de resultados de pesquisa</b></p><p>O painel "Pré-visualizar" na caixa de diálogo "Localizar no caminho" (<span class="shortcut">&shortcut:FindInPath;</span>) permite pesquisar rapidamente sem sair da caixa de diálogo. A caixa de diálogo "Pré-visualizar" exibe os primeiros 100 resultados.</p></body></html>
