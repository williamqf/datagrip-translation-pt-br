<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Alterar a porta do servidor Web embutido</b></p><p>Para alterar a porta do servidor Web embutido, vá ao diálogo "Configurações" (<span class="shortcut">&shortcut:ShowSettings;</span>) em "Construção, execução e implantação | Depurador" e defina um novo valor para o campo "Porta do servidor embutido".</p><p class="image"><img src="images/ps_tips-builtInServer.png" alt="Built-in server" style="border: 1px solid #55555;" /></p></body></html>
