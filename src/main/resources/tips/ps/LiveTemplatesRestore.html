<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b> Restaurar Live Templates </b></p><p> Se você fizer alterações em um Live Template, esse template será marcado na cor azul. Para restaurar um template em seu estado original, clique com o botão direito do mouse no template e selecione "<span class="control"> Restaurar padrão </span> " no menu de contexto. </p><p class="image"><img src="images/ps_tips-LiveTemplatesRestore.png" alt="Restore live templates" style="border: 1px solid #55555;" /></p></body></html>
