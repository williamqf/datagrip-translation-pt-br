<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Reiniciando um projeto</b></p><p>Para reiniciar projetos recentes use a opção no menu principal "<span class="control">Arquivo | Reiniciar</span> " (no Windows ou Linux) ou o "<span class="control">Arquivo | Projetos Recentes</span> " (no MacOS). </p><p>Ou clique com o botão direito do mouse sobre o ícone do PhpStorm na barra de tarefa/dock.</p></body></html>
