<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Filtrar comentários TODO por escopo</b></p><p>Quando você está trabalhando em um projeto grande que contém muitos itens TODO, você pode filtrá-los por escopo.</p><p>Você pode usar a guia "<span class="control">Com base no escopo</span>" na janela de ferramentas "<span class="control">TODO</span>" para mostrar apenas os itens relacionados ao escopo de destino.</p><p class="image"><img src="images/ps_tips-todo_scopes.png" alt="Escopo TODO" style="border: 1px solid #55555;" /></p></body></html>
