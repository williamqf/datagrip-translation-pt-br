<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Ir para Símbolo</b></p><p>Para abrir rapidamente uma classe, campo ou função no editor, pressione <span class="shortcut">&shortcut:GotoSymbol;</span> (ou <span class="control">Navegar | Símbolo</span>) e comece a digitar o nome.</p><p class="image"><img src="images/ps_tips-goto_symbol.png" alt="Ir para Símbolo" style="border: 1px solid #55555;" /></p></body></html>
