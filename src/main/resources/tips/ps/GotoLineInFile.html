<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Ir para uma linha</b></p><p>Você pode abrir uma linha específica de um arquivo no editor. Pressione <span class="shortcut">&shortcut:GotoFile;</span> (<span class="control">Ir | Arquivo</span>) e comece a digitar o nome do arquivo e, em seguida, digite <span class="code_emphasis">:</span> após o número da linha.</p><p class="image"><img src="images/ps_tips-gotoFileLineNumber.png" alt="Go to a specific line in a file" style="border: 1px solid #55555;" /></p></body></html>
