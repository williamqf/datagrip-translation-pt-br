<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Autocomplete de código</b></p><p>O autocomplete de código sugere opções alcançáveis pela posição do cursor atual no momento da digitação. Pressione <span class="shortcut">&shortcut:CodeCompletion;</span> 2 vezes para expandir a lista de candidatos.</p><p class="image"><img src="images/ps_tips-second_code_completion.png" alt="Extended code completion" style="border: 1px solid #55555;" /></p></body></html>
