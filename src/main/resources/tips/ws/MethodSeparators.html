<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Separador de métodos</b></p><p>Habilite as linhas de separação entre os métodos no editor para distinguir visualmente o corpo de cada método. Na caixa de diálogo <span class="control">Configurações</span> <span class="shortcut">&shortcut:ShowSettings;</span> , ative a caixa de seleção <span class="control">Mostrar separador de métodos</span> na página <span class="control">Editor | Geral | Aparência</span> .</p><p class="image"><img src="images/ws_tips-method_separator.png" alt="Mostrar a opção de separador de método" style="border: 1px solid #55555;" /></p></body></html>
