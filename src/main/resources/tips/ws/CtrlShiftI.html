<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Definição rápida</b></p><p><span class="shortcut">&shortcut:QuickImplementations;</span> (<span class="control">Exibir | Definição rápida</span>) permite visualizar a definição ou o conteúdo de um símbolo na posição do cursor sem ter que abrir uma nova guia do editor.</p><p class="image"><img src="images/ws_tips-ctrl_shift_i.png" alt="Quick definition" style="border: 1px solid #55555;" /></p></body></html>
