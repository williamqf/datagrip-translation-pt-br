<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Fechar guias do editor</b></p><p>Para fechar todas as guias do editor, exceto a guia atual, pressione <span class="shortcut">Alt</span> (Windows e Linux) / <span class="shortcut">Alt</span> (macOS) e clique no ícone de cruz da guia atual do editor.</p><p class="image"><img src="images/ps_tips-close_others.png" alt="Fechar outras" style="border: 1px solid #55555;" /></p></body></html>
