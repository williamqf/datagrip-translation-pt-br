<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Definição de Cores em CSS</b></p><p>No WebStorm, você pode definir cores facilmente em arquivos CSS. Na lateral do editor, há um ícone colorido que corresponde à propriedade <span class="code_emphasis">color</span> . Ao clicar neste ícone, você pode escolher uma cor usando o seletor de cores.</p><p class="image"><img src="images/ps_tips-cssColor.png" alt="CSS color" style="border: 1px solid #55555;" /></p></body></html>
