<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Histórico de pesquisas recentes</b></p><p>Ao pesquisar uma string de texto nos arquivos, você pode usar o histórico de pesquisas recentes. Pressione <span class="shortcut">&shortcut:Find;</span> para abrir a barra de pesquisa e <span class="shortcut">&shortcut:ShowSearchHistory;</span> para exibir uma lista de entradas recentes.</p><p class="image"><img src="images/ws_tips-recentSearch.png" alt="Histórico de pesquisas recentes" style="border: 1px solid #55555;" /></p></body></html>
