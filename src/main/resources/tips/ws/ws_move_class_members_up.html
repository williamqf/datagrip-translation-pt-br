<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Refatoração pull de membros de classe</b></p><p>A refatoração "<span class="control">Pull up de membros de classe</span>" move os métodos da classe para a hierarquia de classes acima (da classe atual para a superclasse ou para a interface que a classe implementa).</p><p class="image"><img src="images/ws_tips_refactoring_pull_members_up.png" alt="Pull Class Members Up" style="border: 1px solid #55555;" /></p></body></html>
