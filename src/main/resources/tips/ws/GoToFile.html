<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Ir para o arquivo</b></p><p>Para abrir um arquivo rapidamente, pressione <span class="shortcut">&shortcut:GotoFile;</span> (<span class="control">Navegar | Arquivo</span>) e comece a digitar o nome do arquivo. O ícone de filtro permite pesquisar somente no tipo de arquivo selecionado:</p><p class="image"><img src="images/ws_tips_gotofile.png" alt="Ir para o arquivo" style="border: 1px solid #55555;" /></p></body></html>
