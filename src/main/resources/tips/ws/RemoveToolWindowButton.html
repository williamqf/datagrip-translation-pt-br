<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Ocultar barra de ferramentas</b></p><p>Barras de ferramentas que não são necessárias no momento podem ser ocultadas.</p><p>Clique com o botão direito na barra de ferramentas que deseja ocultar e selecione <span class="control">Remover da barra lateral</span>.</p><p class="image"><img src="images/ws_tips-remove_from_sidebar.png" alt="Remover barra de ferramentas da barra lateral" style="border: 1px solid #55555;" /></p></body></html>
