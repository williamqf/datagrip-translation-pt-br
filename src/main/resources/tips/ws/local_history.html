<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Histórico Local</b></p><p>O histórico local permite rastrear todas as alterações em arquivos, classes, métodos ou trechos de código e reverter para pontos estáveis conforme necessário. Para exibir o histórico local, selecione " <span class="control"> Arquivo | Histórico local | Mostrar histórico </span>" no menu principal.</p></body></html>
