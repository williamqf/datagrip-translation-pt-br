<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Vá para a linha</b></p><p>É possível abrir uma linha específica de um arquivo no editor. Pressione <span class="shortcut">&shortcut:GotoFile;</span> (<span class="control">Navegar | Arquivo</span>). Comece a digitar o nome do arquivo e, em seguida, digite <span class="code_emphasis">:</span> após o número da linha.</p><p class="image"><img src="images/ws_tips-gotoFileLineNumber.png" alt="Vá para uma linha específica em um arquivo" style="border: 1px solid #55555;" /></p></body></html>
