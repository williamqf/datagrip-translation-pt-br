<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Pesquisa de tudo</b></p><p>Pressione <span class="shortcut">Shift</span> duas vezes para abrir o pop-up "<span class="control">Pesquisar em qualquer lugar</span>".</p><p>Pesquise qualquer elemento do código-fonte, arquivos, ações, elementos da interface do usuário e até mesmo confirmações do Git.</p><p class="image"><img src="images/tips_search_everywhere_general.png" alt="Pesquisar em qualquer lugar" style="border: 1px solid #55555;" /></p></body></html>
