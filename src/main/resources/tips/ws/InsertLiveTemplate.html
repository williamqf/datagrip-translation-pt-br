<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Exibir live templates disponíveis</b></p><p>Se não conseguir lembrar a abreviação do live template, pressione <span class="shortcut">&shortcut:InsertLiveTemplate;</span> para exibir a lista de opções disponíveis para o contexto atual. Por exemplo, digite <span class="code_emphasis">it</span> e pressione <span class="shortcut">&shortcut:InsertLiveTemplate;</span> para ver o que acontece.</p><p class="image"><img src="images/ws_tips-insert_live_template.png" alt="Insert live template" style="border: 1px solid #55555;" /></p></body></html>
