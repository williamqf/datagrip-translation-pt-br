<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Suprimir inspeção</b></p><p>Você pode suprimir inspeção de uma classe JavaScript ou TypeScript ou de um arquivo inteiro.</p><p>Posicione o cursor na linha destacada e pressione <span class="shortcut">&shortcut:ShowIntentionActions;</span>, clique na seta ao lado da inspeção a ser suprimida e selecione a ação de supressão necessária.</p><p class="image"><img src="images/tips_ws_suppress_inspection_js_class.png" alt="Suprimir uma inspeção em uma classe JavaScript ou arquivo" style="border: 1px solid #55555;" /></p></body></html>
