<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Criando funções</b></p><p>A refatoração "Criar método" cria uma função a partir de um local do código. Selecione um bloco de código e pressione <span class="shortcut">&shortcut:ExtractMethod;</span> (<span class="control">Refatoração | Criar | Método</span>).</p><p class="image"><img src="images/ws_tips_extract_method1.png" alt="Extract method" style="border: 1px solid #55555;" /></p><p>O resultado é o seguinte:</p><p class="image"><img src="images/ws_tips_extract_method2.png" alt="Extracted method" style="border: 1px solid #55555;" /></p></body></html>
