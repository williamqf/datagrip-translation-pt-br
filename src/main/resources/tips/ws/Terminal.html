<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Terminal integrado ao WebStorm</b></p><p>Não é necessário fechar o WebStorm para trabalhar com seu shell preferido. Em vez disso, use o terminal local integrado. Para abrir o terminal local, pressione <span class="shortcut">&shortcut:ActivateTerminalToolWindow;</span> ou clique em <img src="images/terminal.icons.expui.toolwindow.terminal.png" alt="o botão da janela de ferramentas do Terminal"/>.</p><p class="image"><img src="images/ws_tips-terminal.png" alt="janela de ferramentas do Terminal" style="border: 1px solid #55555;" /></p></body></html>
