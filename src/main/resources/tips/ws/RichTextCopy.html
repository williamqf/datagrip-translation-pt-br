<p><b>Copiar como rich text</b></p>
<p>Você pode copiar textos do editor como rich text e colá-los em outros editores que reconhecem RTF.</p>
<p>Na caixa de diálogo <span class="control">Configurações</span> (<span class="shortcut">&shortcut:ShowSettings;</span>), verifique se a caixa de seleção <span class="control">Copiar como rich text</span> está selecionada na página <span class="control">Editor</span> | <span class="control">Geral</span>.</p>
<p class="image"><img src="images/ws_tips-copy_rich_text.png" alt="Opção Copiar como rich text por padrão" style="border: 1px solid #55555;" /></p>
</body>
