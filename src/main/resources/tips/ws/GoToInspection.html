<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Localizar inspeção de código</b></p><p>Para localizar e executar uma inspeção rapidamente, pressione <span class="shortcut">&shortcut:RunInspection;</span> e digite um nome de inspeção ou de seu grupo. Selecione a inspeção da lista de candidatos e determine o escopo. <p class="image"><img src="images/ws_tips_gotoinspection.png" alt="Execute a inspeção pelo nome" style="border: 1px solid #55555;" /></p></p></body></html>
