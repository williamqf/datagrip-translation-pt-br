<body><p><b>Avaliar expressões</b></p><p>A janela "<span class="control">Pesquisar em qualquer lugar</span>" (<span class="shortcut">Shift</span> 2 vezes) permite avaliar expressões aritméticas simples.</p>
<p>Digite a expressão a ser avaliada no campo de pesquisa. O resultado da avaliação será exibido nos resultados da pesquisa.</p><p class="image"><img src="images/ps_tips_evaluate_expression.png" alt="Avaliar expressão" style="border: 1px solid #55555;" /></p></body></html>
