<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Pesquisa de usos</b></p><p>Pressione <span class="shortcut">&shortcut:FindUsages;</span> para encontrar rapidamente todas as ocorrências do código que referenciam o símbolo na posição do cursor. Não importa se o símbolo é uma classe, método, campo, parâmetro ou parte de outra declaração.</p><p class="image"><img src="images/ws_tips_find_usages.png" alt="Find usages" style="border: 1px solid #55555;" /></p></body></html>
