<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Emmet</b></p><p>Você pode usar o <span class="control">Emmet</span> para acelerar o desenvolvimento de HTML, XML ou CSS.</p><p>No diálogo "<span class="control">Configurações</span>" (<span class="shortcut">&shortcut:ShowSettings;</span>), navegue até "<span class="control">Editor | Emmet</span>", e marque a caixa de seleção "<span class="control">Emmet | HTML</span>", "<span class="control">Emmet | CSS</span>", ou "<span class="control">Emmet | JSX</span>".</p><p class="image"><img src="images/ws_tipsEmmet.png" alt="Ativar Emmet" style="border: 1px solid #55555;" /></p></body></html>
