<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Comentar e Descomentar Código</b></p><p>É possível comentar e descomentar linhas e blocos de código com atalhos:</p><p><span class="shortcut">&shortcut:CommentByLineComment;</span>: para comentários de linha única (<span class="code_emphasis">//...</span>)</p><p><span class="shortcut">&shortcut:CommentByBlockComment;</span>: para comentários de blocos (<span class="code_emphasis">/*...*/</span>)</p></body></html>
