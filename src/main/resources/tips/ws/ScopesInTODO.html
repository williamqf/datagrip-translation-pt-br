<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Filtrar comentários TODO por escopo</b></p><p>Se você estiver trabalhando em um projeto grande com muitos itens TODO, você pode filtrá-los por escopo.</p><p>Use a aba &quot;<span class="control">Baseado em Escopo</span>&quot; na janela de ferramentas &quot;<span class="control">TODO</span>&quot; para mostrar somente aqueles itens relevantes ao escopo atual.</p><p class="image"><img src="images/ws_tips-todo_scopes.png" alt="Escopo de TODO" style="border: 1px solid #55555;" /></p></body></html>
