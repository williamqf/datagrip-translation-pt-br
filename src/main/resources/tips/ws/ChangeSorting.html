<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Ordenando Sugestões de Autocompletar</b></p><p>As sugestões do autocompletar podem ser ordenadas por relevância ou ordem alfabética.</p><p>Para ordenar alfabeticamente, selecione a opção "Ordenar por Nome". Para ordenar por relevância, desmarque a caixa de seleção "Ordenar por Nome".</p><p class="image"><img src="images/ws_tips-changeLookupSorting.png" alt="Alterar a ordenação de sugestões" style="border: 1px solid #55555;" /></p></body></html>
