<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Edição simultânea de várias linhas</b></p><p><span class="control">Modo de coluna</span> <span class="shortcut">&shortcut:EditorToggleColumnMode;</span> para selecionar vários locais, pressione <span class="shortcut">Ctrl+Alt+Shift</span> (Windows e Linux) ou <span class="shortcut">Ctrl+Alt (Opção)+Shift</span> (macOS) enquanto arrasta o mouse:</p><p class="image"><img src="images/ws_tips-multiselection_column.png" alt="Modo de seleção de coluna" style="border: 1px solid #55555;" /></p></body></html>
