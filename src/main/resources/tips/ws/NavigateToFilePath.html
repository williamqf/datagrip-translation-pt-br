<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Abrir</b></p><p>Para navegar para qualquer parte de um caminho de arquivo, <span class="shortcut">Control+Clique com botão esquerdo</span> (Windows e Linux) / <span class="shortcut">Control+Clique com botão esquerdo</span> (macOS) na aba do editor. O elemento selecionado será aberto no navegador de arquivos.</p><p class="image"><img src="images/ws_tips-navigateToFilePath.png" alt="Navegar para o caminho do arquivo" style="border: 1px solid #55555;" /></p></body></html>
