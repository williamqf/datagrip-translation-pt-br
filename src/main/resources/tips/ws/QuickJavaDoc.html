<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Documentação de código rápida</b></p><p>Para visualizar rapidamente a documentação de uma classe ou método onde o cursor estiver posicionado, pressione <span class="shortcut">&shortcut:QuickJavaDoc;</span> (<span class="control">Visualizar | Documentação rápida</span>).</p><p class="image"><img src="images/ws_tips-quick_javadoc.png" alt="Documentação rápida" style="border: 1px solid #55555;" /></p></body></html>
