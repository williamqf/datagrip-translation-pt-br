<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Pesquisa rápida na visualização de árvore</b></p><p>A pesquisa rápida está disponível em todas as visualizações de árvore, como na janela da ferramenta <span class="control">Projeto</span>. Basta começar a digitar o que você está procurando, e o item necessário será encontrado imediatamente.</p><p class="image"><img src="images/ws_tips-speed_search.png" alt="Pesquisa rápida" style="border: 1px solid #55555;" /></p></body></html>
