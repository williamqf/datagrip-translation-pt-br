<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Referência de arrastar e soltar</b></p><p>Para referenciar JavaScript, CSS e arquivos de imagem, selecione um arquivo na janela de ferramentas"<span class="control">Projeto</span>" e arraste e solte no arquivo HTML.</p><p class="image"><img src="images/ws_dragToHtml.png" alt="Geração de uma referência: arrastar e soltar" style="border: 1px solid #55555;" /></p><p>O WebStorm gerará as tags<span class="code_emphasis">script</span>, <span class="code_emphasis">link</span> ou <span class="code_emphasis">image</span> correspondentes.</p><p class="image"><img src="images/ws_dragToHtml_result.png" alt="Referência gerada" style="border: 1px solid #55555;" /></p></body></html>
