<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Pesquisa de Ações</b></p><p>Se você não se lembra do atalho para chamar uma ação, pressione <span class="shortcut">&shortcut:GotoAction;</span> e comece a digitar o nome da ação. Para aplicar a ação, selecione-a na lista de candidatos. O atalho é exibido ao lado do nome da ação.</p><p class="image"><img src="images/tips_find_action.png" alt="Pesquisa de ação" style="border: 1px solid #55555;" /></p></body></html>
