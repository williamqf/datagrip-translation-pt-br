<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>CamelCase na Pesquisa de Qualquer Lugar</b></p><p>O uso do CamelCase no pop-up da <span class="control">Pesquisa de Qualquer Lugar</span> (pressione <span class="shortcut">Shift</span> 2 vezes) filtra a lista de resultados ao pesquisar uma classe, arquivo ou símbolo.</p><p class="image"><img src="images/ws_tips-camel_goto.png" alt="CamelCase na lista Ir para Arquivo" style="border: 1px solid #55555;" /></p></body></html>
