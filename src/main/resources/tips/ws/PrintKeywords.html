<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Palavras Chaves para Impressão</b></p><p>Para deixar seus impressos (<span class="control">Arquivo | Imprimir</span>) mais bonitos e chamativos, use palavras chaves.</p><p>Por exemplo, você pode usar <span class="code_emphasis">$DATE$</span> e <span class="code_emphasis">$TIME$</span> para designar a data e hora exatas para impressão.</p></body></html>
