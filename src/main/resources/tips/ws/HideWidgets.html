<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Configurar os widgets na barra de status</b></p><p>É possível configurar o conjunto de widgets exibidos na barra de status. Para isso, clique com o botão direito nos widgets e em seguida selecione os itens a serem exibidos.</p><p class="image"><img src="images/ws_tips_hide_widgets.png" alt="widgets popup" style="border: 1px solid #55555;" /></p></body></html>
