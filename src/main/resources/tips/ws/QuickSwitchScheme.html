<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Mudar o esquema</b></p><p>Você pode aplicar estilos de códigos diferentes, esquema de cores ou mapa de teclas pelo editor com apenas uma ação de teclado. Pressione <span class="shortcut">&shortcut:QuickChangeScheme;</span> (<span class="control">Visualizar | Mudar Esquema Rapidamente</span>) para especificar qual esquema deseja trocar.</p></body></html>
