<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Selecione vários locais de código</b></p><p>Para selecionar várias partes do texto, mantenha pressionado <span class="shortcut">Control + Shift + Alt</span> (Windows e Linux) ou <span class="shortcut">Comando + Shift + Alt (Option)</span> (macOS) e arraste o cursor sobre o texto:</p><p class="image"><img src="images/ws_tips-multiselection2.png" alt="Seleção múltipla" style="border: 1px solid #55555;" /></p></body></html>
