<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Exibir hierarquia de herança</b></p><p>Para exibir a hierarquia de herança da classe selecionada, pressione <span class="shortcut">&shortcut:TypeHierarchy;</span> (<span class="control">Navigate | Type Hierarchy</span>). Também é possível chamar a exibição de hierarquia diretamente do editor, para verificar a hierarquia da classe que você está editando no momento.</p><p class="image"><img src="images/ws_tips-hierarchy_browser.png" alt="Types hierarchy browser" style="border: 1px solid #55555;" /></p></body></html>
