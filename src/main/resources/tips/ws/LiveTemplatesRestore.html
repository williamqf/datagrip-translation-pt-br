<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Restaurar live templates</b></p><p>Quando você altera um live template, o template é marcado em azul. Para restaurar o template ao seu estado original, clique com o botão direito no template e selecione " <span class="control">Restaurar padrão </span> " no menu de contexto.</p><p class="image"><img src="images/ws_tips-LiveTemplatesRestore.png" alt="Restaurar live templates" style="border: 1px solid #55555;" /></p></body></html>
