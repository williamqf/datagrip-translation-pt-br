<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Pesquisar Configurações e Plug-ins</b></p><p>Digite <span class="code_emphasis">/</span> no campo de pesquisa da janela "Pesquisar em Todos os Lugares" (<span class="shortcut">Shift</span> 2 vezes) para pesquisar grupos de configurações, opções e plug-ins.</p><p class="image"><img src="images/ws_tips_search_everywhere_settings.png" alt="Pesquisar em Todos os Lugares: configurações, plug-ins, mapeamentos de URL" style="border: 1px solid #55555;" /></p></body></html>
