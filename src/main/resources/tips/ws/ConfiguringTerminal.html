<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Escolha o Shell do Terminal</b></p><p>Use o Shell de sua preferência junto com o terminal embutido.</p><p>No diálogo "Configurações" <span class="shortcut">&shortcut:ShowSettings;</span>, vá até "Ferramentas | Terminal" e especifique o caminho para o executável do Shell.</p></body></html>
