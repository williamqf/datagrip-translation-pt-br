<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Pesquisar em diretórios aninhados</b></p><p>Pressione <span class="shortcut">&shortcut:GotoFile;</span> e digite o diretório pai e parte do nome do arquivo para navegar para um arquivo em um diretório aninhado. Use uma barra ou barra invertida como separador.</p><p class="image"><img src="images/ps_tips-enterDirectory.png" alt="Localizar um arquivo" style="border: 1px solid #55555;" /></p></body></html>
