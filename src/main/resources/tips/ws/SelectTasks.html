<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Deleção de tarefas</b></p><p>Ao trabalhar com uma longa lista de tarefas, não é necessário removê-las uma de cada vez. Selecione várias tarefas usando as teclas <span class="shortcut">Shift</span> ou <span class="shortcut">Ctrl / Command</span>, clique na seta para a direita e, em seguida, clique em "<span class="control">Remover</span>".</p><p class="image"><img src="images/py_tips_select_tasks.png" alt="Select several tasks" style="border: 1px solid #55555;" /></p></body></html>
