<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Personalização das cores de código</b></p><p>Se as cores de código não lhe agradarem, pressione <span class="shortcut">&shortcut:GotoAction;</span>, digite <span class="code_emphasis">Jump</span> e clique em "<span class="control">Ir para Cores e Fontes</span>". Isso o levará à página de configurações, na qual você pode alterar as cores dos elementos de código que estão no local do cursor.</p></body></html>
