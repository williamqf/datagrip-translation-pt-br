<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Substituição de Caracteres Especiais</b></p><p>Caracteres especiais em arquivos XML ou HTML podem ser substituídos por seus valores ASCII iniciados por apóstrofo. Para isso, selecione os caracteres e vá no menu principal em「<span class="control">Editar | Codificar Caracteres Especiais XML/HTML</span> 」.</p></body></html>
