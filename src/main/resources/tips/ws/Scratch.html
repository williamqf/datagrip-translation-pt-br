<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Arquivos scratch</b></p><p>Os arquivos scratch são arquivos temporários que permitem experimentar e fazer protótipos de código no editor, sem criar um arquivo de projeto.</p><p>Para criar um arquivo scratch, pressione <span class="shortcut">&shortcut:NewScratchFile;</span> e selecione a linguagem que você deseja usar.</p><p class="image"><img src="images/ws_tips-scratch.png" alt="Arquivos scratch" style="border: 1px solid #55555;" /></p></body></html>
