<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Navegar para uma linha</b></p><p>Você pode abrir um arquivo no editor em uma linha específica. Pressione <span class="shortcut">&shortcut:GotoFile;</span> (<span class="control">Navegar | Arquivo</span>), comece a digitar o nome do arquivo e, em seguida, digite <span class="code_emphasis">:</span> seguido pelo número da linha.</p><p class="image"><img src="images/ij_tips_gotolinenumber.png" alt="Ir para uma linha específica" style="border: 1px solid #55555;" /></p></body></html>
