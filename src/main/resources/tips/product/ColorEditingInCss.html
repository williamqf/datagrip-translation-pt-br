<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Configure cores em arquivos CSS</b></p><p>O IntelliJIDEA facilita a especificação de cores no arquivos CSS. As propriedades <span class="code_emphasis">color</span> têm ícones da cor correspondente no editor gutter. Clique no ícone para escolher a cor desejada usando o seletor de cores.</p><p class="image"><img src="images/ps_tips-cssColor.png" alt="CSS color" style="border: 1px solid #55555;" /></p></body></html>
