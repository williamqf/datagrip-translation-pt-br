<html>
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" type="text/css" href="css/tips.css" />
</head>
<body>
  <p>
    <b>Palavras-chave para impressões</b>
  </p>
  <p>
    Para deixar suas impressões (
    <span class="control">Arquivo | Imprimir</span>
    ) bonitas e informativas, use palavras-chave.
  </p>
  <p>
    Por exemplo, use
    <span class="code_emphasis">$DATE$</span> e
    <span class="code_emphasis">$TIME$</span>
    para especificar a data e hora exatas da impressão.
  </p>
</body>
</html>
