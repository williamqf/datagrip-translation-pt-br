<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Pesquisar inspeções de código</b></p><p>Para encontrar e executar rapidamente uma inspeção, pressione <span class="shortcut">&shortcut:RunInspection;</span> e comece a digitar o nome da inspeção ou do grupo. Escolha a inspeção na lista de sugestões e especifique o escopo. <p class="image"><img src="images/ij_tips_gotoinspection.png" alt="executar inspeção por nome" style="border: 1px solid #55555;" /></p></p></body></html>
