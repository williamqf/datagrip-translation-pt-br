<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Organizar sugestões de preenchimento</b></p><p>É possível organizar as sugestões de preenchimento por relevância ou por ordem alfabética.</p><p>Para organizar por ordem alfabética, selecione a opção <span class="control">Ordenar por Nome</span>. Para organizar por relevância, desmarque a caixa de seleção <span class="control">Ordernar por Nome</span>.</p><p class="image"><img src="images/ij_tips_change_lookup_sorting.png" alt="Alterar organização de preenchimento" style="border: 1px solid #55555;" /></p></body></html>
