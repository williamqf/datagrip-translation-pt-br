<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Personalize a cor do código</b></p><p>Caso não goste da cor do seu código, pressione <span class="shortcut">&shortcut:GotoAction;</span>, digite <span class="code_emphasis">Saltar</span> e clique <span class="control">Saltar para Cores e Fontes</span>. Você será direcionado para a página de configurações onde poderá modificar a cor do elemento do código no cursor.</p></body></html>
