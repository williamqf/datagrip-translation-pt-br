<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/dicas.css"></head><body><p><b>Exibir documentação do bean do Spring</b></p><p>Você pode acessar a documentação do bean do Spring diretamente do editor. Coloque o cursor em um bean, pressione <span class="atalho">&atalho:SelecionarEm;</span> e selecione <span class="controle">Spring Beans</span>. A janela de ferramentas <span class="controle">Spring</span> é aberta, exibindo todas as informações disponíveis.</p><p class="imagem"><img src="images/spring_abrir_bean.png" alt="Exibindo documentação do bean do Spring" style="border: 1px solid #55555;" /></p></body></html>
