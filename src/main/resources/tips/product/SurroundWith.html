<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/dicas.css"></head><body><p><b>Cerque fragmentos de código</b></p><p>Você pode rapidamente envolver um bloco de código em construções úteis. Selecione-o no editor e pressione <span class="shortcut">&shortcut:SurroundWith;</span> (<span class="control">Código | Cercar com</span>).</p><p>A lista de opções ou wrappers disponíveis é dependente do contexto e depende da linguagem. </p><p class="image"><img src="images/ij_tips_surround_with.png" alt="Cercar com" style="border: 1px solid #55555;" /></p></body></html>
