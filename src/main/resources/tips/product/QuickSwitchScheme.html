<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Alterar esquema</b></p><p>Você pode aplicar um estilo diferente de código, esquema de cores ou mapeamento de teclas com um único pressionamento a partir do editor. Pressione <span class="shortcut">&shortcut:QuickChangeScheme;</span> (<span class="control">Exibir | Alterar Esquema Rapidamente</span>) para especificar o esquema para o qual você deseja alternar.</p></body></html>
