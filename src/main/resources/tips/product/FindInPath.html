<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Pré-visualize os resultados da pesquisa</b></p><p>Você pode usar a área <span class="control">Pré-visualizar</span> do <span class="control">Encontre em arquivos</span> diálogo (<span class="shortcut">&shortcut:FindInPath;</span>) para uma pesquisa mais rápida sem sair do diálogo. O <span class="control">Pré-visualizar</span> diálogo exibe os primeiros 100 resultados. </p></body></html>
