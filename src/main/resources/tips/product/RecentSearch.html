<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/dicas.css"></head><body><p><b>Histórico de pesquisas recentes</b></p><p>Ao pesquisar por uma string de texto em um arquivo, utilize o histórico de pesquisas recentes, Pressione <span class="shortcut">&shortcut:Encontrar;</span> para abrir a barra de pesquisa e, em seguida, pressione <span class="shortcut">&shortcut:ExibirHistóricoDePesquisa;</span> para exibir a lista de entradas recentes.</p><p class="image"><img src="images/ij_dicas_historicoPesquisa.png" alt="Histórico de pesquisa recente" style="border: 1px solid #55555;" /></p></body></html>
