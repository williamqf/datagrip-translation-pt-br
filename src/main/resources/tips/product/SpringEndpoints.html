<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Janela de Endpoints</b></p><p>Para controladores REST, use a janela de ferramentas dedicada <span class="control">Endpoints</span> para listar todos os endpoints com seus métodos e URLs. A janela de ferramentas também permite que você crie rapidamente uma solicitação HTTP para o endpoint selecionado e gere uma Especificação OpenAPI.</p><p class="image"><img src="images/restapi_endpoints.png" alt="A janela de ferramentas de Endpoints" style="border: 1px solid #55555;" /></p></body></html>
