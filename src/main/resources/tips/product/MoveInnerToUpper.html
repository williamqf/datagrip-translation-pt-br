<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>A refatoração Move</b></p><p>Quando você invoca a refatoração <span class="control">Move</span> <span class="shortcut">&shortcut:Move;</span> em uma classe interna que é declarada <span class="control">static</span>, é solicitado a você torná-la uma classe de nível superior ou movê-la para outra classe.</p><p class="image"><img src="images/ij_tips_move_inner.png" alt="Mover classe interna" style="border: 1px solid #55555;" /></p></body></html>
