<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/dicas.css"></head><body><p><b>Live templates</b></p><p>Use live templates para inserir construções de código frequentes. </p><p class="imagem"><img src="images/ij_dicas_live_templates_1.png" alt="Live template" style="border: 1px solid #55555;" /></p><p>Por exemplo, digite <span class="enfase_codigo">psvm</span> e pressione <span class="atalho">Tab</span> para inserir o modelo de declaração do método <span class="enfase_codigo">main()</span>, então digite <span class="enfase_codigo">sout</span> para inserir uma declaração print.</p><p class="imagem"><img src="images/ij_dicas_live_templates_2.png" alt="Aplicar um live template" style="border: 1px solid #55555;" /></p></body></html>
