<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Navegue até um símbolo</b></p><p>Para abrir rapidamente qualquer classe, campo ou função no editor, pressione <span class="shortcut">&shortcut:GotoSymbol;</span> (<span class="control">Navigate | Symbol</span>) e comece a digitar o nome.</p><p class="image"><img src="images/ij_tips_gotosymbol.png" alt="Ir para o símbolo" style="border: 1px solid #55555;" /></p></body></html>
