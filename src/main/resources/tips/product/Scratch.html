<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Arquivos scratch</b></p><p>Arquivos scratch são arquivos temporários que permitem a você experimentar e prototipar no editor, sem criar quaisquer arquivos de projeto.</p><p>Para criar um arquivo scratch, pressione <span class="shortcut">&shortcut:NewScratchFile;</span>, e então selecione a Linguagem a ser usada.</p></body></html>
