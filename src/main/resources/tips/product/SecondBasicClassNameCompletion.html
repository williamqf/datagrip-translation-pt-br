<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Conclusão de código</b></p><p>A conclusão de código sugere as opções que podem ser alcançadas a partir da posição atual do cursor conforme você digita. Pressione <span class="shortcut">&shortcut:CodeCompletion;</span> duas vezes para ver também classes e membros inacessíveis.</p><p class="image"><img src="images/ij_tips_second_code_completion.png" alt="Conclusão de código estendida" style="border: 1px solid #55555;" /></p></body></html>
