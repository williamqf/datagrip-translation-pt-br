<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Pesquisar por qualquer coisa</b></p><p>Pressione <span class="shortcut">Shift</span> duas vezes para abrir o <span class="control">Search Everywhere</span> popup.</p><p>Isso permite encontrar qualquer elemento do código-fonte, um arquivo, uma ação, um elemento da IU ou até mesmo um commit do Git.</p><p class="image"><img src="images/tips_search_everywhere.png" alt="Pesquisar por qualquer coisa" style="border: 1px solid #55555;" /></p></body></html>
