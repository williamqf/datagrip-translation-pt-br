<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Avalie expressões matemáticas</b></p><p>Você pode avaliar expressões aritméticas simples com a janela <span class="control">Pesquisar em Todo Lugar</span> (<span class="shortcut">Shift</span> duas vezes).</p><p>Digite uma expressão que você deseja avaliar no campo de pesquisa. O resultado será exibido nos resultados da pesquisa.</p><p class="image"><img src="images/tips_evaluate_expression.png" alt="Evaluate expression" style="border: 1px solid #55555;" /></p></body></html>
