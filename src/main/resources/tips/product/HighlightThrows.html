<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Destaque instruções que podem lançar exceções</b></p><p>Você pode visualizar todas as instruções dentro de um método onde certas exceções podem ser lançadas. Posicione o cursor na palavra <span class="code_emphasis">throws</span> e pressione <span class="shortcut">&shortcut:HighlightUsagesInFile;</span>. </p><p class="image"><img src="images/ij_tips_highlightExceptions.png" alt="Destaque excessões capturadas" style="border: 1px solid #55555;" /></p></body></html>
