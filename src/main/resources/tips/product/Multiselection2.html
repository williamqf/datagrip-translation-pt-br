<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Selecione vários fragmentos de código</b></p><p>Para selecionar vários fragmentos de texto e modificá-los ao mesmo tempo, pressione e segure  <span class="shortcut">Shift+Alt</span> (no Windows e Linux) /  <span class="shortcut">Shift+Alt</span> (no macOS) e arraste seu mouse pelo texto:</p><p class="image"><img src="images/ij_tips_multiselection.png" alt="Seleção múltipla" style="border: 1px solid #55555;" /></p></body></html>
