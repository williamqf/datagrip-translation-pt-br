<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Selecionar em</b></p><p>Para selecionar rapidamente o elemento (uma classe, arquivo, método ou campo) atualmente editado em outra visualização, pressione <span class="shortcut">&shortcut:SelectIn;</span> ou chame <span class="control">Navegar | Selecionar em</span>.</p><p class="image"><img src="images/ij_tips_selectin.png" alt="Selecionar no pop-up" style="border: 1px solid #55555;" /></p></body></html>
