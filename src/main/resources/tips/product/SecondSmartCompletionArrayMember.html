<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Type-Matching code completion</b></p><p>Quando há um array do tipo esperado no contexto, invoke o Type-Matching code completion (<span class="shortcut">&shortcut:SmartTypeCompletion;</span>) duas vezes. O IDE irá sugerir obter um elemento deste array.</p></body></html>
