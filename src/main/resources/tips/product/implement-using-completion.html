<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/dicas.css"></head><body><p><b>Gere código padrão com autocompletar</b></p><p>Você pode gerar código padrão como getters e setters e implementar métodos de interface usando autocompletar.</p><p>Basta começar digitando o nome do método, por exemplo, <span class="control">gn</span> para gerar <span class="control">getName()</span> ou <span class="control">ct</span> para implementar <span class="control">compareTo()</span>.</p><p class="image"><img src="images/tips_completion_generate.png" alt="Gerando um getter usando autocompletar" style="border: 1px solid #55555;" /></p></body></html>
