<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Copiar Classe</b></p><p>Use o " <span class="control">Refatorar | Copiar Classe</span>" para criar uma classe copiada da classe selecionada.</p><p>Esta refatoração é útil quando você precisa criar uma classe similar a uma classe existente e não é possível colocar a funcionalidade comum em uma superclasse comum.</p></body></html>
