<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Pré-visualização de resultados da pesquisa</b></p><p>Use a área "Pré-visualização" na caixa de diálogo "Localizar no arquivo" (<span class="shortcut">&shortcut:FindInPath;</span>) para localizar pesquisas rápidas sem sair da caixa de diálogo. A caixa de diálogo "Pré-visualização" exibe os 100 primeiros resultados.</p></body></html>
