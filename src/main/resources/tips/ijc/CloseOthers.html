<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/dicas.css"></head><body><p><b>Fechar guias do editor</b></p><p>Para fechar todos as guias do editor, exceto a ativa, mantenha pressiona a tecla <span class="shortcut">Alt</span> (Windows e Linux) / <span class="shortcut">Alt</span> (macOS) e clique no ícone de fechar da guia do editor.</p><p class="image"><img src="images/ps_dicas-fechar_outros.png" alt="Fechar outros" style="border: 1px solid #55555;" /></p></body></html>
