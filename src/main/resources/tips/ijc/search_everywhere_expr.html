<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Avaliar expressão</b></p><p>Na janela "<span class="control">Pesquisa em todo o local</span>" (<span class="shortcut">Shift</span> duas vezes) é possível avaliar uma expressão aritmética simples.</p><p>Insira a expressão que deseja avaliar no campo de pesquisa. O resultado da avaliação será exibido nos resultados da pesquisa.</p><p class="image"><img src="images/tips_evaluate_expression.png" alt="Avaliar expressão" style="border: 1px solid #55555;" /></p></body></html>
