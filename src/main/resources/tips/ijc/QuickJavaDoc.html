<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Documentação de código rápido</b></p><p>Para exibir rapidamente a documentação da classe ou método no cursor, pressione <span class="shortcut">&shortcut:QuickJavaDoc;</span> (<span class="control">Exibir | Documentação rápida</span>).</p><p class="image"><img src="images/ij_tips_quick_javadoc.png" alt="Visualização da documentação rápida" style="border: 1px solid #55555;" /></p></body></html>
