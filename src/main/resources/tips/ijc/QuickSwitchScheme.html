<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Alteração de esquema</b></p><p>Você pode aplicar diferentes estilos de código, esquemas de cores ou mapas de teclas no editor por meio de um único atalho de teclado. Basta pressionar <span class="shortcut">&shortcut:QuickChangeScheme;</span> (<span class="control">Exibir | Alteração rápida de esquema</span>) para indicar para qual esquema alternar.</p></body></html>
