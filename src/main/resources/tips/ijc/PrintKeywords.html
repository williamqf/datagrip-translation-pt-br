<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Palavras-chave para impressão</b></p><p>Para tornar os materiais impressos (<span class="control">Arquivo | Imprimir</span>) úteis e visualmente agradáveis, use palavras-chave.</p><p>Por exemplo, você pode usar <span class="code_emphasis">$DATE$</span> e <span class="code_emphasis">$TIME$</span> para inserir a data e a hora exatas do documento no momento da impressão.</p></body></html>
