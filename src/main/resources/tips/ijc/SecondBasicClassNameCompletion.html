<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Completamento de código</b></p><p>O preenchimento automático de código sugere opções que podem ser alcançadas da posição atual do cursor durante a digitação. Pressionar <span class="shortcut">&shortcut:CodeCompletion;</span> duas vezes também mostrará classes e membros inacessíveis.</p><p class="image"><img src="images/ij_tips_second_code_completion.png" alt="Preenchimento automático de código estendido" style="border: 1px solid #55555;" /></p></body></html>
