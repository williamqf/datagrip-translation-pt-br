<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Ordenação das sugestões de autocompletar</b></p><p>Você pode ordenar as sugestões de autocompletar por relevância ou ordem alfabética.</p><p>Para ordenar alfabeticamente, selecione a opção "<span class="control">Classificar por nome</span>". Para ordenar por relevância, desmarque a caixa de seleção "<span class="control">Classificar por nome</span>".</p><p class="image"><img src="images/ij_tips_change_lookup_sorting.png" alt="alterar ordenação de preenchimento automático" style="border: 1px solid #55555;" /></p></body></html>
