<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Histórico Local</b></p><p>O Histórico Local permite rastrear todas as alterações em um arquivo, classe, método ou trecho de código e, se necessário, revertê-las para um ponto estável. Para exibir o Histórico Local, selecione "<span class="control">Arquivo | Histórico Local | Exibir Histórico</span>" no menu principal.</p></body></html>
