<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Refatoração Mover</b></p><p>Chamar a refatoração "<span class="control">Mover</span>" <span class="shortcut">&shortcut:Mover;</span> em uma classe interna declarada como <span class="control">estática</span> mostra uma mensagem que pergunta se a classe deve ser movida para o nível mais alto ou para outra classe.</p><p class="image"><img src="images/ij_tips_move_inner.png" alt="Mover classe interna" style="border: 1px solid #55555;" /></p></body></html>
