<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Conclusão de código do mesmo tipo</b></p><p>Quando há uma matriz do tipo necessário no contexto, invoque a conclusão de código do mesmo tipo (<span class="shortcut">&shortcut:SmartTypeCompletion;</span>) 2 vezes. O IDE se encarregará de sugerir a obtenção de elementos dessa matriz.</p></body></html>
