<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Preenchimento de código</b></p><p>Para preencher rapidamente a chamada do método para um método estático em qualquer lugar do projeto, biblioteca ou JDK, digite o prefixo e pressione <span class="shortcut">&shortcut:CodeCompletion;</span> duas vezes. Você pode importar o método selecionado pressionando <span class="shortcut">&shortcut:ShowIntentionActions;</span>.</p><p class="image"><img src="images/ij_tips_completion_import.png" alt="Importação no preenchimento" style="border: 1px solid #55555;" /></p></body></html>
