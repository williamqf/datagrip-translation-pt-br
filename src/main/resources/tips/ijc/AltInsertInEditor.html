<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Geração de código</b></p><p>O IntelliJ IDEA Community pode gerar métodos getter e setter para os campos de uma classe. Para fazê-lo, com o cursor dentro da classe, pressione <span class="shortcut">&shortcut:Generate;</span> (<span class="control">Código | Gerar</span>).</p><p class="image"><img src="images/ij_tips_generate_getter_setter.png" alt="Generate getter and setter" style="border: 1px solid #55555;" /></p></body></html>
