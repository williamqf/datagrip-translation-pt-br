<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Arquivo Scratch</b></p><p>Um arquivo Scratch é um arquivo temporário que permite experimentar e criar protótipos de código no editor sem a necessidade de criar um arquivo de projeto.</p><p>Para criar um arquivo Scratch, pressione <span class="shortcut">&shortcut:NewScratchFile;</span> e selecione o idioma a ser usado.</p></body></html>
