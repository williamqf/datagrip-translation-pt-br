<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Autocompletar com tipo de correspondência</b></p><p>Quando precisar de um tipo de coleção, chame duas vezes o autocompletar com tipo de correspondência (<span class="shortcut">&shortcut:SmartTypeCompletion;</span>). O IDE buscará um array do mesmo tipo de componente e sugerirá uma transformação usando a chamada <span class="code_emphasis">Arrays.asList()</span> .</p></body></html>
