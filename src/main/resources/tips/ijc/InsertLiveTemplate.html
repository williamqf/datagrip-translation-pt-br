<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Exibição de Live Templates disponíveis</b></p><p>Se não lembrar a abreviação do Live Template, pressione <span class="shortcut">&shortcut:InsertLiveTemplate;</span> e uma lista de sugestões apropriadas para o contexto atual será exibida. Tente digitar <span class="code_emphasis">it</span> e pressione <span class="shortcut">&shortcut:InsertLiveTemplate;</span> para ver o que acontece.</p><p class="image"><img src="images/ij_tips_insert_live_template.png" alt="Inserindo Live template" style="border: 1px solid #55555;" /></p></body></html>
