<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Destaque de instruções que podem lançar exceções</b></p><p>É possível exibir todas as instruções dentro de um método que podem lançar uma exceção específica. Posicione o cursor na instrução <span class="code_emphasis">throws</span> e pressione <span class="shortcut">&shortcut:HighlightUsagesInFile;</span>.</p><p class="image"><img src="images/ij_tips_highlightExceptions.png" alt="Destaque de exceções capturadas" style="border: 1px solid #55555;" /></p></body></html>
