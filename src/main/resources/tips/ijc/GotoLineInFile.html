<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Vá para a linha</b></p><p>É possível abrir uma linha específica de um arquivo no editor. Pressione <span class="shortcut">&shortcut:GotoFile;</span> (<span class="control">Navegar | Arquivo</span>) e comece a digitar o nome do arquivo e, em seguida, digite <span class="code_emphasis">:</span> seguido pelo número da linha.</p></body></html>
