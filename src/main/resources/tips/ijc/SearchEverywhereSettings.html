<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Busca por configurações e plugins</b></p><p>Na caixa de pesquisa da janela "Busca em todos os lugares" (pressione <span class="shortcut">Shift</span> duas vezes), digite <span class="code_emphasis">/</span> para buscar grupos de configurações, opções e plugins.</p><p class="image"><img src="images/tips_search_everywhere_settings.png" alt="Busca em todos os lugares: configurações, plugins, mapeamentos de URL" style="border: 1px solid #55555;" /></p></body></html>
