<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Personalize a cor do código</b></p><p>Se você não gostar da cor do código, pressione <span class="shortcut">&shortcut:GotoAction;</span> e digite <span class="code_emphasis">Jump</span> e clique em <span class="control">Navegar para cores e tipos de letra</span>. Isso irá levá-lo até as configurações em que você poderá alterar as cores dos elementos do código que se encontram no local do cursor.</p></body></html>
