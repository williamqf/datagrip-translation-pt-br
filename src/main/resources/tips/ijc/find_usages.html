<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Busca de Usos</b></p><p><span class="shortcut">&shortcut:FindUsages;</span> pressionado, pode-se encontrar rapidamente todas as ocorrências no código que se referem ao símbolo na posição do cursor. Não importa se este símbolo é uma classe, um método, um campo, um parâmetro ou parte de outro statment.</p><p class="image"><img src="images/tips_find_usages.png" alt="Buscar Usos" style="border: 1px solid #55555;" /></p></body></html>
