<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Histórico de buscas recentes</b></p><p>Ao pesquisar uma sequência de caracteres de texto no arquivo, use o histórico de buscas recentes. Pressione <span class="shortcut">&shortcut:Find;</span> para abrir a barra de pesquisa e <span class="shortcut">&shortcut:ShowSearchHistory;</span> para rolar os resultados na lista dos últimos itens acessados.</p><p class="image"><img src="images/ij_tips_searchhistory.png" alt="Histórico de busca recente" style="border: 1px solid #55555;" /></p></body>
