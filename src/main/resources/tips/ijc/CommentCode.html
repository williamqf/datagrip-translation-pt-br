<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Comentar e remover comentários do código</b></p><p>Use um atalho para comentar e remover comentários de linhas e blocos de código:</p><p><span class="shortcut">&shortcut:CommentByLineComment;</span>: para comentários de uma linha (<span class="code_emphasis">//...</span>)</p><p><span class="shortcut">&shortcut:CommentByBlockComment;</span>: para comentários de bloco (<span class="code_emphasis">/*...*/</span>)</p></body></html>
