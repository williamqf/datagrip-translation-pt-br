<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Busca de Usos</b></p><p><span class="shortcut">&shortcut:FindUsages;</span> permite que você encontre rapidamente todas as ocorrências no código que referenciam o símbolo na posição do cursor. Não importa se o símbolo é uma classe, método, campo, parâmetro ou parte de uma declaração diferente.</p><p class="image"><img src="images/tips_find_usages.png" alt="Find Usages" style="border: 1px solid #55555;" /></p></body></html>
