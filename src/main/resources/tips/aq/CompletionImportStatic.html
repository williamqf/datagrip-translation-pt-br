<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Conclusão de Código</b></p><p>Para concluir rapidamente uma chamada de método para métodos estáticos em qualquer lugar do projeto, biblioteca ou JDK, digite um prefixo e pressione <span class="shortcut">&shortcut:CodeCompletion;</span> duas vezes. Pressione <span class="shortcut">&shortcut:ShowIntentionActions;</span> para importar o método selecionado.</p><p class="image"><img src="images/ij_tips_completion_import.png" alt="Importar na conclusão" style="border: 1px solid #55555;" /></p></body></html>
