<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>fechar todas as abas do editor</b></p><p>para fechar todas as abas do editor, clique com o botão direito do mouse em uma aba e selecione "<span class="control">fechar todas as abas</span>" .</p><p>para fechar todas as abas, exceto a ativa, pressione <span class="shortcut">Alt</span> (Windows e Linux) / <span class="shortcut">Alt</span> (macOS) e clique no botão "<span class="control">fechar</span>" da aba ativa.</p></body></html>
