<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Personalizar cores de código</b></p><p>Não está satisfeito com as cores do código? Pressione <span class="shortcut">&shortcut:GotoAction;</span>, digite <span class="code_emphasis">Jump</span> e clique em "<span class="control">Ir para cores e fontes</span> ". Isso levará você à página de configurações, onde poderá alterar as cores dos elementos de código na posição do cursor.</p></body></html>
