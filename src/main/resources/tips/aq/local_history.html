<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Histórico Local</b></p><p>Use o Histórico Local para rastrear todas as alterações em arquivos, classes, métodos ou partes do código e reverter para um ponto estável, se necessário. Para visualizar o Histórico Local, no menu principal, selecione "<span class="control">Arquivo | Histórico Local | Mostrar Histórico</span>".</p></body></html>
