<html><head><link rel="stylesheet" type="text/css" href="css/tips.css"/></head><body>
<p>
    Quando você pesquisa por uma classe, arquivo ou símbolo que tenha uma nomenclatura Camel-Case,
    é o suficiente para escrever as letras iniciais dos nomes das partes.
</p>
<p>
    Por exemplo, para encontrar <code>FormattableStringFactory</code>, você pode digitar
    <code>fsf</code>.
</p>
</body></html>
