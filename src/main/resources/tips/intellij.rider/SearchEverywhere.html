<p>
    Pressione <span class="shortcut">Shift</span> duas vezes para pesquisar um arquivo, classe ou qualquer símbolo na solução,
    ou mesmo uma ação, um elemento da interface do usuário ou uma configuração no IDE.
    Pressionar dupla <span class="shortcut">Shift</span> novamente estenderá a pesquisa para itens que não são de solução.
