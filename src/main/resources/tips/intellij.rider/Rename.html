<html><head><link rel="stylesheet" type="text/css" href="css/tips.css"/></head><body>
<p>
    Você pode renomear facilmente classes, métodos e variáveis com correção automática em todas as referências.<br/>
    Posicione o cursor sobre um símbolo e pressione <span class="shortcut">&shortcut:RenameElement;</span>
    (<span class="control">Refatorar | Renomear</span>).
    Digite o novo nome e pressione <span class="shortcut">&shortcut:EditorEnter;</span> quando estiver pronto.
</p>
</body></html>
