<p>
    Para criar uma nova variável com base na expressão selecionada, inicialize-a com a expressão
    e substitua todas as ocorrências da expressão pela variável, basta pressionar
    <span class="shortcut">&shortcut:IntroduceVariable;</span>
    (<span class="shortcut">Refatorar | Introduzir Variável</span>)
    e escolha o nome da nova variável.
</p>
