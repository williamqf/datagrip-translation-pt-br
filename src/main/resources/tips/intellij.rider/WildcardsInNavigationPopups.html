<html><head><link rel="stylesheet" type="text/css" href="css/tips.css"/></head><body>
<p>
    Para utilizar padrões de texto ao pesquisar por uma classe, arquivo ou símbolo, use
    <span class="code_emphasis">*</span> e <span class="code_emphasis">espaço</span>:
</p>
<ul><li>
    <p>
        <span class="code_emphasis">*</span>
        representa qualquer número de caracteres arbitrários.
    </p>
</li><li>
    <p>
        <span class="code_emphasis">espaço</span>
        marca o fim de um padrão. A string anterior é considerada não apenas um prefixo, mas um padrão completo.
    </p>
</li></ul>
</body></html>
