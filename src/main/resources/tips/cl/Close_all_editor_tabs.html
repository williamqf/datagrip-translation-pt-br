<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Fechar todas as abas do editor</b></p><p>Para fechar todas as abas do editor, clique com o botão direito do mouse e selecione "<span class="control">Fechar Todas as Abas</span>".</p><p>Para fechar todas as outras abas, exceto a aba ativa, pressione <span class="shortcut">Alt</span> (Windows e Linux) / <span class="shortcut">Alt</span> (macOS) e clique no botão "X" da aba ativa.</p></body></html>
