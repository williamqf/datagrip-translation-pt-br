<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Customizar cores da codificação</b></p><p>Se você não gosta das cores de codificação, pressione <span class="shortcut">&shortcut:GotoAction;</span> , digite <span class="code_emphasis">Jump</span> e clique em " <span class="control">Ir para cores e fontes</span> ". Você será levado para a página de configurações, onde pode alterar as cores dos elementos de codificação sob o cursor.</p></body></html>
