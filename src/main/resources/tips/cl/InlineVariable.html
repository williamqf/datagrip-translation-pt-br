<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Inline de variáveis</b></p><p>O refatoramento " <span class="control">Inline de variáveis</span> <span class="shortcut">&shortcut:Inline;</span>" ( <span class="control">Refatorar | Inline</span> ) substitui as ocorrências de uso de variáveis redundantes pelo valor atribuído a ela por último. </p><p class="image"><img src="images/cl_inlinevariable.png" alt="inline variable" style="border: 1px solid #55555;" /></p><p>Além disso, também é possível fazer inline de funções, parâmetros, constantes, macros e typedef.</p></body></html>
