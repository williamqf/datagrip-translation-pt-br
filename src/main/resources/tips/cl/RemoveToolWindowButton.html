<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Ocultar barra de ferramentas de janela</b></p><p>É possível ocultar barras de ferramentas de janelas que não sejam necessárias no momento.</p><p>Clique com o botão direito do mouse na barra de ferramentas da janela a ser ocultada e selecione "<span class="control">Remover da barra lateral</span> ".</p><p class="image"><img src="images/ac_tips-remove_from_sidebar.png" alt="Remover uma janela de ferramenta da barra lateral" style="border: 1px solid #55555;" /></p></body></html>
