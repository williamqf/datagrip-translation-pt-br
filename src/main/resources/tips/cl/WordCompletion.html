<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p>O preenchimento básico <span class="shortcut">&shortcut;:CodeCompletion;</span> permite que você complete palavras em comentários ou texto em diferentes tipos de arquivos. Todas as palavras que começarem com o prefixo que você digitou no arquivo atual serão apresentadas na lista de completamento.</p><p class="image"><img src="images/cl_wordcompletion.png" alt="Preenchimento de palavra" style="border: 1px solid #55555;" /></p></body></html>
