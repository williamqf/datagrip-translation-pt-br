<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Arquivo scratch</b></p><p>Um arquivo scratch é um arquivo temporário que permite que você experimente e protótipe código no editor sem criar um arquivo de projeto.</p><p>Para criar um arquivo scratch, pressione <span class="shortcut">&shortcut:NewScratchFile;</span> e selecione a linguagem que você deseja usar.</p></body></html>
