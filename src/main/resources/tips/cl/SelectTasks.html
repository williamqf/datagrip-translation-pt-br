<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Exclusão de tarefa</b></p><p>Quando você está lidando com uma longa lista de tarefas, não é necessário excluir uma tarefa por vez. Selecione várias tarefas usando as teclas <span class="shortcut">Shift</span> ou <span class="shortcut">Ctrl / Command</span>, clique na seta para a direita e clique em "<span class="control">Remover</span> ".</p></body></html>
