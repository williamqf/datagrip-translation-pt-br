<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Como comentar e remover comentários de blocos de códigos</b></p><p>Você pode remover comentários de linhas e blocos de códigos usando atalhos:</p><p><span class="shortcut">&shortcut:CommentByLineComment;</span>: Para comentários de uma linha(<span class="code_emphasis">//...</span>)</p><p><span class="shortcut">&shortcut:CommentByBlockComment;</span>: Para comentários em blocos(<span class="code_emphasis">/*...*/</span>)</p></body></html>
