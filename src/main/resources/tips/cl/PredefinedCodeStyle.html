<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p>Se você quiser usar estilos de código famosos como LLVM, Google, Stroustrup, poderá copiar a configuração de estilo de código desses estilos. Navegue até "<span class="control">Configurações | Editor | Estilo de código | C/C++</span>" e clique em "<span class="control">Selecionar e configurar... | Estilos predefinidos</span>".</p><p class="image"><img src="images/cl_predefinedstyles.png" alt="Estilo de código predefinido" style="border: 1px solid #55555;" /></p></body></html>
