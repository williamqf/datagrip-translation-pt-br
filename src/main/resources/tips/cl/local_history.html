<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Histórico Local</b></p><p>O histórico local permite rastrear todas as alterações em um arquivo e revertê-las para um ponto estável, caso necessário. Para exibir o histórico local, selecione <span class="control">Arquivo | Histórico Local | Exibir Histórico</span> no menu principal.</p></body></html>
