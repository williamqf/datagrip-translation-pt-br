<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p>É possível gerar rapidamente o stub para comentários no formato Doxygen. Para isso, digite no início <span class="code_emphasis">/**</span>, <span class="code_emphasis">/*!</span>, <span class="code_emphasis">///</span> ou <span class="code_emphasis">//!</span> e em seguida pressione <span class="shortcut">&shortcut:EditorEnter;</span>. Se o método tiver parâmetros, retornar valores ou lançar exceções, é possível preencher o corpo do documento com o stub.</p><p class="image"><img src="images/cl_generatedoxygen.png" alt="gerar comentários em doxygen" style="border: 1px solid #55555;" /></p></body></html>
