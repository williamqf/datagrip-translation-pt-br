<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Histórico de pesquisa recente</b></p><p>Ao pesquisar strings de texto em um arquivo, é possível utilizar o histórico de pesquisa recente. Mantenha pressionado <span class="shortcut">&shortcut:ShowSearchHistory;</span> ou clique no ícone da lupa com o painel de pesquisa aberto para visualizar uma lista das entradas recentes.</p><p class="image"><img src="images/cl_searchhistory.png" alt="Histórico de pesquisa recente" style="border: 1px solid #55555;" /></p></body></html>
