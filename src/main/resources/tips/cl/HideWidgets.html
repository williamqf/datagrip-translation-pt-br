<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Configurar widgets da barra de status</b></p><p>Você pode configurar o conjunto de widgets exibidos na barra de status. Para fazer isso, clique com o botão direito nos widgets e selecione os itens que deseja exibir.</p><p class="image"><img src="images/ij_tips_hide_widgets.png" alt="Pop-up de widgets" style="border: 1px solid #55555;" /></p></body></html>
