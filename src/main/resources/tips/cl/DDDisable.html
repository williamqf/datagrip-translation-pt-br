<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Arrastar e soltar para mover</b></p><p>Ative a opção "Ativar arrastar e soltar somente quando a tecla alt for pressionada" em "Configurações | Aparência e comportamento | Aparência | Opções de IU" para evitar mover acidentalmente botões da janela da ferramenta ou guias do editor.</p><p class="image"><img src="images/ps_tips-dddisable.png" alt="Opção Arrastar e soltar somente com Alt pressionado" style="border: 1px solid #55555;" /></p></body></html>
