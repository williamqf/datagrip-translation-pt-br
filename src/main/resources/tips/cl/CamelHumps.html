<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p>Ao usar a conclusão de código básico <span class="shortcut">&shortcut:CodeCompletion;</span> ou "Goto Class <span class="shortcut">&shortcut:GotoClass;</span>", não é necessário digitar maiúsculas em nomes com Camel Hump. Você pode digitar as primeiras letras em minúsculas e o nome com Camel Hump será reconhecido corretamente. </p><p class="image"><img src="images/cl_camelhumps.png" alt="Camel Humps" style="border: 1px solid #55555;" /></p></body></html>
