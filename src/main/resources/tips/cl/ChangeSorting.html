<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Ordenação de sugestões de preenchimento automático</b></p><p>Sugestões de preenchimento automático podem ser ordenadas por relevância ou ordem alfabética.</p><p>Para ordenar alfabeticamente, selecione a opção  "<span class="control">Ordenar por nome</span>". Para ordenar por relevância, desmarque a caixa de seleção "<span class="control">Ordenar por nome</span>".</p><p class="image"><img src="images/cl_completion_changesorting.png" alt="mudança de classificação de conclusão" style="border: 1px solid #55555;" /></p></body></html>
