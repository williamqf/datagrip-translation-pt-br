<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Delimitar trechos de código</b></p><p>Para delimitar rapidamente um bloco de código com um construto válido, selecione o bloco de código em questão no editor e pressione <span class="shortcut">&shortcut:SurroundWith;</span> (<span class="control">Code | Surround With</span>).</p><p class="image"><img src="images/cl_surroundwith.png" alt="Delimitar com" style="border: 1px solid #55555;" /></p></body></html>
