<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p>Quando um ícone de lâmpada é exibido ao lado de um símbolo no editor, isto significa que há um problema em potencial ou o CLion tem sugestões de melhorias para aquele código. Clique no ícone de lâmpada ou pressione <span class="shortcut">&shortcut:ShowIntentionActions;</span> para selecionar a melhor correção rápida. <p class="image"><img src="images/cl_quickfix.png" alt="quick fixes" style="border: 1px solid #55555;" /></p></p></body></html>
