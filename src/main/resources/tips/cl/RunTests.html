<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Executar testes</b></p><p>Para executar rapidamente todos os testes de um conjunto de testes, clique no botão <img src="images/app.actions.runAll.png" alt="o botão Executar todos"/> na sarjeta e selecione "Executar '<span class="control">&lt;TestSuite&gt;'</span>".</p><p>Para executar um único teste, clique no botão <img src="images/app.actions.execute.png" alt="o botão Executar"/> na sarjeta.</p></body></html>
