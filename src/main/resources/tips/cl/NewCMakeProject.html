<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p>Para criar um novo projeto CMake no CLion, invoque "<span class="control">Arquivo | Novo Projeto</span>" e selecione uma das opções C/C++. Você também pode importar o código-fonte CMake usando o comando "<span class="control">Arquivo | Novo Projeto CMake a partir do Código-fonte</span>".</p></body></html>
