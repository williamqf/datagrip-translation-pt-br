<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Acesse o Arquivo</b></p><p>Para abrir um arquivo rapidamente, pressione <span class="shortcut">&shortcut:GotoFile;</span> (<span class="control">Navegação | Arquivo</span>) e comece a digitar o nome do arquivo. Use o ícone de filtro para pesquisar somente o tipo de arquivo selecionado:</p><p class="image"><img src="images/cl_gotofile.png" alt="Acesse o arquivo" style="border: 1px solid #55555;" /></p></body></html>
