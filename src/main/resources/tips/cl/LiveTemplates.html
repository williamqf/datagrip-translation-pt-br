<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Live Templates</b></p><p>Live Templates permitem gerar rapidamente construções de códigos usadas com frequência. Por exemplo, <span class="code_emphasis">digite</span> for e <span class="shortcut">clique em Tab</span> para inserir o código do template de loop de processamento. <p class="image"><img src="images/cl_livetemplate_for.png" alt="exemplo de live template" style="border: 1px solid #55555;" /></p></p><p><span class="shortcut">Tab</span> ajuda você a navegar pelos campos do template.</p></body></html>
