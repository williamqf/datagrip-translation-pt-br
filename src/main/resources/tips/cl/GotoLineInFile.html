<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Ir para linha</b></p><p>Você pode abrir uma linha específica em um arquivo no editor. Pressione <span class="shortcut">&shortcut:GotoFile;</span> (<span class="control">Ir | Arquivo</span>) e comece a digitar o nome do arquivo e, em seguida, digite <span class="code_emphasis">:</span> após o número da linha.</p><p class="image"><img src="images/cl_gotolineinfile.png" alt="Ir para uma linha específica em um arquivo" style="border: 1px solid #55555;" /></p></body></html>
