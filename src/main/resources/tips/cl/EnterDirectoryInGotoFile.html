<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Pesquisa em diretório aninhado</b></p><p>Pressione <span class="shortcut">&shortcut:GotoFile;</span> e digite os diretórios de nível mais alto e o começo do nome do arquivo para navegar para arquivos em diretórios aninhados profundamente. Use `/` ou `\` como separador de caminhos.</p><p class="image"><img src="images/cl_directory_ingotofile.png" alt="Digite os diretórios para localizar um arquivo" style="border: 1px solid #55555;" /></p></body></html>
