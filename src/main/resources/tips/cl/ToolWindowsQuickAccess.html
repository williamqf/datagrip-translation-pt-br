<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Acesse rapidamente a janela de ferramentas</b></p><p>Passe o ponteiro do mouse sobre o <img src="images/app.general.tbHidden.png" alt="the Tool windows icon"/> no canto inferior esquerdo da janela do CLion para acessar rapidamente a janela de ferramentas disponível.</p><p>Uma lista das janelas de ferramentas será exibida, permitindo selecionar a desejada:</p><p class="image"><img src="images/ac_tips-showToolWindows.png" alt="Tool windows list" style="border: 1px solid #55555;" /></p></body></html>
