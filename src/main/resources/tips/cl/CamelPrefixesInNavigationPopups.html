<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>CamelCase para todas as pesquisas</b></p><p>O uso de CamelCase para a caixa pop-up "Pesquisar em todos os lugares" (pressione <span class="shortcut">Shift</span> duas vezes) permite filtrar a lista de resultados ao pesquisar por classes, arquivos ou símbolos.</p><p class="image"><img src="images/cl_camelhumps_search.png" alt="CamelHumps na pesquisa" style="border: 1px solid #55555;" /></p></body></html>
