<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Abrir</b></p><p>Para navegar em qualquer parte do caminho do arquivo, <span class="shortcut">Control+CliqueEsquerdo</span> (Windows e Linux) / <span class="shortcut">Control+CliqueEsquerdo</span> (macOS) na aba do editor. Ao selecionar o elemento desejado, ele será aberto no explorador de arquivos.</p><p class="image"><img src="images/cl_navigatetofilepath.png" alt="Navegar para o caminho do arquivo" style="border: 1px solid #55555;" /></p></body></html>
