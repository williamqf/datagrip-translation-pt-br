<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Fechar abas do editor</b></p><p>Você pode fechar abas do editor e das janelas de ferramentas sem usar comandos do menu de contexto. Para isso, clique no centro da aba que deseja fechar ou use <span class="shortcut">Shift+LeftClick</span>.</p></body></html>
