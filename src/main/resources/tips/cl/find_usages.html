<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Encontrar Usos</b></p><p><span class="shortcut">&shortcut:FindUsages;</span> Pressione para encontrar rapidamente todas as ocorrências de código que fazem referência ao símbolo na posição do cursor. Não importa se o símbolo é uma classe, método, campo, parâmetro ou parte de outra declaração.</p><p class="image"><img src="images/cl_findusages.png" alt="Find Usages" style="border: 1px solid #55555;" /></p></body></html>
