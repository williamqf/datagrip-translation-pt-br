<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p>Para abrir uma classe rapidamente no editor, pressione <span class="shortcut">&shortcut:GotoClass;</span> (<span class="control">Navegar | Classe</span>) e comece a digitar o nome da classe.</p><p class="image"><img src="images/cl_gotoclass.png" alt="ir para a classe" style="border: 1px solid #55555;" /></p><p>Da mesma forma, você pode usar <span class="shortcut">&shortcut:GotoFile;</span> (<span class="control">Navegar | Arquivo</span>) para abrir qualquer arquivo no projeto.</p></body></html>
