<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b> Selecionar no Local </b></p><p> Para selecionar rapidamente no outro Editor o elemento que está sendo editado no momento (<span class="control">Project View</span> ou <span class="control">File Structure</span>, por exemplo) pressione <span class="shortcut">&shortcut:SelectIn;</span> ou use o comando <span class="control">Goto | Select in...</span>:</p><p class="image"><img src="images/cl_selectin.png" alt="Select In popup" style="border: 1px solid #55555;" /></p></body></html>
