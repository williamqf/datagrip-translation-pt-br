<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Extração de função</b></p><p>A refatoração "<span class="control">Extract Method</span>" (Extrair Método) cria uma função a partir de um trecho de código. Selecione o bloco de código e pressione <span class="shortcut">&shortcut:ExtractMethod;</span> (<span class="control">Refatoração | Extrair | Método</span>).</p><p class="image"><img src="images/cl_extractmethod.png" alt="extract method" style="border: 1px solid #55555;" /></p></body></html>
