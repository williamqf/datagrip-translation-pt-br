<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Preenchimento de código Hippie</b></p><p>O <span class="shortcut">&shortcut:HippieCompletion;</span> permite que você complete strings no seu escopo de exibição. Nesse caso, os protótipos são realçados.</p><p class="image"><img src="images/cl_hippiecompletion.png" alt="Hippie completion" style="border: 1px solid #55555;" /></p><p>O <span class="shortcut">&shortcut:HippieBackwardCompletion;</span> permite que você execute a mesma ação na ordem inversa.</p></body></html>
