<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Alternar Esquema</b></p><p>Do editor, com apenas uma atalho de teclado, você pode aplicar um estilo de código, esquema de cores ou mapa de teclas diferente. Pressione <span class="shortcut">&shortcut:QuickChangeScheme;</span> (<span class="control">Exibir | Alternar Esquema Rapidamente</span>) para especificar o esquema para o qual deseja alternar.</p></body></html>
