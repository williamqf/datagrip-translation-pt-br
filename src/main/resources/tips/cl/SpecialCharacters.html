<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Substituição de Caracteres Especiais</b></p><p>Os caracteres especiais em um arquivo XML ou HTML podem ser substituídos por um valor ASCII iniciando com um apóstrofo. Para isso, selecione os caracteres e no menu principal vá em:<span class="control">Editar | Codificar Caracteres Especiais XML/HTML</span> .</p></body></html>
