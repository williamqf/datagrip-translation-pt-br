<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Pré-visualização de resultados de pesquisa</b></p><p>Você pode usar a área "Pré-visualização" na caixa de diálogo "Localizar em Arquivo" (<span class="shortcut">&shortcut:FindInPath;</span>) para pesquisar com mais praticidade, sem sair da caixa de diálogo. A caixa de diálogo "Pré-visualização" exibe os 100 primeiros resultados.</p></body></html>
