<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Selecionar vários trechos do código</b></p><p>Para selecionar vários fragmentos de texto, mantenha pressionada a combinação <span class="shortcut">Shift+Alt+Ctrl</span> (Windows e Linux) ou <span class="shortcut">Shift+Alt (Option)+Cmd</span> (macOS) e arraste o mouse sobre o texto. </p></body></html>
