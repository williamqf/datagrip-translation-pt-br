<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Pesquisa de configurações e plugins</b></p><p>No campo de pesquisa da janela "Pesquisa em todos os lugares" (<span class="shortcut">Shift</span> duas vezes), digite <span class="code_emphasis">/</span> para pesquisar grupos de configurações, opções e plugins.</p><p class="image"><img src="images/ac_tips_search_everywhere_settings.png" alt="Pesquisar em todos os lugares: configurações, plugins, mapeamentos de URL" style="border: 1px solid #55555;" /></p></body></html>
