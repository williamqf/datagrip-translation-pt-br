<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Documentação de código rápida</b></p><p>Para visualizar rapidamente a documentação de uma classe ou método na posição do cursor, pressione <span class="shortcut">&shortcut:QuickJavaDoc;</span> (<span class="control">Exibir | Documentação rápida</span>).</p><p class="image"><img src="images/cl_quickdoc.png" alt="documentação rápida" style="border: 1px solid #55555;" /></p></body></html>
