<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p>Para extrair membros de classe para uma subclasse ou superclasse, utilize a refatoração "<span class="control">Refatoração | Extrair | Subclasse</span> " ou "<span class="control">Refatoração | Extrair | Superclasse</span> ". </p><p>O CLion realça os membros dependentes para que você não os deixe de lado ao aplicar alterações.</p><p class="image"><img src="images/cl_extractclass.png" alt="extract superclass" style="border: 1px solid #55555;" /></p></body></html>
