<html><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Ordenação de sugestões</b></p><p>As sugestões podem ser ordenadas por relevância ou em ordem alfabética.</p><p>Para ordenar em ordem alfabética, selecione a opção "<span class="control">Ordenar por nome</span>". Para ordenar por relevância, desmarque a caixa de seleção "<span class="control">Ordenar por nome</span>".</p></body></html>
