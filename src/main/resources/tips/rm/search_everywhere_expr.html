<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Avaliar expressões</b></p><p>Com a janela "<span class="control">Buscar em qualquer lugar</span>" (pressione <span class="shortcut">Shift</span> 2 vezes), é possível avaliar expressões aritméticas simples.</p><p>Digite a expressão que deseja avaliar no campo de pesquisa. O resultado da avaliação será exibido junto aos resultados da busca.</p><p class="image"><img src="images/tips_evaluate_expression.png" alt="Evaluate expression" style="border: 1px solid #55555;" /></p></body></html>
