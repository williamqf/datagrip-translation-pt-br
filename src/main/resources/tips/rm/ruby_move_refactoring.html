<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Refatoração de movimentação</b></p><p>O RubyMine permite mover módulos e classes para um nível superior. Para isso, posicione o cursor no nome do módulo/classe e selecione "<span class="control">Refatoração | Mover</span> " ou pressione <span class="shortcut">&shortcut:Mover;</span> .</p></body></html>
