<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Fechando abas de editor</b></p><p>Para fechar todas as abas de editor exceto a atual, mantenha pressionada a tecla <span class="shortcut">Alt</span> (Windows e Linux) / <span class="shortcut">Alt</span> (macOS) e clique no ícone de cruz da aba de editor atual.</p></body></html>
