<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Extração de método</b></p><p>A refatoração "<span class="control">Extração de método</span>" cria um método a partir de uma seção de código. Selecione o bloco de código e pressione <span class="shortcut">&shortcut:ExtractMethod;</span> (<span class="control">Refatoração | Extração | Método</span>).</p></body></html>
