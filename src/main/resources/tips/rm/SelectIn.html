<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Selecionar in-place</b></p><p>Para selecionar rapidamente o elemento (classe, arquivo, método ou campo) que está editando atualmente em outro modo de exibição, pressione <span class="shortcut">&shortcut:SelectIn;</span> ou invoque "<span class="control">Navegar | Ir para Seleção</span>".</p><p class="image"><img src="images/rm_tips_selectin.png" alt="Popup de Selecionar no local" style="border: 1px solid #55555;" /></p></body></html>
