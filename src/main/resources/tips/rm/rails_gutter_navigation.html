<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Navegar para arquivo de view</b></p><p>Para navegar para um arquivo de view relacionado a uma ação, abra o controlador correspondente, encontre a ação desejada e clique no ícone de sarjeta ao lado da definição da ação.</p><p class="image"><img src="images/rm_navigate_rails_action_view.png" alt="Navegar do controlador para view" style="border: 1px solid #55555;" /></p></body></html>
