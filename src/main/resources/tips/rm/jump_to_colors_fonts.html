<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Personalizar a cor do código</b></p><p>Se as cores do código não lhe agradam, pressione <span class="shortcut">&shortcut:GotoAction;</span>, digite <span class="code_emphasis">Jump</span> e clique em "<span class="control">Ir para cores e fontes</span>". Isso o levará à página de configurações, na qual é possível alterar a cor dos elementos do código na posição do cursor.</p></body></html>
