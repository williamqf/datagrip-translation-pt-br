 <html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Configure cores em arquivos CSS</b></p><p>No RubyMine, é fácil especificar cores em arquivos CSS. Na lateral do editor, há um ícone com a cor correspondente à propriedade <span class="code_emphasis">color</span>. Clique no ícone para escolher a cor desejada usando o seletor de cores.</p></body></html>
