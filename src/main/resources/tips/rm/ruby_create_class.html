<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Como criar um novo arquivo, classe ou módulo em Ruby</b></p><p>Para criar um novo arquivo, classe ou módulo em Ruby, selecione o diretório desejado e pressione <span class="shortcut">&shortcut:Generate;</span>. Especifique o nome necessário e, se preciso, selecione um dos seguintes: <span class="control">arquivo</span>, <span class="control">classe</span> ou <span class="control">módulo</span>.</p></body></html>
