<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Instalar gemas ausentes</b></p><p>É possível instalar as gemas ausentes usando a Inspeção de ação fornecida pelo IDE "<span class="control">Gem ausente</span>". Por exemplo, abra o Gemfile, posicione o cursor na gema ausente destacada no SDK do projeto e pressione <span class="shortcut">&shortcut:ShowIntentionActions;</span>.</p><p class="image"><img src="images/rm_gems_gemfile_install_intention.png" alt="Inspeção do Gemfile" style="border: 1px solid #55555;" /></p></body></html>
