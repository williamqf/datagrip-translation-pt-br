<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Tente a nova UI</b></p><p>Experimente a nova interface do usuário do RubyMine. Pressione <span class="shortcut">&shortcut:ShowSettings;</span> para abrir as configurações do IDE e selecione "<span class="shortcut">Aparência e comportamento | Nova UI</span> ". Selecione a caixa de seleção "<span class="control">Habilitar nova UI</span> " para aplicar as alterações. Reinicie o IDE.</p><p class="image"><img src="images/rm_new_ui.png" alt="Nova UI" style="border: 1px solid #55555;" /></p></body></html>
