<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Arquivo scratch</b></p><p>O arquivo scratch é um arquivo temporário que permite experimentar e prototipar código no editor sem a necessidade de criar um arquivo de projeto.</p><p>Para criar um arquivo scratch, pressione <span class="shortcut">&shortcut:NewScratchFile;</span> e selecione o idioma que deseja usar.</p></body></html>
