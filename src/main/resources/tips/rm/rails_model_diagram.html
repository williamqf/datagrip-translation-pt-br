<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Diagrama de Modelo Rails</b></p><p>Projetando um modelo rails você pode visualizar o diagrama de relacionamentos do model rails. Para fazer isso, use o atalho <span class="shortcut">&shortcut:ShowUmlDiagram;</span> e a partir do menu suspenso, selecione "<span class="control">Diagrama de Relacionamento do Modelo Rails</span>" e pressione <span class="shortcut">&shortcut:EditorEnter;</span>.</p><p class="image"><img src="images/rm_diagram_model_example.png" alt="Rails model diagram" style="border: 1px solid #55555;" /></p></body></html>
