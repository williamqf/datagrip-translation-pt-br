<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Recarregar geradores de Rails</b></p><p>Se a lista de geradores de Rails parecer incompleta, pressione <span class="shortcut">Control</span> 2 vezes. Comece a digitar <span class="code_emphasis">rails --generate</span> e selecione este comando na lista e pressione <span class="shortcut">&shortcut:EditorEnter;</span>.</p></body></html>
