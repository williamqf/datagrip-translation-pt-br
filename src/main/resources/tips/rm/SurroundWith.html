<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Envolva um bloco de código</b></p><p>Para envolver rapidamente um dado bloco de código em um construto válido, selecione o bloco de código em questão no editor e pressione <span class="shortcut">&shortcut:SurroundWith;</span> ( <span class="control">Código | Envolver</span>).</p><p>A lista de opções ou wrappers disponíveis varia conforme o contexto e a linguagem.</p><p class="image"><img src="images/rm_generate_code_surround.png" alt="wrap code into the if statement" style="border: 1px solid #55555;" /></p></body></html>
