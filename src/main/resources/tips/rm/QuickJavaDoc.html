<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Documentação rápida de código</b></p><p>Para ver rapidamente a documentação da classe ou método na posição do cursor, pressione <span class="shortcut">&shortcut:QuickJavaDoc;</span> (<span class="control">Exibir | Documentação rápida</span>) .</p><p class="image"><img src="images/rm_view_reference_quick_doc.png" alt="Pop-up da documentação rápida" style="border: 1px solid #55555;" /></p></body></html>
