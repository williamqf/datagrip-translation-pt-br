<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Mudar esquema</b></p><p>Do editor com uma única ação do teclado, pode aplicar um estilo diferente de código, esquema de cores ou mapa de teclas. <span class="shortcut">&shortcut:QuickChangeScheme;</span> (<span class="control">Exibir | Mudar esquema rapidamente</span>) o pressionará para especificar o esquema que vai mudar.</p></body></html>
