<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Histórico local</b></p><p>Você pode usar o histórico local para rastrear todas as alterações feitas em um arquivo, classe, método ou localização de código e voltar à um ponto estável quando necessário. Para exibir o histórico local, selecione <span class="control">Arquivo | Histórico local | Exibir histórico</span> no menu principal.</p></body></html>
