<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Geração de protótipos RBS</b></p><p>Se você deseja adicionar tipos RBS ao seu projeto, você pode começar gerando um protótipo de assinatura. Abra um arquivo Ruby e pressione <span class="shortcut">&shortcut:Generate;</span>. Depois selecione "<span class="control">Assinatura de tipo</span>" no popup "<span class="control">Gerar</span>".</p><p class="image"><img src="images/rm_tips_generate_rbs_prototype.png" alt="Generste an RBS prototype" style="border: 1px solid #55555;" /></p></body></html>
