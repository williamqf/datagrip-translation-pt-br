<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Faça um backup de uma tabela</b></p><p>Para criar uma cópia de backup de uma tabela, arraste a tabela ao nó <span class="control">tables</span> da mesma fonte de dados na exibição em árvore do banco de dados. Digite um novo nome e clique em <span class="control">Executar</span>.</p><p class="image"><img src="images/tips_db_back_up_table.png" alt="Faça um backup de uma tabela" style="border: 1px solid #55555;" /></p></body></html>
