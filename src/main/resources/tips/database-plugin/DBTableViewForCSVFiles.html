<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Arraste o arquivo CSV para criar uma tabela</b></p><p>Para adicionar dados de um arquivo CSV, arraste o arquivo para o nó <span class="control">tables</span> de uma fonte de dados ou para a tabela.</p><p>Você pode visualizar arquivos CSV e TSV como texto ou como uma tabela.</p></body></html>
